process_template: Basic

types:
  Epic:
    facets: [plannable]
    filing_eligible: false
    max_nesting_depth: 1
    decomposition_guidance: |
      Always decompose into Issues. Epics are never implemented directly.
  Issue:
    facets: [plannable, implementable]
    filing_eligible: true
    max_nesting_depth: 1
    decomposition_guidance: |
      Decompose into Tasks when scope exceeds a single PG (~2000 LoC).
      Implement directly when the change is focused and fits one PG.
  Task:
    facets: [implementable, actionable]
    facet_order: [actionable, implementable]
    actionable_executor: polyphony
    filing_eligible: true

transitions:
  Epic:
    begin_planning: Doing
    begin_implementation: Doing
    implementation_complete: Done
    all_children_complete: Done
    item_satisfied: Done
  Issue:
    begin_planning: Doing
    begin_implementation: Doing
    implementation_complete: Done
    item_satisfied: Done
  Task:
    begin_implementation: Doing
    implementation_complete: Done
    item_satisfied: Done

# Per-type state→category mapping. The user-owned source of truth for what
# category each named state belongs to. Required as of issue #281; V-21
# blocks loading when missing or incomplete. Categories: proposed,
# in_progress, resolved, completed, removed.
states:
  Epic:
    To Do: proposed
    Doing: in_progress
    Done: completed
  Issue:
    To Do: proposed
    Doing: in_progress
    Done: completed
  Task:
    To Do: proposed
    Doing: in_progress
    Done: completed

review_policies:
  planning:
    plan_pr: { agent_review: true, human_review: true, auto_merge: false }
  implementation:
    merge_group_pr: { agent_review: true, human_review: false, auto_merge: true }
    feature_pr: { agent_review: true, human_review: true, auto_merge: false }
  remediation:
    merge_group_pr: { agent_review: true, human_review: false, auto_merge: true }

branch_strategy:
  feature_branch: "feature/{root_id}-{slug}"
  planning_branch: "planning/{root_id}"
  merge_group_branch: "mg-{n}/{root_id}-{slug}"
  target: main

platform: github

