schema_version: 1

# .polyphony-config/policy-fasttrack.yaml — opt-in unattended policy.
#
# USE WHEN:
#   You want a polyphony run to skip every gate that policy can govern —
#   approvals, PR merges, open-questions, root_fallback, and renegotiation —
#   because you're driving from a research script, an unattended dogfood,
#   or a CI smoke run where any human prompt would deadlock the process.
#
# HOW TO ACTIVATE (per-shell):
#   $env:POLYPHONY_POLICY_PATH = '.polyphony-config/policy-fasttrack.yaml'
#   .\scripts\Invoke-PolyphonySdlc.ps1 -ApexId <N> -Platform <ado|github>
#
# OR (per-launch, recommended):
#   .\scripts\Invoke-PolyphonySdlc.ps1 -ApexId <N> -Platform <ado|github> `
#     -PolicyPath .polyphony-config/policy-fasttrack.yaml
#
# CAVEAT — necessary but NOT sufficient for fully unattended runs.
# Many human gates in the workflow YAMLs are *deterministic* (not policy-
# governed): see AB#3104 for the audit. The first wave of those gates is
# now policy-controllable via the `unattended` block below. Wave 1 (this PR)
# wires: apex_completion_gate, user_acceptance, pending_review_gate,
# stuck_review_gate. Remaining 18 gates ship in a follow-on PR — until then
# they still fire even with this policy active.
#
# WHAT THIS POLICY DOES:
#   • approvals: auto everywhere — approve at the highest tolerated quality.
#   • pr:        auto everywhere — auto-merge unless the cap is hit hard.
#   • open_questions: auto — never gate, even on critical questions.
#   • root_fallback: use_active_item — never prompt for a missing root id.
#   • renegotiation: ignore — treat child renegotiation requests as advisory.
#   • unattended: auto / skip / auto_proceed — bypass the wired Bucket-C gates.
#                 (review_wait_mode: skip — the previous `auto` magic-comment
#                 mode was removed in the sentiment-driven PR-review loop;
#                 see issue #444 for re-enablement via platform vote APIs.)
#   • concurrency: unchanged from canonical defaults.

approvals:
  defaults:
    mode: auto
    max_revision_cycles: 5
    quality_threshold:
      avg_score_at_least: 85
      blocking_count_at_most: 0
  root:
    mode: auto
  by_type:
    Task:
      mode: auto

pr:
  defaults:
    mode: auto
    max_fix_loops: 10
    max_remediation_cycles: 3
  root:
    mode: auto

concurrency:
  max_concurrent_children: 3

open_questions:
  defaults:
    mode: auto
    min_severity: moderate
    max_question_loops: 3

root_fallback:
  # use_active_item — never surface the missing-root gate; treat the
  # invoking sub-workflow's active item as root. Auditable via
  # auto_policy_applied: true on the recorded decision.
  auto_decide: use_active_item

renegotiation:
  # ignore — treat child renegotiation requests as advisory; do not
  # restart the parent plan-level workflow and do not prompt the operator.
  auto_decide: ignore

unattended:
  # acceptance_mode: auto / manual
  # review_wait_mode: wait / skip   (`auto` is rejected — see issue #444)
  # cap_mode: auto_proceed / auto_fail / manual
  #
  # Bypass the wired Bucket-C deterministic human gates so the run
  # completes hands-off. PR1 (AB#3104) wires:
  # apex_completion_gate, user_acceptance, pending_review_gate,
  # stuck_review_gate. Additional gates land in PR2 — see AB#3104.
  #
  # `review_wait_mode: skip` keeps polling silently instead of escalating
  # to a human throttle gate; combined with `acceptance_mode: auto` and
  # `cap_mode: auto_proceed` this is the closest hands-off configuration
  # currently available. The previous `auto` value posted a SHA-bound
  # `polyphony:approve` magic comment to converge the poll loop on its
  # own, but that path was removed in the sentiment-driven PR-review loop
  # (PRs #438 / #440) and is now rejected by the loader and the workflow
  # router. Re-enablement via platform vote APIs is tracked in issue #444.
  acceptance_mode: auto
  review_wait_mode: skip
  cap_mode: auto_proceed
