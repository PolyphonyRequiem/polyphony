schema_version: 1

# .conductor/policy.yaml — polyphony's own SDLC policy.
#
# Loaded by `polyphony policy load` at the start of every workflow run.
# Consumed at decision points via
# `polyphony policy resolve --scope <root|type:Name|default> --domain <approvals|pr>`.
#
# CURRENT CONFIGURATION:
# • Root work items (Epic-level): manual approval gate — always requires sign-off
# • All other items: warning mode — gates only when quality bar is missed or fix loop cap hit
# • PR merge: warning mode — auto-merges unless major issues remain at fix-loop cap
# • Planning parallelism: up to 3 concurrent child workflows per recursion frame
# • Implementation parallelism: up to 3 concurrent PG implementations per feature
#
# HOW IT WORKS:
# Policy resolution uses three scopes (most-specific-wins):
#   root          — the root work item passed via -i work_item_id=<N>
#   type:<Name>   — any item of that type (e.g. type:Issue, type:Task)
#   defaults      — fallback for everything else
#
# Gate modes (both approvals and pr):
#   auto     — never gate. Auto-approves or auto-merges if quality bar clears.
#              If revision/fix-loop cap hits, gates only if threshold is missed (or issues remain).
#   warning  — gates only when human attention needed (threshold miss at cap, or issues at cap).
#   manual   — always gates; requires explicit human sign-off.

approvals:
  # ACTIVE DEFAULTS: Warning mode gates for all items.
  # — Allows 5 revision cycles before gating
  # — Gates only when reviewer score < 90 OR violations remain at cap
  # — No gate if score ≥ 90 and no blocking issues
  defaults:
    mode: warning
    max_revision_cycles: 5
    quality_threshold:
      avg_score_at_least: 85
      blocking_count_at_most: 0

  # ACTIVE: Root work item overrides to manual.
  # — Ensures Epic-level items always require explicit human sign-off
  # — Prevents automatic approval regardless of score
  root:
    mode: manual

  # ACTIVE OVERRIDE: Tasks auto-approve when score ≥ 90.
  # — Speeds up routine task planning by skipping gate for clean reviews
  # — Still gates if score < 90 or blocking issues at revision cap
  by_type:
  # Epic: (inherits root: manual — always gates)
    Task:
      mode: auto

pr:
  # ACTIVE DEFAULTS: Warning mode for all PRs.
  # — Allows 10 fix loops and 3 remediation cycles before gating
  # — Auto-merges if no major issues remain at fix-loop cap
  # — Gates only if major issues unresolved at cap
  defaults:
    mode: auto
    max_fix_loops: 10
    max_remediation_cycles: 3

  # Per-scope overrides (commented out — use to apply different gates to specific items).
  # Example: uncomment root to require manual merge approval for root PRs.
  root:
    mode: manual
  # by_type:
  #   Task:
  #     mode: auto

concurrency:
  # ACTIVE: Planning and implementation parallelism limits.
  # — Up to 3 child workflows planned concurrently per recursion frame
  # — Up to 3 plans executed in parallel per planning wave
  #   (prevents overwhelming the orchestrator with too many simultaneous plans)
  max_concurrent_children: 3

open_questions:
  # ACTIVE DEFAULTS: Warning mode for open questions gate.
  # — Gates only when questions at or above min_severity exist
  # — Auto-proceeds after max_question_loops answer cycles (prevents infinite loops)
  # — Low-severity questions pass through without gating unless mode=manual
  #
  # Gate modes:
  #   auto     — never gate on open questions; questions still appear in the plan
  #              for documentation but do not stop the workflow.
  #   warning  — gates only when at least one question meets min_severity threshold.
  #   manual   — always gates if any question exists, regardless of severity.
  #
  # Severity levels (ordered): critical > major > moderate > low
  # severities_at_or_above(min_severity) returns all severities >= the threshold.
  # Example: min_severity=major → gates on critical and major only.
  defaults:
    mode: warning
    min_severity: moderate
    max_question_loops: 3

  # Per-scope overrides:
  # root:
  #   mode: manual       # Root items always gate on open questions
  # by_type:
  #   Task:
  #     mode: auto       # Tasks skip question gate entirely
  #   Epic:
  #     mode: manual     # Epics always gate regardless of severity

root_fallback:
  # ACTIVE DEFAULTS: Surface the human gate when a sub-workflow is invoked
  # without a root work-item id. Consumed by the shared
  # `.conductor/registry/workflows/root-fallback-gate.yaml` sub-workflow.
  #
  # Auto-decide policy (one of `prompt`, `use_active_item`, `abort`):
  #   prompt           — surface the root-fallback human gate (default).
  #                      Operator picks use_active_item or abort.
  #   use_active_item  — auto-resolve: treat the calling sub-workflow's
  #                      active work item as the root. The decision is
  #                      logged with `auto_policy_applied: true` so an
  #                      auditor can distinguish a policy bypass from a
  #                      human pick. Use this in workspaces where every
  #                      sub-workflow legitimately operates on its
  #                      invocation-target as root.
  #   abort            — auto-resolve: fail the workflow with a clear
  #                      error. Use this in strict workspaces where a
  #                      missing root is always a bug worth surfacing
  #                      loudly.
  auto_decide: prompt

renegotiation:
  # ACTIVE DEFAULTS: Surface the renegotiation human gate when a child
  # plan-level sub-workflow returns `renegotiation_pending=true`. Consumed
  # by the `.conductor/registry/workflows/apex-driver.yaml` workflow.
  #
  # Auto-decide policy (one of `prompt`, `auto_restart`, `ignore`):
  #   prompt        — surface the renegotiation human gate (default).
  #                   Operator picks renegotiate / override / abort.
  #   auto_restart  — auto-resolve: re-enter the parent's plan-level
  #                   workflow so the parent can re-author its plan to
  #                   accommodate the child. MVP: stub — apex-driver
  #                   currently treats this identically to `prompt`
  #                   until the auto-restart loop ships in a follow-up.
  #   ignore        — auto-resolve: treat the child plan as accepted and
  #                   continue. Use this when child renegotiation
  #                   requests are advisory rather than blocking.
  auto_decide: prompt

