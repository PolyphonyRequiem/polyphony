# ado-pr — Azure DevOps PR lifecycle: poll → merge.
#
# Platform-specific PR sub-workflow for Azure DevOps. Polyphony does NOT
# auto-review on ADO; reviewers vote natively in the ADO UI. This workflow
# polls PR status (single-shot) and acts on the platform-aggregated
# decision:
#
#   merged            → emit merged=true (idempotent re-entry path)
#   approved          → ado_pr_merger (calls `pr merge-feature-ado`)
#   changes_requested → human gate (operator triages)
#   pending           → human gate (operator waits / re-polls)
#   closed            → human gate (operator triages)
#   error             → human gate (operator retries / aborts)
#
# Interface contract: same inputs and outputs as github-pr.yaml plus
# (organization, project, repository, root_id) for the ADO REST verbs.
#
# This is the FIRST workflow that uses platform-native review (no
# in-workflow LLM verdict). Per Phase 5 design, github-pr.yaml's LLM
# reviewer model is the legacy pattern; ado-pr.yaml v2 is the canonical
# platform-native pattern. Future enhancement: optional advisory LLM
# reviewer that posts via `pr vote-ado` (deferred — needs `pr post-comment-ado`
# which doesn't exist yet).
#
# Invariants:
#   Pre:  PR exists (created upstream by feature-pr.yaml's
#         feature_pr_creator_ado); platform is 'ado'; ADO connection
#         inputs (organization, project, repository) are non-empty.
#   Post: PR is merged (merged=true) — or operator-driven exit (merged=false
#         triggers remediation cycle in feature-pr.yaml; abort exits with
#         merged=false and no remediation).

workflow:
  name: ado-pr
  description: >-
    ADO PR lifecycle. Polls PR status via `pr poll-status-ado`; routes on
    the platform-aggregated decision. When approved, merges via
    `pr merge-feature-ado`. Operator-driven human gates for changes_requested,
    pending, closed, error, and merge-failed states.
  version: "2.3.0"
  entry_point: ado_inputs_validator
  metadata:
    min_polyphony_version: "2.3.0"

  limits:
    # Generous cap — operator may re-poll many times via the pending /
    # changes_requested gates while human reviewers work.
    max_iterations: 200

  input:
    pr_number:
      type: number
      required: true
      description: ADO pull request ID (created upstream by feature_pr_creator_ado)
    branch_name:
      type: string
      required: true
      description: Source branch name for the PR (typically `feature/{root}`)
    target_branch:
      type: string
      required: true
      description: Target branch the PR merges into (typically `main`)
    review_policy:
      type: string
      required: false
      default: "manual"
      description: >-
        Review policy. ADO has only one mode today (`manual` — humans review
        natively). Reserved for future LLM-advisory mode.
    organization:
      type: string
      required: false
      default: ""
      description: >-
        ADO organization name (e.g. `contoso`). Required by `pr poll-status-ado`
        and `pr merge-feature-ado`. When blank, ado_inputs_validator routes to
        the inputs-missing gate.
    project:
      type: string
      required: false
      default: ""
      description: ADO project name. Required when invoking ADO verbs.
    repository:
      type: string
      required: false
      default: ""
      description: >-
        ADO repository identifier — GUID or name; both accepted by the verbs.
        Required when invoking ADO verbs.
    root_id:
      type: number
      required: false
      default: 0
      description: >-
        Root work-item id of the run's apex. Used by `pr merge-feature-ado`
        to derive the head branch (`feature/{root_id}`). When zero,
        ado_inputs_validator routes to the inputs-missing gate.

tools:
  - filesystem

output:
  # Per M3, guard `is defined` because only ONE of the terminal-emitter
  # paths runs in any given execution. Per M7, pipe booleans through
  # `| string | lower` so the parent receives a real bool rather than
  # capital "True"/"False".
  merged: >-
    {%- if ado_pr_merger is defined and ado_pr_merger.output.merged == true -%}true
    {%- elif ado_pr_already_merged_emitter is defined -%}true
    {%- elif ado_pr_treat_as_merged_emitter is defined -%}true
    {%- else -%}false
    {%- endif %}
  pr_url: >-
    {%- if ado_pr_status_check is defined -%}{{ ado_pr_status_check.output.pr_url | default('') }}
    {%- else -%}{% endif -%}

agents:
  # ── ADO connection-inputs validator ─────────────────────────────────────
  #
  # Validates that organization, project, repository, and root_id are all
  # supplied. Mirrors the upstream check in feature-pr.yaml's
  # pr_platform_router so ado-pr.yaml fails fast and clearly when invoked
  # standalone (or when an upstream caller forgets to thread the inputs)
  # without burning an ADO API call that would just return invalid_argument.
  #
  # Emits `{ ado_inputs_ready: bool, missing: '<csv>' }`.
  #
  # Invariants:
  #   Pre:  Workflow inputs are present (default-empty for the optional
  #         ADO connection inputs).
  #   Post: Routes to ado_pr_status_check (inputs ready) or
  #         ado_inputs_missing_gate (any of the four blank/zero).
  - name: ado_inputs_validator
    type: script
    description: Validate ADO connection inputs are present before invoking ADO verbs
    command: pwsh
    args:
      - "-NoProfile"
      - "-Command"
      - >-
        $org = '{{ workflow.input.organization }}';
        $proj = '{{ workflow.input.project }}';
        $repo = '{{ workflow.input.repository }}';
        $root = '{{ workflow.input.root_id }}';
        $missing = @();
        if ([string]::IsNullOrWhiteSpace($org)) { $missing += 'organization' };
        if ([string]::IsNullOrWhiteSpace($proj)) { $missing += 'project' };
        if ([string]::IsNullOrWhiteSpace($repo)) { $missing += 'repository' };
        if ([string]::IsNullOrWhiteSpace($root) -or $root -eq '0') { $missing += 'root_id' };
        $ready = ($missing.Count -eq 0);
        @{ ado_inputs_ready = $ready; missing = ($missing -join ',') } | ConvertTo-Json -Compress
    routes:
      - to: ado_pr_status_check
        when: "{{ ado_inputs_validator.output.ado_inputs_ready == true }}"
      - to: ado_inputs_missing_gate
        when: "{{ ado_inputs_validator.output.ado_inputs_ready == false }}"
      # Catch-all per M4: malformed validator output -> inputs-missing gate.
      - to: ado_inputs_missing_gate

  # ── ADO PR status check ─────────────────────────────────────────────────
  #
  # Single-shot poll of the ADO PR via `polyphony pr poll-status-ado`.
  # Returns a platform-neutral `state` (merged | closed | approved |
  # changes_requested | pending | error). Routes per state.
  #
  # No automatic polling loop — operator drives re-polling via the
  # human gates (re-poll routes back to this agent).
  #
  # Invariants:
  #   Pre:  ADO inputs validated; PR exists.
  #   Post: Routes per output.state to merger / emitter / human gate.
  - name: ado_pr_status_check
    type: script
    description: Poll ADO PR status (single shot) — routes on platform-aggregated decision
    command: polyphony
    args:
      - "pr"
      - "poll-status-ado"
      - "--organization"
      - "{{ workflow.input.organization }}"
      - "--project"
      - "{{ workflow.input.project }}"
      - "--repository-id"
      - "{{ workflow.input.repository }}"
      - "--pr-number"
      - "{{ workflow.input.pr_number }}"
    routes:
      - to: ado_pr_already_merged_emitter
        when: "{{ ado_pr_status_check.output.state == 'merged' }}"
      # Approved AND ADO says merge is allowed (no conflicts, all required
      # reviewers signed off, etc.). Merger forwards head_sha as the ADO
      # `lastMergeSourceCommit.commitId` for stale-head safety.
      - to: ado_pr_merger
        when: "{{ ado_pr_status_check.output.state == 'approved' and ado_pr_status_check.output.policy.merge_allowed == true }}"
      # Approved but ADO blocks merge (typically conflicts or
      # mergeability not yet computed). Surface to operator with the
      # blocking reasons rather than failing the merge call.
      - to: ado_pr_blocked_gate
        when: "{{ ado_pr_status_check.output.state == 'approved' and ado_pr_status_check.output.policy.merge_allowed == false }}"
      - to: ado_pr_changes_requested_gate
        when: "{{ ado_pr_status_check.output.state == 'changes_requested' }}"
      # Stuck-review timeout MVP — pending re-entries flow through
      # ado_pending_poll_counter so we can surface ado_stuck_review_gate
      # after POLL_CAP polls instead of letting the operator click
      # "Re-poll" on ado_pr_pending_gate forever.
      - to: ado_pending_poll_counter
        when: "{{ ado_pr_status_check.output.state == 'pending' }}"
      - to: ado_pr_closed_gate
        when: "{{ ado_pr_status_check.output.state == 'closed' }}"
      - to: ado_pr_failed_gate
        when: "{{ ado_pr_status_check.output.state == 'error' }}"
      # Catch-all per M4: any unrecognized state -> failed gate so the
      # operator can decide rather than silently advancing.
      - to: ado_pr_failed_gate

  # ── ADO PR merger ───────────────────────────────────────────────────────
  #
  # Merges the ADO PR via `polyphony pr merge-feature-ado` (hard-codes
  # `noFastForward` per the verb; head branch retained — sibling runs
  # may still depend on it; the manifest at
  # `feature/{root}:.polyphony/run.yaml` must persist for resume).
  #
  # Idempotent — recognises an already-merged PR via `already_merged`.
  # Routing-style verb: always exits 0; success determined by
  # `merged == true`. Any non-empty error_code routes to the merge-failed
  # gate. The verb forwards the polled head SHA as ADO's
  # `lastMergeSourceCommit.commitId` for stale-head safety.
  #
  # Invariants:
  #   Pre:  Status check returned `approved` (or operator chose retry-merge
  #         from the merge-failed gate).
  #   Post: PR merged into target branch — or routed to merge-failed gate.
  - name: ado_pr_merger
    type: script
    description: Merge the ADO feature PR via `pr merge-feature-ado`
    command: polyphony
    args:
      - "pr"
      - "merge-feature-ado"
      - "--organization"
      - "{{ workflow.input.organization }}"
      - "--project"
      - "{{ workflow.input.project }}"
      - "--repository"
      - "{{ workflow.input.repository }}"
      - "--root-id"
      - "{{ workflow.input.root_id }}"
      - "--target-branch"
      - "{{ workflow.input.target_branch }}"
      # Stale-head safety: pin the merge to the head SHA observed at
      # status-check time. The verb forwards this as ADO's
      # `lastMergeSourceCommit.commitId` and refuses (`stale_head`) if
      # the PR head has moved server-side.
      - "--match-head-commit"
      - "{{ ado_pr_status_check.output.head_sha }}"
    routes:
      # Stale head: PR head moved between status-check and merge attempt.
      # Re-poll to pick up the new head; status-check will route based on
      # the fresh state (still approved → re-attempt merge with new SHA).
      - to: ado_pr_status_check
        when: "{{ ado_pr_merger.output.error_code is defined and ado_pr_merger.output.error_code == 'stale_head' }}"
      - to: ado_pr_merge_failed_gate
        when: "{{ ado_pr_merger.output.error_code is defined and ado_pr_merger.output.error_code != '' }}"
      - to: $end
        when: "{{ ado_pr_merger.output.merged == true }}"
      # Catch-all per M4: not merged + no error_code -> merge-failed gate
      # so the operator can decide rather than silently advancing.
      - to: ado_pr_merge_failed_gate

  # ── ADO PR already-merged emitter ───────────────────────────────────────
  #
  # Idempotent re-entry path. When status_check finds the PR is already
  # merged (e.g., parent workflow re-invoked ado-pr.yaml after a previous
  # run merged it), emit a successful terminal output and exit. Avoids
  # re-calling `pr merge-feature-ado` (which IS idempotent but burns an
  # ADO API call and emits a less clear log message).
  #
  # Invariants:
  #   Pre:  status_check.output.state == 'merged'.
  #   Post: Workflow output.merged is true; exits.
  - name: ado_pr_already_merged_emitter
    type: script
    description: Emit merged=true when status_check found the PR already merged
    command: pwsh
    args:
      - "-NoProfile"
      - "-Command"
      - >-
        @{
          merged = $true;
          pr_url = '{{ ado_pr_status_check.output.pr_url }}';
          reason = 'already_merged_idempotent_reentry'
        } | ConvertTo-Json -Compress
    routes:
      - to: $end

  # ── Treat-as-merged emitter ─────────────────────────────────────────────
  #
  # Operator-driven terminal: when a human gate's "I manually verified
  # merge" option is selected (e.g., the PR was merged externally and ADO
  # is slow to reflect, or the operator confirmed merge via another
  # means), emit merged=true and exit. Records `override=true` and a
  # reason so downstream logs reflect that this was NOT platform-confirmed
  # at the time of decision.
  #
  # Invariants:
  #   Pre:  Operator chose "manually verified merge" at one of the gates.
  #   Post: Workflow output.merged is true; exits.
  - name: ado_pr_treat_as_merged_emitter
    type: script
    description: Operator override — emit merged=true (manually verified)
    command: pwsh
    args:
      - "-NoProfile"
      - "-Command"
      - >-
        @{
          merged = $true;
          pr_url = '{{ ado_pr_status_check.output.pr_url | default("") }}';
          override = $true;
          reason = 'operator_manually_verified_merge'
        } | ConvertTo-Json -Compress
    routes:
      - to: $end

  # ── Approved-but-blocked gate ───────────────────────────────────────────
  #
  # `pr poll-status-ado` returned `state: approved` but
  # `policy.merge_allowed` is false. ADO knows the PR is approved by
  # reviewers but considers merge currently disallowed — typically due to
  # conflicts or mergeability not yet computed (`mergeable` is null on
  # ADO until a background merge probe completes).
  #
  # Per M3, the prompt guards `policy.blocking_reasons` with `is defined`
  # since status_check IS defined when we reach this gate (route
  # precondition).
  #
  # Operator can:
  # - Re-poll: ADO may have computed mergeability / conflicts may be
  #   resolved.
  # - Manually verified merge: rare; covers cases where the merge happened
  #   externally between poll and decision.
  # - Abort: exit merged=false. PR remains approved-but-blocked.
  #
  # Invariants:
  #   Pre:  status_check.output.state == 'approved' AND
  #         status_check.output.policy.merge_allowed == false.
  #   Post: Operator chose re-poll, manually-verified-merge, or abort.
  - name: ado_pr_blocked_gate
    type: human_gate
    description: ADO PR is approved but not mergeable — operator triages
    prompt: |
      ## ⚠️ ADO PR — Approved but Blocked from Merging

      PR: `{{ workflow.input.pr_number }}` on
      `{{ workflow.input.branch_name }}` → `{{ workflow.input.target_branch }}`
      ({{ ado_pr_status_check.output.pr_url | default('') }})

      The PR is approved by reviewers, but ADO considers merge currently
      disallowed. Typical causes: branch conflicts, mergeability not yet
      computed, or build policy waiting.

      {% if ado_pr_status_check is defined and ado_pr_status_check.output.policy is defined and ado_pr_status_check.output.policy.blocking_reasons -%}
      **Blocking reasons:**
      {% for reason in ado_pr_status_check.output.policy.blocking_reasons -%}
      - {{ reason }}
      {% endfor %}
      {%- endif %}

      Choose an action:
      - **Re-poll** — ADO may have re-computed mergeability or conflicts
        may have been resolved.
      - **I manually verified merge** — rare; covers PRs merged externally
        between poll and decision. Records `override=true`.
      - **Abort** — exit with `merged=false`. PR remains approved-but-blocked
        for manual resolution.
    options:
      - label: "🔁 Re-poll status"
        value: repoll
        route: ado_pr_status_check
      - label: "✅ I manually verified merge"
        value: verified_merge
        route: ado_pr_treat_as_merged_emitter
      - label: "🛑 Abort"
        value: abort
        route: $end

  # ── ADO connection-inputs missing gate ──────────────────────────────────
  #
  # Fires when the validator detected at least one of organization,
  # project, repository, root_id was blank. Surfaces a clear remediation
  # path (re-invoke the workflow with the missing inputs) without burning
  # an ADO API call.
  #
  # Per M3, only this gate's prompt references
  # `ado_inputs_validator.output.missing` — the validator IS defined when
  # we reach this gate (route precondition).
  #
  # Invariants:
  #   Pre:  ado_inputs_validator.output.ado_inputs_ready == false.
  #   Post: Operator informed; workflow exits with merged=false.
  - name: ado_inputs_missing_gate
    type: human_gate
    description: ADO connection inputs missing — workflow cannot proceed
    prompt: |
      ## ADO connection inputs missing

      `ado-pr.yaml` was invoked but the following required inputs are blank
      or zero: **{{ ado_inputs_validator.output.missing }}**

      `polyphony pr poll-status-ado` and `pr merge-feature-ado` require
      `--organization`, `--project`, `--repository`, and `--root-id`.
      Re-invoke `feature-pr.yaml` (or this workflow directly) with all four
      threaded.

      PR: `{{ workflow.input.pr_number }}` on
      `{{ workflow.input.branch_name }}` → `{{ workflow.input.target_branch }}`
    options:
      - label: "🛑 Abort"
        value: abort
        route: $end

  # ── Changes-requested gate ──────────────────────────────────────────────
  #
  # One or more reviewers voted for changes (ADO -10 / -5). Operator
  # decides:
  # - Re-poll: reviewer may have re-voted. Re-runs status_check.
  # - Treat-as-not-merged: exit merged=false. Triggers remediation cycle
  #   in feature-pr.yaml.
  # - Abort: exit merged=false without further action.
  #
  # Invariants:
  #   Pre:  status_check.output.state == 'changes_requested'.
  #   Post: Operator chose re-poll, treat-as-not-merged, or abort.
  - name: ado_pr_changes_requested_gate
    type: human_gate
    description: ADO PR has reviewer-requested changes — operator triages
    prompt: |
      ## 🔄 ADO PR — Changes Requested

      PR: `{{ workflow.input.pr_number }}` on
      `{{ workflow.input.branch_name }}` → `{{ workflow.input.target_branch }}`
      ({{ ado_pr_status_check.output.pr_url | default('') }})

      One or more reviewers requested changes. Polyphony does not
      auto-remediate ADO PRs in this workflow; remediation runs in the
      parent `feature-pr.yaml` workflow.

      Choose an action:
      - **Re-poll** — reviewer may have updated their vote. Re-runs the
        status check.
      - **Trigger remediation** — exit with `merged=false`. The parent
        `feature-pr.yaml` workflow will start a remediation cycle
        (planner → seeder → implementer → re-request review). As of
        feature-pr.yaml v1.2.0 this is fully wired on ADO — the planner
        uses reviewer identity + vote from `pr poll-status-ado`, and the
        updater posts the re-review comment via `pr post-comment-ado`.
      - **Abort** — exit with `merged=false` and no remediation. PR
        remains open for manual resolution.
    options:
      - label: "🔁 Re-poll status"
        value: repoll
        route: ado_pr_status_check
      - label: "🛠️ Trigger remediation (exit merged=false)"
        value: trigger_remediation
        route: $end
      - label: "🛑 Abort"
        value: abort
        route: $end

  # ── Pending poll counter (stuck-review timeout MVP) ─────────────────────
  #
  # Increments each time ado_pr_status_check returns 'pending'. Counter
  # file is keyed by pr_number so it persists across the
  # status_check → pending_gate → re-poll → status_check loop. When the
  # count reaches POLL_CAP, routes to ado_stuck_review_gate so the
  # operator can decide whether to keep waiting, override-approve, or
  # abort. Below the cap, routes to the existing ado_pr_pending_gate
  # (unchanged operator UX for the common case).
  #
  # POLL_CAP is hard-coded to 60 at MVP. With operator-driven re-polls
  # this represents 60 deliberate "is it ready yet?" clicks before the
  # workflow surfaces the stuck-review escalation.
  #
  # TODO(stuck-review-policy): elevate to policy.yaml > timeouts:
  #   { review_pending: { by_pr_kind: { feature: 60, ... } } }
  # when the policy schema lands. See docs/decisions/stuck-review-timeout.md.
  #
  # Invariants:
  #   Pre:  ado_pr_status_check.output.state == 'pending'.
  #   Post: output.count is the current poll count (1-based);
  #         output.cap_reached indicates whether the cap was hit.
  - name: ado_pending_poll_counter
    type: script
    description: Track ADO pending-review poll count (cap 60 — stuck-review timeout MVP)
    command: pwsh
    args:
      - "-NoProfile"
      - "-Command"
      - |
        $counterFile = Join-Path ([System.IO.Path]::GetTempPath()) "conductor-ado-pr-pending-poll-{{ workflow.input.pr_number }}"
        if (Test-Path $counterFile) {
            $count = [int](Get-Content $counterFile -Raw) + 1
        } else {
            $count = 1
        }
        Set-Content $counterFile $count
        $cap = 60
        @{ count = $count; cap = $cap; cap_reached = ($count -ge $cap) } | ConvertTo-Json
    routes:
      - to: ado_stuck_review_gate
        when: "{{ ado_pending_poll_counter.output.cap_reached == true }}"
      - to: ado_pr_pending_gate

  # ── Pending gate ────────────────────────────────────────────────────────
  #
  # No reviewer has voted yet (or reviewers required but none submitted).
  # Operator decides:
  # - Re-poll: reviewers may have voted since last check.
  # - Treat-as-merged: PR was merged outside polyphony's view (rare).
  # - Treat-as-not-merged: exit merged=false → remediation.
  # - Abort: exit without action.
  #
  # Invariants:
  #   Pre:  status_check.output.state == 'pending'.
  #   Post: Operator chose re-poll, treat-as-merged, treat-as-not-merged,
  #         or abort.
  - name: ado_pr_pending_gate
    type: human_gate
    description: ADO PR awaiting reviewer votes — operator waits or re-polls
    prompt: |
      ## ⏳ ADO PR — Pending Reviewer Votes

      PR: `{{ workflow.input.pr_number }}` on
      `{{ workflow.input.branch_name }}` → `{{ workflow.input.target_branch }}`
      ({{ ado_pr_status_check.output.pr_url | default('') }})

      No reviewer has voted yet. Wait for required reviewers to vote in
      ADO, then choose **Re-poll**.

      Choose an action:
      - **Re-poll** — re-run the status check (use after reviewers vote).
      - **I manually verified merge** — PR was merged outside polyphony's
        view (rare — e.g., an admin force-merged). Records `override=true`.
      - **Trigger remediation** — exit with `merged=false`. The parent
        `feature-pr.yaml` workflow will run a remediation cycle (wired
        end-to-end on ADO as of feature-pr.yaml v1.2.0).
      - **Abort** — exit with `merged=false` and no remediation.
    options:
      - label: "🔁 Re-poll status"
        value: repoll
        route: ado_pr_status_check
      - label: "✅ I manually verified merge"
        value: verified_merge
        route: ado_pr_treat_as_merged_emitter
      - label: "🛠️ Trigger remediation (exit merged=false)"
        value: trigger_remediation
        route: $end
      - label: "🛑 Abort"
        value: abort
        route: $end

  # ── Stuck-review gate (poll-cap escalation) ─────────────────────────────
  #
  # Fires when ado_pending_poll_counter hits POLL_CAP (60). The reviewers
  # have gone silent — surface that fact rather than letting the operator
  # keep clicking "Re-poll" on ado_pr_pending_gate forever.
  #
  # Three operator options (per task spec):
  #   continue_waiting  → reset the counter, return to ado_pr_pending_gate.
  #                       Gives the operator another full cap budget.
  #   override_approved → bypass review, route to ado_pr_merger.
  #   abort             → exit the workflow.
  #
  # TODO(stuck-review-policy): elevate to policy.yaml > timeouts: when
  # the policy schema lands. See docs/decisions/stuck-review-timeout.md.
  #
  # P6 qualification: this is a genuine multi-option decision (wait /
  # override / abort) that requires the operator to know whether the
  # silence is recoverable — not a routine checkpoint.
  - name: ado_stuck_review_gate
    type: human_gate
    description: ADO PR review pending past poll cap — operator decides wait, override, or abort.
    prompt: |
      ## ⏰ Stuck Review — Poll Cap Reached for ADO PR #{{ workflow.input.pr_number }}

      The PR has been awaiting reviewer votes for
      **{{ ado_pending_poll_counter.output.count }}** polls
      (cap: **{{ ado_pending_poll_counter.output.cap }}**).

      Reviewers may be unavailable or unblocked but silent. You can keep
      waiting (the counter resets), bypass review and merge anyway, or
      abort.

      PR: `{{ workflow.input.pr_number }}` on
      `{{ workflow.input.branch_name }}` → `{{ workflow.input.target_branch }}`
      ({{ ado_pr_status_check.output.pr_url | default('') }})

      ---

      Choose an action:
      - **Continue waiting** — reset the poll counter and return to the pending gate
      - **Override approved** — bypass review and proceed to merge via `pr merge-feature-ado`
      - **Abort** — exit with `merged=false`
    options:
      - label: "⏳ Continue waiting"
        value: continue_waiting
        route: ado_stuck_review_reset
      - label: "✅ Override approved"
        value: override_approved
        route: ado_pr_merger
      - label: "🛑 Abort"
        value: abort
        route: $end

  # ── Stuck-review reset ──────────────────────────────────────────────────
  #
  # Zeros the poll counter file when the operator chose "Continue waiting"
  # at ado_stuck_review_gate, then routes back to ado_pr_pending_gate so
  # the operator gets the regular pending UX again with a fresh cap budget.
  - name: ado_stuck_review_reset
    type: script
    description: Reset ADO pending-poll counter after stuck-review continue-waiting choice
    command: pwsh
    args:
      - "-NoProfile"
      - "-Command"
      - |
        $counterFile = Join-Path ([System.IO.Path]::GetTempPath()) "conductor-ado-pr-pending-poll-{{ workflow.input.pr_number }}"
        Set-Content $counterFile 0
        @{ count = 0; reset = $true } | ConvertTo-Json
    routes:
      - to: ado_pr_pending_gate

  # ── Closed gate ─────────────────────────────────────────────────────────
  #
  # PR was closed without merging. Likely manually abandoned. Operator
  # decides:
  # - Re-poll: rare — PR was reopened.
  # - Treat-as-merged: PR was merged via a different PR (unusual).
  # - Abort: exit merged=false.
  #
  # Invariants:
  #   Pre:  status_check.output.state == 'closed'.
  #   Post: Operator chose re-poll, treat-as-merged, or abort.
  - name: ado_pr_closed_gate
    type: human_gate
    description: ADO PR closed without merging — operator triages
    prompt: |
      ## 🚪 ADO PR — Closed Without Merge

      PR: `{{ workflow.input.pr_number }}` on
      `{{ workflow.input.branch_name }}` → `{{ workflow.input.target_branch }}`
      ({{ ado_pr_status_check.output.pr_url | default('') }})

      The PR was closed without being merged. This is unusual — typically
      the PR was abandoned manually.

      Choose an action:
      - **Re-poll** — rare (PR was reopened).
      - **I manually verified merge** — work was merged via a different
        PR. Records `override=true`.
      - **Abort** — exit with `merged=false`. PR is closed; no remediation.
    options:
      - label: "🔁 Re-poll status"
        value: repoll
        route: ado_pr_status_check
      - label: "✅ I manually verified merge"
        value: verified_merge
        route: ado_pr_treat_as_merged_emitter
      - label: "🛑 Abort"
        value: abort
        route: $end

  # ── Status-check failed gate ────────────────────────────────────────────
  #
  # `pr poll-status-ado` returned `state: error` (or unrecognized state).
  # Most likely causes: missing PAT, ADO timeout, transient API failure.
  # Operator can:
  # - Retry: re-runs status_check.
  # - Abort: exit merged=false.
  #
  # Per M3, the prompt guards `error_code` and `error` references with
  # `is defined` because status_check IS defined when we reach this gate
  # (route precondition).
  #
  # Invariants:
  #   Pre:  status_check.output.state == 'error' (or unrecognized).
  #   Post: Operator chose retry or abort.
  - name: ado_pr_failed_gate
    type: human_gate
    description: ADO PR status check failed — operator retries or aborts
    prompt: |
      ## ❌ ADO PR — Status Check Failed

      PR: `{{ workflow.input.pr_number }}` on
      `{{ workflow.input.branch_name }}` → `{{ workflow.input.target_branch }}`

      `pr poll-status-ado` returned an error or unrecognized state.

      {% if ado_pr_status_check is defined and ado_pr_status_check.output.error_code is defined and ado_pr_status_check.output.error_code != '' -%}
      **Error code:** `{{ ado_pr_status_check.output.error_code }}`
      **Detail:** {{ ado_pr_status_check.output.error | default('(no detail)') }}
      {%- else -%}
      **State:** `{{ ado_pr_status_check.output.state | default('unknown') }}`
      {%- endif %}

      Common causes: missing/invalid PAT, ADO timeout, transient API
      failure. Retry is safe (single read).

      Choose an action:
      - **Retry** — re-runs the status check.
      - **Abort** — exit with `merged=false`.
    options:
      - label: "🔁 Retry status check"
        value: retry
        route: ado_pr_status_check
      - label: "🛑 Abort"
        value: abort
        route: $end

  # ── Merge-failed gate ───────────────────────────────────────────────────
  #
  # `pr merge-feature-ado` returned an error_code or merged=false. Common
  # causes: stale_head (PR head moved between poll and merge), missing
  # PAT, ADO timeout. Operator can:
  # - Retry merge: idempotent (recognises already-merged).
  # - Treat-as-merged: PR was merged externally between attempts.
  # - Abort: exit merged=false.
  #
  # Per M3, the prompt guards merger output references with `is defined`.
  #
  # Invariants:
  #   Pre:  ado_pr_merger ran and returned error_code OR merged=false.
  #   Post: Operator chose retry-merge, treat-as-merged, or abort.
  - name: ado_pr_merge_failed_gate
    type: human_gate
    description: ADO merge failed — operator retries merge, treats as merged, or aborts
    prompt: |
      ## ❌ ADO PR — Merge Failed

      PR: `{{ workflow.input.pr_number }}` on
      `{{ workflow.input.branch_name }}` → `{{ workflow.input.target_branch }}`

      `pr merge-feature-ado` did not complete the merge.

      {% if ado_pr_merger is defined and ado_pr_merger.output.error_code is defined and ado_pr_merger.output.error_code != '' -%}
      **Error code:** `{{ ado_pr_merger.output.error_code }}`
      **Detail:** {{ ado_pr_merger.output.error | default('(no detail)') }}
      {%- elif ado_pr_merger is defined and ado_pr_merger.output.merged == false -%}
      **Detail:** Merge verb returned `merged=false` with no error code; PR
      may still be open or in an unexpected state.
      {%- else -%}
      **Detail:** Routed to gate without an explicit error code.
      {%- endif %}

      **Retry** is safe: `pr merge-feature-ado` is idempotent — recognises
      an already-merged PR and respects stale-head guards (`stale_head`
      result code surfaces explicitly).

      Choose an action:
      - **Retry merge** — re-runs `pr merge-feature-ado`.
      - **I manually verified merge** — PR was merged externally between
        attempts. Records `override=true`.
      - **Abort** — exit with `merged=false`. PR remains in current state.
    options:
      - label: "🔁 Retry merge"
        value: retry
        route: ado_pr_merger
      - label: "✅ I manually verified merge"
        value: verified_merge
        route: ado_pr_treat_as_merged_emitter
      - label: "🛑 Abort"
        value: abort
        route: $end
