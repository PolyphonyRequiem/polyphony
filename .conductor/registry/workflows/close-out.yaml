# close-out — Post-implementation close-out and observation generation.
#
# After the feature PR merges, this sub-workflow generates post-mortem
# observations from the completed hierarchy and returns them as structured
# workflow output. Observations are NOT filed as ADO work items — the
# calling workflow decides what to do with them (surface in dashboard,
# file manually, pipe to a reconciler, etc.).
#
# Invariants:
#   Pre:  work_item_id exists, implementation complete, feature PR merged.
#   Post: output.observations contains structured findings; output.summary
#         provides a narrative overview.

workflow:
  name: close-out
  description: >-
    Post-implementation close-out. Generates structured observations from the
    completed work item hierarchy and returns them as workflow output.
  version: "2.4.0"
  entry_point: guidance_loader
  metadata:
    min_polyphony_version: "2.4.0"

  limits:
    max_iterations: 50

  input:
    work_item_id:
      type: number
      required: true
      description: ADO work item ID of the focus (root) item
    feature_branch:
      type: string
      required: false
      default: ""
      description: Feature branch that was merged

tools:
  - twig
  - gh
  - filesystem

output:
  observations: "{{ close_out.output.observations | json }}"
  summary: "{{ close_out.output.summary | default('') }}"
  observation_count: "{{ close_out.output.observations | length }}"

agents:
  # ── Guidance loader ────────────────────────────────────────────────────
  #
  # Loads repo-specific agent guidance for the close-out work item.
  # Returns role-wide guidance + per-type refinement for each of the
  # three canonical roles; close_out reads `reviewer.*` via Jinja2
  # conditionals so the prompt degrades gracefully when no guidance
  # files exist.
  - name: guidance_loader
    type: script
    description: Load agent guidance markdown files for the close_out prompt
    command: polyphony
    args:
      - "plan"
      - "load-agent-guidance"
      - "--work-item"
      - "{{ workflow.input.work_item_id }}"
    routes:
      - to: close_out

  # ── Post-mortem analysis ───────────────────────────────────────────────
  #
  # Performs post-mortem analysis scoped to the focus work item hierarchy.
  # Reads the work tree, plan artifacts, and PR history to generate
  # structured observations about what went well and what can improve.
  # Type information is loaded from process-config.yaml — no hardcoded
  # type names.
  #
  # Invariants:
  #   Pre:  work_item_id hierarchy is complete (all children in terminal state).
  #   Post: output.observations contains a structured array of observations.
  - name: close_out
    type: agent
    model: claude-opus-4.6
    description: Post-mortem analysis generating structured observations from the completed hierarchy
    tools:
      - twig
      - gh
      - filesystem
    output:
      observations:
        type: array
        description: List of post-mortem observations
        items:
          type: object
          properties:
            title:
              type: string
              description: Brief descriptive title for the observation
            description:
              type: string
              description: Detailed description of the observation
            category:
              type: string
              description: One of "improvement", "bug", "debt", or "process"
            priority:
              type: number
              description: Priority value (lower = higher priority)
            rationale:
              type: string
              description: Why this observation matters
      summary:
        type: string
        description: Brief post-mortem summary
    prompt: |
      You are the close-out analyst for the polyphony SDLC workflow.

      ## Your Mission

      Perform a post-mortem analysis of the completed work item hierarchy and
      generate structured observations about what went well and what can improve.

      ## Context

      - **Focus work item:** {{ workflow.input.work_item_id }}
      - **Feature branch:** {{ workflow.input.feature_branch }}

      ## Instructions

      1. **Load the hierarchy** — Use `twig show {{ workflow.input.work_item_id }} --tree`
         to see the full work item tree and its completion state.

      2. **Review the work** — Examine:
         - Work item descriptions and acceptance criteria vs actual outcomes
         - Commit history on the feature branch
         - PR comments and review feedback
         - Any plan documents referenced by the work items

      3. **Generate observations** — For each finding, classify it as:
         - `improvement` — Something that could be done better next time
         - `bug` — A defect discovered during or after implementation
         - `debt` — Technical debt introduced or discovered
         - `process` — A workflow or process improvement opportunity

      ## Output

      Return a JSON object with this structure:
      ```json
      {
        "observations": [
          {
            "title": "Brief descriptive title",
            "description": "Detailed description of the observation",
            "category": "improvement | bug | debt | process",
            "priority": 2,
            "rationale": "Why this observation matters"
          }
        ],
        "summary": "Brief post-mortem summary"
      }
      ```

      ## Constraints

      - Keep observations actionable and specific
      - Do NOT create or modify any ADO work items — your job is analysis only
      - Focus on the hierarchy under work item {{ workflow.input.work_item_id }} only
      - If no observations are warranted, return an empty observations array

      {% if guidance_loader is defined and guidance_loader.output.agents.close_out is defined and guidance_loader.output.agents.close_out %}
      ## Repo-Specific Guidance — close_out (override)

      {{ guidance_loader.output.agents.close_out }}
      {% elif guidance_loader is defined and guidance_loader.output.reviewer is defined and guidance_loader.output.reviewer.role %}
      ## Repo-Specific Guidance

      {{ guidance_loader.output.reviewer.role }}
      {% endif %}

      {% if guidance_loader is defined and guidance_loader.output.reviewer is defined and guidance_loader.output.reviewer.type_refinement %}
      ## Repo-Specific Guidance — {{ guidance_loader.output.type }} refinement

      {{ guidance_loader.output.reviewer.type_refinement }}
      {% endif %}
    routes:
      - to: $end
