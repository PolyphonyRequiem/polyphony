# plan-level — Recursive planning core for any plannable work item level.
#
# v2.0 — Phase 3 P7b: replaces in-workflow LLM verdicts (technical_reviewer,
# readability_reviewer, review_router, plan_approval) with platform-native
# PR review.
#
# Lifecycle per invocation:
#   1. resolve root + derive ancestor chain
#   2. detect-state — find out where this plan tree branch already is
#   3. branch on state:
#        not_started     → architect → ensure_plan_branch → write_plan →
#                          commit_and_push → open_plan_pr → plan_reviewer →
#                          poll_status → route on review state
#        awaiting_review → poll_status → route on review state
#        stale_generation → architect (re-author against current ancestors)
#        merged_unseeded → seeder → child_router (recurse)
#        complete        → child_router (recurse only)
#        closed_unmerged → blocked exit
#        error           → state error gate
#
# Self-recursion: child_router discovers plannable children and invokes
# this workflow per child with depth+1.
#
# Invariants:
#   Pre:  work_item_id exists in ADO and is plannable per process-config.yaml.
#   Post: Either an approved + merged plan exists and child work items are
#         seeded, OR the workflow exits with a structured "blocked" output
#         that the caller can route on.

workflow:
  name: plan-level
  description: >-
    Recursive planning core (v2). Plans a single hierarchy level by writing
    the architect's plan to a plan branch, opening a plan PR, surfacing
    LLM advisory + human approval via native PR review, then merging and
    seeding child work items.
  version: "2.4.8"
  entry_point: depth_guard
  metadata:
    min_polyphony_version: "2.4.8"
  limits:
    # Recursive planning: each level fans out plan_children_group (for_each)
    # which spawns plan-level.yaml as a sub-workflow per plannable child.
    # Each iteration counts toward max_iterations. Default 10 is far too
    # low for any non-trivial hierarchy. See conductor-mechanics M9.
    max_iterations: 200

  input:
    work_item_id:
      type: number
      required: true
      description: ADO work item id of the item being planned. (Type is runtime-injected; do not hardcode type names.)
    intent:
      type: string
      required: false
      default: resume
      description: "new | redo | resume — currently only inspected by detect-state for routing on existing PRs"
    user_plan_path:
      type: string
      required: false
      default: ""
      description: Path to user-authored plan document (architect refines, not discards)
    depth:
      type: number
      required: false
      default: 0
      description: Current recursion depth (0 = root level)
    max_depth:
      type: number
      required: false
      default: 6
      description: Maximum recursion depth before requiring human approval
    # ── ADO platform inputs (v2.1) ──────────────────────────────────────
    # These are optional for backwards compatibility — when omitted, the
    # workflow runs the GitHub leg via `gh` + `polyphony pr open-plan-pr`
    # exactly as before. When `platform: ado` is supplied, the open/poll/
    # merge script agents are routed to their `*_ado` counterparts which
    # consume the ADO REST API via `polyphony pr {open,poll-status,merge}-
    # plan-ado` (verbs from #100 / #104). The plan_reviewer LLM is
    # platform-aware: on github it posts directly via the `gh` tool; on
    # ado it emits a structured comment body and a downstream
    # `plan_reviewer_poster_ado` script posts via `polyphony pr
    # post-comment-ado` (verb from PR-A of this pair).
    platform:
      type: string
      required: false
      default: ado
      description: "PR platform: 'ado' (default — matches the work item source) or 'github' (for repos hosted on GitHub)"
    organization:
      type: string
      required: false
      default: ""
      description: ADO organization name. Required when platform=ado; ignored on github.
    project:
      type: string
      required: false
      default: ""
      description: ADO project name. Required when platform=ado; ignored on github.
    repository:
      type: string
      required: false
      default: ""
      description: ADO repository identifier (GUID or name). Required when platform=ado; ignored on github.
    # ── Phase 3 P8c — scope renegotiation handler input ─────────────────
    # Comma-separated glob list the child planner is authorized to touch
    # (e.g. "plans/1100/1101.md, plans/1100/notes/**"). Consumed by the
    # validate_scope step (`polyphony plan validate-scope --child-scope`)
    # to classify the plan-PR diff against authorized paths.
    #
    # When empty (the default — current callers do not yet supply it),
    # the validate_scope + scope_violation_gate steps are skipped and
    # poll_status routes straight to merge_plan_pr. The
    # extract_renegotiation_flag step still runs post-merge so the
    # workflow's `renegotiation_pending` output is always populated for
    # future callers (apex-driver) regardless of whether scope was
    # supplied.
    #
    # See docs/decisions/scope-renegotiation.md (handler design — workflow
    # output bubble-up).
    child_scope_globs:
      type: string
      required: false
      default: ""
      description: >-
        Comma-separated globs the child planner is authorized to touch.
        When set, validate_scope classifies the plan-PR diff and fires
        scope_violation_gate on `block`. When empty, the scope check is
        skipped (back-compat for current callers).

tools:
  - twig
  - gh
  - filesystem

# ── Workflow output (Phase 3 P8c — scope renegotiation handler) ──────────
#
# Bubble-up outputs consumed by the (forthcoming) apex-driver workflow.
# Per M7, sub-workflow outputs are the only surface a parent workflow can
# read; we explicitly export the renegotiation + scope-validation result
# so apex-driver can decide whether to re-enter parent planning. Per M3
# (StrictUndefined) every reference is guarded with `is defined` because
# only ONE of the validate_scope / merge legs runs in any execution. Per
# M7 booleans are piped through `| string | lower` so the parent receives
# a real bool rather than capital "True"/"False".
#
# StrictUndefined trap (2026-05-10 dogfood AB#3067, plan-PR #260):
# `<agent> is defined` only checks the agent variable, NOT the dict keys
# under `.output`. When a verb's Result model declares `string? Foo`
# (omitted from JSON when null per WhenWritingNull), accessing
# `<agent>.output.foo` RAISES TemplateError — `| default('')` does not
# rescue, because StrictUndefined fires on the missing dict key BEFORE
# the filter runs. So nullable verb fields require a TWO-LEVEL guard:
# `<agent> is defined and <agent>.output.<field> is defined`. Required
# fields (e.g. `flag_present`, `verdict`) are always emitted and only
# need the agent-level guard. Cf. PlanDeriveAncestorChainResult.cs which
# uses `[JsonIgnore(Condition = Never)]` to dodge the same trap from the
# verb side.
#
# Design rationale — option (C) in docs/decisions/scope-renegotiation.md
# (handler design — workflow output bubble-up). Today plan-level has no
# caller, so these outputs go nowhere; that is intentional. apex-driver
# (a downstream PR) consumes them.
output:
  # FlagPresent is `required bool` in PlanExtractRenegotiationFlagResult
  # — always emitted, agent-level guard suffices.
  renegotiation_pending: >-
    {% if extract_renegotiation_flag is defined %}{{ (extract_renegotiation_flag.output.flag_present | default(false)) | string | lower }}
    {%- else %}false{% endif %}
  # RenegotiationRequest is `string?` — OMITTED from JSON when no flag
  # was present. Two-level guard is mandatory; see the trap note above.
  renegotiation_request: >-
    {% if extract_renegotiation_flag is defined and extract_renegotiation_flag.output.renegotiation_request is defined %}{{ extract_renegotiation_flag.output.renegotiation_request }}
    {%- else %}{% endif %}
  # Verdict is `required string` in PlanValidateScopeResult — always
  # emitted, agent-level guard suffices.
  validate_scope_verdict: >-
    {% if validate_scope is defined %}{{ validate_scope.output.verdict | default('') }}
    {%- else %}{% endif %}
  # FilesOutOfScope is non-nullable IReadOnlyList<string> with default
  # `Array.Empty<string>()` — always emitted, agent-level guard suffices.
  scope_violation_files: >-
    {% if validate_scope is defined %}{{ validate_scope.output.files_out_of_scope | default([]) | tojson }}
    {%- else %}[]{% endif %}

agents:
  # ── Depth guard ──────────────────────────────────────────────────────────
  #
  # Validates that the current recursion depth has not exceeded max_depth.
  # Prevents runaway recursion by gating deeper levels behind human approval.
  #
  # Invariants:
  #   Pre:  depth and max_depth are non-negative integers.
  #   Post: output.allowed is true (depth < max_depth) or false (depth >= max_depth).
  - name: depth_guard
    type: script
    description: Validate recursion depth against max_depth
    command: polyphony
    args:
      - "plan"
      - "depth-guard"
      - "--depth"
      - "{{ workflow.input.depth }}"
      - "--max-depth"
      - "{{ workflow.input.max_depth }}"
    routes:
      - to: guidance_loader
        when: "{{ depth_guard.output.allowed == true }}"
      - to: depth_exceeded_gate
        when: "{{ depth_guard.output.allowed == false }}"

  # ── Depth exceeded gate ──────────────────────────────────────────────────
  - name: depth_exceeded_gate
    type: human_gate
    prompt: |
      ## ⚠️ Recursion Depth Exceeded

      Planning for work item **{{ workflow.input.work_item_id }}** has reached
      depth **{{ workflow.input.depth }}** (max: **{{ workflow.input.max_depth }}**).

      This typically means the hierarchy is deeper than expected. Consider
      restructuring the work item tree or increasing `max_depth` if the depth
      is intentional.

      ---

      Choose an action:
      - **Acknowledge** — stop planning this branch (children will not be planned)
    options:
      - label: "✅ Acknowledge"
        value: acknowledge
        route: $end

  # ── Guidance loader ────────────────────────────────────────────────────
  #
  # Loads repo-specific agent guidance markdown for the three canonical
  # roles (architect, coder, reviewer) for the work item being planned.
  # Each role exposes a role-wide block (`<role>.role`) plus an optional
  # per-type refinement (`<role>.type_refinement`) keyed by the work
  # item's type slug. Architect and plan_reviewer prompts compose their
  # respective blocks via Jinja2 conditionals so prompts degrade gracefully
  # when no guidance files exist.
  - name: guidance_loader
    type: script
    description: Load agent guidance markdown files for planning agent prompts
    command: polyphony
    args:
      - "plan"
      - "load-agent-guidance"
      - "--work-item"
      - "{{ workflow.input.work_item_id }}"
    routes:
      - to: root_resolver

  # ── Root resolver ──────────────────────────────────────────────────────
  #
  # Resolves the run's root work-item id by walking up from work_item_id
  # looking for the polyphony:root tag. plan-level.yaml is invoked from
  # the apex driver (which only threads work_item_id); the plan-PR
  # verbs (branch ensure-plan, pr open-plan-pr, pr merge-plan-pr) need
  # both root_id and item_id, so we derive root_id once at entry.
  #
  # Invariants:
  #   Pre:  work_item_id exists in ADO.
  #   Post: output.resolved_root_id is set, OR fallback_required==true,
  #         OR error is set.
  - name: root_resolver
    type: script
    description: Resolve the run-root work-item id from the polyphony:root tag chain
    command: polyphony
    args:
      - "root"
      - "resolve"
      - "--work-item"
      - "{{ workflow.input.work_item_id }}"
    routes:
      - to: root_fallback_gate
        when: "{{ root_resolver.output.fallback_required == true }}"
      - to: root_resolver_error_gate
        when: "{{ root_resolver.output.error is defined and root_resolver.output.error }}"
      - to: type_loader

  # ── Root fallback gate ──────────────────────────────────────────────
  - name: root_fallback_gate
    type: human_gate
    prompt: |
      ## ⚠️ No `polyphony:root` Ancestor Found

      Plan-PR machinery requires a run-root work item tagged
      `polyphony:root`. Walking ancestors of work item
      **{{ workflow.input.work_item_id }}** did not find one within the
      configured walk budget.

      Tag the appropriate ancestor with `polyphony:root` (via
      `polyphony root declare --work-item N`) and re-run, or acknowledge
      to abort planning for this branch.

      ---

      Choose an action:
      - **Abort** — halt the entire run (terminates the conductor process)
    options:
      - label: "🛑 Abort"
        value: abort
        route: terminal_abort_run

  # ── Root resolver error gate ──────────────────────────────────────────
  - name: root_resolver_error_gate
    type: human_gate
    prompt: |
      ## ⚠️ Root Resolution Failed

      Could not resolve the run root for work item
      **{{ workflow.input.work_item_id }}**.

      **Error:** {{ root_resolver.output.error if root_resolver.output.error is defined else "Unknown error — check that the work item exists in ADO." }}

      ---

      Choose an action:
      - **Abort** — halt the entire run (terminates the conductor process)
    options:
      - label: "🛑 Abort"
        value: abort
        route: terminal_abort_run

  # ── Type loader ──────────────────────────────────────────────────────────
  #
  # Loads type-specific context from .polyphony-config/work-item-types/. Outputs
  # type name, semantic definition, plan template, and decomposition guidance.
  - name: type_loader
    type: script
    description: Load type-specific context from .polyphony-config/work-item-types/
    command: polyphony
    args:
      - "plan"
      - "load-type"
      - "--work-item"
      - "{{ workflow.input.work_item_id }}"
    routes:
      - to: ancestor_chain
        when: "{{ type_loader.output.type is defined and type_loader.output.type != '' }}"
      - to: type_loader_error_gate

  # ── Type loader error gate ───────────────────────────────────────────────
  - name: type_loader_error_gate
    type: human_gate
    prompt: |
      ## ⚠️ Type Context Load Failed

      Planning for work item **{{ workflow.input.work_item_id }}** cannot continue
      because the type context could not be loaded.

      **Error:** {{ type_loader.output.error if type_loader.output.error is defined else "Unknown error — check that .polyphony-config/work-item-types/ is configured and the work item exists in ADO." }}

      ---

      Choose an action:
      - **Abort** — halt the entire run (terminates the conductor process)
    options:
      - label: "🛑 Abort"
        value: abort
        route: terminal_abort_run

  # ── Ancestor chain derivation ─────────────────────────────────────────
  #
  # Walks the work-item parent chain from item to root and emits
  # parent_item_id + ancestor_ids for the plan-PR verbs.
  #
  # Invariants:
  #   Pre:  root_resolver succeeded; work_item_id is a descendant of root_id.
  #   Post: output.parent_item_id, output.ancestor_ids, output.is_root_plan are set.
  - name: ancestor_chain
    type: script
    description: Derive plan-tree ancestor chain (parent_item_id + ancestor_ids)
    command: polyphony
    args:
      - "plan"
      - "derive-ancestor-chain"
      - "--root-id"
      - "{{ root_resolver.output.resolved_root_id }}"
      - "--item-id"
      - "{{ workflow.input.work_item_id }}"
    routes:
      - to: ancestor_chain_error_gate
        when: "{{ ancestor_chain.output.error is defined and ancestor_chain.output.error }}"
      - to: state_detector

  # ── Ancestor chain error gate ─────────────────────────────────────────
  - name: ancestor_chain_error_gate
    type: human_gate
    prompt: |
      ## ⚠️ Ancestor Chain Derivation Failed

      Could not derive the plan-tree ancestor chain for work item
      **{{ workflow.input.work_item_id }}** under root
      **{{ root_resolver.output.resolved_root_id }}**.

      **Error:** {{ ancestor_chain.output.error if ancestor_chain.output.error is defined else "Unknown error" }}

      Common causes: work item is not actually a descendant of the root,
      the parent chain is broken, or a cycle was detected.

      ---

      Choose an action:
      - **Abort** — halt the entire run (terminates the conductor process)
    options:
      - label: "🛑 Abort"
        value: abort
        route: terminal_abort_run

  # ── State detector ────────────────────────────────────────────────────
  #
  # The single oracle for "where is this plan tree branch right now?"
  # Reads the plan branch on origin, the existing plan PR (if any), the
  # PR's ancestor_plan_generations snapshot, and the current run manifest
  # to decide which downstream path to take. Enables P3-style re-entry.
  #
  # States (see PlanDetectStateResult):
  #   not_started       — no live plan PR (no PR, OR closed/abandoned PR
  #                       whose source branch is gone from origin — operator
  #                       remediation)
  #   awaiting_review   — branch + open PR exist; plan is current
  #   stale_generation  — branch + open PR exist; ancestor generations bumped
  #   closed_unmerged   — PR exists, closed without merge, AND the source
  #                       branch is still present on origin (operator-rejected
  #                       plan still in flight)
  #   merged_unseeded   — PR is merged but parent isn't tagged polyphony:planned
  #   complete          — PR is merged AND parent is tagged polyphony:planned
  #   error             — verb failed
  #
  # Invariants:
  #   Pre:  root_id + item_id resolved.
  #   Post: output.state is one of the values above.
  - name: state_detector
    type: script
    description: Detect plan-tree state (not_started / awaiting_review / stale_generation / closed_unmerged / merged_unseeded / complete / error)
    command: polyphony
    args:
      - "plan"
      - "detect-state"
      - "--root-id"
      - "{{ root_resolver.output.resolved_root_id }}"
      - "--item-id"
      - "{{ workflow.input.work_item_id }}"
      - "--platform"
      - "{{ workflow.input.platform }}"
      - "--organization"
      - "{{ workflow.input.organization }}"
      - "--project"
      - "{{ workflow.input.project }}"
      - "--repository-override"
      - "{{ workflow.input.repository }}"
    routes:
      - to: state_detector_error_gate
        when: "{{ state_detector.output.state == 'error' }}"
      - to: child_router
        when: "{{ state_detector.output.state == 'complete' }}"
      - to: extract_parent_patch
        when: "{{ state_detector.output.state == 'parent_change_pending' }}"
      - to: seeder
        when: "{{ state_detector.output.state == 'merged_unseeded' }}"
      - to: closed_unmerged_gate
        when: "{{ state_detector.output.state == 'closed_unmerged' }}"
      # v2.1: route through pr_poll_platform_router so awaiting_review
      # re-entry can feed either poll_status (github) or
      # poll_status_ado (ado).
      - to: pr_poll_platform_router
        when: "{{ state_detector.output.state == 'awaiting_review' }}"
      - to: architect
        when: "{{ state_detector.output.state == 'stale_generation' }}"
      - to: architect
        when: "{{ state_detector.output.state == 'not_started' }}"
      # Catch-all per M4: unexpected state value should surface as a gate,
      # not raise mid-run "no matching route".
      - to: state_detector_error_gate

  # ── State detector error gate ─────────────────────────────────────────
  - name: state_detector_error_gate
    type: human_gate
    prompt: |
      ## ⚠️ Plan State Detection Failed

      Could not detect plan-tree state for work item
      **{{ workflow.input.work_item_id }}** under root
      **{{ root_resolver.output.resolved_root_id }}**.

      **State:** `{{ state_detector.output.state if state_detector.output.state is defined else "unknown" }}`
      **Error:** {{ state_detector.output.error if state_detector.output.error is defined else "Unexpected state value — check polyphony plan detect-state output schema" }}

      ---

      Choose an action:
      - **Abort** — halt the entire run (terminates the conductor process)
    options:
      - label: "🛑 Abort"
        value: abort
        route: terminal_abort_run

  # ── Closed-unmerged gate ───────────────────────────────────────────────
  #
  # Plan PR exists but was closed without merging. Operator likely chose
  # to abandon this plan. Surface to user and end (do not auto-recreate).
  - name: closed_unmerged_gate
    type: human_gate
    prompt: |
      ## ℹ️ Plan PR Closed Without Merge

      The plan PR for work item **{{ workflow.input.work_item_id }}** is
      closed without being merged.

      - **PR:** {{ state_detector.output.pr_url if state_detector.output.pr_url is defined else "(unknown)" }}
      - **Branch:** `{{ state_detector.output.plan_branch }}`

      The workflow will not auto-recreate the PR. To restart planning for
      this item, delete the plan branch on origin and re-run.

      ---

      Choose an action:
      - **Acknowledge** — stop planning this branch
    options:
      - label: "✅ Acknowledge"
        value: acknowledge
        route: $end

  # ── Architect agent ──────────────────────────────────────────────────────
  #
  # Core planning agent. Creates or refines a plan for the work item using
  # type-specific definitions, templates, and decomposition guidance.
  #
  # On stale_generation entry: must read existing plan from disk + PR
  # comments, refine against current ancestors. The prompt instructs how.
  #
  # On revision loop entry (changes_requested from plan_reviewer/human):
  # must read PR comments via gh and incorporate feedback.
  #
  # Outputs the same {plan, children, open_questions, summary} schema as
  # v1.0 — the difference is what happens next: write_plan persists the
  # markdown to disk; the seeder still consumes children; the open_questions
  # gate still runs as before.
  - name: architect
    type: agent
    model: claude-opus-4.7
    description: Create or refine a plan using type-specific context, decomposition guidance, and any prior PR review feedback
    tools:
      - twig
      - gh
      - filesystem
    prompt: !file ../prompts/architect-plan-level.md
    output:
      plan:
        type: string
        description: The full plan document in Markdown format
      children:
        type: array
        description: >-
          Structured list of child work items to seed. Each child has a stable
          child_id (task-1, task-2, ...) the seeder uses for idempotent
          reconciliation across re-plans. Empty array means atomic — no
          children to seed.
        items:
          type: object
          properties:
            child_id:
              type: string
              description: Stable identifier (task-1, task-2, ...). Preserved across re-plans for the same logical child.
            title:
              type: string
              description: Work item title (one line)
            type:
              type: string
              description: Work item type (must be valid per decomposition guidance)
            description:
              type: string
              description: Work item description in Markdown
            acceptance_criteria:
              type: array
              description: Acceptance criteria as a list of strings
              items:
                type: string
            pg:
              type: string
              description: PG group name for implementation ordering (optional)
            depends_on:
              type: array
              description: child_ids this child depends on (optional)
              items:
                type: string
      open_questions:
        type: array
        description: Questions requiring user input before plan can finalize (empty array if none). Emit severity >= low; policy-driven route filters determine which questions gate.
        items:
          type: object
          properties:
            topic:
              type: string
              description: Brief topic title
            detail:
              type: string
              description: Full description of the question and why it matters
            severity:
              type: string
              description: One of critical, major, moderate, low. Policy route filters determine which severities gate — the architect should emit all relevant questions.
            relevant_files:
              type: array
              description: Repo-relative file paths the operator should consult to answer this question (e.g. existing implementations, configs, ADRs, prior plans). Empty array if none. Surfaced verbatim in the open-questions gate so the operator can jump straight to the right context without grepping.
              items:
                type: string
      summary:
        type: string
        description: Brief one-paragraph summary of the plan
      research_request_kind:
        type: string
        description: >-
          Discriminant for the research payload. Required and ALWAYS
          present. One of:
            - "none"     — no archive research needed; plan flows to
                           open_questions / review.
            - "request"  — architect needs archive research before
                           finalizing; the workflow routes to the
                           research sub-workflow and re-invokes the
                           architect with findings.
          Routing is a string compare on this field — no nested-optional
          dict access required.
      research_topics:
        type: array
        description: >-
          Research questions the architect needs answered. Always emitted;
          MUST be a (possibly empty) array. Non-empty when
          research_request_kind == "request"; emit [] when "none".
        items:
          type: string
      research_context:
        type: object
        description: >-
          Originating context for the research request. Always emitted;
          shape is opaque at the schema level (consumers read via
          `.get('plan_excerpt', '')` etc.). When request_kind=="request",
          should contain {work_item_id: number, plan_excerpt: string};
          when "none", emit {}.
      research_budget_hint:
        type: string
        description: >-
          Controls research depth/cost. "cheap" = archive-only (first
          pass). Always emitted; emit "" when research_request_kind ==
          "none".
      research_archive_scope:
        type: object
        description: >-
          Optional constraints narrowing the archive search surface.
          Always emitted; shape is opaque at the schema level (consumers
          read via `.get('paths', [])` / `.get('tags', [])`). When
          request_kind=="request", should contain {paths: [string], tags:
          [string]}; when "none", emit {}.
      research_escalation_cap:
        type: number
        description: >-
          AB#3134: max deep_researcher escalations allowed for this
          research request. Always emitted; defaults to 1 (single-shot
          escalation). Meaningful only when research_request_kind ==
          "request" but always present so the input_mapping below can
          read it directly without optional-dict gymnastics.
    routes:
      - to: research_loop_counter

  # ── Research loop counter ───────────────────────────────────────────────
  #
  # Counts the number of research_dispatch invocations in this run's
  # history. When the architect emits research_request_kind == "request"
  # and the cap has not been reached, routes to research_dispatch. When
  # the cap is reached or kind == "none", falls through to
  # open_questions_policy.
  #
  # AB#3164: routing is now a string-compare on the always-present
  # research_request_kind discriminant. No optional-dict access — the
  # nested-optional `research_needs` shape that gave us the AB#3156
  # StrictUndefined trap has been replaced by a flat discriminated union
  # at the architect's output schema.
  #
  # Hard cap: 3 research loops per plan invocation (MVP). The cap
  # prevents infinite loops when the architect repeatedly requests
  # research without converging. The default is intentionally hard-coded;
  # promotion to policy.yaml is deferred to a future PR.
  #
  # TODO(research-loop-policy): elevate to policy.yaml > research:
  #   { max_loops: 3 } when the policy schema lands.
  - name: research_loop_counter
    type: script
    description: Track research loop iteration count and gate on cap / payload presence
    command: pwsh
    args:
      - "-NoProfile"
      - "-Command"
      - |
        $count = [int]'{{ context.history | select('eq', 'research_dispatch') | list | length }}'
        $maxLoops = 3
        $capReached = $count -ge $maxLoops
        @{ iteration = $count; max_loops = $maxLoops; cap_reached = $capReached } | ConvertTo-Json
    routes:
      # No research requested — fall through.
      - to: open_questions_policy
        when: "{{ architect.output.research_request_kind == 'none' }}"
      # Cap reached — surface to human or fall through.
      - to: research_cap_gate
        when: "{{ research_loop_counter.output.cap_reached == true }}"
      # Research requested and under cap — dispatch.
      - to: research_dispatch

  # ── Research dispatch ──────────────────────────────────────────────────
  #
  # Invokes the research sub-workflow (research.yaml) with the architect's
  # research payload mapped to the sub-workflow's input schema. After
  # the sub-workflow returns, routes directly back to architect — bypassing
  # open_questions_policy, ensure_plan_branch, write_plan, commit_and_push,
  # open_plan_pr, and plan_reviewer entirely.
  #
  # AB#3164: input_mapping reads flat top-level fields on architect.output
  # (research_topics, research_context, research_budget_hint,
  # research_archive_scope, research_escalation_cap). Every field is
  # always emitted by the architect, so direct attribute access is safe
  # under StrictUndefined — no `.get(key, default)` chains required.
  #
  # Invariants:
  #   Pre:  architect.output.research_request_kind == "request".
  #   Post: research_dispatch.output.findings contains the synthesized
  #         Markdown document; routes back to architect for incorporation.
  - name: research_dispatch
    type: workflow
    description: Invoke archive-only research sub-workflow to answer architect's research questions.
    workflow: ./research.yaml
    input_mapping:
      topics: "{{ architect.output.research_topics }}"
      context_work_item_id: "{{ workflow.input.work_item_id }}"
      plan_excerpt: "{{ architect.output.research_context.get('plan_excerpt', '') }}"
      budget_hint: "{{ architect.output.research_budget_hint }}"
      archive_scope_paths: "{{ architect.output.research_archive_scope.get('paths', []) }}"
      archive_scope_tags: "{{ architect.output.research_archive_scope.get('tags', []) }}"
      # AB#3134: deep_researcher escalation cap. Always-present at the
      # architect's output (default 1). Profile-driven cap from
      # research.escalation_cap is a deferred follow-up — when it lands,
      # this default will be sourced from the resolved profile.
      escalation_cap: "{{ architect.output.research_escalation_cap }}"
    routes:
      - to: architect

  # ── Research cap gate ──────────────────────────────────────────────────
  #
  # Fires when the research loop counter reaches the cap. The architect
  # keeps requesting research but isn't converging. Surface to the
  # operator with options to proceed (skip research, continue to open
  # questions) or force one more research cycle.
  - name: research_cap_gate
    type: human_gate
    prompt: |
      ## ⚠️ Research Loop Cap Reached — Work Item {{ workflow.input.work_item_id }}

      The architect has requested research **{{ research_loop_counter.output.max_loops }}**
      times without converging on a final plan. The research loop cap
      prevents infinite loops.

      **Iteration:** {{ research_loop_counter.output.iteration }} of {{ research_loop_counter.output.max_loops }}

      Decide what to do:

      ---

      Choose an action:
      - **Proceed** — skip research and continue to open questions / plan review
      - **Force one more** — allow one additional research cycle
    options:
      - label: "⏩ Proceed without research"
        value: proceed
        route: open_questions_policy
      - label: "🔬 Force one more research cycle"
        value: force
        route: research_dispatch

  # ── Open questions policy resolver ─────────────────────────────────────
  #
  # Resolves the open_questions policy domain for the current work item
  # type. Outputs mode, min_severity, and max_question_loops which drive
  # the routing decision below.
  - name: open_questions_policy
    type: script
    description: Resolve open_questions policy for routing decisions
    command: polyphony
    args:
      - "policy"
      - "resolve"
      - "--domain"
      - "open_questions"
      - "--scope"
      - "type:{{ type_loader.output.type }}"
    routes:
      - to: open_questions_counter

  # ── Open questions loop counter ────────────────────────────────────────
  #
  # Counts the number of times open_questions_gate has appeared in this
  # run's history. Run-scoped automatically — context.history resets
  # each time the workflow re-enters from scratch, so we don't need a
  # temp-file side channel (which would survive across runs of the same
  # work item and stale-cap the loop). Counter rises 0 → 1 → 2 → … as
  # the gate fires; cap_reached short-circuits when count >= max.
  - name: open_questions_counter
    type: script
    description: Track open questions answer loop iteration count
    command: pwsh
    args:
      - "-NoProfile"
      - "-Command"
      - |
        $count = [int]'{{ context.history | select('eq', 'open_questions_gate') | list | length }}'
        $maxLoops = [int]'{{ open_questions_policy.output.max_question_loops }}'
        $capReached = $count -ge $maxLoops
        @{ iteration = $count; max_loops = $maxLoops; cap_reached = $capReached } | ConvertTo-Json
    routes:
      # Policy mode=auto: skip gate entirely regardless of questions.
      - to: ensure_plan_branch
        when: "{{ open_questions_policy.output.mode == 'auto' }}"
      # Cap reached: auto-proceed (fail honestly, don't loop forever).
      - to: ensure_plan_branch
        when: "{{ open_questions_counter.output.cap_reached == true }}"
      # Mode=manual: gate on ANY question present.
      - to: open_questions_gate
        when: "{{ open_questions_policy.output.mode == 'manual' and architect.output.open_questions | length > 0 }}"
      # Mode=warning: gate only when questions at or above min_severity exist.
      - to: open_questions_gate
        when: "{{ open_questions_policy.output.mode == 'warning' and architect.output.open_questions | selectattr('severity', 'in', open_questions_policy.output.severities_at_or_above) | list | length > 0 }}"
      # Else: no gating questions — proceed to ensure_plan_branch.
      - to: ensure_plan_branch

  # ── Open questions gate ──────────────────────────────────────────────────
  - name: open_questions_gate
    type: human_gate
    prompt: |
      ## 🤔 Open Questions — Work Item {{ workflow.input.work_item_id }}

      **Policy mode:** `{{ open_questions_policy.output.mode }}` · **Loop:** {{ open_questions_counter.output.iteration }} of {{ open_questions_counter.output.max_loops }}

      The architect has identified questions that need your input before
      finalizing the plan.

      {% if open_questions_policy.output.mode == 'warning' %}
      {% set blocking = architect.output.open_questions | selectattr('severity', 'in', open_questions_policy.output.severities_at_or_above) | list %}
      {% else %}
      {% set blocking = architect.output.open_questions %}
      {% endif %}
      {% for question in blocking %}
      ### {{ loop.index }}. [{{ question.severity | upper }}] {{ question.topic }}

      {{ question.detail }}

      {% if question.relevant_files is defined and question.relevant_files | length > 0 %}
      **Relevant files:**
      {% for path in question.relevant_files %}
      - `{{ path }}`
      {% endfor %}

      {% endif %}
      {% endfor %}

      ---

      Choose an action:
      - **Answer** — provide answers and revise the plan
      - **Proceed** — continue (write plan + open PR for review)
    options:
      - label: "💬 Answer"
        value: answer
        # Routes directly to architect — the loop counter is derived from
        # context.history above (no separate increment step needed).
        route: architect
        prompt_for: answers
      - label: "⏩ Proceed"
        value: proceed
        route: ensure_plan_branch

  # ── Write plan to disk ─────────────────────────────────────────────────
  #
  # Persists architect.output.plan to plans/plan-{item_id}.md. Pure I/O —
  # no git ops, no PR ops. ensure_plan_branch (previous) has already
  # checked out the plan branch so the file lands on the right ref;
  # commit_and_push (next) owns commit + push.
  #
  # Invariants:
  #   Pre:  architect.output.plan is non-empty; worktree is on the plan
  #         branch (ensure_plan_branch ran first).
  #   Post: plans/plan-{item_id}.md exists with the plan markdown; output.path
  #         is the absolute path; output.unchanged indicates noop on resume.
  - name: write_plan
    type: script
    description: Write architect's plan markdown + children-json sidecar to plans/
    command: polyphony
    args:
      - "plan"
      - "write-plan"
      - "--item-id"
      - "{{ workflow.input.work_item_id }}"
      - "--content-json"
      - "{{ architect.output.plan | tojson }}"
      # AB#3106 dogfood (2026-05-12): persist children-json into a sidecar
      # so the seeder can recover the architect's structured decomposition
      # on workflow re-entry (e.g. when state_detector lands in
      # awaiting_review and the architect agent is skipped). Always pass
      # — even an empty array `[]` — so commit_and_push --paths sees a
      # file. The seeder's resolution order is CLI > sidecar > apex_facets.
      - "--children-json"
      - "{{ architect.output.children | tojson }}"
    routes:
      - to: write_plan_error_gate
        when: "{{ write_plan.output.error is defined and write_plan.output.error }}"
      - to: commit_and_push

  # ── Write plan error gate ──────────────────────────────────────────────
  - name: write_plan_error_gate
    type: human_gate
    prompt: |
      ## ⚠️ Plan Write Failed

      Could not write the plan for work item
      **{{ workflow.input.work_item_id }}**.

      **Error:** {{ write_plan.output.error if write_plan.output.error is defined else "Unknown error" }}

      ---

      Choose an action:
      - **Retry** — re-run `polyphony plan write-plan` (idempotent)
      - **Abort** — halt the entire run (terminates the conductor process)
    options:
      - label: "🔁 Retry"
        value: retry
        route: write_plan
      - label: "🛑 Abort"
        value: abort
        route: terminal_abort_run

  # ── Ensure plan branch ────────────────────────────────────────────────
  #
  # Idempotently creates (or fast-forwards to) the plan branch and checks
  # it out. Runs BEFORE write_plan so the architect's plan file lands on
  # the plan branch (not the upstream branch as untracked, which would
  # block the subsequent checkout). Branch grammar from the Rev 4 ADR:
  #   plan/{root_id}                  — root plan (base = feature/{root_id})
  #   plan/{root_id}-{item_id}        — descendant plan (base = parent plan branch)
  #
  # Invariants:
  #   Pre:  root_id + item_id resolved; ancestor_chain has parent_item_id.
  #   Post: Worktree is on the plan branch; output.branch is the plan branch name.
  - name: ensure_plan_branch
    type: script
    description: Idempotently create/checkout the plan branch off its parent base
    command: polyphony
    args:
      - "branch"
      - "ensure-plan"
      - "--root-id"
      - "{{ root_resolver.output.resolved_root_id }}"
      - "--item-id"
      - "{{ workflow.input.work_item_id }}"
      - "--parent-item-id"
      - "{{ ancestor_chain.output.parent_item_id | default(0) }}"
    routes:
      - to: ensure_plan_branch_error_gate
        when: "{{ ensure_plan_branch.output.error is defined and ensure_plan_branch.output.error }}"
      - to: write_plan

  # ── Ensure plan branch error gate ─────────────────────────────────────
  - name: ensure_plan_branch_error_gate
    type: human_gate
    prompt: |
      ## ⚠️ Plan Branch Setup Failed

      Could not create or check out the plan branch for work item
      **{{ workflow.input.work_item_id }}**.

      **Error:** {{ ensure_plan_branch.output.error if ensure_plan_branch.output.error is defined else "Unknown error" }}

      ---

      Choose an action:
      - **Retry** — re-run `polyphony branch ensure-plan` (idempotent;
        recovers from transient git-network failures)
      - **Abort** — halt the entire run (terminates the conductor process)
    options:
      - label: "🔁 Retry"
        value: retry
        route: ensure_plan_branch
      - label: "🛑 Abort"
        value: abort
        route: terminal_abort_run

  # ── Commit and push ────────────────────────────────────────────────────
  #
  # Stages plans/plan-{item_id}.md, commits with a deterministic message,
  # and pushes to origin. Idempotent — emits no_changes when nothing is
  # staged (e.g., resume on already-pushed plan).
  #
  # Invariants:
  #   Pre:  Worktree on plan branch; plans/plan-{item_id}.md exists.
  #   Post: Either output.pushed == true (PR will be opened/updated next) OR
  #         output.no_op_reason == 'no_changes' (PR may already exist with
  #         this content; open_plan_pr handles reuse).
  - name: commit_and_push
    type: script
    description: Stage plan markdown + children-json sidecar, commit, push to origin
    command: polyphony
    args:
      - "plan"
      - "commit-and-push"
      - "--branch"
      - "{{ ensure_plan_branch.output.branch }}"
      - "--message"
      - "plan({{ workflow.input.work_item_id }}): write plan-{{ workflow.input.work_item_id }}.md"
      # AB#3106 dogfood (2026-05-12): include the children-json sidecar
      # written by `write_plan --children-json`. The sidecar is the
      # seeder's contract for re-entry recovery, so it MUST land in the
      # plan PR alongside the markdown.
      - "--paths"
      - "plans/plan-{{ workflow.input.work_item_id }}.md,plans/plan-{{ workflow.input.work_item_id }}.children.json"
    routes:
      - to: commit_and_push_error_gate
        when: "{{ commit_and_push.output.error is defined and commit_and_push.output.error }}"
      # v2.1: route through pr_open_platform_router so the same
      # commit-and-push leg can feed either open_plan_pr (github) or
      # open_plan_pr_ado (ado). On github (default) the router is a
      # no-op fall-through.
      - to: pr_open_platform_router

  # ── Commit and push error gate ────────────────────────────────────────
  - name: commit_and_push_error_gate
    type: human_gate
    prompt: |
      ## ⚠️ Plan Commit/Push Failed

      Could not commit and push the plan for work item
      **{{ workflow.input.work_item_id }}**.

      **Branch:** `{{ ensure_plan_branch.output.branch }}`
      **Error:** {{ commit_and_push.output.error if commit_and_push.output.error is defined else "Unknown error" }}

      ---

      Choose an action:
      - **Retry** — re-run `polyphony plan commit-and-push` (idempotent;
        emits no_changes when nothing is staged, recovers from transient
        push-network failures)
      - **Abort** — halt the entire run (terminates the conductor process)
    options:
      - label: "🔁 Retry"
        value: retry
        route: commit_and_push
      - label: "🛑 Abort"
        value: abort
        route: terminal_abort_run

  # ── Open plan PR ───────────────────────────────────────────────────────
  #
  # Opens the plan PR (or returns the existing one) and embeds the
  # ancestor_plan_generations snapshot in the PR body front-matter for
  # later stale-generation detection at merge time.
  #
  # Reuse semantics: an existing PR with a matching snapshot is returned;
  # an existing PR with a stale snapshot is rejected (operator decides).
  #
  # Invariants:
  #   Pre:  commit_and_push produced a pushable plan branch.
  #   Post: output.pr_url + output.pr_number identify the plan PR;
  #         output.created indicates whether it was just opened.
  - name: open_plan_pr
    type: script
    description: Open (or reuse) the plan PR with ancestor-generations snapshot
    command: polyphony
    args:
      - "pr"
      - "open-plan-pr"
      - "--root-id"
      - "{{ root_resolver.output.resolved_root_id }}"
      - "--item-id"
      - "{{ workflow.input.work_item_id }}"
      - "--parent-item-id"
      - "{{ ancestor_chain.output.parent_item_id | default(0) }}"
      - "--ancestor-ids"
      - "{{ ancestor_chain.output.ancestor_ids }}"
    routes:
      - to: open_plan_pr_error_gate
        when: "{{ open_plan_pr.output.error is defined and open_plan_pr.output.error }}"
      - to: plan_reviewer

  # ── Open plan PR error gate ────────────────────────────────────────────
  - name: open_plan_pr_error_gate
    type: human_gate
    prompt: |
      ## ⚠️ Plan PR Open Failed

      Could not open the plan PR for work item
      **{{ workflow.input.work_item_id }}**.

      **Branch:** `{{ ensure_plan_branch.output.branch }}`
      **Error:** {{ open_plan_pr.output.error if open_plan_pr.output.error is defined else "Unknown error" }}

      Common causes: stale ancestor snapshot on an existing PR (operator
      must close/recreate); gh authentication missing; network timeout
      (gh rate-limit, GitHub API hiccup, DNS); transient gh process hang.

      ---

      Choose an action:
      - **Retry** — re-run `polyphony pr open-plan-pr` (idempotent — reuses
        an existing PR with a matching ancestor snapshot; safe for
        transient gh/network failures)
      - **Abort** — halt the entire run (terminates the conductor process)
    options:
      - label: "🔁 Retry"
        value: retry
        route: open_plan_pr
      - label: "🛑 Abort"
        value: abort
        route: terminal_abort_run

  # ── Plan reviewer (LLM advisory — sentiment-driven model) ─────────────
  #
  # Single LLM reviewer per design doc Q2. Produces a critique using a
  # rubric and emits two fields the sentiment-driven loop consumes:
  #
  #   • `blocking_concerns` — issues that, in the reviewer's judgement,
  #     would harm downstream implementation. Read by
  #     `pr_feedback_analyzer` to decide whether to send the architect
  #     back for revision. Only blocking_concerns gate merge.
  #   • `non_blocking_suggestions` — polish / nice-to-have items. Kept
  #     for audit but NOT considered by the analyzer and NOT posted on
  #     the PR (to avoid noise).
  #
  # Posted comment shape: ONLY a marker line + the blocking_concerns
  # list (or "No blocking concerns identified" when empty). Full audit
  # (summary, strengths, non_blocking_suggestions) lives in the agent's
  # output fields for logs / dashboard, never on the PR — per
  # sentiment-driven design (the analyzer reads negative sentiment;
  # everything else is noise to the architect).
  #
  # Marker contract: the first line of `comment_body` MUST be the
  # `<!-- polyphony:agent-comment agent=plan_reviewer head_sha=... -->`
  # marker so `pr_feedback_analyzer` can reliably identify this bot's
  # comments across operator-token boundaries. The marker's head_sha
  # pins the comment to a specific commit; the analyzer uses it to
  # distinguish a fresh reviewer comment from a stale one across
  # remediation pushes.
  #
  # Posting: both platforms post via downstream poster scripts
  # (`plan_reviewer_poster` for github, `plan_reviewer_poster_ado` for
  # ado) — the LLM does NOT call `gh` directly. This keeps the marker-
  # prepend contract in one place (the LLM prompt) and removes the
  # github-vs-ado asymmetry that confused the old design.
  #
  # Invariants:
  #   Pre:  open_plan_pr (github) or open_plan_pr_ado (ado) produced
  #         output.pr_url + output.pr_number.
  #   Post: output.comment_body holds the marker-prefixed markdown to
  #         be posted by the platform-specific poster script;
  #         output.posted == false (the poster flips it to true).
  - name: plan_reviewer
    type: agent
    model: claude-opus-4.7
    description: Produce a single advisory plan review (audit in output; minimal post via poster scripts)
    tools:
      - filesystem
    output:
      posted:
        type: boolean
        description: Always false — the downstream poster script does the real posting.
      pr_number:
        type: number
        description: PR number that was reviewed
      summary:
        type: string
        description: One-paragraph summary of the reviewer's overall assessment (audit-only — not posted)
      strengths:
        type: array
        description: Plan strengths (audit-only — not posted)
        items:
          type: string
      blocking_concerns:
        type: array
        description: Issues that would harm downstream implementation. Read by pr_feedback_analyzer; only these gate merge.
        items:
          type: string
      non_blocking_suggestions:
        type: array
        description: Polish / nice-to-have items (audit-only — not posted and never gating).
        items:
          type: string
      comment_body:
        type: string
        description: |
          The fully-rendered markdown comment ready to be posted by the
          platform-specific poster. MUST start with the
          `<!-- polyphony:agent-comment agent=plan_reviewer pr_number=... -->`
          marker line. Body contains ONLY the blocking_concerns list
          (or "No blocking concerns identified" when empty). The full
          rubric assessment lives in this agent's other output fields.
    prompt: |
      You are an advisory plan reviewer for an SDLC planning workflow
      under the sentiment-driven PR review model.

      ## Your Mission

      Read the plan, evaluate it against the rubric below, and emit
      your assessment as structured output. A downstream agent
      (`pr_feedback_analyzer`) reads your `blocking_concerns` to decide
      whether to send the architect back for revision. You do NOT vote
      `--approve` / `--request-changes`; you do NOT call `gh` or any
      posting tool. A separate poster script handles the platform-
      specific posting using your `comment_body` field.

      ## Severity discipline (load-bearing)

      Be **conservative** with `blocking_concerns`. Every entry sends
      the architect back to revise; chains of pedantic blocking concerns
      cause revise-loop churn until the cap fires.

      - `blocking_concerns` — issues that would HARM downstream
        implementation if shipped as-is. Examples: missing acceptance
        criteria a coder cannot satisfy, decomposition that produces
        unimplementable children, factual contradictions, scope that
        conflicts with the type definition. If you are unsure, put it
        in `non_blocking_suggestions` instead.
      - `non_blocking_suggestions` — polish / phrasing / "would be
        nicer if". Audit only — never posted, never gates merge.

      ## Context

      - **Work item:** {{ workflow.input.work_item_id }}
      - **Type definition:** {{ type_loader.output.definition }}
      - **Decomposition guidance:** {{ type_loader.output.decomposition_guidance }}
      - **Plan template:** {{ type_loader.output.template }}
      {% if workflow.input.platform == 'ado' -%}
      - **PR URL:** {{ open_plan_pr_ado.output.pr_url }}
      - **PR number:** {{ open_plan_pr_ado.output.pr_number }}
      - **Head branch:** {{ open_plan_pr_ado.output.head_branch }}
      {% else -%}
      - **PR URL:** {{ open_plan_pr.output.pr_url }}
      - **PR number:** {{ open_plan_pr.output.pr_number }}
      - **Head branch:** {{ open_plan_pr.output.head_branch }}
      {%- endif %}
      - **Plan file path:** plans/plan-{{ workflow.input.work_item_id }}.md

      Read the plan from disk (the working tree is on the plan branch).

      ## Rubric (combined technical + readability)

      | Criterion | Weight | Notes |
      |---|---|---|
      | Feasibility | 25% | Can the plan be implemented as described? |
      | Completeness | 20% | Does the plan cover all aspects of the work item? |
      | Decomposition | 20% | Are child items well-scoped, sized, and dependency-correct? |
      | Alignment | 15% | Does the plan follow the type's guidance? |
      | Clarity | 10% | Is the plan easy for a downstream agent or human to act on? |
      | Acceptance criteria | 10% | Are acceptance criteria present, testable, unambiguous? |

      ## Comment body shape (load-bearing)

      The `comment_body` field MUST follow this exact structure. The
      first line MUST be the marker (no leading whitespace, no preceding
      content). Do NOT add strengths, summary, non-blocking suggestions,
      or any other section — only the blocking-concerns list:

      ```
      <!-- polyphony:agent-comment agent=plan_reviewer pr_number={{ open_plan_pr_ado.output.pr_number if workflow.input.platform == 'ado' else open_plan_pr.output.pr_number }} -->
      ### 🤖 Polyphony plan reviewer

      **Blocking concerns** (sentiment-driven loop reads this section):

      - <blocking concern 1>
      - <blocking concern 2>

      _Advisory only — pr_feedback_analyzer determines routing. Full
      rubric audit available in the workflow logs._
      ```

      When `blocking_concerns` is empty, replace the bulleted list with
      the single line `_No blocking concerns identified._` — keep the
      marker and the header. The analyzer needs a marker comment on
      every poll to know the reviewer ran.

      {% if guidance_loader is defined and guidance_loader.output.agents.plan_reviewer is defined and guidance_loader.output.agents.plan_reviewer %}
      ## Repo-Specific Guidance — plan_reviewer (override)

      {{ guidance_loader.output.agents.plan_reviewer }}
      {% elif guidance_loader is defined and guidance_loader.output.reviewer is defined and guidance_loader.output.reviewer.role %}
      ## Repo-Specific Guidance

      {{ guidance_loader.output.reviewer.role }}
      {% endif %}

      {% if guidance_loader.output.reviewer is defined and guidance_loader.output.reviewer.type_refinement %}
      ## Repo-Specific Guidance — {{ guidance_loader.output.type }} refinement

      {{ guidance_loader.output.reviewer.type_refinement }}
      {% endif %}

      ## Output

      Return JSON:
      ```json
      {
        "posted": false,
        "pr_number": {% if workflow.input.platform == 'ado' %}{{ open_plan_pr_ado.output.pr_number }}{% else %}{{ open_plan_pr.output.pr_number }}{% endif %},
        "summary": "<one paragraph — audit only, not posted>",
        "strengths": ["..."],
        "blocking_concerns": ["..."],
        "non_blocking_suggestions": ["..."],
        "comment_body": "<full marker-prefixed markdown per the shape above>"
      }
      ```
    routes:
      - to: plan_reviewer_poster_ado
        when: "{{ workflow.input.platform == 'ado' }}"
      - to: plan_reviewer_poster

  # ── Plan reviewer poster (GitHub) ─────────────────────────────────────
  #
  # Posts plan_reviewer's rendered comment_body to the GitHub PR via
  # `gh pr comment`. Mirrors plan_reviewer_poster_ado so both platforms
  # have a single deterministic posting site (matters for the marker-
  # prepend contract — the LLM does NOT call gh directly, so the
  # marker discipline lives in plan_reviewer's prompt and the poster
  # just emits the body verbatim).
  - name: plan_reviewer_poster
    type: script
    description: Post plan_reviewer's rendered comment to the GitHub PR.
    command: pwsh
    args:
      - "-NoProfile"
      - "-NoLogo"
      - "-Command"
      - |
        $ErrorActionPreference = 'Stop'
        $prNumber = [int]'{{ open_plan_pr.output.pr_number }}'
        $repoSlug = '{{ open_plan_pr.output.repo_slug }}'
        $body     = @'
        {{ plan_reviewer.output.comment_body }}
        '@
        try {
          $null = gh pr comment $prNumber --repo $repoSlug --body $body 2>&1
          @{ posted = $true; pr_number = $prNumber } | ConvertTo-Json -Compress
        } catch {
          @{ posted = $false; error = $_.Exception.Message; pr_number = $prNumber } | ConvertTo-Json -Compress
          exit 1
        }
    routes:
      - to: poll_status

  # ── Poll status ───────────────────────────────────────────────────────
  #
  # Single-shot poll of the plan PR. Returns the platform-neutral
  # envelope including the deterministic 4-way `route` field computed
  # by PrPollTerminalRoute.Classify:
  #
  #   • `merge_now`       — approved, no unresolved actionable threads
  #   • `already_merged`  — operator merged on the platform
  #   • `abort_unmerged`  — PR closed (gh) / abandoned (ado) / -10 reject
  #   • `none`            — mixed signals; defer to pr_feedback_analyzer
  #
  # With --include-metadata, also returns metadata.requests_parent_change
  # parsed from the PR body front-matter (used for the P8 deferred
  # parent-change-request handling).
  #
  # Invariants:
  #   Pre:  open_plan_pr produced output.pr_url; plan_reviewer has posted
  #         a marker comment so the analyzer can recognize it as the bot.
  #   Post: output.route in {merge_now, already_merged, abort_unmerged, none}.
  - name: poll_status
    type: script
    description: Single-shot poll of plan PR review state (with metadata)
    command: polyphony
    args:
      - "pr"
      - "poll-status"
      - "--pr-url"
      - "{{ open_plan_pr.output.pr_url if (open_plan_pr is defined and open_plan_pr.output.pr_url is defined) else state_detector.output.pr_url }}"
      - "--include-metadata"
    routes:
      - to: poll_error_gate
        when: "{{ poll_status.output.error is defined and poll_status.output.error }}"
      # Terminal: operator merged through the platform UI.
      - to: seeder
        when: "{{ poll_status.output.route == 'already_merged' }}"
      # Terminal: operator closed (gh) or abandoned (ado) or voted -10 reject.
      - to: closed_unmerged_gate
        when: "{{ poll_status.output.route == 'abort_unmerged' }}"
      # Terminal: approved, clean — but check for parent-change request
      # or scope-violation gate before merging.
      - to: extract_parent_patch
        when: "{{ poll_status.output.route == 'merge_now' and poll_status.output.metadata is defined and poll_status.output.metadata is not none and poll_status.output.metadata.requests_parent_change == true }}"
      - to: validate_scope
        when: "{{ poll_status.output.route == 'merge_now' and workflow.input.child_scope_globs != '' }}"
      - to: merge_plan_pr
        when: "{{ poll_status.output.route == 'merge_now' }}"
      # Mixed signals — defer to the sentiment analyzer.
      - to: pr_feedback_analyzer
        when: "{{ poll_status.output.route == 'none' }}"
      # Catch-all per M4 — defensive; treat unknown as deferral to analyzer.
      - to: pr_feedback_analyzer

  # ── Poll error gate ───────────────────────────────────────────────────
  - name: poll_error_gate
    type: human_gate
    prompt: |
      ## ⚠️ Plan PR Poll Failed

      Could not read the plan PR review state for work item
      **{{ workflow.input.work_item_id }}**.

      **State:** `{{ poll_status_ado.output.state if (poll_status_ado is defined and poll_status_ado.output.state is defined) else (poll_status.output.state if (poll_status is defined and poll_status.output.state is defined) else "unknown") }}`
      **Error:** {{ poll_status_ado.output.error if (poll_status_ado is defined and poll_status_ado.output.error is defined) else (poll_status.output.error if (poll_status is defined and poll_status.output.error is defined) else "Unexpected state — check polyphony pr poll-status / poll-status-ado output schema") }}

      ---

      Choose an action:
      - **Retry** — re-poll the PR
      - **Abort** — halt the entire run (terminates the conductor process)
    options:
      - label: "🔄 Retry"
        value: retry
        route: pr_poll_platform_router
      - label: "🛑 Abort"
        value: abort
        route: terminal_abort_run

  # ── Extract parent patch (P8d wiring) ──────────────────────────────────
  #
  # Reached when either (a) state_detector returns parent_change_pending —
  # i.e. an approved direct-child plan PR carries
  # `requests_parent_change: true`, or (b) poll_status sees the same flag
  # on a freshly-approved child PR mid-flight. In both cases we extract a
  # bounded markdown diff for THIS work item's plan file out of the child
  # PR, then re-prompt the architect to integrate or reject it.
  #
  # `parent_item_id` is the current workflow's `work_item_id` — that's the
  # parent the child PR is asking to change.
  #
  # On state_detector entry, the child PR url comes from
  # `state_detector.output.parent_change_pending_children[0]`. On
  # poll_status entry, the child IS the current work_item_id but the
  # child PR url is captured by poll_status itself; the verb only needs
  # the URL, so we always read from state_detector when defined and fall
  # back to the open_plan_pr / state_detector pr_url chain otherwise.
  #
  # Output schema (per polyphony.exe plan extract-parent-patch — Models/PlanExtractParentPatchResult.cs):
  #   pr_url, pr_number, repo_slug, child_item_id, parent_item_id,
  #   expected_parent_generation, head_sha, files_touched[],
  #   parent_plan_diff, truncated, diff_size_bytes,
  #   requests_parent_change, warnings[], error, error_code
  #
  # Always exits 0 (routing-style). Workflow branches on the presence of
  # `error` inside the architect prompt — there is no error gate here
  # because the architect is the consumer and is told to default to
  # "reject by reasoning" when the diff is unusable.
  - name: extract_parent_patch
    type: script
    description: Extract bounded parent-plan markdown diff from a child plan PR that requests parent change
    command: polyphony
    args:
      - "plan"
      - "extract-parent-patch"
      - "--pr-url"
      - "{{ state_detector.output.parent_change_pending_children[0].pr_url if (state_detector.output.parent_change_pending_children is defined and state_detector.output.parent_change_pending_children|length > 0) else (open_plan_pr_ado.output.pr_url if (workflow.input.platform == 'ado' and open_plan_pr_ado is defined and open_plan_pr_ado.output.pr_url is defined) else (open_plan_pr.output.pr_url if (open_plan_pr is defined and open_plan_pr.output.pr_url is defined) else state_detector.output.pr_url)) }}"
      - "--root-id"
      - "{{ root_resolver.output.resolved_root_id }}"
      - "--parent-item-id"
      - "{{ workflow.input.work_item_id }}"
    routes:
      - to: architect

  # ── PR feedback analyzer (sentiment-driven loop heart) ────────────────
  #
  # LLM agent that reads the poll envelope and decides whether the PR
  # has actionable negative feedback that should send the architect
  # back to revise, OR whether the workflow should throttle and wait
  # for a human signal (positive vote / merge / explicit comment).
  #
  # Invoked on `poll_status[_ado].output.route == 'none'` — the
  # deterministic classifier already handled merged / closed / approved-
  # and-clean / rejected-vote terminals; this agent only judges the
  # ambiguous middle.
  #
  # Identity policy (load-bearing — encoded in the prompt):
  #   1. Comment with a `<!-- polyphony:agent-comment agent=... -->`
  #      marker → bot reviewer. INCLUDE the comment's content.
  #   2. Comment author matches the PR author → exclude (PR author
  #      narrating their own work doesn't count as feedback to itself).
  #   3. Otherwise → human reviewer. INCLUDE.
  #
  # Severity policy (also load-bearing):
  #   - For polyphony's own bot reviewers (e.g. plan_reviewer), only
  #     items under the `**Blocking concerns**` section count as
  #     negative. `non_blocking_suggestions` are NEVER posted but if
  #     a future bot emits a body with both, blocking-only is the rule.
  #   - For human comments + unresolved threads, the analyzer judges
  #     overall sentiment using natural-language reasoning. A vote of
  #     `changes_requested` or `rejected` on its own qualifies as
  #     negative even without an explanatory comment.
  #
  # Output digest contract: `feedback_digest` is a stable hash of
  # (comment ids + thread ids + vote tuples + body sha) of everything
  # the analyzer considered. `revise_counter` uses this to avoid
  # incrementing on no-progress re-polls — see that node for details.
  #
  # Invariants:
  #   Pre:  poll_status (or poll_status_ado) returned route == 'none'.
  #   Post: output.has_negative_feedback bool drives routing;
  #         output.feedback_summary is the architect's revision brief
  #         (concise markdown — the analyzer summarizes; raw threads
  #         are not pasted back); output.feedback_digest dedups
  #         no-progress polls in revise_counter.
  - name: pr_feedback_analyzer
    type: agent
    model: claude-sonnet-4.6
    description: Read poll envelope; decide whether negative feedback requires architect revision.
    tools:
      - filesystem
    output:
      has_negative_feedback:
        type: boolean
        description: True when the analyzer judges that one or more in-scope reviewers requested changes the architect should address.
      feedback_summary:
        type: string
        description: Markdown summary of the negative feedback for the architect prompt. Empty when has_negative_feedback is false.
      feedback_digest:
        type: string
        description: Stable hash of all comments/threads/votes considered. revise_counter uses this to detect no-progress re-polls.
      reasoning:
        type: string
        description: Short explanation of the decision (audit only — not posted, not consumed by routing).
    prompt: |
      You decide whether a plan PR currently has actionable negative
      feedback that the architect should respond to.

      ## Context — Poll envelope

      - **PR URL:** {{ poll_status_ado.output.pr_url if (workflow.input.platform == 'ado' and poll_status_ado is defined) else poll_status.output.pr_url }}
      - **PR author identity:** `{{ poll_status_ado.output.author_identity if (workflow.input.platform == 'ado' and poll_status_ado is defined) else poll_status.output.author_identity }}`
      - **Head SHA:** `{{ poll_status_ado.output.head_sha if (workflow.input.platform == 'ado' and poll_status_ado is defined) else poll_status.output.head_sha }}`
      - **Derived state:** `{{ poll_status_ado.output.state if (workflow.input.platform == 'ado' and poll_status_ado is defined) else poll_status.output.state }}`
      - **Route reason (from terminal classifier):** {{ poll_status_ado.output.route_reason if (workflow.input.platform == 'ado' and poll_status_ado is defined) else poll_status.output.route_reason }}

      ### Top-level PR comments (JSON, oldest first)

      ```json
      {{ (poll_status_ado.output.comments if (workflow.input.platform == 'ado' and poll_status_ado is defined) else poll_status.output.comments) | tojson }}
      ```

      ### Review threads (JSON, includes thread comments)

      ```json
      {{ (poll_status_ado.output.threads if (workflow.input.platform == 'ado' and poll_status_ado is defined) else poll_status.output.threads) | tojson }}
      ```

      ### Reviewer votes

      ```json
      {{ (poll_status_ado.output.reviewers if (workflow.input.platform == 'ado' and poll_status_ado is defined) else poll_status.output.reviewers) | tojson }}
      ```

      ## Identity & severity policy

      For each comment / thread, classify the source:

      1. If the comment body's `marker` field is non-null → **bot
         reviewer** (the polyphony plan_reviewer or another marker-
         posting agent). Only treat items under the `**Blocking
         concerns**` section as negative; ignore everything else in the
         bot's body.
      2. Else if `author == PR author identity` → **author self-comment**.
         Exclude entirely (the PR author narrating their own work is
         not feedback to themselves).
      3. Else → **human reviewer**. Use natural-language judgement of
         the comment's sentiment and any embedded code-review concerns.

      For reviewer **votes**: a `changes_requested` vote from a non-
      author reviewer counts as negative feedback regardless of any
      explanatory comment. A `rejected` vote was already terminated by
      the deterministic classifier — you should not see it here.

      Unresolved threads (`is_resolved == false && is_outdated != true`)
      that contain at least one in-scope (non-author) comment count as
      negative feedback even if the comment body is short.

      ## Output

      Return JSON:
      ```json
      {
        "has_negative_feedback": <true|false>,
        "feedback_summary": "<markdown brief for the architect; concise — summarize, do not paste raw threads; empty string when no negative feedback>",
        "feedback_digest": "<short stable hash of everything you considered — comment ids + thread ids + vote tuples; same inputs MUST produce the same digest>",
        "reasoning": "<≤500 chars audit explanation of the decision>"
      }
      ```

      The `feedback_summary` is fed verbatim into the architect's
      revision prompt — keep it actionable, focused on what to change
      (not why the reviewer flagged it). The `feedback_digest` lets
      revise_counter detect no-progress re-polls; use a stable
      formulation like `sha256("comment-ids:thread-ids:votes:body-shas")`
      computed from the input ids — DO NOT include timestamps or
      run-specific fields.
    routes:
      - to: approvals_policy
        when: "{{ pr_feedback_analyzer.output.has_negative_feedback == true }}"
      - to: pending_poll_counter

  # ── Pending poll counter (stuck-review timeout MVP) ───────────────────
  #
  # Increments each time pr_feedback_analyzer concludes there is no
  # actionable negative feedback. Counter file is keyed by work_item_id
  # so it persists across the poll → throttle → continue → re-poll loop.
  # When the count reaches POLL_CAP, routes to stuck_review_gate so the
  # operator can decide whether to keep waiting, override-approve, or
  # abort. Below the cap, routes to pending_review_gate (the throttle
  # gate) for the unchanged operator UX in the common case.
  #
  # POLL_CAP is hard-coded to 60 at MVP. With human-driven re-polls
  # this represents 60 deliberate "is it ready yet?" clicks before the
  # workflow surfaces the stuck-review escalation.
  #
  # TODO(stuck-review-policy): elevate to policy.yaml > timeouts:
  #   { review_pending: { by_pr_kind: { plan: 60, feature: 60, ... } } }
  # when the policy schema lands. See docs/decisions/stuck-review-timeout.md.
  #
  # Invariants:
  #   Pre:  pr_feedback_analyzer returned has_negative_feedback == false.
  #   Post: output.count is the current poll count (1-based);
  #         output.cap_reached indicates whether the cap was hit.
  - name: pending_poll_counter
    type: script
    description: Track pending-review poll count (cap 60 — stuck-review timeout MVP)
    command: pwsh
    args:
      - "-NoProfile"
      - "-Command"
      - |
        $counterFile = Join-Path ([System.IO.Path]::GetTempPath()) "conductor-plan-pending-poll-{{ workflow.input.work_item_id }}"
        if (Test-Path $counterFile) {
            $count = [int](Get-Content $counterFile -Raw) + 1
        } else {
            $count = 1
        }
        Set-Content $counterFile $count
        $cap = 60
        @{ count = $count; cap = $cap; cap_reached = ($count -ge $cap) } | ConvertTo-Json
    routes:
      - to: stuck_review_gate_policy_router
        when: "{{ pending_poll_counter.output.cap_reached == true }}"
      - to: pending_review_gate_policy_router

  # ── Pending-review gate policy router ─────────────────────────────────
  #
  # Reads `policy.unattended.review_wait_mode`. Three modes, two behaviors:
  #   • `wait` (default) → fall through to the human throttle gate.
  #   • `skip`           → bypass the gate, route directly back to re-poll.
  #   • `auto`           → REJECTED. The old `auto` mode self-approved via
  #                        magic comments; that mechanism is gone in the
  #                        sentiment-driven loop and reintroducing it
  #                        requires calling the platform vote APIs with
  #                        an operator-identity token. Until that PR
  #                        lands, treat `auto` as a hard misconfiguration
  #                        so it surfaces immediately rather than silently
  #                        degrading to `skip` (which keeps polling forever
  #                        with no human in the loop — an unattended
  #                        operator might wait days for a PR they thought
  #                        was being auto-merged).
  #
  # Invariants:
  #   Pre:  pending_poll_counter has been computed (cap not reached).
  #   Post: load_policy.output.unattended.review_wait_mode is
  #         {wait, skip} (validated by the loader; `auto` is rejected here).
  - name: pending_review_gate_policy_router
    type: script
    description: Bypass pending_review_gate when policy.unattended.review_wait_mode is skip; reject auto.
    command: polyphony
    args:
      - "policy"
      - "load"
    routes:
      - to: terminal_abort_auto_mode_unsupported
        when: "{{ pending_review_gate_policy_router.output.unattended.review_wait_mode == 'auto' }}"
      - to: pr_poll_platform_router
        when: "{{ pending_review_gate_policy_router.output.unattended.review_wait_mode == 'skip' }}"
      - to: pending_review_gate

  # ── Pending-review gate (in-workflow human checkpoint) ────────────────
  #
  # When poll_status returns 'pending' we surface a gate with the PR URL
  # so the human can review on GitHub/ADO and come back to continue.
  #
  # NOTE: design doc Q3 recommended option (b) "exit-with-pending" so the
  # outer apex driver re-enters when human feedback lands. We currently
  # use option (a) human_gate because the apex driver is being rebuilt
  # around the requirement+disposition model. Switch to option (b) lands
  # with Phase 2c (workflow YAML migration to requirement+disposition).
  # ── Pending-review throttle gate (sentiment-driven loop) ──────────────
  #
  # Reached when `pr_feedback_analyzer` judged the current poll cycle
  # as no-actionable-feedback (no negative bot concerns, no human
  # changes_requested vote, no unresolved human threads). The PR may
  # still be open and waiting for an explicit positive signal (merge,
  # approve vote, comment that changes the analyzer's verdict). This
  # gate is the throttle: continue to re-poll, or abort the run.
  #
  # Under the sentiment-driven model the analyzer — not the operator —
  # is the source of truth for whether the architect needs to revise.
  # Operators no longer need to dictate "approve" or "request changes"
  # via magic comments; the natural platform UX (vote / comment /
  # merge) drives the loop.
  - name: pending_review_gate
    type: human_gate
    prompt: |
      ## ⏳ Plan PR Awaiting Action — Work Item {{ workflow.input.work_item_id }}

      The plan PR is open. The polyphony bot reviewer has posted (see
      the marker comment on the PR) and the sentiment-driven analyzer
      did NOT find actionable negative feedback this poll.

      - **PR:** {{ open_plan_pr_ado.output.pr_url if (workflow.input.platform == 'ado' and open_plan_pr_ado is defined and open_plan_pr_ado.output.pr_url is defined) else (open_plan_pr.output.pr_url if (open_plan_pr is defined and open_plan_pr.output.pr_url is defined) else state_detector.output.pr_url) }}
      - **Branch:** `{{ ensure_plan_branch.output.branch if (ensure_plan_branch is defined and ensure_plan_branch.output.branch is defined) else state_detector.output.plan_branch }}`

      {% if workflow.input.platform == 'ado' %}
      To proceed, take one of these actions in Azure DevOps, then click
      **Continue** to re-poll:

      _Permissive approval mode is **enabled** for plan PRs on the ADO
      leg (the plan-level workflow always passes
      `--allow-any-approval-vote` since polyphony-opened PRs typically
      lack ADO branch-policy required-reviewers). Any reviewer's
      positive vote (`+5` / `+10`) counts as APPROVED on the next poll._

      - **Approve** (`+5` or `+10`) — workflow merges on next poll.
      - **Complete the PR** — workflow detects merged state next poll.
      - **Wait for author** (`-5`) or a comment requesting changes —
        the analyzer reads the comment on the next poll and routes the
        architect back to revise.
      - **Reject** (`-10`) or **Abandon** the PR — workflow aborts this
        plan-leg on the next poll. (Rejection short-circuits before any
        approval logic.)

      _Note: ADO does not invalidate reviewer votes when new commits
      land. An approval cast before a force-push still counts after the
      push. If you push fix-up commits, re-review explicitly before
      clicking **Continue**._
      {% else %}
      To proceed, take one of these actions on GitHub, then click
      **Continue** to re-poll:

      - **Merge the PR** — workflow detects merged state next poll.
      - **Comment requesting changes** — the analyzer reads the
        comment on the next poll and routes the architect back to
        revise. (You can also formally `--request-changes` via review
        if you have the permission; the analyzer sees both.)
      - **Close the PR** — workflow aborts this plan-leg on the next
        poll.

      _Note: GitHub blocks PR-author self-approval. If you opened this
      PR yourself, the merge happens once a second reviewer approves —
      or you can simply use the **Merge** button directly._
      {% endif %}

      ---

      Choose an action:
      - **Continue** — re-poll the PR for the updated state
      - **Abort** — halt the entire run (terminates the conductor process)
    options:
      - label: "🔄 Continue"
        value: continue
        route: pr_poll_platform_router
      - label: "🛑 Abort"
        value: abort
        route: terminal_abort_run

  # ── Stuck-review gate policy router (AB#3104) ─────────────────────────
  #
  # Reads `policy.unattended.review_wait_mode`. Three modes:
  #   • `auto`  → falls through to the human `stuck_review_gate`. Reaching
  #               poll #60 with `auto` enabled means the magic-approve
  #               comment never took effect (wrong actor identity, gh
  #               failure, or a derivation bug) — escalate to a human
  #               rather than silently merging or polling forever.
  #   • `skip`  → bypasses `stuck_review_gate` and routes to
  #               `stuck_review_reset` (the operator's "Continue waiting"
  #               choice — reset the counter, keep polling).
  #   • `wait`  → falls through to the human gate (default).
  #
  # Invariants:
  #   Pre:  pending_poll_counter.cap_reached == true.
  #   Post: load_policy.output.unattended.review_wait_mode is
  #         {wait, skip, auto} (validated by the loader).
  - name: stuck_review_gate_policy_router
    type: script
    description: Bypass stuck_review_gate when policy.unattended.review_wait_mode=skip; auto escalates to human
    command: polyphony
    args:
      - "policy"
      - "load"
    routes:
      - to: stuck_review_reset
        when: "{{ stuck_review_gate_policy_router.output.unattended.review_wait_mode == 'skip' }}"
      - to: stuck_review_gate

  # ── Stuck-review gate (poll-cap escalation) ───────────────────────────
  #
  # Fires when pending_poll_counter hits POLL_CAP (60). The reviewer has
  # gone silent — surface that fact rather than letting the operator
  # keep clicking "Continue" on pending_review_gate forever.
  #
  # Three operator options (per task spec):
  #   continue_waiting  → reset the counter, return to pending_review_gate.
  #                       Gives the operator another full cap budget.
  #   override_approved → bypass review, route to the platform-appropriate
  #                       merger via stuck_review_override_router.
  #   abort             → exit the workflow.
  #
  # TODO(stuck-review-policy): elevate to policy.yaml > timeouts: when
  # the policy schema lands. See docs/decisions/stuck-review-timeout.md.
  #
  # P6 qualification: this is a genuine multi-option decision (wait /
  # override / abort) that requires the operator to know whether the
  # silence is recoverable — not a routine checkpoint.
  - name: stuck_review_gate
    type: human_gate
    description: PR review pending past poll cap — operator decides wait, override, or abort.
    prompt: |
      ## ⏰ Stuck Review — Poll Cap Reached for Work Item {{ workflow.input.work_item_id }}

      The plan PR has been awaiting reviewer action for
      **{{ pending_poll_counter.output.count }}** polls
      (cap: **{{ pending_poll_counter.output.cap }}**).

      The reviewer may be unavailable or unblocked but silent. You can
      keep waiting (the counter resets), bypass review and merge anyway,
      or abort.

      - **PR:** {{ open_plan_pr_ado.output.pr_url if (workflow.input.platform == 'ado' and open_plan_pr_ado is defined and open_plan_pr_ado.output.pr_url is defined) else (open_plan_pr.output.pr_url if (open_plan_pr is defined and open_plan_pr.output.pr_url is defined) else state_detector.output.pr_url) }}
      - **Branch:** `{{ ensure_plan_branch.output.branch if (ensure_plan_branch is defined and ensure_plan_branch.output.branch is defined) else state_detector.output.plan_branch }}`

      ---

      Choose an action:
      - **Continue waiting** — reset the poll counter and return to the pending-review gate
      - **Override approved** — treat the PR as approved and proceed to merge
      - **Abort** — halt the entire run (terminates the conductor process)
    options:
      - label: "⏳ Continue waiting"
        value: continue_waiting
        route: stuck_review_reset
      - label: "✅ Override approved"
        value: override_approved
        route: stuck_review_override_router
      - label: "🛑 Abort"
        value: abort
        route: terminal_abort_run

  # ── Stuck-review reset ────────────────────────────────────────────────
  #
  # Zeros the poll counter file when the operator chose "Continue waiting"
  # at stuck_review_gate, then routes back to pending_review_gate so the
  # operator gets the regular pending UX again with a fresh cap budget.
  - name: stuck_review_reset
    type: script
    description: Reset pending-poll counter after stuck-review continue-waiting choice
    command: pwsh
    args:
      - "-NoProfile"
      - "-Command"
      - |
        $counterFile = Join-Path ([System.IO.Path]::GetTempPath()) "conductor-plan-pending-poll-{{ workflow.input.work_item_id }}"
        Set-Content $counterFile 0
        @{ count = 0; reset = $true } | ConvertTo-Json
    routes:
      - to: pending_review_gate_policy_router

  # ── Stuck-review override router ──────────────────────────────────────
  #
  # When the operator picks "Override approved" at stuck_review_gate, we
  # need to route to the platform-appropriate merger (merge_plan_pr for
  # github, merge_plan_pr_ado for ado). This script-step echoes the
  # platform input so the route conditions can branch on it without
  # depending on whether poll_status or poll_status_ado was the last
  # poller.
  - name: stuck_review_override_router
    type: script
    description: Route stuck-review override to the platform-appropriate plan PR merger
    command: pwsh
    args:
      - "-NoProfile"
      - "-Command"
      - |
        $platform = '{{ workflow.input.platform }}'
        if ([string]::IsNullOrWhiteSpace($platform)) { $platform = 'ado' }
        @{ platform = $platform } | ConvertTo-Json -Compress
    routes:
      - to: merge_plan_pr_ado
        when: "{{ stuck_review_override_router.output.platform == 'ado' }}"
      - to: merge_plan_pr
        when: "{{ stuck_review_override_router.output.platform == 'github' }}"
      # Catch-all per M4: default to ADO since plan-level defaults platform to 'ado'.
      - to: merge_plan_pr_ado

  # ── Approvals policy resolver (AB#3181 partial wiring) ────────────────
  #
  # Resolves the `approvals` policy domain for the current work item type
  # so revise_counter can drive its cap from policy.approvals.max_revision_cycles
  # instead of a hardcoded literal. Pre-AB#3181 this domain was dead at
  # workflow runtime — the resolver returned correct values but no
  # workflow consumed them.
  #
  # Currently consumed: max_revision_cycles only. The mode (auto/warning/
  # manual) and quality_threshold (avg_score_at_least, blocking_count_at_most)
  # fields require reviewer-output schema changes (numeric scoring, blocking
  # counts) before they can be wired — tracked as follow-up under AB#3181.
  - name: approvals_policy
    type: script
    description: Resolve approvals policy for revise-loop cap (AB#3181)
    command: polyphony
    args:
      - "policy"
      - "resolve"
      - "--domain"
      - "approvals"
      - "--scope"
      - "type:{{ type_loader.output.type }}"
    routes:
      - to: revise_counter

  # ── Revise counter ────────────────────────────────────────────────────
  #
  # Tracks architect-revision cycles. Under the sentiment-driven model
  # the counter is **digest-keyed**: it only increments when
  # `pr_feedback_analyzer.output.feedback_digest` differs from the
  # last-seen digest. This makes re-polls during CI / between architect
  # pushes safe — they would otherwise consume budget without progress.
  # When the digest is identical to the previously stored digest, the
  # counter stays put and we route straight to the architect (the same
  # feedback is still pending; the architect re-attempts).
  #
  # Cap reading is unchanged: policy.approvals.max_revision_cycles
  # (AB#3181), falls back to 5.
  - name: revise_counter
    type: script
    description: Track architect-revise loop iteration count (digest-keyed; cap from policy.approvals.max_revision_cycles)
    command: pwsh
    args:
      - "-NoProfile"
      - "-Command"
      - |
        $counterFile = Join-Path ([System.IO.Path]::GetTempPath()) "conductor-plan-revise-{{ workflow.input.work_item_id }}.json"
        $digestNow   = '{{ pr_feedback_analyzer.output.feedback_digest if (pr_feedback_analyzer is defined and pr_feedback_analyzer.output.feedback_digest is defined) else "" }}'

        $count = 0
        $digestPrev = ''
        if (Test-Path $counterFile) {
          try {
            $state      = Get-Content $counterFile -Raw | ConvertFrom-Json
            $count      = [int]$state.count
            $digestPrev = [string]$state.digest
          } catch {
            # Fall back to a stale plaintext counter from the pre-digest
            # implementation: treat the file content as the count and
            # start digest tracking fresh.
            try { $count = [int](Get-Content $counterFile -Raw) } catch { $count = 0 }
            $digestPrev = ''
          }
        }

        # Increment only when the analyzer found NEW feedback. An empty
        # current digest (analyzer didn't run, or emitted no digest)
        # is treated as "same as before" — defensive, avoids surprise
        # increments from upstream skips.
        if ($digestNow -ne '' -and $digestNow -ne $digestPrev) {
          $count = $count + 1
        } elseif ($count -eq 0) {
          # First entry into the loop ever — start at 1 even if the
          # digest is empty so we never run the architect on a count
          # of 0 (off-by-one safety).
          $count = 1
        }

        @{ count = $count; digest = $digestNow } | ConvertTo-Json -Compress | Set-Content $counterFile

        $policyMax = '{{ approvals_policy.output.max_revision_cycles }}'
        if ([string]::IsNullOrWhiteSpace($policyMax) -or $policyMax -eq 'None' -or $policyMax -eq '0') {
            $maxRevisions = 5
        } else {
            $maxRevisions = [int]$policyMax
        }
        $capReached = $count -ge $maxRevisions
        $digestChanged = ($digestNow -ne '' -and $digestNow -ne $digestPrev)
        @{ iteration = $count; max_revisions = $maxRevisions; cap_reached = $capReached; digest = $digestNow; digest_changed = $digestChanged } | ConvertTo-Json
    routes:
      - to: revise_cap_gate
        when: "{{ revise_counter.output.cap_reached == true }}"
      - to: architect

  # ── Revise cap gate ───────────────────────────────────────────────────
  - name: revise_cap_gate
    type: human_gate
    prompt: |
      ## ⚠️ Revision Cap Hit — Work Item {{ workflow.input.work_item_id }}

      The architect has produced **{{ revise_counter.output.max_revisions }}**
      revisions but reviewers are still requesting changes.

      - **PR:** {{ open_plan_pr_ado.output.pr_url if (workflow.input.platform == 'ado' and open_plan_pr_ado is defined and open_plan_pr_ado.output.pr_url is defined) else (open_plan_pr.output.pr_url if (open_plan_pr is defined and open_plan_pr.output.pr_url is defined) else state_detector.output.pr_url) }}

      Decide what to do:

      ---

      Choose an action:
      - **Re-poll** — perhaps reviewers approved since the last revision; check PR state again
      - **Force revision** — send the architect through one more revision cycle
      - **Abort** — halt the entire run (terminates the conductor process)
    options:
      - label: "🔄 Re-poll PR"
        value: repoll
        route: pr_poll_platform_router
      - label: "✏️ Force one more revision"
        value: force
        route: architect
      - label: "🛑 Abort"
        value: abort
        route: terminal_abort_run

  # ── Validate scope (Phase 3 P8c — scope renegotiation handler) ────────
  #
  # GitHub-leg only. Reached from poll_status when the plan PR is
  # approved AND `workflow.input.child_scope_globs` is non-empty.
  # Classifies the PR's changed-file list against the supplied globs and
  # the renegotiation flag in the PR body via the four-cell matrix
  # documented in docs/decisions/scope-renegotiation.md.
  #
  # The verb is github-only (consumes `gh pr view`); the ADO leg
  # currently merges directly via merge_plan_pr_ado without this gate.
  # ADO sibling parity is a deferred follow-up — see the ADR.
  #
  # Routing:
  #   verdict == 'block'                     → scope_violation_gate
  #   verdict == 'allow' (with/without warn) → merge_plan_pr
  #
  # Output schema (per polyphony.exe plan validate-scope —
  # Models/PlanValidateScopeResult.cs): pr_number, verdict ('allow' |
  # 'block'), files_touched[], files_in_scope[], files_out_of_scope[],
  # flag_present, warnings[], error_code, error_message.
  - name: validate_scope
    type: script
    description: Classify plan PR diff against authorized child-scope globs (post-review, pre-merge).
    command: polyphony
    args:
      - "plan"
      - "validate-scope"
      - "{{ poll_status.output.pr_number if (poll_status is defined and poll_status.output.pr_number is defined) else open_plan_pr.output.pr_number }}"
      - "--child-scope"
      - "{{ workflow.input.child_scope_globs }}"
      - "--platform"
      - "{{ workflow.input.platform }}"
      - "--organization"
      - "{{ workflow.input.organization }}"
      - "--project"
      - "{{ workflow.input.project }}"
      - "--repository-override"
      - "{{ workflow.input.repository }}"
    routes:
      - to: scope_violation_gate
        when: "{{ validate_scope.output.verdict == 'block' }}"
      - to: merge_plan_pr

  # ── Scope violation gate ──────────────────────────────────────────────
  #
  # Fires when validate_scope returns `verdict: block` — the plan PR
  # touched files outside the workflow-supplied child scope and did NOT
  # declare a renegotiation request via the
  # <!-- polyphony:requests-parent-change --> fence. The operator picks:
  #
  #   override → proceed to merge anyway (agent's diff was right; the
  #              renegotiation declaration was simply missing).
  #   abort    → terminate the workflow; the agent must re-do the plan
  #              within scope or declare a renegotiation in a follow-up.
  - name: scope_violation_gate
    type: human_gate
    description: Plan PR exceeded authorized child scope without a renegotiation flag — operator decides override or abort.
    prompt: |
      ## ⚠️ Plan PR #{{ validate_scope.output.pr_number }} touches files outside the child's authorized scope

      The validate-scope verb classified the diff against
      `workflow.input.child_scope_globs` and found out-of-scope paths.
      The PR body does NOT carry a `<!-- polyphony:requests-parent-change -->`
      fence, so this is treated as an unauthorized scope expansion
      rather than a renegotiation request.

      ### Authorized scope

      `{{ workflow.input.child_scope_globs }}`

      ### Files out of scope

      {% for f in validate_scope.output.files_out_of_scope -%}
      - `{{ f }}`
      {% endfor %}

      ### Files in scope ({{ validate_scope.output.files_in_scope | length }})

      {% if validate_scope.output.files_in_scope | length == 0 -%}
      _(none)_
      {%- else -%}
      {% for f in validate_scope.output.files_in_scope -%}
      - `{{ f }}`
      {% endfor %}
      {%- endif %}

      ---

      Choose an action:

      - **Override** — accept the out-of-scope changes and proceed to
        merge. Use this when you're confident the agent's diff was
        correct and only the renegotiation declaration was missing.
      - **Abort** — halt the entire run (terminates the conductor process).
        Re-run later with intent=resume after the agent has re-done the
        plan within the authorized scope or opened a new PR with the
        renegotiation fence in its body.
    options:
      - label: "✅ Override (merge anyway)"
        value: override
        route: merge_plan_pr
      - label: "🛑 Abort"
        value: abort
        route: terminal_abort_run

  # ── Merge plan PR ─────────────────────────────────────────────────────
  #
  # Atomic merge + manifest update. On success, plan_generations[item_key]
  # is bumped in the run manifest and the manifest commit is pushed back
  # to feature/{root}. On stale_generation error, surfaces a gate.
  #
  # Invariants:
  #   Pre:  poll_status returned state == approved + requests_parent_change == false.
  #   Post: PR is merged; manifest reflects new plan_generation; output.merged == true.
  - name: merge_plan_pr
    type: script
    description: Merge plan PR + bump plan_generations in run manifest
    command: polyphony
    args:
      - "pr"
      - "merge-plan-pr"
      - "--root-id"
      - "{{ root_resolver.output.resolved_root_id }}"
      - "--item-id"
      - "{{ workflow.input.work_item_id }}"
      - "--pr-number"
      - "{{ poll_status.output.pr_number if (poll_status is defined and poll_status.output.pr_number is defined) else open_plan_pr.output.pr_number }}"
      - "--parent-item-id"
      - "{{ ancestor_chain.output.parent_item_id | default(0) }}"
    routes:
      - to: stale_generation_gate
        when: "{{ merge_plan_pr.output.error_code is defined and merge_plan_pr.output.error_code == 'stale_generation' }}"
      - to: merge_error_gate
        when: "{{ merge_plan_pr.output.error_code is defined and merge_plan_pr.output.error_code != '' and merge_plan_pr.output.error_code != 'stale_generation' }}"
      - to: extract_renegotiation_flag

  # ── Extract renegotiation flag (Phase 3 P8c — handler) ────────────────
  #
  # GitHub-leg only. Runs post-merge to harvest the plan PR's
  # `<!-- polyphony:requests-parent-change -->` fenced block (if any)
  # for the workflow's bubble-up output. The signal goes to the parent
  # workflow (apex-driver, downstream PR) which decides whether to
  # re-enter parent planning. Today the workflow has no caller — the
  # output goes nowhere — but extracting it now ensures the contract is
  # in place when apex-driver lands.
  #
  # Always runs regardless of whether validate_scope ran — a child can
  # legitimately declare a renegotiation request whose diff stays inside
  # its authorized scope (e.g., the plan document itself notes "the
  # parent plan's assumption about feature/X was wrong" without
  # touching parent files).
  #
  # Output schema (per polyphony.exe plan extract-renegotiation-flag —
  # Models/PlanExtractRenegotiationFlagResult.cs): pr_number,
  # flag_present, renegotiation_request, fenced_block_well_formed,
  # error_code, error_message.
  #
  # Always exits 0 (routing-style). On verb error (gh_failed,
  # pr_not_found, malformed_renegotiation_block) flag_present is false
  # and the workflow proceeds to cascade_remedy as if no flag were
  # present. The error surface is left to the future apex-driver
  # consumer to inspect via the bubbled output.
  - name: extract_renegotiation_flag
    type: script
    description: Extract renegotiation flag from merged plan PR body for workflow bubble-up output.
    command: polyphony
    args:
      - "plan"
      - "extract-renegotiation-flag"
      - "--pr-number"
      - "{{ poll_status.output.pr_number if (poll_status is defined and poll_status.output.pr_number is defined) else open_plan_pr.output.pr_number }}"
      - "--platform"
      - "{{ workflow.input.platform }}"
      - "--organization"
      - "{{ workflow.input.organization }}"
      - "--project"
      - "{{ workflow.input.project }}"
      - "--repository-override"
      - "{{ workflow.input.repository }}"
    routes:
      - to: cascade_remedy

  # ── Cascade remedy ────────────────────────────────────────────────────
  #
  # Phase 3 P9 step 4. After merge_plan_pr bumps a plan_generation, any
  # OPEN descendant plan PRs whose snapshot referenced the prior generation
  # are now stale. Invoke the cascade-remedy sub-workflow to classify and
  # remediate them (auto-rebase / recreate / per-PR human gate).
  #
  # The sub-workflow is a no-op when there are no stale descendants.
  # Errors inside the sub-workflow are surfaced via its own gates and do
  # not block continuation here.
  #
  # Invariants:
  #   Pre:  merge_plan_pr succeeded; manifest has the new generation.
  #   Post: All open descendant PRs of the resolved root have been
  #         remediated or surfaced for manual handling.
  - name: cascade_remedy
    type: workflow
    description: Cascade-remedy open descendant plan PRs whose snapshot is now stale.
    workflow: ./cascade-remedy.yaml
    input_mapping:
      root_id: "{{ root_resolver.output.resolved_root_id }}"
    routes:
      - to: seeder

  # ── Stale generation gate ─────────────────────────────────────────────
  #
  # Fires when merge_plan_pr itself reports stale_generation — i.e. THIS
  # plan PR's own ancestor snapshot is behind the manifest at merge time.
  # This is a different cascade trigger than the descendant cascade
  # (cascade_remedy above): the parent's bump must be reconciled here
  # BEFORE we can merge this plan, so we route to the cascade-remedy
  # sub-workflow scoped to this PR's own root, then the operator can
  # re-attempt merge.
  - name: stale_generation_gate
    type: human_gate
    prompt: |
      ## ⚠️ This Plan PR's Snapshot Is Stale At Merge

      Plan PR for work item **{{ workflow.input.work_item_id }}** was
      approved but its `ancestor_plan_generations` snapshot is behind the
      current manifest:

      - **Stale ancestors:**
      {% for entry in merge_plan_pr.output.stale_ancestors %}
        - `{{ entry.ancestor_key }}` — PR snapshot generation **{{ entry.snapshot_generation }}**, current manifest generation **{{ entry.current_generation }}**
      {% endfor %}

      Run the cascade-remedy sub-workflow (which will auto-rebase or
      recreate this PR), then retry the merge.

      ---

      Choose an action:
      - **Run cascade-remedy** — invoke the cascade and re-attempt merge.
      - **Acknowledge** — stop planning this branch (escalate to human).
    options:
      - label: "🔄 Run cascade-remedy + retry merge"
        value: cascade
        route: cascade_remedy_for_self
      - label: "✅ Acknowledge"
        value: acknowledge
        route: $end

  # ── Cascade remedy (self-trigger from stale_generation_gate) ──────────
  #
  # Same sub-workflow as the post-merge cascade, but invoked here when
  # this PR itself is the stale one. After the cascade rebases/recreates
  # this PR, we route back to merge_plan_pr to re-attempt.
  - name: cascade_remedy_for_self
    type: workflow
    description: Cascade-remedy invoked because THIS plan PR is the stale one at merge time.
    workflow: ./cascade-remedy.yaml
    input_mapping:
      root_id: "{{ root_resolver.output.resolved_root_id }}"
    routes:
      - to: merge_plan_pr

  # ── Merge error gate ──────────────────────────────────────────────────
  #
  # Cause-aware: surfaces the verb's full diagnostic message (which is
  # already specific — e.g. worktree_dirty includes the porcelain entry
  # count and remediation hint) and then a per-error-code "Next step"
  # block tailored to what the operator actually needs to do before
  # retrying. Falls back to a generic message for codes not yet enumerated
  # so a new error_code never silently regresses to "no guidance shown".
  - name: merge_error_gate
    type: human_gate
    prompt: |
      ## ⚠️ Plan PR Merge Failed

      Could not merge the plan PR for work item
      **{{ workflow.input.work_item_id }}**.

      **Error code:** `{{ merge_plan_pr.output.error_code }}`

      {% if merge_plan_pr.output.error is defined and merge_plan_pr.output.error %}
      **Details:** {{ merge_plan_pr.output.error }}
      {% endif %}

      ---

      **Next step:**
      {% if merge_plan_pr.output.error_code == 'worktree_dirty' %}
      The worktree has uncommitted changes. From the run's worktree
      directory, run `git status` to see what's there, then commit,
      stash, or discard the changes before retrying. Common culprit:
      stray scratch files left behind by an agent tool call (look for
      orphan `.txt` / `.json` files at the repo root).
      {% elif merge_plan_pr.output.error_code == 'lock_held' %}
      Another polyphony run holds the same-root run lock. Check for an
      in-flight workflow on the same apex; wait for it to finish, or
      use `polyphony lock force-release` if it's a stale lock.
      {% elif merge_plan_pr.output.error_code == 'lock_stale' %}
      The run lock is older than the staleness threshold. Run
      `polyphony lock force-release --root-id <id>` to clear it, then
      retry.
      {% elif merge_plan_pr.output.error_code == 'manifest_push_rejected' %}
      A concurrent run pushed to the manifest branch first. Retry —
      the verb will refetch and re-attempt; usually succeeds on the
      next try.
      {% elif merge_plan_pr.output.error_code in ['repo_not_resolved', 'config_error'] %}
      Configuration / environment issue. Check that gh is authenticated
      to the right user (`gh auth status`), the repo slug resolves, and
      the run's `.conductor` config is valid. Retry once fixed.
      {% elif merge_plan_pr.output.error_code == 'pr_not_found' %}
      The PR number on record no longer exists on the platform.
      Someone may have closed or deleted it manually. Aborting and
      restarting plan-level for this work item is usually safer than
      retrying.
      {% elif merge_plan_pr.output.error_code in ['head_ref_mismatch', 'base_ref_mismatch'] %}
      The PR's head or base branch doesn't match what the manifest
      expects. Inspect the PR on the platform — it may have been
      retargeted manually. Aborting and re-opening the PR via
      plan-level is safer than retrying.
      {% elif merge_plan_pr.output.error_code == 'pr_state_unmergeable' %}
      The platform reports the PR is not in a mergeable state
      (conflicts, failing required checks, blocked by branch protection).
      Resolve the underlying block on the PR page, then retry.
      {% elif merge_plan_pr.output.error_code == 'merge_failed' %}
      The platform's merge call returned an error. Check the PR page
      for the platform-specific reason, address it, then retry.
      {% elif merge_plan_pr.output.error_code in ['missing_merge_commit', 'ledger_conflict'] %}
      Post-merge bookkeeping failed. Manifest may be partially
      updated. Inspect the manifest branch before retrying.
      {% elif merge_plan_pr.output.error_code == 'validation_blocked' %}
      A pre-merge validation check rejected the merge. See **Details**
      above for the specific rule that blocked it; remediate, then
      retry.
      {% elif merge_plan_pr.output.error_code == 'internal_error' %}
      Unexpected verb-internal failure. Capture the run's event log
      and file a polyphony issue. Retry is safe but may reproduce.
      {% else %}
      No targeted guidance for this error code. See **Details** above
      and inspect the run's event log for context. Retry is safe but
      may reproduce.
      {% endif %}

      ---

      Choose an action:
      - **Retry** — re-attempt the merge
      - **Abort** — halt the entire run (terminates the conductor process)
    options:
      - label: "🔄 Retry"
        value: retry
        route: merge_plan_pr
      - label: "🛑 Abort"
        value: abort
        route: terminal_abort_run

  # ── Seeder ─────────────────────────────────────────────────────────────
  #
  # Idempotent seeder. Consumes architect.output.children and reconciles
  # against existing children of the parent work item via marker-aware
  # idempotent matching, then sets the polyphony:planned tag on the parent.
  #
  # NOTE: when state_detector routes us straight here (state == merged_unseeded
  # on resume), the architect step never ran in this conductor process, so
  # `architect` itself is undefined — not just `architect.output.children`.
  # An inner `is defined` guard against `architect.output.children` raises
  # TemplateError on the `.output` access before the guard evaluates, which
  # crashes the step before `polyphony plan seed-children` is even invoked
  # (closed-loop PR #8 — the merged_unseeded resume gap). The outer guard
  # `(architect is defined and ...)` short-circuits cleanly so the seeder
  # is invoked with `[]`. The verb tolerates the empty array, reconciles
  # against existing children (idempotent), and sets polyphony:planned.
  #
  # Routing-style envelope: the seeder verb exits 0 even on per-child
  # failures (errors arrive as a populated `errors[]` array with
  # `error_count > 0`). Without an error gate, downstream child_router
  # then walks into a half-seeded tree and the apex silently terminates
  # blocked. AB#3067 dogfood reproduced this exact pattern when a child
  # title clashed during ADO `twig new` and the parent had no plannable
  # children to discover. Mirrors the write_plan error-gate pattern at
  # line 710-736 above.
  - name: seeder
    type: script
    description: Idempotent seeder — marker-aware reconciliation, sets polyphony:planned tag
    command: polyphony
    args:
      - "plan"
      - "seed-children"
      - "--work-item"
      - "{{ workflow.input.work_item_id }}"
      # AB#3106 dogfood (2026-05-12): when the architect ran in this
      # execution, pass its tojson'd children verbatim. When the
      # architect did NOT run (re-entry on awaiting_review or
      # merged_unseeded), pass an EMPTY string so the verb falls back
      # to reading the children-json sidecar at
      # plans/plan-{id}.children.json. (An explicit '[]' would mean
      # "architect ran and emitted no children" — a different signal
      # that routes to the apex_facets check.)
      - "--children-json"
      - "{{ architect.output.children | tojson if (architect is defined and architect.output.children is defined) else '' }}"
      # AB#3106 rubber-duck #1 (2026-05-12): re-entry recovery seam. When
      # state_detector classifies the work item as merged_unseeded or
      # awaiting_review, MergePlanPr has already merged the plan PR but
      # did NOT pull/checkout the merged commit into the local worktree
      # (per Rev 4.2 — manifest is local + canonical). The sidecar
      # plans/plan-{id}.children.json is therefore on origin/main but
      # NOT on local disk. The verb falls back to
      # `git show <ref>:plans/plan-{id}.children.json` (with a best-
      # effort `git fetch` first) when CLI input AND local sidecar are
      # both empty. If the ref doesn't carry the file, it falls through
      # to apex_facets / refusal — so this is safe to set
      # unconditionally.
      - "--children-from-ref"
      - "origin/main"
    routes:
      - to: seeder_error_gate
        when: "{{ seeder.output.error_count is defined and seeder.output.error_count > 0 }}"
      - to: child_router

  # ── Seeder error gate (AB#3067) ─────────────────────────────────────────
  #
  # `polyphony plan seed-children` always exits 0 and carries per-child
  # failures in `errors[]`. This gate fires when `error_count > 0` so the
  # operator sees the failure rather than continuing into child_router with
  # a half-seeded tree (which silently terminates the apex blocked).
  #
  # Retry routes back to `seeder` because the verb is idempotent — it
  # reconciles against existing children via marker-aware matching, so
  # re-running after fixing the upstream cause (e.g. resolving a duplicate
  # title) is safe.
  - name: seeder_error_gate
    type: human_gate
    prompt: |
      ## ⚠️ Seeder Reported Errors

      `polyphony plan seed-children` for work item
      **{{ workflow.input.work_item_id }}** returned
      `error_count = {{ seeder.output.error_count if seeder.output.error_count is defined else 'unknown' }}`.

      The seeder is idempotent — it reconciles architect-emitted
      children against existing children of the parent work item.
      Common causes:
      - Duplicate child title under the parent (twig dedup conflict).
      - Invalid or inaccessible parent ID at the platform layer.
      - Twig workspace misconfiguration.

      **Errors (truncated to a first line per item):**
      {%- if seeder.output.errors is defined %}
      {%- for e in seeder.output.errors %}
      - `{{ e.child_id if e.child_id is defined and e.child_id else (e.title if e.title is defined and e.title else '(unknown)') }}` — {{ e.error if e.error is defined else '(no detail)' }}
      {%- endfor %}
      {%- else %}
      _(no per-child error envelopes — see verb stderr in run logs)_
      {%- endif %}

      ---

      Choose an action:
      - **Retry** — re-run the seeder (idempotent; safe after fixing the
        upstream cause, e.g. resolving a duplicate title)
      - **Continue** — proceed to `child_router` anyway (a partial seed is
        usually still useful; the next driver iteration will revisit any
        children that did get created)
      - **Abort** — halt the entire run (terminates the conductor process)
    options:
      - label: "🔁 Retry"
        value: retry
        route: seeder
      - label: "▶️  Continue"
        value: continue
        route: child_router
      - label: "🛑 Abort"
        value: abort
        route: terminal_abort_run

  # ── Child router ─────────────────────────────────────────────────────────
  #
  # Discovers plannable children of the current work item. Filters by
  # 'plannable' facet via polyphony plan next-child.
  - name: child_router
    type: script
    description: Discover plannable children for recursive planning
    command: polyphony
    args:
      - "plan"
      - "next-child"
      - "--work-item"
      - "{{ workflow.input.work_item_id }}"
    routes:
      - to: plan_children_group
        when: "{{ child_router.output.has_plannable_children == true }}"
      - to: $end

  # ════════════════════════════════════════════════════════════════════════
  # ADO leg (v2.1) — Phase 5 platform threading
  # ════════════════════════════════════════════════════════════════════════
  #
  # The agents below mirror the github-leg flow (commit_and_push →
  # open_plan_pr → plan_reviewer → poll_status → merge_plan_pr) for ADO.
  # They are reached only when workflow.input.platform == 'ado' via the
  # two platform routers (pr_open_platform_router for the open path,
  # pr_poll_platform_router for the awaiting_review re-entry path).
  #
  # Inputs `organization`, `project`, `repository` are required when
  # platform == 'ado'. The pr_inputs_missing_gate (shared by both
  # routers) catches the misconfigured case before any verb is invoked.

  # ── Platform router: open path ────────────────────────────────────────
  #
  # Reached from commit_and_push. Routes to open_plan_pr (github),
  # open_plan_pr_ado (ado-ready), or pr_inputs_missing_gate (ado-but-
  # missing-creds).
  - name: pr_open_platform_router
    type: script
    description: Route plan-PR-open between github and ado legs based on workflow.input.platform.
    command: pwsh
    args:
      - "-NoProfile"
      - "-Command"
      - |
        $platform = "{{ workflow.input.platform }}"
        $org = "{{ workflow.input.organization }}"
        $project = "{{ workflow.input.project }}"
        $repo = "{{ workflow.input.repository }}"
        $adoReady = ($platform -eq 'ado') -and ($org -ne '') -and ($project -ne '') -and ($repo -ne '')
        @{
            platform = $platform
            ado_ready = $adoReady
        } | ConvertTo-Json -Compress
    routes:
      - to: pr_inputs_missing_gate
        when: "{{ workflow.input.platform == 'ado' and (workflow.input.organization == '' or workflow.input.project == '' or workflow.input.repository == '') }}"
      - to: open_plan_pr_ado
        when: "{{ workflow.input.platform == 'ado' }}"
      - to: open_plan_pr

  # ── Platform router: poll/re-entry path ───────────────────────────────
  #
  # Reached from state_detector when state == awaiting_review (i.e. PR
  # already exists, we're polling for a verdict). Same triage as
  # pr_open_platform_router.
  - name: pr_poll_platform_router
    type: script
    description: Route plan-PR-poll between github and ado legs based on workflow.input.platform.
    command: pwsh
    args:
      - "-NoProfile"
      - "-Command"
      - |
        $platform = "{{ workflow.input.platform }}"
        $org = "{{ workflow.input.organization }}"
        $project = "{{ workflow.input.project }}"
        $repo = "{{ workflow.input.repository }}"
        $adoReady = ($platform -eq 'ado') -and ($org -ne '') -and ($project -ne '') -and ($repo -ne '')
        @{
            platform = $platform
            ado_ready = $adoReady
        } | ConvertTo-Json -Compress
    routes:
      - to: pr_inputs_missing_gate
        when: "{{ workflow.input.platform == 'ado' and (workflow.input.organization == '' or workflow.input.project == '' or workflow.input.repository == '') }}"
      - to: poll_status_ado
        when: "{{ workflow.input.platform == 'ado' }}"
      - to: poll_status

  # ── Shared gate: ADO connection inputs missing ────────────────────────
  - name: pr_inputs_missing_gate
    type: human_gate
    prompt: |
      ## ⚠️ ADO Connection Inputs Missing

      Workflow was invoked with `platform: ado` but one or more of
      `organization`, `project`, `repository` is empty. The ADO PR verbs
      cannot be called without these.

      **Got:**
      - `organization`: `{{ workflow.input.organization }}`
      - `project`: `{{ workflow.input.project }}`
      - `repository`: `{{ workflow.input.repository }}`

      Re-run the apex driver with all three set, or pass `platform: github`.

      ---

      Choose an action:
      - **Abort** — halt the entire run (terminates the conductor process)
    options:
      - label: "🛑 Abort"
        value: abort
        route: terminal_abort_run

  # ── Open plan PR (ADO) ────────────────────────────────────────────────
  #
  # ADO analogue of open_plan_pr. Mirrors the same ancestor-snapshot
  # contract — `polyphony pr open-plan-ado` is responsible for embedding
  # the ancestor_plan_generations into the PR body so merge-plan-ado can
  # detect stale_generation later.
  - name: open_plan_pr_ado
    type: script
    description: Open (or reuse) the ADO plan PR with ancestor-generations snapshot.
    command: polyphony
    args:
      - "pr"
      - "open-plan-ado"
      - "--organization"
      - "{{ workflow.input.organization }}"
      - "--project"
      - "{{ workflow.input.project }}"
      - "--repository"
      - "{{ workflow.input.repository }}"
      - "--root-id"
      - "{{ root_resolver.output.resolved_root_id }}"
      - "--item-id"
      - "{{ workflow.input.work_item_id }}"
      - "--parent-item-id"
      - "{{ ancestor_chain.output.parent_item_id | default(0) }}"
      - "--ancestor-ids"
      - "{{ ancestor_chain.output.ancestor_ids }}"
    routes:
      - to: open_plan_pr_ado_error_gate
        when: "{{ open_plan_pr_ado.output.error is defined and open_plan_pr_ado.output.error }}"
      - to: plan_reviewer

  # ── Open plan PR (ADO) error gate ─────────────────────────────────────
  - name: open_plan_pr_ado_error_gate
    type: human_gate
    prompt: |
      ## ⚠️ ADO Plan PR Open Failed

      Could not open (or reuse) the plan PR on Azure DevOps for work item
      **{{ workflow.input.work_item_id }}**.

      **Branch:** `{{ ensure_plan_branch.output.branch }}`
      **Error:** {{ open_plan_pr_ado.output.error if open_plan_pr_ado.output.error is defined else "Unknown error" }}

      Common causes: stale ancestor snapshot on an existing PR (operator
      must abandon/recreate); ADO PAT missing or insufficient scope;
      network timeout; repository identifier mismatch.

      ---

      Choose an action:
      - **Retry** — re-run `polyphony pr open-plan-pr-ado` (idempotent —
        reuses an existing PR with a matching ancestor snapshot; safe for
        transient ADO API / network failures)
      - **Abort** — halt the entire run (terminates the conductor process)
    options:
      - label: "🔁 Retry"
        value: retry
        route: open_plan_pr_ado
      - label: "🛑 Abort"
        value: abort
        route: terminal_abort_run

  # ── Plan reviewer poster (ADO) ────────────────────────────────────────
  #
  # Posts the comment body produced by plan_reviewer to the ADO PR via
  # `polyphony pr post-comment-ado` (since the LLM has no `polyphony` tool
  # registered for direct invocation). Routes straight to poll_status_ado.
  #
  # NOTE: poll_status_ado is the polling step on the ADO leg — even if
  # the post fails (already-commented races, transient API failures), we
  # still proceed to poll the PR. The poll surfaces the real PR state.
  - name: plan_reviewer_poster_ado
    type: script
    description: Post the plan_reviewer's rendered comment to the ADO PR.
    command: polyphony
    args:
      - "pr"
      - "post-comment-ado"
      - "--organization"
      - "{{ workflow.input.organization }}"
      - "--project"
      - "{{ workflow.input.project }}"
      - "--repository"
      - "{{ workflow.input.repository }}"
      - "--pr-number"
      - "{{ open_plan_pr_ado.output.pr_number }}"
      - "--body"
      - "{{ plan_reviewer.output.comment_body }}"
    routes:
      - to: poll_status_ado

  # ── Poll status (ADO) ─────────────────────────────────────────────────
  #
  # ADO analogue of poll_status. Routes off the same envelope `route`
  # field (PrPollTerminalRoute.Classify is platform-neutral) — see the
  # poll_status counterpart for the 4-way vocabulary.
  #
  # NOTE on `--allow-any-approval-vote` (v2.4.1+):
  # Plan PRs opened by polyphony do NOT have ADO branch-policy
  # required-reviewers configured, so strict aggregation (the default in
  # the CLI) leaves a +5/+10 vote stuck at REVIEW_REQUIRED forever. The
  # plan-level workflow defaults to permissive aggregation: ANY
  # reviewer's positive vote counts as APPROVED. Rejection still
  # short-circuits.
  #
  # This is hardcoded here rather than read from `policy.yaml`'s
  # `pr.allow_any_approval_vote` because the ConsoleAppFramework bool
  # flag is no-value only — you can't pass `--allow-any-approval-vote
  # true|false` from a workflow's static args list. The policy field
  # still exists in `PolicyConfig.ScopeRule` for future PR-kind-aware
  # consumers and for tooling that wants to inspect the resolved value.
  # See AB#3104 PR2 (SHA-bound approval semantics) for the longer-term
  # remediation that supersedes this stop-gap.
  #
  # Stale-approval caveat: ADO does NOT invalidate reviewer votes when
  # new commits are pushed. A pre-push approval still counts after a
  # force push. Operators relying on this leg must understand that an
  # approval implicitly applies to all subsequent commits until the
  # reviewer re-evaluates manually.
  - name: poll_status_ado
    type: script
    description: Single-shot poll of ADO plan PR review state (with metadata, permissive aggregation).
    command: polyphony
    args:
      - "pr"
      - "poll-status-ado"
      - "--organization"
      - "{{ workflow.input.organization }}"
      - "--project"
      - "{{ workflow.input.project }}"
      - "--repository-id"
      - "{{ workflow.input.repository }}"
      - "--pr-number"
      - "{{ open_plan_pr_ado.output.pr_number if (open_plan_pr_ado is defined and open_plan_pr_ado.output.pr_number is defined) else state_detector.output.pr_number }}"
      - "--include-metadata"
      - "--allow-any-approval-vote"
    routes:
      - to: poll_error_gate
        when: "{{ poll_status_ado.output.error is defined and poll_status_ado.output.error }}"
      - to: seeder
        when: "{{ poll_status_ado.output.route == 'already_merged' }}"
      - to: closed_unmerged_gate
        when: "{{ poll_status_ado.output.route == 'abort_unmerged' }}"
      - to: extract_parent_patch
        when: "{{ poll_status_ado.output.route == 'merge_now' and poll_status_ado.output.metadata is defined and poll_status_ado.output.metadata is not none and poll_status_ado.output.metadata.requests_parent_change == true }}"
      - to: merge_plan_pr_ado
        when: "{{ poll_status_ado.output.route == 'merge_now' }}"
      - to: pr_feedback_analyzer
        when: "{{ poll_status_ado.output.route == 'none' }}"
      # Catch-all per M4 — defensive deferral to analyzer.
      - to: pr_feedback_analyzer

  # ── Merge plan PR (ADO) ───────────────────────────────────────────────
  #
  # ADO analogue of merge_plan_pr. Same atomic merge + manifest update
  # contract; same stale_generation detection.
  - name: merge_plan_pr_ado
    type: script
    description: Merge ADO plan PR + bump plan_generations in run manifest.
    command: polyphony
    args:
      - "pr"
      - "merge-plan-ado"
      - "--organization"
      - "{{ workflow.input.organization }}"
      - "--project"
      - "{{ workflow.input.project }}"
      - "--repository"
      - "{{ workflow.input.repository }}"
      - "--root-id"
      - "{{ root_resolver.output.resolved_root_id }}"
      - "--item-id"
      - "{{ workflow.input.work_item_id }}"
      - "--pr-number"
      - "{{ poll_status_ado.output.pr_number if (poll_status_ado is defined and poll_status_ado.output.pr_number is defined) else open_plan_pr_ado.output.pr_number }}"
      - "--parent-item-id"
      - "{{ ancestor_chain.output.parent_item_id | default(0) }}"
    routes:
      # NOTE: stale_generation reuses stale_generation_gate. The gate's
      # prompt references merge_plan_pr.output.* fields — those are
      # undefined when we arrive via the ADO leg. The gate offers
      # cascade_remedy_for_self → routes back to merge_plan_pr (github).
      # On ADO we want to route back to merge_plan_pr_ado instead, so we
      # use a dedicated gate.
      - to: merge_plan_pr_ado_stale_gate
        when: "{{ merge_plan_pr_ado.output.error_code is defined and merge_plan_pr_ado.output.error_code == 'stale_generation' }}"
      - to: merge_plan_pr_ado_error_gate
        when: "{{ merge_plan_pr_ado.output.error_code is defined and merge_plan_pr_ado.output.error_code != '' and merge_plan_pr_ado.output.error_code != 'stale_generation' }}"
      - to: cascade_remedy

  # ── Merge plan PR (ADO) stale-generation gate ─────────────────────────
  - name: merge_plan_pr_ado_stale_gate
    type: human_gate
    prompt: |
      ## ⚠️ This ADO Plan PR's Snapshot Is Stale At Merge

      Plan PR for work item **{{ workflow.input.work_item_id }}** was
      approved but its `ancestor_plan_generations` snapshot is behind the
      current manifest:

      - **Stale ancestors:**
      {% for entry in merge_plan_pr_ado.output.stale_ancestors %}
        - `{{ entry.ancestor_key }}` — PR snapshot generation **{{ entry.snapshot_generation }}**, current manifest generation **{{ entry.current_generation }}**
      {% endfor %}

      Run the cascade-remedy sub-workflow (which will auto-rebase or
      recreate this PR), then retry the merge.

      ---

      Choose an action:
      - **Run cascade-remedy** — invoke the cascade and re-attempt merge.
      - **Acknowledge** — stop planning this branch (escalate to human).
    options:
      - label: "🔄 Run cascade-remedy + retry merge"
        value: cascade
        route: cascade_remedy_for_self_ado
      - label: "✅ Acknowledge"
        value: acknowledge
        route: $end

  # ── Cascade remedy (ADO self-trigger) ─────────────────────────────────
  - name: cascade_remedy_for_self_ado
    type: workflow
    description: Cascade-remedy invoked because THIS ADO plan PR is the stale one at merge time.
    workflow: ./cascade-remedy.yaml
    input_mapping:
      root_id: "{{ root_resolver.output.resolved_root_id }}"
    routes:
      - to: merge_plan_pr_ado

  # ── Merge plan PR (ADO) error gate ────────────────────────────────────
  - name: merge_plan_pr_ado_error_gate
    type: human_gate
    prompt: |
      ## ⚠️ ADO Plan PR Merge Failed

      Could not merge the plan PR for work item
      **{{ workflow.input.work_item_id }}**.

      **Error code:** `{{ merge_plan_pr_ado.output.error_code }}`

      Common causes: lock acquisition failed (another run holds the
      same-root lock); push conflict on manifest branch; ADO PAT auth;
      stale head SHA; reviewer requirements not met.

      ---

      Choose an action:
      - **Retry** — re-attempt the merge
      - **Abort** — halt the entire run (terminates the conductor process)
    options:
      - label: "🔄 Retry"
        value: retry
        route: merge_plan_pr_ado
      - label: "🛑 Abort"
        value: abort
        route: terminal_abort_run

  # ── Plan children summary gate ───────────────────────────────────────────
  #
  # Fires only when one or more child planning sub-workflows failed.
  - name: plan_children_summary_gate
    type: human_gate
    prompt: |
      ## ⚠️ Child Planning Partial Failure

      Planning for work item **{{ workflow.input.work_item_id }}** completed with errors.

      - **Succeeded:** {{ plan_children_group.outputs | length }}
      - **Failed:** {{ plan_children_group.errors | length }}

      Some child work items were not planned. Review the failures and re-run
      with intent=resume to retry only the failed children.

      ---

      Choose an action:
      - **Acknowledge** — finish this run
    options:
      - label: "✅ Acknowledge"
        value: acknowledge
        route: $end

  # ── Terminal: operator-initiated full-run abort ──────────────────────────
  #
  # Routed-to from error gates whose "Abort" option means "halt the entire
  # conductor run, not just this sub-workflow". Plain `route: $end` ends
  # only plan-level; the parent (apex-item-dispatch / apex-wave-dispatch /
  # apex-driver) then proceeds to teardown_worktree → next item → next
  # wave, producing confusing downstream errors. This agent invokes
  # abort-run.ps1, which POSTs to conductor's /api/stop endpoint. The
  # engine raises InterruptError at every nested between-agent check
  # (workflow.py:_check_interrupt at workflow.py:2309), unwinding the
  # entire run cleanly — no process-kill, no zombies, no inflight
  # PR/branch corruption.
  #
  # New error gates that surface a "halt everything" outcome should route
  # their Abort option here too.
  - name: terminal_abort_run
    type: script
    description: Operator-initiated full-run abort — POSTs /api/stop to halt the run cleanly
    command: pwsh
    args:
      - "-NoProfile"
      - "-File"
      - "{{ workflow.dir }}/../scripts/abort-run.ps1"
      - "-Reason"
      - "operator-abort"
      - "-WorkItemId"
      - "{{ workflow.input.work_item_id }}"
      - "-Stage"
      - "plan-level"
    routes:
      - to: $end

  # ── Auto-mode misconfiguration abort ──────────────────────────────────
  #
  # Reached when policy.unattended.review_wait_mode == 'auto'. The old
  # auto path self-approved the plan PR via magic comments. That
  # mechanism is gone in the sentiment-driven loop. Reintroducing it
  # requires calling the platform vote/merge APIs with an operator
  # identity. Until that work lands, refuse the misconfiguration loudly
  # so an operator who set `auto` finds out at policy-load time instead
  # of watching the run poll forever (or, worse, escalate to a stuck
  # gate days later) under what looks like normal `skip` behavior.
  - name: terminal_abort_auto_mode_unsupported
    type: script
    description: Abort — policy.unattended.review_wait_mode='auto' is unsupported under the sentiment-driven PR-review loop.
    command: pwsh
    args:
      - "-NoProfile"
      - "-File"
      - "{{ workflow.dir }}/../scripts/abort-run.ps1"
      - "-Reason"
      - "auto-mode-unsupported"
      - "-WorkItemId"
      - "{{ workflow.input.work_item_id }}"
      - "-Stage"
      - "plan-level"
      - "-Detail"
      - "policy.unattended.review_wait_mode='auto' was honored by the magic-comment auto-approve path that this PR (sentiment-driven loop) deleted. Set it to 'skip' (silent unattended polling) or 'wait' (human throttle gate) and re-run; a future PR will reintroduce 'auto' on top of the platform vote APIs."
    routes:
      - to: $end

# ── Plan children group (for_each) ─────────────────────────────────────
#
# Self-recursion: invokes plan-level.yaml for each plannable child with
# depth+1. Conductor schema requires for_each at the workflow root, not
# nested under agents.
for_each:
  # ── Plan children group ────────────────────────────────────────────────
  #
  # Self-recursion: invokes plan-level.yaml for each plannable child with
  # depth+1.
  #
  # Conductor schema: for_each lives at workflow root, with fields
  # `source` (BARE dotted path, not a Jinja expression), `as` (loop var
  # name), and `agent` (inline AgentDef). The legacy field names
  # `items`/`item_var`/`workflow` are no longer accepted.
  - name: plan_children_group
    type: for_each
    description: Recursively plan each plannable child
    source: child_router.output.plannable_children
    as: child
    max_concurrent: 1
    failure_mode: continue_on_error
    agent:
      name: plan_one_child
      type: workflow
      workflow: ./plan-level.yaml
      max_depth: 6
      input_mapping:
        work_item_id: "{{ child.id }}"
        depth: "{{ workflow.input.depth + 1 }}"
        max_depth: "{{ workflow.input.max_depth }}"
        # v2.1: inherit platform threading so recursive child planning
        # targets the same platform as the apex run. Defaults preserve
        # github behavior when these inputs were never supplied.
        platform: "{{ workflow.input.platform }}"
        organization: "{{ workflow.input.organization }}"
        project: "{{ workflow.input.project }}"
        repository: "{{ workflow.input.repository }}"
    routes:
      - to: plan_children_summary_gate
        when: "{{ plan_children_group.errors | length > 0 }}"
      - to: $end
