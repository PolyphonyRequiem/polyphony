# plan-level — Recursive planning core for any plannable work item level.
#
# v2.0 — Phase 3 P7b: replaces in-workflow LLM verdicts (technical_reviewer,
# readability_reviewer, review_router, plan_approval) with platform-native
# PR review.
#
# Lifecycle per invocation:
#   1. resolve root + derive ancestor chain
#   2. detect-state — find out where this plan tree branch already is
#   3. branch on state:
#        not_started     → architect → write_plan → ensure_plan_branch →
#                          commit_and_push → open_plan_pr → plan_reviewer →
#                          poll_status → route on review state
#        awaiting_review → poll_status → route on review state
#        stale_generation → architect (re-author against current ancestors)
#        merged_unseeded → seeder → child_router (recurse)
#        complete        → child_router (recurse only)
#        closed_unmerged → blocked exit
#        error           → state error gate
#
# Self-recursion: child_router discovers plannable children and invokes
# this workflow per child with depth+1.
#
# Invariants:
#   Pre:  work_item_id exists in ADO and is plannable per process-config.yaml.
#   Post: Either an approved + merged plan exists and child work items are
#         seeded, OR the workflow exits with a structured "blocked" output
#         that the caller can route on.

workflow:
  name: plan-level
  description: >-
    Recursive planning core (v2). Plans a single hierarchy level by writing
    the architect's plan to a plan branch, opening a plan PR, surfacing
    LLM advisory + human approval via native PR review, then merging and
    seeding child work items.
  version: "2.1.0"
  entry_point: depth_guard
  metadata:
    min_polyphony_version: "1.0.1"

  limits:
    # Recursive planning: each level fans out plan_children_group (for_each)
    # which spawns plan-level.yaml as a sub-workflow per plannable child.
    # Each iteration counts toward max_iterations. Default 10 is far too
    # low for any non-trivial hierarchy. See conductor-mechanics M9.
    max_iterations: 200

  input:
    work_item_id:
      type: number
      required: true
      description: ADO work item id of the item being planned. (Type is runtime-injected; do not hardcode type names.)
    intent:
      type: string
      required: false
      default: resume
      description: "new | redo | resume — currently only inspected by detect-state for routing on existing PRs"
    user_plan_path:
      type: string
      required: false
      default: ""
      description: Path to user-authored plan document (architect refines, not discards)
    depth:
      type: number
      required: false
      default: 0
      description: Current recursion depth (0 = root level)
    max_depth:
      type: number
      required: false
      default: 6
      description: Maximum recursion depth before requiring human approval
    # ── ADO platform inputs (v2.1) ──────────────────────────────────────
    # These are optional for backwards compatibility — when omitted, the
    # workflow runs the GitHub leg via `gh` + `polyphony pr open-plan-pr`
    # exactly as before. When `platform: ado` is supplied, the open/poll/
    # merge script agents are routed to their `*_ado` counterparts which
    # consume the ADO REST API via `polyphony pr {open,poll-status,merge}-
    # plan-ado` (verbs from #100 / #104). The plan_reviewer LLM is
    # platform-aware: on github it posts directly via the `gh` tool; on
    # ado it emits a structured comment body and a downstream
    # `plan_reviewer_poster_ado` script posts via `polyphony pr
    # post-comment-ado` (verb from PR-A of this pair).
    platform:
      type: string
      required: false
      default: ado
      description: "PR platform: 'ado' (default — matches the work item source) or 'github' (for repos hosted on GitHub)"
    organization:
      type: string
      required: false
      default: ""
      description: ADO organization name. Required when platform=ado; ignored on github.
    project:
      type: string
      required: false
      default: ""
      description: ADO project name. Required when platform=ado; ignored on github.
    repository:
      type: string
      required: false
      default: ""
      description: ADO repository identifier (GUID or name). Required when platform=ado; ignored on github.

tools:
  - twig
  - gh
  - filesystem

agents:
  # ── Depth guard ──────────────────────────────────────────────────────────
  #
  # Validates that the current recursion depth has not exceeded max_depth.
  # Prevents runaway recursion by gating deeper levels behind human approval.
  #
  # Invariants:
  #   Pre:  depth and max_depth are non-negative integers.
  #   Post: output.allowed is true (depth < max_depth) or false (depth >= max_depth).
  - name: depth_guard
    type: script
    description: Validate recursion depth against max_depth
    command: polyphony
    args:
      - "plan"
      - "depth-guard"
      - "--depth"
      - "{{ workflow.input.depth }}"
      - "--max-depth"
      - "{{ workflow.input.max_depth }}"
    routes:
      - to: guidance_loader
        when: "{{ depth_guard.output.allowed == true }}"
      - to: depth_exceeded_gate
        when: "{{ depth_guard.output.allowed == false }}"

  # ── Depth exceeded gate ──────────────────────────────────────────────────
  - name: depth_exceeded_gate
    type: human_gate
    prompt: |
      ## ⚠️ Recursion Depth Exceeded

      Planning for work item **{{ workflow.input.work_item_id }}** has reached
      depth **{{ workflow.input.depth }}** (max: **{{ workflow.input.max_depth }}**).

      This typically means the hierarchy is deeper than expected. Consider
      restructuring the work item tree or increasing `max_depth` if the depth
      is intentional.

      ---

      Choose an action:
      - **Acknowledge** — stop planning this branch (children will not be planned)
    options:
      - label: "✅ Acknowledge"
        value: acknowledge
        route: $end

  # ── Guidance loader ────────────────────────────────────────────────────
  #
  # Loads repo-specific agent guidance markdown. Architect and plan_reviewer
  # consume their per-role keys via Jinja2 conditionals so prompts degrade
  # gracefully when no guidance files exist.
  - name: guidance_loader
    type: script
    description: Load agent guidance markdown files for planning agent prompts
    command: polyphony
    args:
      - "plan"
      - "load-guidance"
    routes:
      - to: root_resolver

  # ── Root resolver ──────────────────────────────────────────────────────
  #
  # Resolves the run's root work-item id by walking up from work_item_id
  # looking for the polyphony:root tag. plan-level.yaml is invoked from
  # polyphony-planning.yaml which only knows work_item_id; the plan-PR
  # verbs (branch ensure-plan, pr open-plan-pr, pr merge-plan-pr) need
  # both root_id and item_id, so we derive root_id once at entry.
  #
  # Invariants:
  #   Pre:  work_item_id exists in ADO.
  #   Post: output.resolved_root_id is set, OR fallback_required==true,
  #         OR error is set.
  - name: root_resolver
    type: script
    description: Resolve the run-root work-item id from the polyphony:root tag chain
    command: polyphony
    args:
      - "root"
      - "resolve"
      - "--work-item"
      - "{{ workflow.input.work_item_id }}"
    routes:
      - to: root_fallback_gate
        when: "{{ root_resolver.output.fallback_required == true }}"
      - to: root_resolver_error_gate
        when: "{{ root_resolver.output.error is defined and root_resolver.output.error }}"
      - to: type_loader

  # ── Root fallback gate ──────────────────────────────────────────────
  - name: root_fallback_gate
    type: human_gate
    prompt: |
      ## ⚠️ No `polyphony:root` Ancestor Found

      Plan-PR machinery requires a run-root work item tagged
      `polyphony:root`. Walking ancestors of work item
      **{{ workflow.input.work_item_id }}** did not find one within the
      configured walk budget.

      Tag the appropriate ancestor with `polyphony:root` (via
      `polyphony root declare --work-item N`) and re-run, or acknowledge
      to abort planning for this branch.

      ---

      Choose an action:
      - **Abort** — cancel planning for this work item
    options:
      - label: "🛑 Abort"
        value: abort
        route: $end

  # ── Root resolver error gate ──────────────────────────────────────────
  - name: root_resolver_error_gate
    type: human_gate
    prompt: |
      ## ⚠️ Root Resolution Failed

      Could not resolve the run root for work item
      **{{ workflow.input.work_item_id }}**.

      **Error:** {{ root_resolver.output.error if root_resolver.output.error is defined else "Unknown error — check that the work item exists in ADO." }}

      ---

      Choose an action:
      - **Abort** — cancel planning for this work item
    options:
      - label: "🛑 Abort"
        value: abort
        route: $end

  # ── Type loader ──────────────────────────────────────────────────────────
  #
  # Loads type-specific context from .conductor/work-item-types/. Outputs
  # type name, semantic definition, plan template, and decomposition guidance.
  - name: type_loader
    type: script
    description: Load type-specific context from .conductor/work-item-types/
    command: polyphony
    args:
      - "plan"
      - "load-type"
      - "--work-item"
      - "{{ workflow.input.work_item_id }}"
    routes:
      - to: ancestor_chain
        when: "{{ type_loader.output.type is defined and type_loader.output.type != '' }}"
      - to: type_loader_error_gate

  # ── Type loader error gate ───────────────────────────────────────────────
  - name: type_loader_error_gate
    type: human_gate
    prompt: |
      ## ⚠️ Type Context Load Failed

      Planning for work item **{{ workflow.input.work_item_id }}** cannot continue
      because the type context could not be loaded.

      **Error:** {{ type_loader.output.error if type_loader.output.error is defined else "Unknown error — check that .conductor/work-item-types/ is configured and the work item exists in ADO." }}

      ---

      Choose an action:
      - **Abort** — cancel planning for this work item
    options:
      - label: "🛑 Abort"
        value: abort
        route: $end

  # ── Ancestor chain derivation ─────────────────────────────────────────
  #
  # Walks the work-item parent chain from item to root and emits
  # parent_item_id + ancestor_ids for the plan-PR verbs.
  #
  # Invariants:
  #   Pre:  root_resolver succeeded; work_item_id is a descendant of root_id.
  #   Post: output.parent_item_id, output.ancestor_ids, output.is_root_plan are set.
  - name: ancestor_chain
    type: script
    description: Derive plan-tree ancestor chain (parent_item_id + ancestor_ids)
    command: polyphony
    args:
      - "plan"
      - "derive-ancestor-chain"
      - "--root-id"
      - "{{ root_resolver.output.resolved_root_id }}"
      - "--item-id"
      - "{{ workflow.input.work_item_id }}"
    routes:
      - to: ancestor_chain_error_gate
        when: "{{ ancestor_chain.output.error is defined and ancestor_chain.output.error }}"
      - to: state_detector

  # ── Ancestor chain error gate ─────────────────────────────────────────
  - name: ancestor_chain_error_gate
    type: human_gate
    prompt: |
      ## ⚠️ Ancestor Chain Derivation Failed

      Could not derive the plan-tree ancestor chain for work item
      **{{ workflow.input.work_item_id }}** under root
      **{{ root_resolver.output.resolved_root_id }}**.

      **Error:** {{ ancestor_chain.output.error if ancestor_chain.output.error is defined else "Unknown error" }}

      Common causes: work item is not actually a descendant of the root,
      the parent chain is broken, or a cycle was detected.

      ---

      Choose an action:
      - **Abort** — cancel planning for this work item
    options:
      - label: "🛑 Abort"
        value: abort
        route: $end

  # ── State detector ────────────────────────────────────────────────────
  #
  # The single oracle for "where is this plan tree branch right now?"
  # Reads the plan branch on origin, the existing plan PR (if any), the
  # PR's ancestor_plan_generations snapshot, and the current run manifest
  # to decide which downstream path to take. Enables P3-style re-entry.
  #
  # States (see PlanDetectStateResult):
  #   not_started       — no plan branch on origin
  #   awaiting_review   — branch + open PR exist; plan is current
  #   stale_generation  — branch + open PR exist; ancestor generations bumped
  #   closed_unmerged   — PR exists but is closed without merge
  #   merged_unseeded   — PR is merged but parent isn't tagged polyphony:planned
  #   complete          — PR is merged AND parent is tagged polyphony:planned
  #   error             — verb failed
  #
  # Invariants:
  #   Pre:  root_id + item_id resolved.
  #   Post: output.state is one of the values above.
  - name: state_detector
    type: script
    description: Detect plan-tree state (not_started / awaiting_review / stale_generation / closed_unmerged / merged_unseeded / complete / error)
    command: polyphony
    args:
      - "plan"
      - "detect-state"
      - "--root-id"
      - "{{ root_resolver.output.resolved_root_id }}"
      - "--item-id"
      - "{{ workflow.input.work_item_id }}"
    routes:
      - to: state_detector_error_gate
        when: "{{ state_detector.output.state == 'error' }}"
      - to: child_router
        when: "{{ state_detector.output.state == 'complete' }}"
      - to: extract_parent_patch
        when: "{{ state_detector.output.state == 'parent_change_pending' }}"
      - to: seeder
        when: "{{ state_detector.output.state == 'merged_unseeded' }}"
      - to: closed_unmerged_gate
        when: "{{ state_detector.output.state == 'closed_unmerged' }}"
      # v2.1: route through pr_poll_platform_router so awaiting_review
      # re-entry can feed either poll_status (github) or
      # poll_status_ado (ado).
      - to: pr_poll_platform_router
        when: "{{ state_detector.output.state == 'awaiting_review' }}"
      - to: architect
        when: "{{ state_detector.output.state == 'stale_generation' }}"
      - to: architect
        when: "{{ state_detector.output.state == 'not_started' }}"
      # Catch-all per M4: unexpected state value should surface as a gate,
      # not raise mid-run "no matching route".
      - to: state_detector_error_gate

  # ── State detector error gate ─────────────────────────────────────────
  - name: state_detector_error_gate
    type: human_gate
    prompt: |
      ## ⚠️ Plan State Detection Failed

      Could not detect plan-tree state for work item
      **{{ workflow.input.work_item_id }}** under root
      **{{ root_resolver.output.resolved_root_id }}**.

      **State:** `{{ state_detector.output.state if state_detector.output.state is defined else "unknown" }}`
      **Error:** {{ state_detector.output.error if state_detector.output.error is defined else "Unexpected state value — check polyphony plan detect-state output schema" }}

      ---

      Choose an action:
      - **Abort** — cancel planning for this work item
    options:
      - label: "🛑 Abort"
        value: abort
        route: $end

  # ── Closed-unmerged gate ───────────────────────────────────────────────
  #
  # Plan PR exists but was closed without merging. Operator likely chose
  # to abandon this plan. Surface to user and end (do not auto-recreate).
  - name: closed_unmerged_gate
    type: human_gate
    prompt: |
      ## ℹ️ Plan PR Closed Without Merge

      The plan PR for work item **{{ workflow.input.work_item_id }}** is
      closed without being merged.

      - **PR:** {{ state_detector.output.pr_url if state_detector.output.pr_url is defined else "(unknown)" }}
      - **Branch:** `{{ state_detector.output.plan_branch }}`

      The workflow will not auto-recreate the PR. To restart planning for
      this item, delete the plan branch on origin and re-run.

      ---

      Choose an action:
      - **Acknowledge** — stop planning this branch
    options:
      - label: "✅ Acknowledge"
        value: acknowledge
        route: $end

  # ── Architect agent ──────────────────────────────────────────────────────
  #
  # Core planning agent. Creates or refines a plan for the work item using
  # type-specific definitions, templates, and decomposition guidance.
  #
  # On stale_generation entry: must read existing plan from disk + PR
  # comments, refine against current ancestors. The prompt instructs how.
  #
  # On revision loop entry (changes_requested from plan_reviewer/human):
  # must read PR comments via gh and incorporate feedback.
  #
  # Outputs the same {plan, children, open_questions, summary} schema as
  # v1.0 — the difference is what happens next: write_plan persists the
  # markdown to disk; the seeder still consumes children; the open_questions
  # gate still runs as before.
  - name: architect
    type: agent
    model: claude-opus-4.7
    description: Create or refine a plan using type-specific context, decomposition guidance, and any prior PR review feedback
    tools:
      - twig
      - gh
      - filesystem
    prompt: !file ../prompts/architect-plan-level.md
    output:
      plan:
        type: string
        description: The full plan document in Markdown format
      children:
        type: array
        description: >-
          Structured list of child work items to seed. Each child has a stable
          child_id (task-1, task-2, ...) the seeder uses for idempotent
          reconciliation across re-plans. Empty array means atomic — no
          children to seed.
        items:
          type: object
          properties:
            child_id:
              type: string
              description: Stable identifier (task-1, task-2, ...). Preserved across re-plans for the same logical child.
            title:
              type: string
              description: Work item title (one line)
            type:
              type: string
              description: Work item type (must be valid per decomposition guidance)
            description:
              type: string
              description: Work item description in Markdown
            acceptance_criteria:
              type: array
              description: Acceptance criteria as a list of strings
              items:
                type: string
            pg:
              type: string
              description: PG group name for implementation ordering (optional)
            depends_on:
              type: array
              description: child_ids this child depends on (optional)
              items:
                type: string
      open_questions:
        type: array
        description: Questions requiring user input before plan can finalize (empty array if none). Emit severity >= low; policy-driven route filters determine which questions gate.
        items:
          type: object
          properties:
            topic:
              type: string
              description: Brief topic title
            detail:
              type: string
              description: Full description of the question and why it matters
            severity:
              type: string
              description: One of critical, major, moderate, low. Policy route filters determine which severities gate — the architect should emit all relevant questions.
      summary:
        type: string
        description: Brief one-paragraph summary of the plan
    routes:
      - to: open_questions_policy

  # ── Open questions policy resolver ─────────────────────────────────────
  #
  # Resolves the open_questions policy domain for the current work item
  # type. Outputs mode, min_severity, and max_question_loops which drive
  # the routing decision below.
  - name: open_questions_policy
    type: script
    description: Resolve open_questions policy for routing decisions
    command: polyphony
    args:
      - "policy"
      - "resolve"
      - "--domain"
      - "open_questions"
      - "--scope"
      - "type:{{ type_loader.output.type_name }}"
    routes:
      - to: open_questions_counter

  # ── Open questions loop counter ────────────────────────────────────────
  #
  # Tracks the number of answer loops taken. Mirrors review_counter in
  # github-pr.yaml.
  - name: open_questions_counter
    type: script
    description: Track open questions answer loop iteration count
    command: pwsh
    args:
      - "-NoProfile"
      - "-Command"
      - |
        $counterFile = Join-Path ([System.IO.Path]::GetTempPath()) "conductor-oq-loops-{{ workflow.input.work_item_id }}"
        if (Test-Path $counterFile) {
            $count = [int](Get-Content $counterFile -Raw)
        } else {
            $count = 0
        }
        $maxLoops = {{ open_questions_policy.output.max_question_loops }}
        $capReached = $count -ge $maxLoops
        @{ iteration = $count; max_loops = $maxLoops; cap_reached = $capReached } | ConvertTo-Json
    routes:
      # Policy mode=auto: skip gate entirely regardless of questions.
      - to: write_plan
        when: "{{ open_questions_policy.output.mode == 'auto' }}"
      # Cap reached: auto-proceed (fail honestly, don't loop forever).
      - to: write_plan
        when: "{{ open_questions_counter.output.cap_reached == true }}"
      # Mode=manual: gate on ANY question present.
      - to: open_questions_gate
        when: "{{ open_questions_policy.output.mode == 'manual' and architect.output.open_questions | length > 0 }}"
      # Mode=warning: gate only when questions at or above min_severity exist.
      - to: open_questions_gate
        when: "{{ open_questions_policy.output.mode == 'warning' and architect.output.open_questions | selectattr('severity', 'in', severities_at_or_above(open_questions_policy.output.min_severity)) | list | length > 0 }}"
      # Else: no gating questions — proceed to write_plan.
      - to: write_plan

  # ── Open questions gate ──────────────────────────────────────────────────
  - name: open_questions_gate
    type: human_gate
    prompt: |
      ## 🤔 Open Questions — Work Item {{ workflow.input.work_item_id }}

      **Policy mode:** `{{ open_questions_policy.output.mode }}` · **Loop:** {{ open_questions_counter.output.iteration }} of {{ open_questions_counter.output.max_loops }}

      The architect has identified questions that need your input before
      finalizing the plan.

      {% if open_questions_policy.output.mode == 'warning' %}
      {% set blocking = architect.output.open_questions | selectattr('severity', 'in', severities_at_or_above(open_questions_policy.output.min_severity)) | list %}
      {% else %}
      {% set blocking = architect.output.open_questions %}
      {% endif %}
      {% for question in blocking %}
      ### {{ loop.index }}. [{{ question.severity | upper }}] {{ question.topic }}

      {{ question.detail }}

      {% endfor %}

      ---

      Choose an action:
      - **Answer** — provide answers and revise the plan
      - **Proceed** — continue (write plan + open PR for review)
    options:
      - label: "💬 Answer"
        value: answer
        route: open_questions_answer_counter
        prompt_for: answers
      - label: "⏩ Proceed"
        value: proceed
        route: write_plan

  # ── Open questions answer counter increment ────────────────────────────
  - name: open_questions_answer_counter
    type: script
    description: Increment open questions loop counter on answer route
    command: pwsh
    args:
      - "-NoProfile"
      - "-Command"
      - |
        $counterFile = Join-Path ([System.IO.Path]::GetTempPath()) "conductor-oq-loops-{{ workflow.input.work_item_id }}"
        if (Test-Path $counterFile) {
            $count = [int](Get-Content $counterFile -Raw) + 1
        } else {
            $count = 1
        }
        Set-Content $counterFile $count
        @{ iteration = $count } | ConvertTo-Json
    routes:
      - to: architect

  # ── Write plan to disk ─────────────────────────────────────────────────
  #
  # Persists architect.output.plan to plans/plan-{item_id}.md. Pure I/O —
  # no git ops, no PR ops. ensure_plan_branch (next) owns branch state;
  # commit_and_push (after that) owns commit + push.
  #
  # Invariants:
  #   Pre:  architect.output.plan is non-empty.
  #   Post: plans/plan-{item_id}.md exists with the plan markdown; output.path
  #         is the absolute path; output.unchanged indicates noop on resume.
  - name: write_plan
    type: script
    description: Write architect's plan markdown to plans/plan-{item_id}.md
    command: polyphony
    args:
      - "plan"
      - "write-plan"
      - "--item-id"
      - "{{ workflow.input.work_item_id }}"
      - "--content-json"
      - "{{ architect.output.plan | tojson }}"
    routes:
      - to: write_plan_error_gate
        when: "{{ write_plan.output.error is defined and write_plan.output.error }}"
      - to: ensure_plan_branch

  # ── Write plan error gate ──────────────────────────────────────────────
  - name: write_plan_error_gate
    type: human_gate
    prompt: |
      ## ⚠️ Plan Write Failed

      Could not write the plan for work item
      **{{ workflow.input.work_item_id }}** to disk.

      **Error:** {{ write_plan.output.error if write_plan.output.error is defined else "Unknown error" }}

      ---

      Choose an action:
      - **Abort** — cancel planning
    options:
      - label: "🛑 Abort"
        value: abort
        route: $end

  # ── Ensure plan branch ────────────────────────────────────────────────
  #
  # Idempotently creates (or fast-forwards to) the plan branch and checks
  # it out. Branch grammar from the Rev 4 ADR:
  #   plan/{root_id}                  — root plan (base = feature/{root_id})
  #   plan/{root_id}-{item_id}        — descendant plan (base = parent plan branch)
  #
  # Invariants:
  #   Pre:  root_id + item_id resolved; ancestor_chain has parent_item_id.
  #   Post: Worktree is on the plan branch; output.branch is the plan branch name.
  - name: ensure_plan_branch
    type: script
    description: Idempotently create/checkout the plan branch off its parent base
    command: polyphony
    args:
      - "branch"
      - "ensure-plan"
      - "--root-id"
      - "{{ root_resolver.output.resolved_root_id }}"
      - "--item-id"
      - "{{ workflow.input.work_item_id }}"
      - "--parent-item-id"
      - "{{ ancestor_chain.output.parent_item_id | default(0) }}"
    routes:
      - to: ensure_plan_branch_error_gate
        when: "{{ ensure_plan_branch.output.error is defined and ensure_plan_branch.output.error }}"
      - to: commit_and_push

  # ── Ensure plan branch error gate ─────────────────────────────────────
  - name: ensure_plan_branch_error_gate
    type: human_gate
    prompt: |
      ## ⚠️ Plan Branch Setup Failed

      Could not create or check out the plan branch for work item
      **{{ workflow.input.work_item_id }}**.

      **Error:** {{ ensure_plan_branch.output.error if ensure_plan_branch.output.error is defined else "Unknown error" }}

      ---

      Choose an action:
      - **Abort** — cancel planning
    options:
      - label: "🛑 Abort"
        value: abort
        route: $end

  # ── Commit and push ────────────────────────────────────────────────────
  #
  # Stages plans/plan-{item_id}.md, commits with a deterministic message,
  # and pushes to origin. Idempotent — emits no_changes when nothing is
  # staged (e.g., resume on already-pushed plan).
  #
  # Invariants:
  #   Pre:  Worktree on plan branch; plans/plan-{item_id}.md exists.
  #   Post: Either output.pushed == true (PR will be opened/updated next) OR
  #         output.no_op_reason == 'no_changes' (PR may already exist with
  #         this content; open_plan_pr handles reuse).
  - name: commit_and_push
    type: script
    description: Stage plans/plan-{item_id}.md, commit, push to origin
    command: polyphony
    args:
      - "plan"
      - "commit-and-push"
      - "--branch"
      - "{{ ensure_plan_branch.output.branch }}"
      - "--message"
      - "plan({{ workflow.input.work_item_id }}): write plan-{{ workflow.input.work_item_id }}.md"
      - "--paths"
      - "plans/plan-{{ workflow.input.work_item_id }}.md"
    routes:
      - to: commit_and_push_error_gate
        when: "{{ commit_and_push.output.error is defined and commit_and_push.output.error }}"
      # v2.1: route through pr_open_platform_router so the same
      # commit-and-push leg can feed either open_plan_pr (github) or
      # open_plan_pr_ado (ado). On github (default) the router is a
      # no-op fall-through.
      - to: pr_open_platform_router

  # ── Commit and push error gate ────────────────────────────────────────
  - name: commit_and_push_error_gate
    type: human_gate
    prompt: |
      ## ⚠️ Plan Commit/Push Failed

      Could not commit and push the plan for work item
      **{{ workflow.input.work_item_id }}**.

      **Branch:** `{{ ensure_plan_branch.output.branch }}`
      **Error:** {{ commit_and_push.output.error if commit_and_push.output.error is defined else "Unknown error" }}

      ---

      Choose an action:
      - **Abort** — cancel planning
    options:
      - label: "🛑 Abort"
        value: abort
        route: $end

  # ── Open plan PR ───────────────────────────────────────────────────────
  #
  # Opens the plan PR (or returns the existing one) and embeds the
  # ancestor_plan_generations snapshot in the PR body front-matter for
  # later stale-generation detection at merge time.
  #
  # Reuse semantics: an existing PR with a matching snapshot is returned;
  # an existing PR with a stale snapshot is rejected (operator decides).
  #
  # Invariants:
  #   Pre:  commit_and_push produced a pushable plan branch.
  #   Post: output.pr_url + output.pr_number identify the plan PR;
  #         output.created indicates whether it was just opened.
  - name: open_plan_pr
    type: script
    description: Open (or reuse) the plan PR with ancestor-generations snapshot
    command: polyphony
    args:
      - "pr"
      - "open-plan-pr"
      - "--root-id"
      - "{{ root_resolver.output.resolved_root_id }}"
      - "--item-id"
      - "{{ workflow.input.work_item_id }}"
      - "--parent-item-id"
      - "{{ ancestor_chain.output.parent_item_id | default(0) }}"
      - "--ancestor-ids"
      - "{{ ancestor_chain.output.ancestor_ids }}"
    routes:
      - to: open_plan_pr_error_gate
        when: "{{ open_plan_pr.output.error is defined and open_plan_pr.output.error }}"
      - to: plan_reviewer

  # ── Open plan PR error gate ────────────────────────────────────────────
  - name: open_plan_pr_error_gate
    type: human_gate
    prompt: |
      ## ⚠️ Plan PR Open Failed

      Could not open the plan PR for work item
      **{{ workflow.input.work_item_id }}**.

      **Branch:** `{{ ensure_plan_branch.output.branch }}`
      **Error:** {{ open_plan_pr.output.error if open_plan_pr.output.error is defined else "Unknown error" }}

      Common causes: stale ancestor snapshot on an existing PR (operator
      must close/recreate); gh authentication missing; network timeout.

      ---

      Choose an action:
      - **Abort** — cancel planning
    options:
      - label: "🛑 Abort"
        value: abort
        route: $end

  # ── Plan reviewer (LLM advisory — platform-aware) ─────────────────────
  #
  # Single LLM reviewer per design doc Q2. Produces a critique using a
  # rubric and either:
  #   - github platform: posts directly via `gh pr review --comment --body`
  #     (the LLM owns the post; same behavior as v2.0).
  #   - ado platform: emits the rendered comment body via output.comment_body
  #     and a downstream `plan_reviewer_poster_ado` script posts it via
  #     `polyphony pr post-comment-ado` (no `polyphony` tool is registered
  #     for LLM agents, so the post must be a separate script step).
  #
  # Either way the LLM does NOT vote approve/changes_requested — option 2
  # from the P7-pre identity model decision: LLM is advisory, human
  # approval is the gate. The rubric, comment shape, and re-review
  # semantics are identical across platforms.
  #
  # Invariants:
  #   Pre:  open_plan_pr (github) or open_plan_pr_ado (ado) produced
  #         output.pr_url + output.pr_number.
  #   Post: github → comment is posted on the PR; output.posted == true.
  #         ado    → output.comment_body holds the markdown to be posted
  #                  by plan_reviewer_poster_ado; output.posted == false
  #                  (will flip to true after the poster script runs).
  - name: plan_reviewer
    type: agent
    model: claude-opus-4.7
    description: Produce a single advisory plan review (post via gh on github; emit body for ado)
    tools:
      - gh
      - filesystem
    output:
      posted:
        type: boolean
        description: Whether a comment was posted by THIS agent (true on github happy path; false on ado, where the downstream poster script is responsible)
      pr_number:
        type: number
        description: PR number that was reviewed
      summary:
        type: string
        description: One-paragraph summary of the reviewer's overall assessment
      strengths:
        type: array
        description: Plan strengths (also included in the posted comment)
        items:
          type: string
      concerns:
        type: array
        description: Plan concerns (also included in the posted comment)
        items:
          type: string
      comment_body:
        type: string
        description: |
          The fully-rendered markdown comment ready to be posted. On ado
          this is consumed by plan_reviewer_poster_ado. On github it is
          informational (the LLM has already posted it via gh) but is
          still emitted for log parity.
    prompt: |
      You are an advisory plan reviewer for an SDLC planning workflow.

      ## Your Mission

      Read the plan and produce **one** advisory comment using the rubric
      and shape below. You do NOT vote `--approve` or `--request-changes`
      — human review is the gate. Your job is to give the human reviewer
      a useful starting point.

      {% if workflow.input.platform == 'ado' %}
      **Platform: Azure DevOps.** You do NOT have a tool to post the
      comment yourself. Render the comment body and emit it via
      `output.comment_body` — a downstream script
      (`plan_reviewer_poster_ado`) will post it via
      `polyphony pr post-comment-ado`. Do NOT attempt to call `gh`; this
      is an ADO PR and `gh` will fail.

      Set `output.posted = false` (the poster script will record the real
      post status when it runs).
      {% else %}
      **Platform: GitHub.** Post the comment directly using:

      `gh pr review {{ open_plan_pr.output.pr_number }} --comment --body "..."`

      Set `output.posted = true` after a successful post.

      Do **not** post multiple comments. If you've already posted a review
      on this PR (use `gh pr view {{ open_plan_pr.output.pr_number }}
      --comments` to check), post a new comment that explicitly references
      the prior one (e.g., "## Re-review (revision N)").
      {% endif %}

      ## Context

      - **Work item:** {{ workflow.input.work_item_id }}
      - **Type definition:** {{ type_loader.output.definition }}
      - **Decomposition guidance:** {{ type_loader.output.decomposition_guidance }}
      - **Plan template:** {{ type_loader.output.template }}
      {% if workflow.input.platform == 'ado' -%}
      - **PR URL:** {{ open_plan_pr_ado.output.pr_url }}
      - **PR number:** {{ open_plan_pr_ado.output.pr_number }}
      {% else -%}
      - **PR URL:** {{ open_plan_pr.output.pr_url }}
      - **PR number:** {{ open_plan_pr.output.pr_number }}
      {%- endif %}
      - **Plan file path:** plans/plan-{{ workflow.input.work_item_id }}.md

      Read the plan from disk (the working tree is on the plan branch).

      ## Rubric (combined technical + readability)

      | Criterion | Weight | Notes |
      |---|---|---|
      | Feasibility | 25% | Can the plan be implemented as described? |
      | Completeness | 20% | Does the plan cover all aspects of the work item? |
      | Decomposition | 20% | Are child items well-scoped, sized, and dependency-correct? |
      | Alignment | 15% | Does the plan follow the type's guidance? |
      | Clarity | 10% | Is the plan easy for a downstream agent or human to act on? |
      | Acceptance criteria | 10% | Are acceptance criteria present, testable, unambiguous? |

      ## Comment shape

      The comment body must use this structure (markdown):

      ```
      ### 🤖 Polyphony plan reviewer (advisory)

      **Summary:** <one paragraph>

      **Strengths**
      - …

      **Concerns**
      - …

      **Suggested changes**
      - … (only what would materially improve the plan; skip nits)

      _This is an advisory comment from the polyphony plan_reviewer agent.
      It does not vote — human review is the merge gate._
      ```

      {% if guidance_loader.output.reviewer is defined and guidance_loader.output.reviewer %}
      ## Repo-Specific Guidance

      {{ guidance_loader.output.reviewer }}
      {% endif %}

      ## Output

      Return JSON:
      ```json
      {
        "posted": {% if workflow.input.platform == 'ado' %}false{% else %}true{% endif %},
        "pr_number": {% if workflow.input.platform == 'ado' %}{{ open_plan_pr_ado.output.pr_number }}{% else %}{{ open_plan_pr.output.pr_number }}{% endif %},
        "summary": "<one paragraph>",
        "strengths": ["..."],
        "concerns": ["..."],
        "comment_body": "<full rendered markdown comment per the shape above>"
      }
      ```
    routes:
      # On ADO platform, route to the poster script which actually posts
      # the comment via `polyphony pr post-comment-ado`. On github the
      # LLM already posted via the `gh` tool, so route straight to poll.
      - to: plan_reviewer_poster_ado
        when: "{{ workflow.input.platform == 'ado' }}"
      - to: poll_status

  # ── Poll status ───────────────────────────────────────────────────────
  #
  # Single-shot poll of the plan PR's aggregated review state. With
  # --include-metadata, also returns metadata.requests_parent_change
  # parsed from the PR body front-matter (used for the P8 deferred
  # parent-change-request handling).
  #
  # Invariants:
  #   Pre:  open_plan_pr produced output.pr_url; plan_reviewer has posted (or
  #         we're re-entering on awaiting_review and the prior reviewer comment
  #         is already on the PR).
  #   Post: output.state in {approved, changes_requested, pending, merged, closed}.
  - name: poll_status
    type: script
    description: Single-shot poll of plan PR review state (with metadata)
    command: polyphony
    args:
      - "pr"
      - "poll-status"
      - "--pr-url"
      - "{{ open_plan_pr.output.pr_url if open_plan_pr.output.pr_url is defined else state_detector.output.pr_url }}"
      - "--include-metadata"
    routes:
      - to: poll_error_gate
        when: "{{ poll_status.output.error is defined and poll_status.output.error }}"
      - to: extract_parent_patch
        when: "{{ poll_status.output.state == 'approved' and poll_status.output.metadata is defined and poll_status.output.metadata is not none and poll_status.output.metadata.requests_parent_change == true }}"
      - to: merge_plan_pr
        when: "{{ poll_status.output.state == 'approved' }}"
      - to: revise_counter
        when: "{{ poll_status.output.state == 'changes_requested' }}"
      - to: pending_review_gate
        when: "{{ poll_status.output.state == 'pending' }}"
      - to: seeder
        when: "{{ poll_status.output.state == 'merged' }}"
      - to: closed_unmerged_gate
        when: "{{ poll_status.output.state == 'closed' }}"
      # Catch-all per M4
      - to: poll_error_gate

  # ── Poll error gate ───────────────────────────────────────────────────
  - name: poll_error_gate
    type: human_gate
    prompt: |
      ## ⚠️ Plan PR Poll Failed

      Could not read the plan PR review state for work item
      **{{ workflow.input.work_item_id }}**.

      **State:** `{{ poll_status.output.state if poll_status.output.state is defined else "unknown" }}`
      **Error:** {{ poll_status.output.error if poll_status.output.error is defined else "Unexpected state — check polyphony pr poll-status output schema" }}

      ---

      Choose an action:
      - **Retry** — re-poll the PR
      - **Abort** — cancel planning
    options:
      - label: "🔄 Retry"
        value: retry
        route: pr_poll_platform_router
      - label: "🛑 Abort"
        value: abort
        route: $end

  # ── Extract parent patch (P8d wiring) ──────────────────────────────────
  #
  # Reached when either (a) state_detector returns parent_change_pending —
  # i.e. an approved direct-child plan PR carries
  # `requests_parent_change: true`, or (b) poll_status sees the same flag
  # on a freshly-approved child PR mid-flight. In both cases we extract a
  # bounded markdown diff for THIS work item's plan file out of the child
  # PR, then re-prompt the architect to integrate or reject it.
  #
  # `parent_item_id` is the current workflow's `work_item_id` — that's the
  # parent the child PR is asking to change.
  #
  # On state_detector entry, the child PR url comes from
  # `state_detector.output.parent_change_pending_children[0]`. On
  # poll_status entry, the child IS the current work_item_id but the
  # child PR url is captured by poll_status itself; the verb only needs
  # the URL, so we always read from state_detector when defined and fall
  # back to the open_plan_pr / state_detector pr_url chain otherwise.
  #
  # Output schema (per polyphony.exe plan extract-parent-patch — Models/PlanExtractParentPatchResult.cs):
  #   pr_url, pr_number, repo_slug, child_item_id, parent_item_id,
  #   expected_parent_generation, head_sha, files_touched[],
  #   parent_plan_diff, truncated, diff_size_bytes,
  #   requests_parent_change, warnings[], error, error_code
  #
  # Always exits 0 (routing-style). Workflow branches on the presence of
  # `error` inside the architect prompt — there is no error gate here
  # because the architect is the consumer and is told to default to
  # "reject by reasoning" when the diff is unusable.
  - name: extract_parent_patch
    type: script
    description: Extract bounded parent-plan markdown diff from a child plan PR that requests parent change
    command: polyphony
    args:
      - "plan"
      - "extract-parent-patch"
      - "--pr-url"
      - "{{ state_detector.output.parent_change_pending_children[0].pr_url if (state_detector.output.parent_change_pending_children is defined and state_detector.output.parent_change_pending_children|length > 0) else (open_plan_pr_ado.output.pr_url if (workflow.input.platform == 'ado' and open_plan_pr_ado.output.pr_url is defined) else (open_plan_pr.output.pr_url if open_plan_pr.output.pr_url is defined else state_detector.output.pr_url)) }}"
      - "--root-id"
      - "{{ root_resolver.output.resolved_root_id }}"
      - "--parent-item-id"
      - "{{ workflow.input.work_item_id }}"
    routes:
      - to: architect

  # ── Pending-review gate (in-workflow human checkpoint) ────────────────
  #
  # When poll_status returns 'pending' we surface a gate with the PR URL
  # so the human can review on GitHub/ADO and come back to continue.
  #
  # NOTE: design doc Q3 recommended option (b) "exit-with-pending" so the
  # outer state_detector loop re-enters when human feedback lands. We
  # currently use option (a) human_gate because polyphony-full.yaml's
  # state_detector still uses the OLD single-string phase model and would
  # infinite-loop on the awaiting_review state. Switch to option (b)
  # lands with Phase 2c (workflow YAML migration to requirement+disposition).
  - name: pending_review_gate
    type: human_gate
    prompt: |
      ## ⏳ Plan PR Awaiting Review — Work Item {{ workflow.input.work_item_id }}

      The plan PR is open and the polyphony plan_reviewer has posted an
      advisory comment. Human review is required before merging.

      - **PR:** {{ open_plan_pr_ado.output.pr_url if (workflow.input.platform == 'ado' and open_plan_pr_ado.output.pr_url is defined) else (open_plan_pr.output.pr_url if open_plan_pr.output.pr_url is defined else state_detector.output.pr_url) }}
      - **Branch:** `{{ ensure_plan_branch.output.branch if ensure_plan_branch.output.branch is defined else state_detector.output.plan_branch }}`

      Review the PR on GitHub/ADO. Approve to proceed with merge + seeding,
      or request changes to send the architect back for revision. Then
      return here and click **Continue**.

      ---

      Choose an action:
      - **Continue** — re-poll the PR for the updated state
      - **Abort** — stop planning this branch
    options:
      - label: "🔄 Continue"
        value: continue
        route: pr_poll_platform_router
      - label: "🛑 Abort"
        value: abort
        route: $end

  # ── Revise counter ────────────────────────────────────────────────────
  #
  # Tracks the number of architect-revision cycles when reviewers request
  # changes. Capped at 5 to prevent runaway loops; on cap, escalates to a
  # human gate that lets the operator approve the current plan, force a
  # final revision, or abort.
  - name: revise_counter
    type: script
    description: Track architect-revise loop iteration count (cap 5)
    command: pwsh
    args:
      - "-NoProfile"
      - "-Command"
      - |
        $counterFile = Join-Path ([System.IO.Path]::GetTempPath()) "conductor-plan-revise-{{ workflow.input.work_item_id }}"
        if (Test-Path $counterFile) {
            $count = [int](Get-Content $counterFile -Raw) + 1
        } else {
            $count = 1
        }
        Set-Content $counterFile $count
        $maxRevisions = 5
        $capReached = $count -ge $maxRevisions
        @{ iteration = $count; max_revisions = $maxRevisions; cap_reached = $capReached } | ConvertTo-Json
    routes:
      - to: revise_cap_gate
        when: "{{ revise_counter.output.cap_reached == true }}"
      - to: architect

  # ── Revise cap gate ───────────────────────────────────────────────────
  - name: revise_cap_gate
    type: human_gate
    prompt: |
      ## ⚠️ Revision Cap Hit — Work Item {{ workflow.input.work_item_id }}

      The architect has produced **{{ revise_counter.output.max_revisions }}**
      revisions but reviewers are still requesting changes.

      - **PR:** {{ open_plan_pr_ado.output.pr_url if (workflow.input.platform == 'ado' and open_plan_pr_ado.output.pr_url is defined) else (open_plan_pr.output.pr_url if open_plan_pr.output.pr_url is defined else state_detector.output.pr_url) }}

      Decide what to do:

      ---

      Choose an action:
      - **Re-poll** — perhaps reviewers approved since the last revision; check PR state again
      - **Force revision** — send the architect through one more revision cycle
      - **Abort** — stop planning this branch
    options:
      - label: "🔄 Re-poll PR"
        value: repoll
        route: pr_poll_platform_router
      - label: "✏️ Force one more revision"
        value: force
        route: architect
      - label: "🛑 Abort"
        value: abort
        route: $end

  # ── Merge plan PR ─────────────────────────────────────────────────────
  #
  # Atomic merge + manifest update. On success, plan_generations[item_key]
  # is bumped in the run manifest and the manifest commit is pushed back
  # to feature/{root}. On stale_generation error, surfaces a gate.
  #
  # Invariants:
  #   Pre:  poll_status returned state == approved + requests_parent_change == false.
  #   Post: PR is merged; manifest reflects new plan_generation; output.merged == true.
  - name: merge_plan_pr
    type: script
    description: Merge plan PR + bump plan_generations in run manifest
    command: polyphony
    args:
      - "pr"
      - "merge-plan-pr"
      - "--root-id"
      - "{{ root_resolver.output.resolved_root_id }}"
      - "--item-id"
      - "{{ workflow.input.work_item_id }}"
      - "--parent-item-id"
      - "{{ ancestor_chain.output.parent_item_id | default(0) }}"
    routes:
      - to: stale_generation_gate
        when: "{{ merge_plan_pr.output.error_code is defined and merge_plan_pr.output.error_code == 'stale_generation' }}"
      - to: merge_error_gate
        when: "{{ merge_plan_pr.output.error_code is defined and merge_plan_pr.output.error_code != '' and merge_plan_pr.output.error_code != 'stale_generation' }}"
      - to: cascade_remedy

  # ── Cascade remedy ────────────────────────────────────────────────────
  #
  # Phase 3 P9 step 4. After merge_plan_pr bumps a plan_generation, any
  # OPEN descendant plan PRs whose snapshot referenced the prior generation
  # are now stale. Invoke the cascade-remedy sub-workflow to classify and
  # remediate them (auto-rebase / recreate / per-PR human gate).
  #
  # The sub-workflow is a no-op when there are no stale descendants.
  # Errors inside the sub-workflow are surfaced via its own gates and do
  # not block continuation here.
  #
  # Invariants:
  #   Pre:  merge_plan_pr succeeded; manifest has the new generation.
  #   Post: All open descendant PRs of the resolved root have been
  #         remediated or surfaced for manual handling.
  - name: cascade_remedy
    type: workflow
    description: Cascade-remedy open descendant plan PRs whose snapshot is now stale.
    workflow: ./cascade-remedy.yaml
    input_mapping:
      root_id: "{{ root_resolver.output.resolved_root_id }}"
    routes:
      - to: seeder

  # ── Stale generation gate ─────────────────────────────────────────────
  #
  # Fires when merge_plan_pr itself reports stale_generation — i.e. THIS
  # plan PR's own ancestor snapshot is behind the manifest at merge time.
  # This is a different cascade trigger than the descendant cascade
  # (cascade_remedy above): the parent's bump must be reconciled here
  # BEFORE we can merge this plan, so we route to the cascade-remedy
  # sub-workflow scoped to this PR's own root, then the operator can
  # re-attempt merge.
  - name: stale_generation_gate
    type: human_gate
    prompt: |
      ## ⚠️ This Plan PR's Snapshot Is Stale At Merge

      Plan PR for work item **{{ workflow.input.work_item_id }}** was
      approved but its `ancestor_plan_generations` snapshot is behind the
      current manifest:

      - **Ancestor:** `{{ merge_plan_pr.output.ancestor_key }}`
      - **PR snapshot generation:** {{ merge_plan_pr.output.snapshot_generation }}
      - **Current manifest generation:** {{ merge_plan_pr.output.current_generation }}

      Run the cascade-remedy sub-workflow (which will auto-rebase or
      recreate this PR), then retry the merge.

      ---

      Choose an action:
      - **Run cascade-remedy** — invoke the cascade and re-attempt merge.
      - **Acknowledge** — stop planning this branch (escalate to human).
    options:
      - label: "🔄 Run cascade-remedy + retry merge"
        value: cascade
        route: cascade_remedy_for_self
      - label: "✅ Acknowledge"
        value: acknowledge
        route: $end

  # ── Cascade remedy (self-trigger from stale_generation_gate) ──────────
  #
  # Same sub-workflow as the post-merge cascade, but invoked here when
  # this PR itself is the stale one. After the cascade rebases/recreates
  # this PR, we route back to merge_plan_pr to re-attempt.
  - name: cascade_remedy_for_self
    type: workflow
    description: Cascade-remedy invoked because THIS plan PR is the stale one at merge time.
    workflow: ./cascade-remedy.yaml
    input_mapping:
      root_id: "{{ root_resolver.output.resolved_root_id }}"
    routes:
      - to: merge_plan_pr

  # ── Merge error gate ──────────────────────────────────────────────────
  - name: merge_error_gate
    type: human_gate
    prompt: |
      ## ⚠️ Plan PR Merge Failed

      Could not merge the plan PR for work item
      **{{ workflow.input.work_item_id }}**.

      **Error code:** `{{ merge_plan_pr.output.error_code }}`

      Common causes: lock acquisition failed (another run holds the
      same-root lock); push conflict on manifest branch; gh CLI
      authentication.

      ---

      Choose an action:
      - **Retry** — re-attempt the merge
      - **Abort** — cancel planning
    options:
      - label: "🔄 Retry"
        value: retry
        route: merge_plan_pr
      - label: "🛑 Abort"
        value: abort
        route: $end

  # ── Seeder ─────────────────────────────────────────────────────────────
  #
  # Idempotent seeder. Consumes architect.output.children and reconciles
  # against existing children of the parent work item via marker-aware
  # idempotent matching, then sets the polyphony:planned tag on the parent.
  #
  # NOTE: when state_detector routes us straight here (state == merged_unseeded
  # on resume), architect.output.children is undefined. The seeder verb
  # tolerates an empty children array and reconciles against existing children
  # — it will warn but proceed and still set polyphony:planned.
  - name: seeder
    type: script
    description: Idempotent seeder — marker-aware reconciliation, sets polyphony:planned tag
    command: polyphony
    args:
      - "plan"
      - "seed-children"
      - "--work-item"
      - "{{ workflow.input.work_item_id }}"
      - "--children-json"
      - "{{ architect.output.children | tojson if architect.output.children is defined else '[]' }}"
    routes:
      - to: child_router

  # ── Child router ─────────────────────────────────────────────────────────
  #
  # Discovers plannable children of the current work item. Filters by
  # 'plannable' facet via polyphony plan next-child.
  - name: child_router
    type: script
    description: Discover plannable children for recursive planning
    command: polyphony
    args:
      - "plan"
      - "next-child"
      - "--work-item"
      - "{{ workflow.input.work_item_id }}"
    routes:
      - to: plan_children_group
        when: "{{ child_router.output.has_plannable_children == true }}"
      - to: $end

  # ════════════════════════════════════════════════════════════════════════
  # ADO leg (v2.1) — Phase 5 platform threading
  # ════════════════════════════════════════════════════════════════════════
  #
  # The agents below mirror the github-leg flow (commit_and_push →
  # open_plan_pr → plan_reviewer → poll_status → merge_plan_pr) for ADO.
  # They are reached only when workflow.input.platform == 'ado' via the
  # two platform routers (pr_open_platform_router for the open path,
  # pr_poll_platform_router for the awaiting_review re-entry path).
  #
  # Inputs `organization`, `project`, `repository` are required when
  # platform == 'ado'. The pr_inputs_missing_gate (shared by both
  # routers) catches the misconfigured case before any verb is invoked.

  # ── Platform router: open path ────────────────────────────────────────
  #
  # Reached from commit_and_push. Routes to open_plan_pr (github),
  # open_plan_pr_ado (ado-ready), or pr_inputs_missing_gate (ado-but-
  # missing-creds).
  - name: pr_open_platform_router
    type: script
    description: Route plan-PR-open between github and ado legs based on workflow.input.platform.
    command: pwsh
    args:
      - "-NoProfile"
      - "-Command"
      - |
        $platform = "{{ workflow.input.platform }}"
        $org = "{{ workflow.input.organization }}"
        $project = "{{ workflow.input.project }}"
        $repo = "{{ workflow.input.repository }}"
        $adoReady = ($platform -eq 'ado') -and ($org -ne '') -and ($project -ne '') -and ($repo -ne '')
        @{
            platform = $platform
            ado_ready = $adoReady
        } | ConvertTo-Json -Compress
    routes:
      - to: pr_inputs_missing_gate
        when: "{{ workflow.input.platform == 'ado' and (workflow.input.organization == '' or workflow.input.project == '' or workflow.input.repository == '') }}"
      - to: open_plan_pr_ado
        when: "{{ workflow.input.platform == 'ado' }}"
      - to: open_plan_pr

  # ── Platform router: poll/re-entry path ───────────────────────────────
  #
  # Reached from state_detector when state == awaiting_review (i.e. PR
  # already exists, we're polling for a verdict). Same triage as
  # pr_open_platform_router.
  - name: pr_poll_platform_router
    type: script
    description: Route plan-PR-poll between github and ado legs based on workflow.input.platform.
    command: pwsh
    args:
      - "-NoProfile"
      - "-Command"
      - |
        $platform = "{{ workflow.input.platform }}"
        $org = "{{ workflow.input.organization }}"
        $project = "{{ workflow.input.project }}"
        $repo = "{{ workflow.input.repository }}"
        $adoReady = ($platform -eq 'ado') -and ($org -ne '') -and ($project -ne '') -and ($repo -ne '')
        @{
            platform = $platform
            ado_ready = $adoReady
        } | ConvertTo-Json -Compress
    routes:
      - to: pr_inputs_missing_gate
        when: "{{ workflow.input.platform == 'ado' and (workflow.input.organization == '' or workflow.input.project == '' or workflow.input.repository == '') }}"
      - to: poll_status_ado
        when: "{{ workflow.input.platform == 'ado' }}"
      - to: poll_status

  # ── Shared gate: ADO connection inputs missing ────────────────────────
  - name: pr_inputs_missing_gate
    type: human_gate
    prompt: |
      ## ⚠️ ADO Connection Inputs Missing

      Workflow was invoked with `platform: ado` but one or more of
      `organization`, `project`, `repository` is empty. The ADO PR verbs
      cannot be called without these.

      **Got:**
      - `organization`: `{{ workflow.input.organization }}`
      - `project`: `{{ workflow.input.project }}`
      - `repository`: `{{ workflow.input.repository }}`

      Re-run polyphony-full with all three set, or pass `platform: github`.

      ---

      Choose an action:
      - **Abort** — cancel planning
    options:
      - label: "🛑 Abort"
        value: abort
        route: $end

  # ── Open plan PR (ADO) ────────────────────────────────────────────────
  #
  # ADO analogue of open_plan_pr. Mirrors the same ancestor-snapshot
  # contract — `polyphony pr open-plan-ado` is responsible for embedding
  # the ancestor_plan_generations into the PR body so merge-plan-ado can
  # detect stale_generation later.
  - name: open_plan_pr_ado
    type: script
    description: Open (or reuse) the ADO plan PR with ancestor-generations snapshot.
    command: polyphony
    args:
      - "pr"
      - "open-plan-ado"
      - "--root-id"
      - "{{ root_resolver.output.resolved_root_id }}"
      - "--item-id"
      - "{{ workflow.input.work_item_id }}"
      - "--parent-item-id"
      - "{{ ancestor_chain.output.parent_item_id | default(0) }}"
      - "--ancestor-ids"
      - "{{ ancestor_chain.output.ancestor_ids }}"
    routes:
      - to: open_plan_pr_ado_error_gate
        when: "{{ open_plan_pr_ado.output.error is defined and open_plan_pr_ado.output.error }}"
      - to: plan_reviewer

  # ── Open plan PR (ADO) error gate ─────────────────────────────────────
  - name: open_plan_pr_ado_error_gate
    type: human_gate
    prompt: |
      ## ⚠️ ADO Plan PR Open Failed

      Could not open (or reuse) the plan PR on Azure DevOps for work item
      **{{ workflow.input.work_item_id }}**.

      **Branch:** `{{ ensure_plan_branch.output.branch }}`
      **Error:** {{ open_plan_pr_ado.output.error if open_plan_pr_ado.output.error is defined else "Unknown error" }}

      Common causes: stale ancestor snapshot on an existing PR (operator
      must abandon/recreate); ADO PAT missing or insufficient scope;
      network timeout; repository identifier mismatch.

      ---

      Choose an action:
      - **Abort** — cancel planning
    options:
      - label: "🛑 Abort"
        value: abort
        route: $end

  # ── Plan reviewer poster (ADO) ────────────────────────────────────────
  #
  # Posts the comment body produced by plan_reviewer to the ADO PR via
  # `polyphony pr post-comment-ado` (since the LLM has no `polyphony` tool
  # registered for direct invocation). Routes straight to poll_status_ado.
  #
  # NOTE: poll_status_ado is the polling step on the ADO leg — even if
  # the post fails (already-commented races, transient API failures), we
  # still proceed to poll the PR. The poll surfaces the real PR state.
  - name: plan_reviewer_poster_ado
    type: script
    description: Post the plan_reviewer's rendered comment to the ADO PR.
    command: polyphony
    args:
      - "pr"
      - "post-comment-ado"
      - "--organization"
      - "{{ workflow.input.organization }}"
      - "--project"
      - "{{ workflow.input.project }}"
      - "--repository"
      - "{{ workflow.input.repository }}"
      - "--pr-number"
      - "{{ open_plan_pr_ado.output.pr_number }}"
      - "--body"
      - "{{ plan_reviewer.output.comment_body }}"
    routes:
      - to: poll_status_ado

  # ── Poll status (ADO) ─────────────────────────────────────────────────
  #
  # ADO analogue of poll_status. Same 6-way routing — approved →
  # extract_parent_patch (when requests_parent_change) or merge_plan_pr_ado;
  # changes_requested → revise_counter; pending → pending_review_gate;
  # merged → seeder; closed → closed_unmerged_gate; error → poll_error_gate
  # (the github-leg gate is reused — the prompt is platform-agnostic
  # enough that we don't need a separate ADO version yet).
  - name: poll_status_ado
    type: script
    description: Single-shot poll of ADO plan PR review state (with metadata).
    command: polyphony
    args:
      - "pr"
      - "poll-status-ado"
      - "--organization"
      - "{{ workflow.input.organization }}"
      - "--project"
      - "{{ workflow.input.project }}"
      - "--repository-id"
      - "{{ workflow.input.repository }}"
      - "--pr-number"
      - "{{ open_plan_pr_ado.output.pr_number if open_plan_pr_ado.output.pr_number is defined else state_detector.output.pr_number }}"
      - "--include-metadata"
    routes:
      - to: poll_error_gate
        when: "{{ poll_status_ado.output.error is defined and poll_status_ado.output.error }}"
      - to: extract_parent_patch
        when: "{{ poll_status_ado.output.state == 'approved' and poll_status_ado.output.metadata is defined and poll_status_ado.output.metadata is not none and poll_status_ado.output.metadata.requests_parent_change == true }}"
      - to: merge_plan_pr_ado
        when: "{{ poll_status_ado.output.state == 'approved' }}"
      - to: revise_counter
        when: "{{ poll_status_ado.output.state == 'changes_requested' }}"
      - to: pending_review_gate
        when: "{{ poll_status_ado.output.state == 'pending' }}"
      - to: seeder
        when: "{{ poll_status_ado.output.state == 'merged' }}"
      - to: closed_unmerged_gate
        when: "{{ poll_status_ado.output.state == 'closed' }}"
      # Catch-all per M4
      - to: poll_error_gate

  # ── Merge plan PR (ADO) ───────────────────────────────────────────────
  #
  # ADO analogue of merge_plan_pr. Same atomic merge + manifest update
  # contract; same stale_generation detection.
  - name: merge_plan_pr_ado
    type: script
    description: Merge ADO plan PR + bump plan_generations in run manifest.
    command: polyphony
    args:
      - "pr"
      - "merge-plan-ado"
      - "--organization"
      - "{{ workflow.input.organization }}"
      - "--project"
      - "{{ workflow.input.project }}"
      - "--repository"
      - "{{ workflow.input.repository }}"
      - "--root-id"
      - "{{ root_resolver.output.resolved_root_id }}"
      - "--item-id"
      - "{{ workflow.input.work_item_id }}"
      - "--parent-item-id"
      - "{{ ancestor_chain.output.parent_item_id | default(0) }}"
    routes:
      # NOTE: stale_generation reuses stale_generation_gate. The gate's
      # prompt references merge_plan_pr.output.* fields — those are
      # undefined when we arrive via the ADO leg. The gate offers
      # cascade_remedy_for_self → routes back to merge_plan_pr (github).
      # On ADO we want to route back to merge_plan_pr_ado instead, so we
      # use a dedicated gate.
      - to: merge_plan_pr_ado_stale_gate
        when: "{{ merge_plan_pr_ado.output.error_code is defined and merge_plan_pr_ado.output.error_code == 'stale_generation' }}"
      - to: merge_plan_pr_ado_error_gate
        when: "{{ merge_plan_pr_ado.output.error_code is defined and merge_plan_pr_ado.output.error_code != '' and merge_plan_pr_ado.output.error_code != 'stale_generation' }}"
      - to: cascade_remedy

  # ── Merge plan PR (ADO) stale-generation gate ─────────────────────────
  - name: merge_plan_pr_ado_stale_gate
    type: human_gate
    prompt: |
      ## ⚠️ This ADO Plan PR's Snapshot Is Stale At Merge

      Plan PR for work item **{{ workflow.input.work_item_id }}** was
      approved but its `ancestor_plan_generations` snapshot is behind the
      current manifest:

      - **Ancestor:** `{{ merge_plan_pr_ado.output.ancestor_key }}`
      - **PR snapshot generation:** {{ merge_plan_pr_ado.output.snapshot_generation }}
      - **Current manifest generation:** {{ merge_plan_pr_ado.output.current_generation }}

      Run the cascade-remedy sub-workflow (which will auto-rebase or
      recreate this PR), then retry the merge.

      ---

      Choose an action:
      - **Run cascade-remedy** — invoke the cascade and re-attempt merge.
      - **Acknowledge** — stop planning this branch (escalate to human).
    options:
      - label: "🔄 Run cascade-remedy + retry merge"
        value: cascade
        route: cascade_remedy_for_self_ado
      - label: "✅ Acknowledge"
        value: acknowledge
        route: $end

  # ── Cascade remedy (ADO self-trigger) ─────────────────────────────────
  - name: cascade_remedy_for_self_ado
    type: workflow
    description: Cascade-remedy invoked because THIS ADO plan PR is the stale one at merge time.
    workflow: ./cascade-remedy.yaml
    input_mapping:
      root_id: "{{ root_resolver.output.resolved_root_id }}"
    routes:
      - to: merge_plan_pr_ado

  # ── Merge plan PR (ADO) error gate ────────────────────────────────────
  - name: merge_plan_pr_ado_error_gate
    type: human_gate
    prompt: |
      ## ⚠️ ADO Plan PR Merge Failed

      Could not merge the plan PR for work item
      **{{ workflow.input.work_item_id }}**.

      **Error code:** `{{ merge_plan_pr_ado.output.error_code }}`

      Common causes: lock acquisition failed (another run holds the
      same-root lock); push conflict on manifest branch; ADO PAT auth;
      stale head SHA; reviewer requirements not met.

      ---

      Choose an action:
      - **Retry** — re-attempt the merge
      - **Abort** — cancel planning
    options:
      - label: "🔄 Retry"
        value: retry
        route: merge_plan_pr_ado
      - label: "🛑 Abort"
        value: abort
        route: $end

  # ── Plan children summary gate ───────────────────────────────────────────
  #
  # Fires only when one or more child planning sub-workflows failed.
  - name: plan_children_summary_gate
    type: human_gate
    prompt: |
      ## ⚠️ Child Planning Partial Failure

      Planning for work item **{{ workflow.input.work_item_id }}** completed with errors.

      - **Succeeded:** {{ plan_children_group.outputs | length }}
      - **Failed:** {{ plan_children_group.errors | length }}

      Some child work items were not planned. Review the failures and re-run
      with intent=resume to retry only the failed children.

      ---

      Choose an action:
      - **Acknowledge** — finish this run
    options:
      - label: "✅ Acknowledge"
        value: acknowledge
        route: $end

# ── Plan children group (for_each) ─────────────────────────────────────
#
# Self-recursion: invokes plan-level.yaml for each plannable child with
# depth+1. Conductor schema requires for_each at the workflow root, not
# nested under agents.
for_each:
  - name: plan_children_group
    description: Recursively plan each plannable child
    items: "{{ child_router.output.plannable_children }}"
    item_var: child
    max_concurrent: 1
    failure_mode: continue_on_error
    workflow:
      type: workflow
      workflow: ./plan-level.yaml
      max_depth: 6
      input_mapping:
        work_item_id: "{{ child.id }}"
        depth: "{{ workflow.input.depth + 1 }}"
        max_depth: "{{ workflow.input.max_depth }}"
        # v2.1: inherit platform threading so recursive child planning
        # targets the same platform as the apex run. Defaults preserve
        # github behavior when these inputs were never supplied.
        platform: "{{ workflow.input.platform }}"
        organization: "{{ workflow.input.organization }}"
        project: "{{ workflow.input.project }}"
        repository: "{{ workflow.input.repository }}"
    routes:
      - to: plan_children_summary_gate
        when: "{{ plan_children_group.errors | length > 0 }}"
      - to: $end
