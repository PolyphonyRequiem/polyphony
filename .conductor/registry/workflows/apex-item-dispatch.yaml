# apex-item-dispatch — Phase 7 innermost sub-workflow of apex-driver.
#
# Dispatches a single work item from a wave through:
#
#   1. lifecycle-router.ps1 — classify which lifecycle workflow this
#      item belongs in (plan-level / actionable / implement-merge-group /
#      feature-pr / fast-path) using `polyphony state next-ready`.
#   2. worktree-manager.ps1 spawn — create a per-item worktree so the
#      lifecycle dispatch can run in parallel with siblings without
#      racing branch checkouts.
#   3. Lifecycle dispatch — branch-on-router into the classified
#      sub-workflow (this file's reason for existing).
#   4. worktree-manager.ps1 teardown — clean up the worktree.
#
# Per-item isolation is the thing that lets apex-wave-dispatch run with
# max_concurrent: 3. Without per-item worktrees, three concurrent
# lifecycle dispatches would race on the same working tree.
#
# ── Branch-on-router pattern ─────────────────────────────────────────
#
# Each lifecycle gets its own `type: workflow` agent node
# (`plan_level_dispatch`, `actionable_dispatch`, `implement_merge_group_dispatch`,
# `feature_pr_dispatch`). The classifier emits a `lifecycle_workflow`
# string and the routes from `spawn_worktree` (and the catch-all branch
# from classify) fan into the right node based on that value. The
# pattern mirrors `feature-pr.yaml`'s `pr_platform_router` →
# `pr_lifecycle_github` / `pr_lifecycle_ado` split — proven, lintable,
# and self-documenting in the YAML topology.
#
# Conductor does NOT support dynamic templated `workflow:` paths
# (`workflow: "./{{ classify.output.workflow }}.yaml"`), so the
# branch-on-router pattern is the canonical mechanism for "invoke
# sub-workflow X or Y based on a router output". See
# `.github/skills/polyphony-workflow-author/SKILL.md` ("Branch-on-router
# into sub-workflow") for the canonical write-up.
#
# ── Multi-facet handling (Q2 design pick) ────────────────────────────
#
# The `facet_sequence: [actionable, implementable]` planner declaration
# is honored implicitly through `polyphony state next-ready`'s ordered
# requirement-kind dispositions, NOT through this workflow re-invoking
# itself. If an item has both an actionable and an implementable facet,
# the action_satisfied requirement gates the implementation_merged
# requirement; the classifier returns whichever is currently
# dispatchable. Subsequent waves of the apex-driver outer loop pick up
# the next facet once the previous one is satisfied. Each invocation of
# apex-item-dispatch therefore dispatches exactly ONE lifecycle.
#
# ── Renegotiation bubble-up ──────────────────────────────────────────
#
# Plan-level invocations may produce `renegotiation_pending` along with
# the supporting `renegotiation_request`, `validate_scope_verdict`, and
# `scope_violation_files` outputs (PR #144). Those are bubbled up
# verbatim to apex-wave-dispatch (which aggregates across the wave) and
# ultimately to apex-driver's renegotiation gate. M3 guards keep the
# references safe on every leg the plan-level dispatch did not run.
#
# ── Conductor mechanics gotchas honored ──────────────────────────────
#   M3  StrictUndefined `is defined` guards on every cross-leg output.
#   M4  Explicit catch-all `to:` last on every routing block.
#   M7  Booleans piped through `| string | lower`.
#   M8  Sub-workflow paths are parent-relative (`./plan-level.yaml`).
#
# ── Out of scope (DO NOT add in this PR) ─────────────────────────────
#   * E2E execution tests (separate PR p7-apex-driver-e2e).
#   * Auto-restart on renegotiation (currently prompt-equivalent).
#   * Per-MG worktree serialization (currently per-item only).

workflow:
  name: apex-item-dispatch
  description: >-
    Dispatches a single work item: classify lifecycle, spawn per-item
    worktree, branch-on-router into the classified lifecycle
    sub-workflow (plan-level / actionable / implement-merge-group / feature-pr /
    fast-path), tear down worktree. Inner sub-workflow of
    apex-wave-dispatch.
  version: "2.3.0"
  entry_point: classify_lifecycle
  metadata:
    min_polyphony_version: "2.3.0"

  limits:
    # Five branch nodes plus a teardown plus terminals. Sub-workflow
    # invocations count as one iteration each — the actual recursion
    # happens inside the lifecycle workflow's own limits.
    max_iterations: 50

  input:
    apex_id:
      type: number
      required: true
    work_item_id:
      type: number
      required: true
    platform:
      type: string
      required: false
      default: ado
    organization:
      type: string
      required: false
      default: ""
      description: ADO organization (threaded into platform-aware lifecycles).
    project:
      type: string
      required: false
      default: ""
      description: ADO project (threaded into platform-aware lifecycles).
    repository:
      type: string
      required: false
      default: ""
      description: ADO repository GUID/name (threaded into platform-aware lifecycles).

# ── Workflow output ──────────────────────────────────────────────────
#
# Per M3 every cross-leg verb output is `is defined`-guarded — only
# ONE of the four lifecycle nodes runs in any given execution; the
# other three remain undefined. Per M7 booleans are piped through
# `| string | lower` so apex-wave-dispatch (and ultimately apex-driver)
# receives a real bool, not capital "True"/"False".
#
# `lifecycle_workflow` echoes the classifier's verdict — useful for
# the wave summary and for apex-driver's renegotiation gate prompt
# (so the operator can see which lifecycle bubbled up the signal).
output:
  work_item_id: "{{ workflow.input.work_item_id }}"
  apex_id: "{{ workflow.input.apex_id }}"
  lifecycle_workflow: >-
    {%- if classify_lifecycle is defined -%}{{ classify_lifecycle.output.lifecycle_workflow }}
    {%- else -%}error{%- endif -%}
  dispatched: >-
    {%- if terminal_dispatched is defined -%}true
    {%- else -%}false{%- endif -%}
  fast_pathed: >-
    {%- if terminal_fast_path is defined -%}true
    {%- else -%}false{%- endif -%}
  # ── Terminal-satisfied bubble-up (PR #6 — closed-loop step 6) ──
  # `item_satisfied` is true ONLY when the terminal_satisfied node
  # actually ran and performed the ADO state transition. PR #9 (apex-driver
  # outer loop) consumes this to count items as DONE in the wave aggregator
  # rather than DISPATCHED. Other terminals default to false.
  item_satisfied: >-
    {%- if terminal_satisfied is defined -%}true
    {%- else -%}false{%- endif -%}
  # ── Renegotiation bubble-up (PR #144 — plan-level outputs) ──
  # Only plan-level emits these; the other lifecycles leave them
  # undefined. The `is defined` guards collapse to safe defaults.
  #
  # `renegotiation_request` is bubbled up from
  # PlanExtractRenegotiationFlagResult.RenegotiationRequest which is
  # `string?` and OMITTED when null. plan-level.yaml's output: block
  # always emits the field as a string (post-fix at the plan-level
  # source) but if plan-level itself crashes mid-run, the .output
  # dict can be partial. Two-level guard is defense-in-depth against
  # any future plan-level failure mode that leaves outputs incomplete.
  # Cf. plan-level.yaml output: block for the source-of-truth fix.
  renegotiation_pending: >-
    {%- if plan_level_dispatch is defined -%}{{ (plan_level_dispatch.output.renegotiation_pending | default(false)) | string | lower }}
    {%- else -%}false{%- endif -%}
  renegotiation_request: >-
    {%- if plan_level_dispatch is defined and plan_level_dispatch.output.renegotiation_request is defined -%}{{ plan_level_dispatch.output.renegotiation_request }}
    {%- else -%}{%- endif -%}
  validate_scope_verdict: >-
    {%- if plan_level_dispatch is defined -%}{{ plan_level_dispatch.output.validate_scope_verdict | default('') }}
    {%- else -%}{%- endif -%}
  scope_violation_files: >-
    {%- if plan_level_dispatch is defined -%}{{ plan_level_dispatch.output.scope_violation_files | default('[]') }}
    {%- else -%}[]{%- endif -%}
  # Lifecycle-specific outcome surfaces (only the matching leg's value
  # is meaningful; others collapse to safe defaults via M3 guards).
  actionable_satisfied: >-
    {%- if actionable_dispatch is defined -%}{{ (actionable_dispatch.output.satisfied | default(false)) | string | lower }}
    {%- else -%}false{%- endif -%}
  implement_merge_group_merged: >-
    {%- if implement_merge_group_dispatch is defined -%}{{ (implement_merge_group_dispatch.output.merged | default(false)) | string | lower }}
    {%- else -%}false{%- endif -%}
  feature_pr_merged: >-
    {%- if feature_pr_dispatch is defined -%}{{ (feature_pr_dispatch.output.merged | default(false)) | string | lower }}
    {%- else -%}false{%- endif -%}
  # ── Error surfacing (issue #178) ──
  # The two terminal-error legs (`terminal_classify_error`,
  # `terminal_spawn_error`) emit `error` + `error_code` in their canonical
  # envelope. Surface them at the workflow output so the wave consumer
  # can attribute failures without parsing the for_each `errors` array.
  error: >-
    {%- if terminal_classify_error is defined -%}lifecycle classification failed
    {%- elif terminal_spawn_error is defined -%}worktree spawn failed
    {%- else -%}{%- endif -%}
  error_code: >-
    {%- if terminal_classify_error is defined -%}{{ classify_lifecycle.output.error_code | default('classification_failed') }}
    {%- elif terminal_spawn_error is defined -%}{{ spawn_worktree.output.error_code | default('worktree_spawn_failed') }}
    {%- else -%}{%- endif -%}

agents:
  # ── Classify lifecycle ────────────────────────────────────────────────────
  #
  # Calls lifecycle-router.ps1 which wraps `polyphony state next-ready`
  # and emits the classified `lifecycle_workflow` field. Routing-style
  # envelope: errors surface via error_code and route to the failure leg.
  - name: classify_lifecycle
    type: script
    description: Classify which lifecycle workflow this item belongs in
    command: pwsh
    args:
      - "-NoProfile"
      - "-File"
      - "{{ workflow.dir }}/../scripts/lifecycle-router.ps1"
      - "-WorkItemId"
      - "{{ workflow.input.work_item_id }}"
      - "-ApexId"
      - "{{ workflow.input.apex_id }}"
    routes:
      # Fast-path / monitoring / blocked / error short-circuits BEFORE
      # spawning a worktree — these legs are pure observable-state
      # transitions with no per-item working-tree need. terminal-satisfied
      # is also worktree-less: the only ready kind is item_satisfied, so
      # we just perform the ADO state transition and emit item_satisfied=true.
      - to: terminal_fast_path
        when: "{{ classify_lifecycle.output.lifecycle_workflow == 'fast-path' }}"
      - to: terminal_satisfied
        when: "{{ classify_lifecycle.output.lifecycle_workflow == 'terminal-satisfied' }}"
      - to: terminal_monitoring
        when: "{{ classify_lifecycle.output.lifecycle_workflow == 'monitoring' }}"
      - to: terminal_blocked
        when: "{{ classify_lifecycle.output.lifecycle_workflow == 'blocked' }}"
      - to: terminal_classify_error
        when: "{{ classify_lifecycle.output.lifecycle_workflow == 'error' }}"
      - to: spawn_worktree
        when: "{{ classify_lifecycle.output.success | string | lower == 'true' }}"
      # M4 catch-all
      - to: terminal_classify_error

  # ── Spawn worktree ───────────────────────────────────────────────────────
  #
  # Per-item worktree lets parallel sibling dispatches operate
  # independently. worktree-manager.ps1 is idempotent on resume.
  - name: spawn_worktree
    type: script
    description: Spawn a per-item git worktree
    command: pwsh
    args:
      - "-NoProfile"
      - "-File"
      - "{{ workflow.dir }}/../scripts/worktree-manager.ps1"
      - "-Operation"
      - "spawn"
      - "-WorkItemId"
      - "{{ workflow.input.work_item_id }}"
      - "-BaseBranch"
      - "feature/{{ workflow.input.apex_id }}"
    routes:
      # Branch-on-router: dispatch into the lifecycle picked by classify_lifecycle.
      # Each lifecycle has an explicit `when:` clause, plus an M4 catch-all
      # last that funnels unknown classifications to the spawn-error terminal.
      - to: plan_level_dispatch
        when: "{{ spawn_worktree.output.success | string | lower == 'true' and classify_lifecycle.output.lifecycle_workflow == 'plan-level' }}"
      - to: actionable_dispatch
        when: "{{ spawn_worktree.output.success | string | lower == 'true' and classify_lifecycle.output.lifecycle_workflow == 'actionable' }}"
      - to: implement_merge_group_dispatch
        when: "{{ spawn_worktree.output.success | string | lower == 'true' and classify_lifecycle.output.lifecycle_workflow == 'implement-merge-group' }}"
      - to: feature_pr_dispatch
        when: "{{ spawn_worktree.output.success | string | lower == 'true' and classify_lifecycle.output.lifecycle_workflow == 'feature-pr' }}"
      - to: terminal_spawn_error
      # M4 catch-all
      - to: terminal_spawn_error

  # ── Lifecycle dispatch — plan-level ──────────────────────────────────────
  #
  # Recursive planning core. Inputs are the minimum stable shape from
  # PR #136 / #141 / #144: work_item_id required; intent defaults to
  # `resume` so re-entry hits the existing plan PR; child_scope_globs
  # left empty (apex-driver does not yet derive per-child scope —
  # tracked separately).
  #
  # On completion, this node bubbles up the renegotiation_* and
  # validate_scope_* outputs that PR #144 added to plan-level.yaml.
  - name: plan_level_dispatch
    type: workflow
    description: Recursive planning lifecycle (plan-level.yaml)
    workflow: ./plan-level.yaml
    input_mapping:
      work_item_id: "{{ workflow.input.work_item_id }}"
      intent: "resume"
      platform: "{{ workflow.input.platform }}"
      organization: "{{ workflow.input.organization }}"
      project: "{{ workflow.input.project }}"
      repository: "{{ workflow.input.repository }}"
    routes:
      - to: teardown_worktree

  # ── Lifecycle dispatch — actionable ──────────────────────────────────────
  #
  # Single-item actionable facet lifecycle. `executor` defaults to
  # `polyphony` per actionable.yaml's own default; the apex-driver does
  # not currently override it (a future PR could thread an explicit
  # planner-declared executor through `polyphony state next-ready`).
  - name: actionable_dispatch
    type: workflow
    description: Actionable facet lifecycle (actionable.yaml)
    workflow: ./actionable.yaml
    input_mapping:
      work_item_id: "{{ workflow.input.work_item_id }}"
      apex_id: "{{ workflow.input.apex_id }}"
      executor: "polyphony"
      platform: "{{ workflow.input.platform }}"
      organization: "{{ workflow.input.organization }}"
      project: "{{ workflow.input.project }}"
      repository: "{{ workflow.input.repository }}"
    routes:
      - to: teardown_worktree

  # ── Lifecycle dispatch — implement-merge-group ───────────────────────────
  #
  # Single merge-group implementation lifecycle. The apex-driver's per-item
  # dispatch model treats each work item as its own MG container —
  # `pg_number` = work_item_id (transitional input — see implement-merge-group
  # comment block re: `PG-N` tag dependency), `work_item_ids` =
  # [work_item_id], `mg_path` = `pg-{work_item_id}` (synthesized to satisfy
  # the Rev 4 grammar while the legacy `PG-N` tagging is in place). The
  # `feature_branch` is the apex's feature branch.
  #
  # NOTE: This input mapping is the MVP shape for the apex-driver →
  # implement-merge-group bridge. A richer mapping (multiple work_item_ids
  # per MG, planner-declared MG paths) requires the apex-driver to surface
  # MG grouping from the worklist build, which is a follow-up.
  - name: implement_merge_group_dispatch
    type: workflow
    description: Single merge-group implementation lifecycle (implement-merge-group.yaml)
    workflow: ./implement-merge-group.yaml
    input_mapping:
      work_item_id: "{{ workflow.input.work_item_id }}"
      root_id: "{{ workflow.input.apex_id }}"
      pg_number: "{{ workflow.input.work_item_id }}"
      mg_path: "pg-{{ workflow.input.work_item_id }}"
      work_item_ids: "[{{ workflow.input.work_item_id }}]"
      feature_branch: "feature/{{ workflow.input.apex_id }}"
      platform: "{{ workflow.input.platform }}"
      organization: "{{ workflow.input.organization }}"
      project: "{{ workflow.input.project }}"
      repository: "{{ workflow.input.repository }}"
    routes:
      - to: teardown_worktree

  # ── Lifecycle dispatch — feature-pr ──────────────────────────────────────
  #
  # Apex-root implementation lifecycle: the classifier returns
  # `feature-pr` when the work item is the apex root and
  # implementation_merged is the next ready requirement. Merges
  # the apex feature branch into target (default `main`).
  - name: feature_pr_dispatch
    type: workflow
    description: Feature PR lifecycle (feature-pr.yaml) — apex root only
    workflow: ./feature-pr.yaml
    input_mapping:
      work_item_id: "{{ workflow.input.work_item_id }}"
      feature_branch: "feature/{{ workflow.input.apex_id }}"
      target_branch: "main"
      platform: "{{ workflow.input.platform }}"
      organization: "{{ workflow.input.organization }}"
      project: "{{ workflow.input.project }}"
      repository: "{{ workflow.input.repository }}"
    routes:
      - to: teardown_worktree

  # ── Teardown worktree ────────────────────────────────────────────────────
  #
  # Always run, regardless of dispatch success/failure. Idempotent.
  - name: teardown_worktree
    type: script
    description: Remove the per-item worktree
    command: pwsh
    args:
      - "-NoProfile"
      - "-File"
      - "{{ workflow.dir }}/../scripts/worktree-manager.ps1"
      - "-Operation"
      - "teardown"
      - "-WorkItemId"
      - "{{ workflow.input.work_item_id }}"
    routes:
      - to: terminal_dispatched

  # ── Terminals ────────────────────────────────────────────────────────────
  #
  # Issue #178 (canonical-output): Every terminal MUST emit the FULL canonical output
  # schema with safe defaults. When the workflow `output:` template
  # reference resolution misbehaves, conductor can surface a terminal's
  # raw output in place of the rendered workflow output; consumers in
  # apex-wave-dispatch and apex-driver assume the canonical shape and
  # blow up on missing keys (TemplateError: 'dict object' has no
  # attribute 'renegotiation_pending'). Defense-in-depth — even when the
  # template path works, having the terminals self-describe makes
  # debugging tractable and pre-positions us for #173 (typed verb
  # output schema registry).
  #
  # Canonical fields (13): work_item_id, apex_id, lifecycle_workflow,
  # dispatched, fast_pathed, item_satisfied, renegotiation_pending,
  # renegotiation_request, validate_scope_verdict, scope_violation_files,
  # actionable_satisfied, implement_merge_group_merged, feature_pr_merged. Error
  # terminals add `error` and `error_code`. `monitoring`/`blocked` legs
  # keep their additive boolean as a non-canonical convenience — harmless
  # to consumers that ignore unknown keys.
  - name: terminal_dispatched
    type: script
    description: Terminal — item dispatched into its lifecycle sub-workflow
    command: pwsh
    args:
      - "-NoProfile"
      - "-Command"
      - >-
        @{
          work_item_id = {{ workflow.input.work_item_id }};
          apex_id = '{{ workflow.input.apex_id }}';
          lifecycle_workflow = '{{ classify_lifecycle.output.lifecycle_workflow | default('') }}';
          dispatched = $true;
          fast_pathed = $false;
          item_satisfied = $false;
          renegotiation_pending = $false;
          renegotiation_request = '';
          validate_scope_verdict = '';
          scope_violation_files = @();
          actionable_satisfied = $false;
          implement_merge_group_merged = $false;
          feature_pr_merged = $false;
        } | ConvertTo-Json -Compress
    routes:
      - to: $end

  - name: terminal_fast_path
    type: script
    description: Terminal — item is already satisfied or empty (fast-path)
    command: pwsh
    args:
      - "-NoProfile"
      - "-Command"
      - >-
        @{
          work_item_id = {{ workflow.input.work_item_id }};
          apex_id = '{{ workflow.input.apex_id }}';
          lifecycle_workflow = 'fast-path';
          dispatched = $false;
          fast_pathed = $true;
          item_satisfied = $false;
          renegotiation_pending = $false;
          renegotiation_request = '';
          validate_scope_verdict = '';
          scope_violation_files = @();
          actionable_satisfied = $false;
          implement_merge_group_merged = $false;
          feature_pr_merged = $false;
        } | ConvertTo-Json -Compress
    routes:
      - to: $end

  # ── Terminal: terminal-satisfied (PR #6) ─────────────────────────────────
  #
  # Performs the ADO state transition for an item whose only ready
  # requirement is `item_satisfied` — every facet-driven kind has
  # already settled. Mirrors apex-driver.yaml's `close_mark_satisfied`
  # (validate-then-twig-state) so the same terminal-state mapping
  # rules apply (per `.conductor/process-config.yaml > transitions`).
  #
  # The `polyphony validate --event item_satisfied` call is the
  # canonical event-to-target-state lookup. When it returns a
  # `target_state`, we transition via `twig state`; otherwise we
  # leave the item in place (the surrounding workflow surfaces the
  # condition via `item_satisfied=true` so the wave aggregator can
  # count it).
  #
  # No worktree is spawned — this leg is purely an observable-state
  # transition, same as fast-path / monitoring / blocked.
  - name: terminal_satisfied
    type: script
    description: Terminal — perform ADO state transition for item_satisfied
    command: pwsh
    args:
      - "-NoProfile"
      - "-Command"
      - |
        $errMsg = '';
        try {
          twig sync;
          $validate = polyphony validate --work-item {{ workflow.input.work_item_id }} --event item_satisfied | ConvertFrom-Json;
          if ($validate.target_state) {
            twig state $validate.target_state --id {{ workflow.input.work_item_id }};
          }
        } catch {
          # Capture, don't swallow: the apex driver's outer loop (PR #9)
          # re-evaluates next-ready on the next pass — transient ADO/twig
          # failures still surface there rather than failing the whole
          # wave here. But we now log the message to stderr (visible in
          # the conductor event log) AND surface it in the structured
          # output so wave-aggregator consumers can observe failures
          # instead of silently re-looping. AB#3066 fix.
          $errMsg = $_.Exception.Message;
          [Console]::Error.WriteLine("terminal_satisfied caught: $errMsg");
        }
        $out = @{
          work_item_id = {{ workflow.input.work_item_id }};
          apex_id = '{{ workflow.input.apex_id }}';
          lifecycle_workflow = 'terminal-satisfied';
          dispatched = $false;
          fast_pathed = $false;
          item_satisfied = $true;
          renegotiation_pending = $false;
          renegotiation_request = '';
          validate_scope_verdict = '';
          scope_violation_files = @();
          actionable_satisfied = $false;
          implement_merge_group_merged = $false;
          feature_pr_merged = $false;
        };
        if ($errMsg -ne '') {
          $out.error = $errMsg;
          $out.error_code = 'terminal_satisfied_caught';
        }
        $out | ConvertTo-Json -Compress
    routes:
      - to: $end

  - name: terminal_monitoring
    type: script
    description: Terminal — item is in flight (monitoring); skip this wave
    command: pwsh
    args:
      - "-NoProfile"
      - "-Command"
      - >-
        @{
          work_item_id = {{ workflow.input.work_item_id }};
          apex_id = '{{ workflow.input.apex_id }}';
          lifecycle_workflow = 'monitoring';
          dispatched = $false;
          fast_pathed = $false;
          item_satisfied = $false;
          renegotiation_pending = $false;
          renegotiation_request = '';
          validate_scope_verdict = '';
          scope_violation_files = @();
          actionable_satisfied = $false;
          implement_merge_group_merged = $false;
          feature_pr_merged = $false;
          monitoring = $true;
        } | ConvertTo-Json -Compress
    routes:
      - to: $end

  - name: terminal_blocked
    type: script
    description: Terminal — item has unmet prerequisites (blocked)
    command: pwsh
    args:
      - "-NoProfile"
      - "-Command"
      - >-
        @{
          work_item_id = {{ workflow.input.work_item_id }};
          apex_id = '{{ workflow.input.apex_id }}';
          lifecycle_workflow = 'blocked';
          dispatched = $false;
          fast_pathed = $false;
          item_satisfied = $false;
          renegotiation_pending = $false;
          renegotiation_request = '';
          validate_scope_verdict = '';
          scope_violation_files = @();
          actionable_satisfied = $false;
          implement_merge_group_merged = $false;
          feature_pr_merged = $false;
          blocked = $true;
        } | ConvertTo-Json -Compress
    routes:
      - to: $end

  - name: terminal_classify_error
    type: script
    description: Terminal — lifecycle classification failed
    command: pwsh
    args:
      - "-NoProfile"
      - "-Command"
      - >-
        @{
          work_item_id = {{ workflow.input.work_item_id }};
          apex_id = '{{ workflow.input.apex_id }}';
          lifecycle_workflow = 'error';
          dispatched = $false;
          fast_pathed = $false;
          item_satisfied = $false;
          renegotiation_pending = $false;
          renegotiation_request = '';
          validate_scope_verdict = '';
          scope_violation_files = @();
          actionable_satisfied = $false;
          implement_merge_group_merged = $false;
          feature_pr_merged = $false;
          error = 'lifecycle classification failed';
          error_code = '{{ classify_lifecycle.output.error_code | default('classification_failed') }}';
        } | ConvertTo-Json -Compress
    routes:
      - to: $end

  - name: terminal_spawn_error
    type: script
    description: Terminal — worktree spawn failed
    command: pwsh
    args:
      - "-NoProfile"
      - "-Command"
      - >-
        @{
          work_item_id = {{ workflow.input.work_item_id }};
          apex_id = '{{ workflow.input.apex_id }}';
          lifecycle_workflow = '{{ classify_lifecycle.output.lifecycle_workflow | default('') }}';
          dispatched = $false;
          fast_pathed = $false;
          item_satisfied = $false;
          renegotiation_pending = $false;
          renegotiation_request = '';
          validate_scope_verdict = '';
          scope_violation_files = @();
          actionable_satisfied = $false;
          implement_merge_group_merged = $false;
          feature_pr_merged = $false;
          error = 'worktree spawn failed';
          error_code = '{{ spawn_worktree.output.error_code | default('worktree_spawn_failed') }}';
        } | ConvertTo-Json -Compress
    routes:
      - to: $end
