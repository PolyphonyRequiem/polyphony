# implement-merge-group — Single MG (merge-group) lifecycle on the Rev 4 branch model.
#
# Drives one merge group through: branch creation → per-task implementation
# loop with per-impl PRs → MG-level review and acceptance → MG PR creation
# and merge → scope closure.
# Single MG (merge-group) lifecycle on the Rev 4 branch model.
#
# Drives one merge group through: branch creation → per-task implementation
# loop with per-impl PRs → MG-level review and acceptance → MG PR creation
# and merge → scope closure.
#
# Adopts the Rev 4 ADR (docs/decisions/branch-model.md) shape:
#
#   - The merge group lives on `mg/{root}_{mg_path}` (per MergeGroupPath
#     grammar). Created via `polyphony branch ensure-mg`.
#
#   - Each task in the MG is implemented on its own per-item branch
#     `impl/{root}-{item_id}` and promoted into the MG branch via a
#     squash-merged impl PR (`polyphony pr open-impl-pr` +
#     `polyphony pr merge-impl-pr`).
#
#   - The MG itself is promoted into the feature branch (or its parent MG)
#     via a merge-commit-only MG PR (`polyphony pr open-mg-pr` +
#     `polyphony pr merge-mg-pr`). The merge method is hard-coded merge-commit
#     per the ADR; nested merge groups depend on git ancestry and squash
#     would break the chain.
#
# Invariants:
#   Pre:  Items in this MG carry `PG-{pg_number}` legacy tags (transitional
#         bridge — see "Transitional notes" below). Feature branch exists.
#   Post: Each impl PR merged into the MG branch; MG PR merged into the
#         enclosing branch (parent MG when nested, feature when top-level);
#         all items transitioned to Done in ADO.
#
# Transitional notes (TODO follow-up PRs):
#   1. `polyphony branch next-impl --pg-number N` and `branch route`
#      currently match items by `PG-N` tag (ExtractLegacyPgTag in
#      BranchCommands). Items in this MG MUST carry that legacy tag for
#      this workflow to find them. A follow-up PR will introduce
#      MG-path-aware item routing (`--mg-path PATH`) and drop the legacy
#      tag dependency.
#   2. The same is true for `polyphony branch close-scope --pg-number N`.
#   3. The run lock and run manifest (`polyphony lock acquire`,
#      `polyphony manifest init` + `record-approval`) are NOT acquired or
#      written here. The apex workflow that wraps multiple MGs is
#      responsible for lock acquisition, manifest init, and final
#      approval recording. Adding those here would defeat parallel-MG
#      execution under one root.
#   4. The MG PR merges directly via `polyphony pr merge-mg-pr` on the
#      GitHub leg (no review-fix sub-workflow at the MG layer per the
#      ADR — review happens inside `scope_reviewer` upstream of the MG
#      PR). The ADO leg uses a human-gate stub (matching `ado-pr.yaml`)
#      until ADO connection inputs are threaded through the workflow
#      stack and the ADO MG verbs (`pr open-mg-ado` + `pr merge-mg-ado`,
#      shipped in PR #106) can be wired in.
#
# Re-entry behavior (P3):
#   Every step in this workflow is idempotent — `branch ensure-mg`,
#   `branch ensure-impl`, `pr open-mg-pr`, `pr open-impl-pr`,
#   `pr merge-impl-pr`, `pr merge-mg-pr` all detect prior state and
#   either reuse or no-op. `branch next-impl` walks past items already in
#   their terminal state. A killed workflow can be restarted on the same
#   inputs without manual cleanup, with the caveat that scope_reviewer
#   and user_acceptance will re-run.
#
# Risk acknowledged (rubber-duck finding #7):
#   `primary_completer` transitions tasks to their template's done state
#   immediately after the impl PR merges, before the MG PR merges. If the
#   MG PR fails to merge afterwards, ADO will reflect tasks as Done while
#   the feature branch lacks the work. Recovery: re-run this workflow;
#   it will re-open and re-merge the MG PR (idempotent). The work is
#   physically on the MG branch via the squash merges; only the
#   feature-branch promotion is missing.

workflow:
  name: implement-merge-group
  description: >-
    Single merge-group lifecycle on the Rev 4 branch model. Creates the
    MG branch, iterates tasks through coder → reviewer with per-task
    branches and PRs, runs scope-level review, and opens + merges the
    MG PR via the merge-commit-only path required by the ADR.
  version: "2.4.8"
  entry_point: branch_ensure_mg
  metadata:
    min_polyphony_version: "2.4.8"
  limits:
    # Per the rubber-duck pass — implement-merge-group's task loop is wide because
    # each task carries seven nodes
    # (ensure-impl → coder → reviewer → impl-pr-open → impl-pr-merge
    #  → completer → router). Ten tasks ≈ 70 iterations baseline; budget
    # 300 to cover changes-requested loops and the scope_reviewer
    # round-trip without hitting the conductor cap.
    max_iterations: 300

  input:
    work_item_id:
      type: number
      required: true
      description: ADO work item ID of the parent for this MG # type is runtime-injected; do not hardcode type names
    root_id:
      type: number
      required: true
      description: ADO work item ID of the run's apex (focus) item
    pg_number:
      type: number
      required: true
      description: >-
        Legacy merge-group number used by the existing `branch next-impl`
        and `branch close-scope` verbs to find tasks via `PG-N` tags.
        Transitional — a follow-up PR will replace with `--mg-path PATH`.
    mg_path:
      type: string
      required: true
      description: >-
        Canonical `_`-joined merge-group path (each segment matches
        `^[a-z][a-z0-9-]{0,30}$`). Used to compute branch + PR names via
        the Rev 4 grammar (`mg/{root}_{mg_path}`). Pass the top-level
        segment for top-level MGs; pass `parent_child` for nested MGs.
    work_item_ids:
      type: array
      required: true
      description: Array of child work item IDs in this MG # type is runtime-injected; do not hardcode type names
    feature_branch:
      type: string
      required: true
      description: Parent feature branch that this MG branch ultimately promotes into
    platform:
      type: string
      required: false
      default: ado
      description: >-
        PR platform — `ado` (default — full lifecycle via ADO REST when
        organization, project, and repository are also supplied; falls
        back to a clear failure gate when those connection inputs are
        blank) or `github` (full lifecycle: open + merge MG PR via gh).
        Default 'ado' matches the work item source.
    organization:
      type: string
      required: false
      default: ""
      description: >-
        ADO organization name (e.g. `contoso`). Required when
        platform=ado; ignored when platform=github. When platform=ado
        and this is blank, pr_platform_router routes to
        mg_pr_inputs_missing_gate before invoking any ADO verb.
    project:
      type: string
      required: false
      default: ""
      description: >-
        ADO project name. Required when platform=ado; ignored when
        platform=github.
    repository:
      type: string
      required: false
      default: ""
      description: >-
        ADO repository identifier — GUID or name; both accepted by
        `pr open-mg-ado` / `pr merge-mg-ado`. Required when
        platform=ado; ignored when platform=github.

tools:
  - twig
  - gh
  - filesystem

output:
  # Workflow-scope output is rendered at end-of-run. Per M7, capital
  # "True"/"False" is NOT coerced by _maybe_parse_json — pipe through
  # `| string | lower` so the parent receives a real bool. Per M3,
  # under StrictUndefined we must guard `scope_closer is defined`
  # because several routes (dependency_gate reassign, user_acceptance
  # abort, error fall-throughs) reach $end without running scope_closer.
  merged: "{% if scope_closer is defined %}{{ (scope_closer.output.exit_code == 0) | string | lower }}{% else %}false{% endif %}"
  pr_url: >-
    {% if mg_pr_open_ado is defined %}{{ mg_pr_open_ado.output.pr_url | default('') }}
    {%- elif mg_pr_open is defined %}{{ mg_pr_open.output.pr_url | default('') }}
    {%- else %}{% endif %}
  pr_number: >-
    {% if mg_pr_open_ado is defined %}{{ mg_pr_open_ado.output.pr_number | default(0) }}
    {%- elif mg_pr_open is defined %}{{ mg_pr_open.output.pr_number | default(0) }}
    {%- else %}0{% endif %}
  mg_path: "{{ workflow.input.mg_path }}"

agents:
  # ── MG branch ensure ───────────────────────────────────────────────────
  #
  # Idempotently creates and checks out `mg/{root}_{mg_path}` from its
  # parent (top-level → feature branch; nested → enclosing MG branch).
  # Re-entry safe: if the branch already exists locally it is checked out;
  # if it exists only on the remote it is fetched + tracked; if the base
  # is missing remotely the verb returns RoutingFailure with a clear
  # message.
  #
  # Invariants:
  #   Pre:  feature branch exists on the remote (or, for nested MGs, the
  #         enclosing MG branch exists on the remote).
  #   Post: `mg/{root}_{mg_path}` is checked out and pushed to origin.
  - name: branch_ensure_mg
    type: script
    description: Idempotently create or check out the MG branch via the Rev 4 grammar
    command: polyphony
    args:
      - "branch"
      - "ensure-mg"
      - "--root-id"
      - "{{ workflow.input.root_id }}"
      - "--mg-path"
      - "{{ workflow.input.mg_path }}"
    routes:
      - to: primary_router

  # ── Per-item router ───────────────────────────────────────────────────
  #
  # Determines the next task in this MG via `polyphony branch next-impl`.
  # Routes to impl_branch_ensure for implementation or to dependency_check
  # when all tasks are complete.
  #
  # Transitional bridge: `next-impl` matches items by `PG-N` legacy tag
  # (see ExtractLegacyPgTag in BranchCommands). A follow-up PR will add
  # `--mg-path PATH` matching.
  #
  # Invariants:
  #   Pre:  MG branch is checked out; tasks in this MG carry `PG-N` tags.
  #   Post: output.action is `implement_item` or `all_items_done`;
  #         output.primary_id and output.primary_title set when implementing.
  - name: primary_router
    type: script
    description: Route to next implementable task within this MG
    command: polyphony
    args:
      - "branch"
      - "next-impl"
      - "--work-item"
      - "{{ workflow.input.work_item_id }}"
      - "--pg-number"
      - "{{ workflow.input.pg_number }}"
      # AB#3217: thread the structural mg-path so next-impl can match the
      # impl-merged-in-mg marker stamped by primary_completer's apex-root
      # branch. Without this, next-impl falls back to the pg-name form
      # (PG-N) which doesn't agree with primary_completer's mg-path
      # (pg-N) under casing rules and lets the same apex root re-dispatch
      # forever.
      - "--mg-path"
      - "{{ workflow.input.mg_path }}"
    routes:
      - to: impl_branch_ensure
        when: "{{ primary_router.output.action == 'implement_item' }}"
      - to: dependency_check
        when: "{{ primary_router.output.action == 'all_items_done' }}"
      # AB#3126: explicit error route. `branch next-impl` returns
      # action='error' with a populated `error` field when its internal
      # try/catch trips (e.g. ADO unreachable during the post-state
      # twig sync). Without this route the catch-all below silently
      # treats errors as "done with tasks" and proceeds toward MG
      # closure — masking real failures and leaving items unstarted.
      - to: primary_router_error_gate
        when: "{{ primary_router.output.action == 'error' or (primary_router.output.error is defined and primary_router.output.error != '') }}"
      # Catch-all per M4: unknown action from next-impl should fail
      # safely to dependency_check (the natural "we're done with tasks"
      # path) rather than raise `No matching route found`.
      - to: dependency_check

  # ── Impl branch ensure ────────────────────────────────────────────────
  #
  # Idempotently creates and checks out `impl/{root}-{item_id}` from the
  # MG branch. Re-entry safe.
  #
  # Invariants:
  #   Pre:  primary_router selected a task (output.action == 'implement_item').
  #   Post: `impl/{root}-{primary_id}` is checked out and pushed to origin.
  - name: impl_branch_ensure
    type: script
    description: Idempotently create or check out the per-item impl branch
    command: polyphony
    args:
      - "branch"
      - "ensure-impl"
      - "--root-id"
      - "{{ workflow.input.root_id }}"
      - "--item-id"
      - "{{ primary_router.output.primary_id }}"
      - "--mg-path"
      - "{{ workflow.input.mg_path }}"
    routes:
      - to: guidance_loader

  # ── Guidance loader ────────────────────────────────────────────────────
  #
  # Loads repo-specific agent guidance for the per-task work item being
  # implemented. Returns role-wide guidance + per-type refinement for each
  # of the three canonical roles (architect / coder / reviewer); coder and
  # primary_reviewer prompts read their respective role + type_refinement
  # blocks via Jinja2 conditionals so prompts degrade gracefully when no
  # guidance files exist. Runs per task (not once per MG) so per-task type
  # drives the refinement lookup when an MG mixes types.
  #
  # Invariants:
  #   Pre:  primary_router selected a task; impl branch is checked out.
  #   Post: output exposes architect/coder/reviewer keys, each with
  #         role + type_refinement strings (empty when files absent).
  - name: guidance_loader
    type: script
    description: Load agent guidance markdown files for coder and reviewer prompts
    command: polyphony
    args:
      - "plan"
      - "load-agent-guidance"
      - "--work-item"
      - "{{ primary_router.output.primary_id }}"
    routes:
      - to: branch_assert_on_impl_pre_coder

  # ── Pre-coder branch assertion (AB#3210) ──────────────────────────────
  #
  # Defends against silent commit misroute. `branch ensure-impl` (above)
  # checks out `impl/{root}-{primary_id}`, but the worktree may already
  # have HEAD on a sibling impl branch from a prior task in the same
  # wave; if `ensure-impl` returned `action="checked_out"` based on a
  # branch existence check while a separate cwd state is what the agent
  # actually sees, the coder commits land on the wrong branch.
  #
  # In apex run 3165 (run_id 9c857363, 2026-05-14), this exact failure
  # mode put the AB#3175 verb commit on `impl/3165-3176` (sibling task's
  # branch) instead of `impl/3165-3175`, and AB#3175 reached the scope
  # reviewer as an "empty MG" — a misleading symptom several stages
  # downstream of the root cause.
  #
  # The verb is read-only: it inspects HEAD via `git branch
  # --show-current` and emits action="ok" when HEAD matches the
  # expected branch, action="mismatch" otherwise. On mismatch we route
  # to a human gate (no automated recovery — operator must reconcile).
  #
  # Invariants:
  #   Pre:  branch ensure-impl succeeded; HEAD should be on
  #         impl/{root_id}-{primary_id}.
  #   Post: output.action is "ok" (continue), "mismatch" (gate), or
  #         "error" (gate; treat like mismatch so operator sees it).
  - name: branch_assert_on_impl_pre_coder
    type: script
    description: Assert HEAD is on impl/{root}-{primary_id} before dispatching the coder agent (AB#3210)
    command: polyphony
    args:
      - "branch"
      - "assert-on-impl"
      - "--root-id"
      - "{{ workflow.input.root_id }}"
      - "--item-id"
      - "{{ primary_router.output.primary_id }}"
    routes:
      - to: coder
        when: "{{ branch_assert_on_impl_pre_coder.output.action == 'ok' }}"
      - to: pre_coder_branch_mismatch_gate
        when: "{{ branch_assert_on_impl_pre_coder.output.action == 'mismatch' }}"
      - to: pre_coder_branch_mismatch_gate
        when: "{{ branch_assert_on_impl_pre_coder.output.action == 'error' }}"
      # Catch-all per M4: any unknown action routes to the gate so a
      # human reconciles rather than raising "No matching route found".
      - to: pre_coder_branch_mismatch_gate

  # ── Pre-coder branch mismatch gate (AB#3210) ──────────────────────────
  #
  # Fires when the pre-coder assertion observed HEAD on a branch other
  # than `impl/{root}-{primary_id}`. The recovery path is operator-only:
  # the workflow has no safe automated way to reconcile a divergent
  # cwd/branch state (the wrong branch may already carry uncommitted
  # work, the right branch may be checked out elsewhere, etc.).
  #
  # Operator options:
  #   - Retry: re-run the assertion (use after manually `git checkout`
  #            to the expected branch).
  #   - Abort: end the workflow. The MG remains in its current state.
  - name: pre_coder_branch_mismatch_gate
    type: human_gate
    description: HEAD is not on the expected impl branch — operator decides retry or abort
    prompt: |
      ## ⚠️ Branch mismatch BEFORE coder dispatch — task `{{ primary_router.output.primary_id }}`

      `polyphony branch assert-on-impl` observed that git HEAD is **not** on
      the expected per-item impl branch. Dispatching the coder agent now
      would route its commits onto the wrong branch (the AB#3210 failure
      mode that struck apex run 3165).

      | Field | Value |
      |---|---|
      | Expected branch | `{{ branch_assert_on_impl_pre_coder.output.expected_branch }}` |
      | Actual branch | `{{ branch_assert_on_impl_pre_coder.output.actual_branch | default('(detached or unknown)') }}` |
      | Work item | AB#{{ primary_router.output.primary_id }} — {{ primary_router.output.primary_title }} |
      | MG branch | `mg/{{ workflow.input.root_id }}_{{ workflow.input.mg_path }}` |
      {% if branch_assert_on_impl_pre_coder.output.error is defined and branch_assert_on_impl_pre_coder.output.error %}
      | Error | `{{ branch_assert_on_impl_pre_coder.output.error | default('') }}` |
      {% endif %}

      ### Recovery

      In another terminal, in the run worktree, switch to the expected
      branch:

      ```
      git checkout {{ branch_assert_on_impl_pre_coder.output.expected_branch }}
      ```

      Then choose **Retry** to re-run the assertion. If the actual
      branch carries unintended uncommitted work, stash or commit it
      first per the worktree's policy.

      Choose an action:

      - **Retry** — re-run `branch assert-on-impl`. Use after
        `git checkout` to the expected branch.
      - **Abort** — end the workflow. The MG state is unchanged; a
        later workflow re-entry resumes from `primary_router`.
    options:
      - label: "🔄 Retry assertion"
        value: retry
        route: branch_assert_on_impl_pre_coder
      - label: "🛑 Abort"
        value: abort
        route: terminal_abort_run

  # ── Coder agent ───────────────────────────────────────────────────────
  #
  # Implements a single task. Commits to the per-item impl branch.
  # Uses Opus 4.6. Lint check
  # accepts any "opus" model so the choice can evolve without lint churn.
  #
  # Invariants:
  #   Pre:  Impl branch is checked out.
  #   Post: Code changes committed and pushed to the impl branch.
  - name: coder
    type: agent
    model: claude-opus-4.6
    description: Implement a single task with code changes committed to the per-item impl branch
    tools:
      - twig
      - gh
      - filesystem
    prompt: |
      You are the implementation coder for the polyphony SDLC workflow.

      ## Your Mission

      Implement the task described below. Write clean, production-quality code
      that satisfies the acceptance criteria. Commit your changes to the current
      impl branch (which has already been created and checked out for you).

      ## Context

      - **Work Item ID:** {{ primary_router.output.primary_id }}
      - **Work item title:** {{ primary_router.output.primary_title }}
      - **Impl branch:** `impl/{{ workflow.input.root_id }}-{{ primary_router.output.primary_id }}`
      - **Enclosing MG branch:** `mg/{{ workflow.input.root_id }}_{{ workflow.input.mg_path }}`
      - **Parent work item:** {{ workflow.input.work_item_id }}
      - **Run apex:** {{ workflow.input.root_id }}

      ## Instructions

      1. Read the full task description from ADO using `twig show {{ primary_router.output.primary_id }}`.
      2. Understand the codebase context — read related files, understand patterns.
      3. Implement the changes required by the task.
      4. Write tests covering the new functionality.
      5. Run the build and tests to verify correctness.
      6. Commit and push your changes with a descriptive message including `AB#{{ primary_router.output.primary_id }}`.

      ## Constraints

      - Follow existing code conventions and patterns.
      - Do NOT modify files outside the scope of this task.
      - Do NOT skip tests — every implementation must have test coverage.
      - Commit messages must reference the ADO work item: `AB#{{ primary_router.output.primary_id }}`.
      - Stage only the files you actually modified for this task. Use
        `git add <path1> <path2>` with explicit paths — never `git add -A`,
        `git add .`, or `git add --all`. The working tree may contain
        unrelated dirty files from concurrent human work or earlier
        workflow iterations; sweeping them in pollutes the commit, breaks
        AB# traceability, and creates phantom changes in PR review.

      {% if primary_reviewer is defined and primary_reviewer.output is defined and primary_reviewer.output.verdict == 'changes_requested' and primary_reviewer.output.feedback %}
      ## Previous Reviewer Feedback (this task)

      Your previous attempt at this task was rejected by `primary_reviewer`. Address the
      feedback below specifically — the implementation already exists on the branch;
      do NOT re-research the problem from scratch and conclude "already implemented".
      Apply the changes the reviewer asked for, commit, and let the reviewer re-check.

      Treat each numbered bug or concern as a required change. If you disagree with a
      finding, fix the others and explain in your commit message and via
      `twig note --text "..."` why you did not apply that one.

      {{ primary_reviewer.output.feedback }}
      {% endif %}

      {% if scope_reviewer is defined and scope_reviewer.output is defined and scope_reviewer.output.verdict == 'changes_requested' and scope_reviewer.output.feedback %}
      ## Parent-level Reviewer Feedback (MG-wide)

      The parent-level reviewer flagged the following MG-wide concerns from the previous
      end-of-MG review. These may span multiple tasks — if the current task touches any
      of them, address them here. Otherwise note that they will be picked up by the
      task that owns them.

      {{ scope_reviewer.output.feedback }}
      {% endif %}

      {% if guidance_loader is defined and guidance_loader.output.agents.coder is defined and guidance_loader.output.agents.coder %}
      ## Repo-Specific Guidance — coder (override)

      {{ guidance_loader.output.agents.coder }}
      {% elif guidance_loader is defined and guidance_loader.output.coder is defined and guidance_loader.output.coder.role %}
      ## Repo-Specific Guidance

      {{ guidance_loader.output.coder.role }}
      {% endif %}

      {% if guidance_loader.output.coder is defined and guidance_loader.output.coder.type_refinement %}
      ## Repo-Specific Guidance — {{ guidance_loader.output.type }} refinement

      {{ guidance_loader.output.coder.type_refinement }}
      {% endif %}
    routes:
      - to: branch_assert_on_impl_post_coder

  # ── Post-coder branch assertion (AB#3210) ─────────────────────────────
  #
  # Defense-in-depth pair to `branch_assert_on_impl_pre_coder`. The
  # pre-coder check confirms HEAD was correct when the agent was
  # dispatched; this post-coder check confirms HEAD is STILL correct
  # after the agent's session — catching the case where the agent ran
  # `git checkout` on its own (intentionally or otherwise) and committed
  # to a different branch than the one the executor staged.
  #
  # Without this check the workflow would silently advance to
  # `impl_pr_open`, which opens a PR for an impl branch that may have
  # received zero of the agent's commits. The downstream squash-coverage
  # check (AB#3211) would catch the symptom, but only after a wasted PR
  # round-trip. Catching it here is cheaper.
  #
  # Invariants:
  #   Pre:  Coder agent has run; HEAD should still be on
  #         impl/{root_id}-{primary_id}.
  #   Post: output.action is "ok" (continue), "mismatch" (gate), or
  #         "error" (gate).
  - name: branch_assert_on_impl_post_coder
    type: script
    description: Assert HEAD is still on impl/{root}-{primary_id} after the coder agent ran (AB#3210)
    command: polyphony
    args:
      - "branch"
      - "assert-on-impl"
      - "--root-id"
      - "{{ workflow.input.root_id }}"
      - "--item-id"
      - "{{ primary_router.output.primary_id }}"
    routes:
      - to: fetch_for_primary_review
        when: "{{ branch_assert_on_impl_post_coder.output.action == 'ok' }}"
      - to: post_coder_branch_mismatch_gate
        when: "{{ branch_assert_on_impl_post_coder.output.action == 'mismatch' }}"
      - to: post_coder_branch_mismatch_gate
        when: "{{ branch_assert_on_impl_post_coder.output.action == 'error' }}"
      # Catch-all per M4: any unknown action routes to the gate.
      - to: post_coder_branch_mismatch_gate

  # ── Post-coder branch mismatch gate (AB#3210) ─────────────────────────
  #
  # Fires when the post-coder assertion observed HEAD on a branch other
  # than `impl/{root}-{primary_id}`. Worse than the pre-coder gate: the
  # agent has already committed somewhere. The commits may be on the
  # wrong branch (same data-loss shape as AB#3175) and need manual
  # cherry-pick recovery before the workflow can safely advance.
  #
  # Operator options:
  #   - Retry: re-run the assertion (use after manually moving commits
  #            and `git checkout` back to the expected branch).
  #   - Abort: end the workflow. The MG remains in its current state;
  #            operator must reconcile out-of-band before re-entering.
  - name: post_coder_branch_mismatch_gate
    type: human_gate
    description: HEAD is not on the expected impl branch after coder ran — operator decides retry or abort
    prompt: |
      ## ⚠️ Branch mismatch AFTER coder dispatch — task `{{ primary_router.output.primary_id }}`

      `polyphony branch assert-on-impl` observed that git HEAD moved off
      the expected per-item impl branch during the coder agent's
      session. The agent's commits may be stranded on the wrong branch
      (the AB#3210 failure mode — see AB#3175 for the live reproducer
      where this exact pattern caused a recovery PR to be required).

      | Field | Value |
      |---|---|
      | Expected branch | `{{ branch_assert_on_impl_post_coder.output.expected_branch }}` |
      | Actual branch | `{{ branch_assert_on_impl_post_coder.output.actual_branch | default('(detached or unknown)') }}` |
      | Work item | AB#{{ primary_router.output.primary_id }} — {{ primary_router.output.primary_title }} |
      | MG branch | `mg/{{ workflow.input.root_id }}_{{ workflow.input.mg_path }}` |
      {% if branch_assert_on_impl_post_coder.output.error is defined and branch_assert_on_impl_post_coder.output.error %}
      | Error | `{{ branch_assert_on_impl_post_coder.output.error | default('') }}` |
      {% endif %}

      ### Recovery

      In another terminal, in the run worktree:

      1. Inspect the actual branch's recent commits:

         ```
         git log --oneline {{ branch_assert_on_impl_post_coder.output.actual_branch }} -10
         ```

      2. If the agent's commits ended up there, cherry-pick them onto
         the expected branch:

         ```
         git checkout {{ branch_assert_on_impl_post_coder.output.expected_branch }}
         git cherry-pick <sha1> [<sha2> ...]
         git push
         ```

      3. (Optional) Reset the wrong branch to drop the misrouted
         commits if no other work depends on them.

      4. Return to the expected branch and choose **Retry**.

      Choose an action:

      - **Retry** — re-run `branch assert-on-impl`. Use after
        recovering the commits and checking out the expected branch.
      - **Abort** — end the workflow. The MG state is unchanged; a
        later workflow re-entry resumes from `primary_router`.
    options:
      - label: "🔄 Retry assertion"
        value: retry
        route: branch_assert_on_impl_post_coder
      - label: "🛑 Abort"
        value: abort
        route: terminal_abort_run

  # ── Fetch for primary review (AB#3157 / AB#3161) ──────────────────────
  #
  # Mirror of `fetch_for_scope_review` placed before `primary_reviewer`.
  # The reviewer prompt compares against `origin/mg/...` to avoid the
  # stale-local-ref bug class (PR #358 audit candidate, hardened by the
  # bare-ref lint added in AB#3161). Even though the impl branch is
  # freshly forked from `mg/...` via `polyphony branch ensure-impl`, the
  # local `mg/...` head can drift behind `origin/mg/...` once a sibling
  # impl PR merges in the same MG run — that's the same pattern as
  # AB#3157, narrower window but identical shape. Pre-fetching keeps
  # the reviewer honest.
  #
  # Invariants:
  #   Pre:  MG branch exists on origin (mg push happens upstream of any
  #         impl branch).
  #   Post: `origin/mg/...` reflects remote; local `refs/heads/mg/...`
  #         has been fast-forwarded when safe.
  - name: fetch_for_primary_review
    type: script
    description: Pre-fetch origin MG ref so primary_reviewer sees fresh state (AB#3157 / AB#3161)
    command: pwsh
    args:
      - "-NoProfile"
      - "-Command"
      - |
        $mg = 'mg/{{ workflow.input.root_id }}_{{ workflow.input.mg_path }}'
        git fetch --quiet origin $mg
        if ($LASTEXITCODE -ne 0) { throw "git fetch failed for $mg" }
        $remoteRef = "refs/remotes/origin/$mg"
        $localRef = "refs/heads/$mg"
        $localExists = (git rev-parse --verify --quiet $localRef 2>$null) -ne $null
        if ($localExists) {
            & git merge-base --is-ancestor $localRef $remoteRef
            if ($LASTEXITCODE -eq 0) {
                git update-ref $localRef $remoteRef
            } else {
                Write-Host "::warning:: local $mg has commits not on origin; not fast-forwarding"
            }
        }
        @{ ok = $true } | ConvertTo-Json -Compress
    routes:
      - to: primary_reviewer

  # ── Primary reviewer ──────────────────────────────────────────────────
  #
  # Reviews the coder's per-task implementation for correctness, code
  # quality, and alignment with the task requirements. Routes to
  # impl_pr_open when approved, back to coder when changes are requested.
  #
  # Invariants:
  #   Pre:  Coder has committed changes to the impl branch.
  #   Post: output.verdict is 'approved' or 'changes_requested'.
  - name: primary_reviewer
    type: agent
    model: claude-opus-4.6
    description: Review per-item task implementation for correctness and quality
    tools:
      - twig
      - filesystem
    output:
      # Schema mirrors this agent's JSON contract below. Required by M2:
      # routes read primary_reviewer.output.verdict.
      verdict:
        type: string
        description: Review outcome — "approved" or "changes_requested"
      feedback:
        type: string
        description: Detailed review feedback
      issues:
        type: array
        description: List of specific issues if changes_requested (empty if approved)
        items:
          type: string
    prompt: |
      You are the primary reviewer for the polyphony SDLC workflow.

      ## Your Mission

      Review the implementation of item {{ primary_router.output.primary_id }} on its
      per-item impl branch for correctness, code quality, and alignment with the work
      item requirements.

      ## Context

      - **Work Item ID:** {{ primary_router.output.primary_id }}
      - **Work item title:** {{ primary_router.output.primary_title }}
      - **Impl branch:** `impl/{{ workflow.input.root_id }}-{{ primary_router.output.primary_id }}`
      - **Enclosing MG branch:** `mg/{{ workflow.input.root_id }}_{{ workflow.input.mg_path }}`

      {% if primary_reviewer is defined and primary_reviewer.output is defined and primary_reviewer.output.verdict == 'changes_requested' %}
      ## ⚠️ This is a RE-REVIEW

      You previously reviewed this item and requested changes. Your prior feedback:

      {{ primary_reviewer.output.feedback }}

      {% if primary_reviewer.output.issues is defined and primary_reviewer.output.issues | length > 0 %}
      ### Prior issues flagged:
      {% for issue in primary_reviewer.output.issues %}
      {{ loop.index }}. {{ issue }}
      {% endfor %}
      {% endif %}

      **Focus your review on whether the coder addressed the issues above.**
      - Check each prior issue specifically — was it fixed, partially fixed, or ignored?
      - Only flag NEW issues if they are substantive (bugs, missing tests, regressions).
      - Do NOT re-flag issues that were adequately addressed.
      - If all prior issues are resolved and no new substantive issues exist, approve.
      {% endif %}

      ## Instructions

      1. Read the item description from ADO: `twig show {{ primary_router.output.primary_id }}`.
      2. Inspect the latest commits on the impl branch — start with
         `git log --oneline origin/mg/{{ workflow.input.root_id }}_{{ workflow.input.mg_path }}..HEAD`
         and `git diff origin/mg/{{ workflow.input.root_id }}_{{ workflow.input.mg_path }}...HEAD`
         to see what the coder added on this impl branch.

         > Refs were freshly fetched from origin immediately upstream;
         > compare against `origin/...` refs to avoid stale-cache false
         > positives. (See AB#3157.)
      3. Read the modified source and test files in full as needed.
      4. Verify:
         - Requirements are met
         - Code quality is acceptable
         - Tests cover the implementation
         - No regressions introduced
      5. Return your verdict.

      ## Output

      Return a JSON object:
      ```json
      {
        "verdict": "approved | changes_requested",
        "feedback": "Detailed review feedback",
        "issues": ["List of specific issues if changes_requested"]
      }
      ```

      ## Decision Criteria

      - **Approve** if the implementation is correct, well-tested, and meets requirements.
      - **Request changes** only for substantive issues (bugs, missing requirements, no tests).
      - Do NOT request changes for style preferences or minor nits.

      {% if guidance_loader is defined and guidance_loader.output.agents.primary_reviewer is defined and guidance_loader.output.agents.primary_reviewer %}
      ## Repo-Specific Guidance — primary_reviewer (override)

      {{ guidance_loader.output.agents.primary_reviewer }}
      {% elif guidance_loader is defined and guidance_loader.output.reviewer is defined and guidance_loader.output.reviewer.role %}
      ## Repo-Specific Guidance

      {{ guidance_loader.output.reviewer.role }}
      {% endif %}

      {% if guidance_loader.output.reviewer is defined and guidance_loader.output.reviewer.type_refinement %}
      ## Repo-Specific Guidance — {{ guidance_loader.output.type }} refinement

      {{ guidance_loader.output.reviewer.type_refinement }}
      {% endif %}
    routes:
      - to: impl_pr_open
        when: "{{ primary_reviewer.output.verdict == 'approved' }}"
      - to: coder
        when: "{{ primary_reviewer.output.verdict == 'changes_requested' }}"
      # Catch-all per M4: an unexpected verdict value (typo, schema drift)
      # routes back to coder for another iteration rather than raising
      # `No matching route found`.
      - to: coder

  # ── Impl PR open ──────────────────────────────────────────────────────
  #
  # Opens (or reuses) the per-item impl PR. Head is the impl branch;
  # base is the MG branch. Idempotent — reuses an existing open PR for
  # the same head/base pair.
  #
  # Invariants:
  #   Pre:  Reviewer approved the task implementation.
  #   Post: Impl PR exists targeting the MG branch; output.pr_number set.
  - name: impl_pr_open
    type: script
    description: Open (or reuse) the per-item impl PR targeting the MG branch
    command: polyphony
    args:
      - "pr"
      - "open-impl-pr"
      - "--root-id"
      - "{{ workflow.input.root_id }}"
      - "--item-id"
      - "{{ primary_router.output.primary_id }}"
      - "--mg-path"
      - "{{ workflow.input.mg_path }}"
      - "--platform"
      - "{{ workflow.input.platform }}"
      - "--organization"
      - "{{ workflow.input.organization }}"
      - "--project"
      - "{{ workflow.input.project }}"
      - "--repository"
      - "{{ workflow.input.repository }}"
    routes:
      - to: impl_pr_merge

  # ── Impl PR merge ─────────────────────────────────────────────────────
  #
  # Merges the per-item impl PR into the MG branch. Default method is
  # squash (per the ADR — impl PRs carry micro-history we do not want
  # to pollute the MG branch with). Idempotent — recognises an already
  # merged PR.
  #
  # AB#3211 carve-out: passes `--delete-branch false` so the impl branch
  # survives long enough for `assert_impl_pr_coverage` (next step) to
  # diff the cumulative impl-branch state against the squash commit on
  # the MG branch. Deletion is deferred to `delete_impl_branch` after
  # the assertion passes.
  #
  # Invariants:
  #   Pre:  Impl PR is open and approved.
  #   Post: Impl PR is merged; impl branch INTENTIONALLY left in place
  #         for the coverage assertion that follows.
  - name: impl_pr_merge
    type: script
    description: Squash-merge the per-item impl PR into the MG branch (defers branch deletion for AB#3211 coverage assertion)
    command: polyphony
    args:
      - "pr"
      - "merge-impl-pr"
      - "--root-id"
      - "{{ workflow.input.root_id }}"
      - "--item-id"
      - "{{ primary_router.output.primary_id }}"
      - "--mg-path"
      - "{{ workflow.input.mg_path }}"
      - "--delete-branch"
      - "false"
      - "--platform"
      - "{{ workflow.input.platform }}"
      - "--organization"
      - "{{ workflow.input.organization }}"
      - "--project"
      - "{{ workflow.input.project }}"
      - "--repository"
      - "{{ workflow.input.repository }}"
    routes:
      - to: fetch_for_coverage_assertion

  # ── Fetch latest MG ref (AB#3211 defense pre-step) ────────────────────
  #
  # `merge-impl-pr` advances `mg/{root}_{path}` on the remote via the
  # GitHub API but does NOT update local remote-tracking refs. The
  # coverage assertion that follows compares `origin/mg/{root}_{path}^`
  # (pre-squash MG tip) against `origin/mg/{root}_{path}` (post-squash
  # MG tip), so the local ref MUST be refreshed to point at the new
  # squash commit before the diff runs.
  #
  # We fetch ONLY the mg branch — fetching all refs would include
  # `--prune` semantics on `impl/{root}-{item}`, which gh just deleted
  # on the server. The impl ref must remain locally cached so the
  # assertion's diff (`base..origin/impl/{root}-{item}`) sees the
  # commits the squash was supposed to carry.
  #
  # Invariants:
  #   Pre:  impl_pr_merge completed; remote `mg/{root}_{path}` advanced
  #         by exactly one squash commit.
  #   Post: local `origin/mg/{root}_{path}` matches remote tip; local
  #         `origin/impl/{root}-{item}` is unchanged (still at impl
  #         tip pre-deletion).
  - name: fetch_for_coverage_assertion
    type: script
    description: Refresh local origin/mg ref so coverage assertion sees post-squash state
    command: pwsh
    args:
      - "-NoProfile"
      - "-Command"
      - >-
        $ErrorActionPreference = 'Stop';
        $PSNativeCommandUseErrorActionPreference = $true;
        $rootId = '{{ workflow.input.root_id }}';
        $mgPath = '{{ workflow.input.mg_path }}';
        $branch = "mg/$rootId" + "_" + "$mgPath";
        git fetch origin "+refs/heads/$branch`:refs/remotes/origin/$branch" 2>&1 | Out-String | Write-Host;
        @{ branch = $branch; fetched = $true } | ConvertTo-Json
    routes:
      - to: assert_impl_pr_coverage

  # ── Coverage assertion (AB#3211 defense) ──────────────────────────────
  #
  # Verifies that the squash commit on `mg/{root}_{path}` carries the
  # full cumulative diff of `impl/{root}-{item}`. Defends against the
  # AB#3211 failure mode that struck apex run 3165 (mg/3165_pg-3175):
  # gh's squash-merge silently dropped commits that referenced foreign
  # task IDs, leaving the MG branch missing the work the impl branch
  # had produced.
  #
  # Routing contract (DU `action` field):
  #   - 'ok'       → impl branch can be safely deleted; route to
  #                  delete_impl_branch.
  #   - 'mismatch' → squash dropped commits; surface the impl-branch
  #                  commit list to an operator via
  #                  squash_coverage_mismatch_gate.
  #   - 'error'    → verb itself failed (git invocation, ref resolution);
  #                  surface to squash_coverage_error_gate for retry/abort.
  #
  # Invariants:
  #   Pre:  Squash committed to `origin/mg/{root}_{path}`; local ref
  #         refreshed; impl branch still present locally.
  #   Post: action ∈ {ok, mismatch, error} with diff hashes + commit
  #         enumeration in output.
  - name: assert_impl_pr_coverage
    type: script
    description: Verify squash on MG branch carries cumulative impl-branch diff (AB#3211 defense)
    command: polyphony
    args:
      - "pr"
      - "assert-impl-pr-coverage"
      - "--root-id"
      - "{{ workflow.input.root_id }}"
      - "--item-id"
      - "{{ primary_router.output.primary_id }}"
      - "--mg-path"
      - "{{ workflow.input.mg_path }}"
      - "--platform"
      - "{{ workflow.input.platform }}"
      - "--organization"
      - "{{ workflow.input.organization }}"
      - "--project"
      - "{{ workflow.input.project }}"
      - "--repository-override"
      - "{{ workflow.input.repository }}"
    routes:
      - when: "{{ assert_impl_pr_coverage.output.action == 'ok' }}"
        to: delete_impl_branch
      - when: "{{ assert_impl_pr_coverage.output.action == 'mismatch' }}"
        to: squash_coverage_mismatch_gate
      - to: squash_coverage_error_gate

  # ── Coverage mismatch gate (AB#3211) ──────────────────────────────────
  #
  # Surfaces a dropped-commit incident to the operator. Two responses:
  #
  #   - abort         → leave the impl branch present so the operator can
  #                     inspect / cherry-pick / re-PR the dropped commits.
  #                     The MG state remains green-washed in ADO until
  #                     manually reconciled. Workflow ends.
  #   - force_accept  → operator has inspected and acknowledges the loss
  #                     (e.g., the dropped commits were genuinely no-ops
  #                     or routed elsewhere). Proceed to delete the impl
  #                     branch and continue the workflow as normal.
  - name: squash_coverage_mismatch_gate
    type: human_gate
    description: Squash merge dropped commits — operator decides abort or force-accept
    prompt: |
      ## ❌ Squash-merge coverage mismatch — task `{{ primary_router.output.primary_id }}` (AB#3211)

      `polyphony pr assert-impl-pr-coverage` reports the squash commit on
      `mg/{{ workflow.input.root_id }}_{{ workflow.input.mg_path }}` does
      **not** carry the cumulative diff of
      `impl/{{ workflow.input.root_id }}-{{ primary_router.output.primary_id }}`.
      Commits the impl branch produced were silently dropped during the
      squash — the apex 3165 / pg-3175 incident.

      | Field | Value |
      |---|---|
      | Work item | AB#{{ primary_router.output.primary_id }} — {{ primary_router.output.primary_title }} |
      | Impl ref | `{{ assert_impl_pr_coverage.output.impl_ref }}` |
      | MG ref | `{{ assert_impl_pr_coverage.output.mg_ref }}` |
      | Comparison base | `{{ assert_impl_pr_coverage.output.comparison_base }}` |
      | Expected diff hash | `{{ assert_impl_pr_coverage.output.expected_diff_hash }}` ({{ assert_impl_pr_coverage.output.expected_diff_bytes | default(0) }} bytes) |
      | Actual diff hash | `{{ assert_impl_pr_coverage.output.actual_diff_hash }}` ({{ assert_impl_pr_coverage.output.actual_diff_bytes | default(0) }} bytes) |

      ### Inspect

      ```
      # bare-ref-ok: comparison_base is `origin/mg/...^` at runtime (PrCommands.AssertImplPrCoverage emits "{remote}/{branch}^")
      git log --oneline {{ assert_impl_pr_coverage.output.comparison_base }}..{{ assert_impl_pr_coverage.output.impl_ref }}
      # bare-ref-ok: comparison_base / impl_ref are origin/-prefixed at runtime
      git diff {{ assert_impl_pr_coverage.output.comparison_base }}..{{ assert_impl_pr_coverage.output.impl_ref }}
      # bare-ref-ok: comparison_base / mg_ref are origin/-prefixed at runtime
      git diff {{ assert_impl_pr_coverage.output.comparison_base }}..{{ assert_impl_pr_coverage.output.mg_ref }}
      ```

      ### Recovery options

      - **Abort** — END this workflow. The impl branch
        (`impl/{{ workflow.input.root_id }}-{{ primary_router.output.primary_id }}`)
        is left intact so you can cherry-pick or re-PR the dropped commits.
        The MG state remains as-is in ADO — reconcile out-of-band before
        re-entering.
      - **Force-accept** — acknowledge the loss (commits were no-ops or
        intentionally routed elsewhere). Delete the impl branch and
        continue. Recommended only after manual `git diff` inspection.
    options:
      - label: "🛑 Abort (preserve impl branch for inspection)"
        value: abort
        route: terminal_abort_run
      - label: "⚡ Force-accept (acknowledge loss, proceed to delete branch)"
        value: force_accept
        route: delete_impl_branch

  # ── Coverage assertion error gate (AB#3211) ───────────────────────────
  #
  # Fires when `assert-impl-pr-coverage` itself returns action='error'
  # (typically a git invocation failure: missing ref, transient network).
  # Distinct from the mismatch gate — this is a tool failure, not a
  # data-loss incident.
  - name: squash_coverage_error_gate
    type: human_gate
    description: assert-impl-pr-coverage tool error — operator decides retry or abort
    prompt: |
      ## ⚠️ Coverage assertion failed to run — task `{{ primary_router.output.primary_id }}`

      `polyphony pr assert-impl-pr-coverage` returned an error envelope
      (the verb itself could not complete; this is a tool failure, not
      a coverage mismatch).

      **Detail:** {{ assert_impl_pr_coverage.output.error | default('(no error message)') }}

      | Field | Value |
      |---|---|
      | Impl ref | `{{ assert_impl_pr_coverage.output.impl_ref | default('(unresolved)') }}` |
      | MG ref | `{{ assert_impl_pr_coverage.output.mg_ref | default('(unresolved)') }}` |

      Common causes: stale local refs (re-fetch may help), missing
      `origin/impl/{root}-{item}` (impl branch deleted prematurely),
      transient git failure.

      Choose an action:

      - **Retry** — re-run the fetch + assertion. Use after manual
        recovery (e.g. `git fetch origin`).
      - **Abort** — END this workflow without deleting the impl branch.
    options:
      - label: "🔄 Retry (re-fetch + re-assert)"
        value: retry
        route: fetch_for_coverage_assertion
      - label: "🛑 Abort"
        value: abort
        route: terminal_abort_run

  # ── Delete impl branch (deferred from impl_pr_merge per AB#3211) ──────
  #
  # Performs the branch deletion that `merge-impl-pr` would normally do
  # via `gh pr merge --delete-branch`. Idempotent — a missing branch is
  # not an error (the operator may have already deleted it manually
  # while inspecting an aborted run, or a previous workflow re-entry
  # may have already pruned it).
  #
  # Invariants:
  #   Pre:  Coverage assertion passed (or operator force-accepted a
  #         mismatch).
  #   Post: Remote `impl/{root}-{item}` is gone (or was already gone).
  - name: delete_impl_branch
    type: script
    description: Delete impl branch on remote (deferred from impl_pr_merge per AB#3211; idempotent)
    command: pwsh
    args:
      - "-NoProfile"
      - "-Command"
      - >-
        $ErrorActionPreference = 'Continue';
        $rootId = '{{ workflow.input.root_id }}';
        $itemId = '{{ primary_router.output.primary_id }}';
        $branch = "impl/$rootId-$itemId";
        $output = git push origin --delete $branch 2>&1 | Out-String;
        Write-Host $output;
        $exit = $LASTEXITCODE;
        $alreadyGone = ($output -match 'remote ref does not exist' -or $output -match 'unable to delete.*remote ref does not exist');
        if ($exit -ne 0 -and -not $alreadyGone) {
          @{ branch = $branch; deleted = $false; already_gone = $false; error = $output.Trim() } | ConvertTo-Json
          exit 0
        }
        @{ branch = $branch; deleted = ($exit -eq 0); already_gone = $alreadyGone } | ConvertTo-Json
    routes:
      - to: primary_completer

  # ── Primary completer ─────────────────────────────────────────────────
  #
  # Transitions the completed task to its template's done state in ADO
  # and adds a summary note. Then routes back to primary_router to pick
  # up the next task.
  #
  # ── Trust chain (AB#3214) ─────────────────────────────────────────────
  #
  # AB#3175 incident (apex run 3165, 2026-05-14): a child task reached
  # `state = Done` in ADO via this step while the implementing commit
  # was stranded on a sibling task's impl branch and the squash-merge
  # to the MG carried zero diff. Net result: ADO reported the work as
  # Done while `feature/{root}` lacked any of its commits.
  #
  # This step does NOT re-verify that the MG branch carries the work
  # item's commits. That verification is the responsibility of the
  # upstream defenses, which this step trusts:
  #
  #   1. Impl-branch routing assertion (AB#3210, PR #401):
  #      `polyphony branch assert-current-impl` runs around the coder
  #      turn (steps `assert_impl_branch_pre_coder` /
  #      `assert_impl_branch_post_coder`). Guarantees the coder's
  #      commits land on the right impl branch.
  #
  #   2. Squash-coverage assertion (AB#3211, PR #402):
  #      `polyphony pr assert-impl-pr-coverage` runs at
  #      `assert_impl_pr_coverage` and computes diff hashes for the
  #      cumulative impl-branch range vs the squash on the MG branch.
  #      On `ok` it routes through `delete_impl_branch → primary_completer`.
  #      On `mismatch` it surfaces `squash_coverage_mismatch_gate` for
  #      the operator; only `force_accept` (an explicit operator
  #      acknowledgement of loss) routes onward to `delete_impl_branch
  #      → primary_completer`.
  #
  # Routing invariant (enforced by
  # tests/lint-primary-completer-trust-chain.ps1):
  #   - The ONLY route INTO `primary_completer` is from
  #     `delete_impl_branch`.
  #   - The ONLY routes INTO `delete_impl_branch` are from
  #     `assert_impl_pr_coverage` (action='ok') or
  #     `squash_coverage_mismatch_gate` (option='force_accept').
  #
  # Together these mean: by the time `primary_completer` fires, either
  # the squash-coverage assertion confirmed diff equivalence, or the
  # operator has explicitly acknowledged a known mismatch. The AB#3175
  # green-wash is structurally impossible.
  #
  # If you change this routing, the lint will fail. If you intentionally
  # add a new predecessor to `primary_completer` or `delete_impl_branch`,
  # update the lint's expected-predecessor lists in lockstep — and think
  # very hard about whether the new path preserves the diff-coverage
  # guarantee.
  #
  # ── Risk acknowledged (rubber-duck #7) ────────────────────────────────
  #
  # Child tasks transition to Done before the MG PR merges. If the MG
  # PR fails to merge afterwards, ADO will report tasks as Done while
  # the feature branch lacks the work. The work IS physically present
  # on the MG branch via the squash merge (verified by the trust chain
  # above) — only the feature-branch promotion is missing. Recovery:
  # re-run this workflow; the MG PR open + merge are idempotent.
  #
  # AB#3169 carve-out (indivisible apex root): when `primary_id == root_id`
  # the "task" being completed IS the apex root work item itself (an
  # indivisible apex with zero ADO children — the lifecycle classifier
  # dispatches the apex root through implement-merge-group as its own
  # implementable). In that case, firing `implementation_complete` here
  # transitions the apex root to its template's done state at MG → feature
  # merge time — which is BEFORE feature → main has been promoted (see
  # AB#3168 for the matching promotion-routing fix). The apex would then
  # be reported done in ADO while `main` lacks any of its commits — a
  # high-blast-radius lie that cascades to ancestor work items.
  # Mitigation: skip the validate + state transition when this is the
  # apex root. The apex's terminal state is fired by `close_mark_satisfied`
  # in apex-driver.yaml AFTER `promote_feature_to_main` succeeds (and
  # therefore AFTER feature → main is merged).
  #
  # Invariants:
  #   Pre:  Impl PR is merged into MG branch.
  #   Post: For child tasks, item is transitioned to its template's done
  #         state in ADO and a note added.
  #         For an indivisible apex root, only a note is added; terminal
  #         state is deferred to apex-driver close-out (AB#3169). When
  #         this is the apex root, the impl-merged-in-mg marker is
  #         stamped on the apex via `polyphony branch mark-impl-merged`
  #         so the next `primary_router` poll reports `all_items_done`
  #         instead of re-dispatching the same item (AB#3217 fix to the
  #         apex-3175 redispatch loop). The marker is cleared on every
  #         revision route that re-dispatches the MG (see
  #         `clear_apex_impl_marker_*` nodes below). # type is runtime-injected; do not hardcode type names
  - name: primary_completer
    type: script
    description: "Transition completed child task to its template's done state (apex root: defer to close_mark_satisfied per AB#3169) and route to next"
    command: pwsh
    args:
      - "-NoProfile"
      - "-Command"
      - >-
        $ErrorActionPreference = 'Stop';
        $PSNativeCommandUseErrorActionPreference = $true;
        $taskId = [int]'{{ primary_router.output.primary_id }}';
        $rootId = [int]'{{ workflow.input.root_id }}';
        $mgPath = '{{ workflow.input.mg_path }}';
        $isApexRoot = ($taskId -eq $rootId);
        twig set $taskId;
        if ($isApexRoot) {
          twig note --text 'Apex root implementation merged into MG branch via impl PR; deferring terminal state transition to close_mark_satisfied after feature-to-main promotion (AB#3169).';
          twig sync;
          $marker = polyphony branch mark-impl-merged --work-item $taskId --mg-path $mgPath | ConvertFrom-Json;
          if (-not $marker.success) { throw "Failed to mark apex root #$taskId impl-merged-in-mg=$($mgPath) (AB#3217 break-loop guard): $($marker.error)" };
          @{ child_id = $taskId; completed = $true; target_state = $null; deferred_apex_root = $true; marker_tag = $marker.tag; marker_already_present = $marker.already_in_desired_state } | ConvertTo-Json
        } else {
          twig note --text 'Item implementation merged into MG branch via impl PR';
          twig sync;
          $validate = polyphony validate --work-item $taskId --event implementation_complete | ConvertFrom-Json;
          if (-not $validate.is_valid) { throw "Cannot transition task $($taskId): $($validate.message)" };
          twig state $validate.target_state;
          twig sync;
          @{ child_id = $taskId; completed = $true; target_state = $validate.target_state; deferred_apex_root = $false } | ConvertTo-Json
        }
    routes:
      - to: primary_router

  # ── Primary router error gate ─────────────────────────────────────────
  #
  # Fires when `branch next-impl` (primary_router) emits action='error' or
  # a non-empty `error` field. Without an explicit route, the catch-all
  # below would silently treat the error as "all items done" and proceed
  # toward MG closure — masking the failure and skipping every remaining
  # task.
  #
  # AB#3126 root cause coupling: next-impl now flushes its
  # begin_implementation transition via a post-state `twig sync` before
  # returning. Network/auth blips during that sync surface here as
  # action='error'.
  #
  # Operator options:
  #   - Retry: re-enter primary_router. `next-impl` is idempotent —
  #     transitions a Doing item to Doing is a no-op for the validator
  #     (begin_implementation accepts both Proposed and InProgress), and
  #     the second `twig sync` will retry the push.
  #   - Abort: $end. The MG remains in its current state; no items are
  #     advanced to Done. Re-running the workflow later resumes from the
  #     same point.
  #
  # Invariants:
  #   Pre:  primary_router emitted action='error' or a populated `error`.
  #   Post: Operator has retried (route to primary_router) or aborted ($end).
  - name: primary_router_error_gate
    type: human_gate
    description: next-impl signaled error — operator decides retry or abort
    prompt: |
      ## ❌ next-impl error — MG `mg/{{ workflow.input.root_id }}_{{ workflow.input.mg_path }}`

      `polyphony branch next-impl` returned an error envelope. The most
      common cause is a transient ADO failure during the post-state
      `twig sync` that flushes the `begin_implementation` transition
      (AB#3126).

      **Detail:** {{ primary_router.output.error | default('(no error message)') }}

      Choose an action:

      - **Retry** — re-enter `primary_router`. `next-impl` is idempotent
        (selecting the same task again, validating `begin_implementation`
        on a Doing item, and re-flushing all are no-ops or safe retries).
      - **Abort** — exit without advancing any further items. The MG
        remains in its current state; a later workflow re-entry resumes
        from the same point.
    options:
      - label: "🔄 Retry (re-run next-impl)"
        value: retry
        route: primary_router
      - label: "🛑 Abort"
        value: abort
        route: terminal_abort_run

  # ── Dependency check ──────────────────────────────────────────────────
  #
  # Checks ADO predecessor links to determine if the MG is blocked by
  # unresolved dependencies. Items with no predecessor links route
  # directly to scope_reviewer (gate never fires).
  #
  # On re-entry, this re-runs and auto-clears blocks whose predecessors
  # have since reached a terminal state.
  #
  # Invariants:
  #   Pre:  primary_router.output.action == 'all_items_done'.
  #   Post: output.status is 'blocked' or 'not_blocked'; blocking_items
  #         populated if blocked.
  - name: dependency_check
    type: script
    description: Check ADO predecessor links for blocking dependencies
    command: polyphony
    args:
      - "branch"
      - "check-deps"
      - "--work-item"
      - "{{ workflow.input.work_item_id }}"
    routes:
      - to: dependency_gate
        when: "{{ dependency_check.output.status == 'blocked' }}"
      - to: fetch_for_scope_review
        when: "{{ dependency_check.output.status == 'not_blocked' }}"
      # Catch-all per M4: an unknown status value routes to the gate so
      # a human resolves it rather than raising `No matching route found`.
      - to: dependency_gate

  # ── Dependency gate ───────────────────────────────────────────────────
  #
  # Fires when dependency_check detects unresolved predecessor links.
  # Three options:
  #   - Wait:     re-check (predecessors may complete on their own).
  #   - Override: proceed despite unresolved dependencies (user accepts risk).
  #   - Reassign: end this MG and track dependencies externally.
  #
  # Invariants:
  #   Pre:  dependency_check.output.status == 'blocked'.
  #   Post: User has chosen wait, override, or reassign.
  - name: dependency_gate
    type: human_gate
    prompt: |
      ## 🚫 Dependency Gate — MG `{{ workflow.input.mg_path }}`

      Work item **{{ workflow.input.work_item_id }}** has unresolved predecessor
      dependencies that may block PR submission.

      ### Blocking Items

      | # | Work Item | Title | State |
      |---|-----------|-------|-------|
      {% for item in dependency_check.output.blocking_items %}
      | {{ loop.index }} | `{{ item.id }}` | {{ item.title }} | {{ item.state }} |
      {% endfor %}

      ---

      **{{ dependency_check.output.blocking_items | length }}** predecessor(s) are
      not yet complete.

      > **Re-entry note:** Choosing **Wait** routes back to the dependency check.
      > If the workflow resumes later, predecessors are re-checked automatically —
      > any that completed in the interim will clear the block without user action.

      Choose an action:
      - **Wait** — re-check dependencies later (blockers may resolve on their own)
      - **Override** — proceed to scope review despite unresolved dependencies (user accepts risk)
      - **Reassign** — end this MG and track dependencies externally
    options:
      - label: "⏳ Wait"
        value: wait
        route: dependency_check
      - label: "⏩ Override"
        value: override
        route: fetch_for_scope_review
      - label: "🔀 Reassign"
        value: reassign
        route: $end

  # ── Scope reviewer ────────────────────────────────────────────────────
  #
  # Reviews the completed MG at the parent-scope level. Checks that all
  # tasks are properly implemented, the overall solution is cohesive,
  # and the MG is ready for promotion via its MG PR.
  #
  # Invariants:
  #   Pre:  All tasks complete; dependencies resolved (or overridden).
  #   Post: output.verdict is 'approved' or 'changes_requested'.
  # ── Fetch for scope review (AB#3157) ──────────────────────────────────
  #
  # In the bare-repo + per-run worktree model, all worktrees share
  # `.git/refs`. When the impl PR merges into the MG branch via
  # `gh pr merge`, only `origin/mg/...` is updated; local
  # `refs/heads/mg/...` stays at the SHA the worktree was created with.
  # That stale local ref poisoned scope_reviewer (which compared against
  # bare branch names): it saw zero new commits on the MG and emitted a
  # spurious `empty_merge_group_structural_violation` (see AB#3157,
  # validated in the AB#3127 dogfood Run #3).
  #
  # This deterministic pre-fetch is the workflow leg of a belt + suspenders
  # fix; the prompt-level leg (use `origin/...` refs in the example
  # commands) is the suspenders.
  #
  # Invariants:
  #   Pre:  feature_branch + MG branch exist on origin (the MG's first
  #         push is `branch ensure-mg`, well upstream of this step).
  #   Post: `origin/feature_branch` and `origin/mg/...` reflect remote;
  #         local heads have been fast-forwarded to match when safe.
  - name: fetch_for_scope_review
    type: script
    description: Pre-fetch origin refs so scope_reviewer sees fresh state (AB#3157)
    command: pwsh
    args:
      - "-NoProfile"
      - "-Command"
      - |
        $feature = '{{ workflow.input.feature_branch }}'
        $mg = 'mg/{{ workflow.input.root_id }}_{{ workflow.input.mg_path }}'
        git fetch --quiet origin $feature $mg
        if ($LASTEXITCODE -ne 0) { throw "git fetch failed for $feature, $mg" }
        # Defensive fast-forward of local heads so any consumer that
        # uses bare names (without the origin/ prefix) sees fresh state.
        foreach ($branch in @($feature, $mg)) {
            $remoteRef = "refs/remotes/origin/$branch"
            $localRef = "refs/heads/$branch"
            $localExists = (git rev-parse --verify --quiet $localRef 2>$null) -ne $null
            if ($localExists) {
                & git merge-base --is-ancestor $localRef $remoteRef
                if ($LASTEXITCODE -eq 0) {
                    git update-ref $localRef $remoteRef
                } else {
                    Write-Host "::warning:: local $branch has commits not on origin; not fast-forwarding"
                }
            }
        }
        @{ ok = $true } | ConvertTo-Json -Compress
    routes:
      - to: scope_guidance_loader

  - name: scope_guidance_loader
    type: script
    description: Load agent guidance for the MG's parent work item (drives scope_reviewer's type refinement)
    command: polyphony
    args:
      - "plan"
      - "load-agent-guidance"
      - "--work-item"
      - "{{ workflow.input.work_item_id }}"
    routes:
      - to: scope_empty_mg_triage

  # ── Scope empty-MG triage (AB#3166) ──────────────────────────────────
  #
  # Deterministic pre-check that disambiguates three distinct zero-commit
  # MG cases before the scope_reviewer LLM fires:
  #
  #   Case A  Genuinely empty MG — structural violation (bug upstream).
  #   Case B  Nothing-to-do MG — impl agents completed but produced no
  #           code changes (e.g. spec-only work, sibling MG covered it).
  #   Case C  Already-merged-forward — the fix landed on main via a
  #           different PR, so feature/ already contains it.
  #
  # Previously all three collapsed to `changes_requested` →
  # scope_revise_counter → cap gate, with no convergence path.
  #
  # Case C is deterministically detectable (main is ancestor of feature)
  # and is auto-approved here. Cases A and B are deferred to
  # scope_reviewer with enriched context so the LLM can distinguish
  # them using ADO work item state and notes.
  #
  # Invariants:
  #   Pre:  origin refs freshly fetched by fetch_for_scope_review.
  #   Post: output.disposition is one of: has_commits,
  #         already_satisfied, zero_commits_unresolved,
  #         structural_violation.
  - name: scope_empty_mg_triage
    type: script
    description: Deterministic zero-commit MG triage — disambiguates Case A/B/C before scope_reviewer (AB#3166)
    command: pwsh
    args:
      - "-NoProfile"
      - "-Command"
      - |
        $feature = '{{ workflow.input.feature_branch }}'
        $mg = 'mg/{{ workflow.input.root_id }}_{{ workflow.input.mg_path }}'
        $taskCount = [int]'{{ workflow.input.work_item_ids | length }}'

        # Structural check (a): MG branch must exist on origin
        git rev-parse --verify --quiet "origin/$mg" 2>$null | Out-Null
        if ($LASTEXITCODE -ne 0) {
            @{
                disposition = 'structural_violation'
                detail = "MG branch origin/$mg does not exist"
                mg_commit_count = 0
                feature_contains_main = $false
            } | ConvertTo-Json -Compress
            exit 0
        }

        # Structural check (d): MG must have been dispatched with tasks
        if ($taskCount -eq 0) {
            @{
                disposition = 'structural_violation'
                detail = "MG was dispatched with zero tasks (work_item_ids is empty)"
                mg_commit_count = 0
                feature_contains_main = $false
            } | ConvertTo-Json -Compress
            exit 0
        }

        # Count commits on MG ahead of feature
        # bare-ref-ok: $feature and $mg are PowerShell variables interpolated with origin/ prefix; lint tokenizer cannot see through the dollar-sigil into the resolved ref name.
        $mgCommitStr = git rev-list --count "origin/$feature..origin/$mg" 2>&1
        if ($LASTEXITCODE -ne 0) {
            @{
                disposition = 'has_commits'
                detail = "git rev-list failed ($mgCommitStr); deferring to scope_reviewer"
                mg_commit_count = -1
                feature_contains_main = $false
            } | ConvertTo-Json -Compress
            exit 0
        }
        $mgCommitCount = [int]$mgCommitStr

        if ($mgCommitCount -gt 0) {
            @{
                disposition = 'has_commits'
                detail = "MG has $mgCommitCount commit(s) ahead of feature branch"
                mg_commit_count = $mgCommitCount
                feature_contains_main = $false
            } | ConvertTo-Json -Compress
            exit 0
        }

        # ── Zero commits on MG — triage Case C vs deferred ──────────
        # Fetch origin/main so the ancestry check is fresh
        # (fetch_for_scope_review only fetches feature + MG).
        git fetch --quiet origin main 2>$null
        if ($LASTEXITCODE -ne 0) {
            @{
                disposition = 'zero_commits_unresolved'
                detail = "Could not fetch origin/main; deferring zero-commit triage to scope_reviewer"
                mg_commit_count = 0
                feature_contains_main = $false
            } | ConvertTo-Json -Compress
            exit 0
        }

        # Case C: is origin/main an ancestor of origin/{feature}?
        # If yes, feature contains everything in main — any fix that
        # landed on main is already present on feature, so a zero-commit
        # MG means the work was already done.
        git merge-base --is-ancestor "origin/main" "origin/$feature" 2>$null
        $mainIsAncestor = ($LASTEXITCODE -eq 0)

        if ($mainIsAncestor) {
            @{
                disposition = 'already_satisfied'
                detail = "Feature branch '$feature' contains current origin/main (main is ancestor of feature). MG produced zero commits because the intended changes are already present — likely merged via a different PR."
                mg_commit_count = 0
                feature_contains_main = $true
            } | ConvertTo-Json -Compress
            exit 0
        }

        # Zero commits, feature does not fully contain main.
        # Could be Case B (legitimate no-op) or Case A (upstream bug).
        # Defer to scope_reviewer with enriched context.
        @{
            disposition = 'zero_commits_unresolved'
            detail = "MG has zero commits ahead of feature and feature does not fully contain origin/main. Could be a legitimate no-op (Case B) or a structural issue (Case A) — scope_reviewer will evaluate with ADO context."
            mg_commit_count = 0
            feature_contains_main = $false
        } | ConvertTo-Json -Compress
    routes:
      - to: scope_auto_approve
        when: "{{ scope_empty_mg_triage.output.disposition == 'already_satisfied' }}"
      - to: scope_reviewer
        when: "{{ scope_empty_mg_triage.output.disposition == 'has_commits' }}"
      - to: scope_reviewer
        when: "{{ scope_empty_mg_triage.output.disposition == 'structural_violation' }}"
      - to: scope_reviewer
        when: "{{ scope_empty_mg_triage.output.disposition == 'zero_commits_unresolved' }}"
      # Catch-all per M4: unknown disposition routes to scope_reviewer
      # so a human-quality review still happens.
      - to: scope_reviewer

  # ── Scope auto-approve (AB#3166) ─────────────────────────────────────
  #
  # Deterministic approval for zero-commit MGs that the triage node
  # identified as Case C (already_satisfied). Emits the same output
  # schema as scope_reviewer (verdict, feedback, issues) so downstream
  # templates can consume either interchangeably.
  #
  # Invariants:
  #   Pre:  scope_empty_mg_triage.output.disposition == 'already_satisfied'.
  #   Post: verdict is 'approved'; routes to user_acceptance_policy_router.
  - name: scope_auto_approve
    type: script
    description: Auto-approve zero-commit MG identified as already_satisfied by triage (AB#3166)
    command: pwsh
    args:
      - "-NoProfile"
      - "-Command"
      - |
        $disposition = '{{ scope_empty_mg_triage.output.disposition }}'
        $detail = '{{ scope_empty_mg_triage.output.detail }}'

        $feedback = @"
        **Auto-approved ($disposition):** $detail

        This merge group produced zero commits ahead of the feature branch,
        but the upstream triage determined this is expected — the intended
        changes are already present on the feature branch (merged via a
        different code path). No scope-level concerns.
        "@.Trim()

        @{
            verdict = 'approved'
            feedback = $feedback
            issues = @()
            auto_disposition = $disposition
        } | ConvertTo-Json -Compress
    routes:
      - to: user_acceptance_policy_router

  - name: scope_reviewer
    type: agent
    model: claude-opus-4.7
    description: Review completed MG at the parent-scope level for cohesion and completeness
    tools:
      - twig
      - filesystem
    output:
      # Schema mirrors this agent's JSON contract below. Required by M2:
      # routes read scope_reviewer.output.verdict.
      verdict:
        type: string
        description: Review outcome — "approved" or "changes_requested"
      feedback:
        type: string
        description: Detailed scope-level review feedback (also rendered in the user_acceptance human gate, so write it for a human reader)
      issues:
        type: array
        description: Specific issues if changes_requested (empty if approved)
        items:
          type: string
    prompt: |
      You are the parent-level reviewer for the polyphony SDLC workflow.

      ## Your Mission

      Review the completed merge group `{{ workflow.input.mg_path }}` for work item
      {{ workflow.input.work_item_id }} at the parent level. Verify that the
      overall solution is cohesive and ready for promotion via its MG PR.

      ## Context

      - **MG path:** `{{ workflow.input.mg_path }}`
      - **MG branch:** `mg/{{ workflow.input.root_id }}_{{ workflow.input.mg_path }}`
      - **Parent work item:** {{ workflow.input.work_item_id }}
      - **Run apex:** {{ workflow.input.root_id }}
      - **Tasks in this MG:** {{ workflow.input.work_item_ids | length }}
        ({{ workflow.input.work_item_ids | join(', ') }})

      {% if scope_empty_mg_triage is defined %}
      ## Upstream Triage Result (AB#3166)

      The deterministic triage node ran before you and produced:

      - **Disposition:** `{{ scope_empty_mg_triage.output.disposition }}`
      - **Detail:** {{ scope_empty_mg_triage.output.detail }}
      - **MG commit count:** {{ scope_empty_mg_triage.output.mg_commit_count }}
      - **Trunk contains main:** {{ scope_empty_mg_triage.output.feature_contains_main }}

      Use this data to inform your review. If disposition is
      `structural_violation`, the triage already confirmed the MG is
      structurally broken — verify and issue `changes_requested`. If
      disposition is `zero_commits_unresolved`, you must distinguish
      between a legitimate no-op (Case B) and a genuine upstream bug
      (Case A) — see the zero-commit disambiguation section below.
      {% endif %}

      ## Instructions

      1. Read the parent work item description: `twig show {{ workflow.input.work_item_id }}`.
      2. Inspect the MG branch in full:
         - `git log --oneline origin/{{ workflow.input.feature_branch }}..origin/mg/{{ workflow.input.root_id }}_{{ workflow.input.mg_path }}`
           to see every commit added by this MG (one squash commit per impl PR).
         - `git diff origin/{{ workflow.input.feature_branch }}...origin/mg/{{ workflow.input.root_id }}_{{ workflow.input.mg_path }} --stat`
           for an aggregate file/line summary.
         - Read the modified files in full as needed.
      3. **Empty-MG structural check** (FAIL LOUDLY — do not punt to the
         user_acceptance gate):

         Refs were freshly fetched from origin immediately upstream;
         compare against `origin/...` refs to avoid stale-cache false
         positives. (See AB#3157.)

         a. If the branch `mg/{{ workflow.input.root_id }}_{{ workflow.input.mg_path }}`
            does not exist (`git rev-parse --verify origin/mg/{{ workflow.input.root_id }}_{{ workflow.input.mg_path }}` fails),
            that is a structural violation → `changes_requested`.
         b. If `{{ workflow.input.work_item_ids | length }}` is zero (the MG was
            dispatched with no tasks), that is a structural violation →
            `changes_requested`.

         When (a) or (b) holds, return immediately with:

             verdict: "changes_requested"
             issues: ["empty_merge_group_structural_violation: <which check failed and why>"]
             feedback: a short paragraph naming the broken invariant and
                       pointing at the upstream classifier/seeder/feature-pr-router
                       as the likely cause. DO NOT rationalize the void by
                       claiming the apex's requirements "must be covered
                       elsewhere" — the MG layer is responsible for the work
                       it was dispatched with; an empty MG is a bug somewhere
                       upstream and approving it green-washes that bug.

         The user_acceptance gate is not the right place to confirm
         "did the apex get done somewhere else?" — that check happens
         at the apex level, not inside the MG reviewer.

      4. **Zero-commit disambiguation** (AB#3166 — direction-asymmetry fix):

         If the MG has zero commits ahead of the feature branch (the
         upstream triage reports `mg_commit_count == 0`), do NOT
         automatically declare a structural violation. There are two
         remaining legitimate cases after Case C (already_satisfied)
         has been handled by the upstream triage:

         **Case B — Nothing-to-do MG (no_op):** The impl agents
         correctly determined no code change was needed. To confirm
         this, check the ADO work items for each task in the MG:
         - Run `twig show <task_id>` for each task.
         - Look for impl agent notes indicating "no change needed",
           "already implemented", or similar.
         - If ALL tasks show evidence of intentional no-op completion,
           this is Case B → `verdict: "approved"` with feedback
           explaining the no_op rationale.

         **Case A — Genuinely empty MG (structural violation):** If
         the tasks do NOT show evidence of intentional no-op, then
         zero commits represents a genuine upstream bug →
         `verdict: "changes_requested"` with the
         `empty_merge_group_structural_violation` issue tag.

         The key distinction: Case B is "the agents ran, evaluated the
         work, and correctly concluded nothing needed changing." Case A
         is "something went wrong upstream and no work was routed into
         this MG despite the dispatch."

      5. Verify (only when the MG has actual content):
         - All acceptance criteria from the parent work item are met
         - Tasks work together cohesively
         - No integration issues between tasks
         - Test coverage is adequate at the integration level
      6. Return your verdict.

         The `feedback` field will be rendered to the human in the
         user_acceptance gate that follows — write a self-contained
         summary the user can read without re-running git. Cover:
         what changed, which files moved, what tests were added, and
         any remaining concerns.

      ## Output

      Return a JSON object:
      ```json
      {
        "verdict": "approved | changes_requested",
        "feedback": "Parent-level review feedback",
        "issues": ["List of specific issues if changes_requested"]
      }
      ```

      {% if scope_guidance_loader is defined and scope_guidance_loader.output.agents.scope_reviewer is defined and scope_guidance_loader.output.agents.scope_reviewer %}
      ## Repo-Specific Guidance — scope_reviewer (override)

      {{ scope_guidance_loader.output.agents.scope_reviewer }}
      {% elif scope_guidance_loader is defined and scope_guidance_loader.output.reviewer is defined and scope_guidance_loader.output.reviewer.role %}
      ## Repo-Specific Guidance

      {{ scope_guidance_loader.output.reviewer.role }}
      {% endif %}

      {% if scope_guidance_loader is defined and scope_guidance_loader.output.reviewer is defined and scope_guidance_loader.output.reviewer.type_refinement %}
      ## Repo-Specific Guidance — {{ scope_guidance_loader.output.type }} refinement

      {{ scope_guidance_loader.output.reviewer.type_refinement }}
      {% endif %}
    routes:
      - to: user_acceptance_policy_router
        when: "{{ scope_reviewer.output.verdict == 'approved' }}"
      - to: scope_approvals_policy
        when: "{{ scope_reviewer.output.verdict == 'changes_requested' }}"
      # Catch-all per M4: unknown verdict (typo, schema drift) routes
      # through the revise counter so that even malformed verdicts cannot
      # bypass the cap. This is the AB#3125 fix — previously this catch-all
      # routed back to primary_router, which combined with `next-impl`
      # returning `all_items_done` produced an infinite loop burning Opus
      # calls when an MG was structurally empty (see dogfood Run #7).
      - to: scope_approvals_policy

  # ── Scope approvals policy resolver (AB#3181 partial wiring) ──────────
  #
  # Resolves the `approvals` policy domain for the MG so scope_revise_counter
  # can drive its cap from policy.approvals.max_revision_cycles instead of
  # a hardcoded literal. Pre-AB#3181 this domain was dead at workflow
  # runtime — the resolver returned correct values but no workflow consumed
  # them.
  #
  # Scoped to `default` because the MG aggregates multiple tasks of
  # potentially different types; the cap is an MG-wide concern, not a
  # per-task one. If per-type tuning becomes useful later, an MG-level
  # type loader can be added and this scope can switch to `type:{name}`.
  #
  # Currently consumed: max_revision_cycles only. The mode (auto/warning/
  # manual) and quality_threshold fields require reviewer-output schema
  # changes (numeric scoring, blocking counts) before they can be wired
  # — tracked as follow-up under AB#3181.
  - name: scope_approvals_policy
    type: script
    description: Resolve approvals policy for scope-revise cap (AB#3181)
    command: polyphony
    args:
      - "policy"
      - "resolve"
      - "--domain"
      - "approvals"
      - "--scope"
      - "default"
    routes:
      - to: scope_revise_counter

  # ── Scope revise counter (AB#3125) ────────────────────────────────────
  #
  # Caps the scope_reviewer → primary_router revise cycle so that when
  # an MG is structurally broken (empty branch, no implementable items,
  # reviewer correctly emits `changes_requested` per its empty-MG check)
  # the workflow escalates to a human gate after MAX_REVISIONS instead
  # of looping forever burning Opus-4.7 calls.
  #
  # Mirrors the canonical pattern from `github-pr.yaml` (`review_counter`)
  # and `plan-level.yaml` (`revise_counter`). Counter file keyed by
  # work_item_id + mg_path so parallel sibling MGs under the same parent
  # do not clobber each other's counters.
  #
  # Cap source: policy.approvals.max_revision_cycles (AB#3181 wiring via
  # scope_approvals_policy above; falls back to 3 if the policy returned
  # no value, preserving pre-AB#3181 behavior).
  #
  # Invariants:
  #   Pre:  scope_reviewer.output.verdict is 'changes_requested' or unknown.
  #   Post: output.cap_reached is true after max_revisions cycles.
  #
  # Known limitation (filed separately): the counter file persists
  # across conductor runs (TempPath is per-user, not per-run). A
  # successful run that took 1-2 revisions leaves stale state that can
  # cause the next run to hit the cap early. Same gap exists in the
  # canonical patterns; tracking as a sibling concern.
  - name: scope_revise_counter
    type: script
    description: Track scope-reviewer revise-loop iteration count (cap from policy.approvals.max_revision_cycles)
    command: pwsh
    args:
      - "-NoProfile"
      - "-Command"
      - |
        $counterFile = Join-Path ([System.IO.Path]::GetTempPath()) "conductor-mg-scope-revise-{{ workflow.input.work_item_id }}-{{ workflow.input.mg_path }}"
        if (Test-Path $counterFile) {
            $count = [int](Get-Content $counterFile -Raw) + 1
        } else {
            $count = 1
        }
        Set-Content $counterFile $count
        $policyMax = '{{ scope_approvals_policy.output.max_revision_cycles }}'
        if ([string]::IsNullOrWhiteSpace($policyMax) -or $policyMax -eq 'None' -or $policyMax -eq '0') {
            $maxRevisions = 3
        } else {
            $maxRevisions = [int]$policyMax
        }
        $capReached = $count -ge $maxRevisions
        @{ iteration = $count; max_revisions = $maxRevisions; cap_reached = $capReached } | ConvertTo-Json
    routes:
      - to: scope_revise_cap_gate
        when: "{{ scope_revise_counter.output.cap_reached == true }}"
      # AB#3217: route revision passes through clear_apex_impl_marker so
      # the impl-merged-in-mg marker (stamped by primary_completer when
      # the apex root completed last round) doesn't suppress this round's
      # re-dispatch.
      - to: clear_apex_impl_marker
        when: "{{ scope_revise_counter.output.cap_reached == false }}"
      # Catch-all per M4: defensive against cap_reached missing/malformed.
      # Routes to the gate so a human resolves it rather than silently
      # bypassing the cap.
      - to: scope_revise_cap_gate

  # ── Scope revise cap gate (AB#3125) ───────────────────────────────────
  #
  # Fires when scope_revise_counter hits MAX_REVISIONS. Surfaces the
  # last reviewer feedback so the operator can diagnose whether the MG
  # is salvageable. Three options matching the canonical
  # `pr_fix_exhausted_gate` shape from github-pr.yaml.
  #
  # Invariants:
  #   Pre:  scope_revise_counter.output.cap_reached == true.
  #   Post: Operator chose re_loop (reset + retry), force_accept (bypass
  #         to MG PR open), or abort (end this MG).
  - name: scope_revise_cap_gate
    type: human_gate
    prompt: |
      ## ⚠️ Scope Review Cap Hit — MG `{{ workflow.input.mg_path }}`

      The scope reviewer for MG `{{ workflow.input.mg_path }}` (work item
      **{{ workflow.input.work_item_id }}**) has produced
      **{{ scope_revise_counter.output.iteration }}** consecutive
      `changes_requested` verdicts without converging.

      ### MG Details

      | Field | Value |
      |-------|-------|
      | MG path | `{{ workflow.input.mg_path }}` |
      | MG branch | `mg/{{ workflow.input.root_id }}_{{ workflow.input.mg_path }}` |
      | Parent work item | `AB#{{ workflow.input.work_item_id }}` |
      | Tasks in MG | {{ workflow.input.work_item_ids | length }} |
      | Cycles attempted | {{ scope_revise_counter.output.iteration }} of {{ scope_revise_counter.output.max_revisions }} |

      ### Latest Reviewer Feedback

      {{ scope_reviewer.output.feedback }}

      {% if scope_reviewer.output.issues %}
      ### Reviewer-Identified Issues

      {% for issue in scope_reviewer.output.issues %}
      - {{ issue }}
      {% endfor %}
      {% endif %}

      ---

      A repeated `changes_requested` verdict with no implementable items
      remaining usually indicates the MG is structurally broken (empty
      branch, no commits, classifier seeded zero tasks) — not the kind
      of issue that another revise cycle can fix.

      Choose an action:
      - **Re-loop** — reset the counter and run another full revise budget. Use this if you have addressed the upstream cause (e.g. seeded missing tasks, recovered the branch).
      - **Force-accept** — accept the current MG state and proceed to MG PR open, bypassing the scope review verdict. Use this if you have inspected the MG and consider it acceptable despite the reviewer's complaint.
      - **Abort** — end this MG. The operator will reconcile out-of-band.
    options:
      - label: "🔄 Re-loop (reset budget)"
        value: re_loop
        route: scope_revise_reset
      - label: "⚡ Force-accept (proceed to MG PR)"
        value: force_accept
        route: pr_platform_router
      - label: "🛑 Abort"
        value: abort
        route: terminal_abort_run

  # ── Scope revise reset (AB#3125) ──────────────────────────────────────
  #
  # Resets the scope-revise iteration counter when the operator chooses
  # to continue at the cap gate. Routes back to primary_router to resume
  # the loop with a fresh budget. Mirrors `review_counter_reset` in
  # github-pr.yaml.
  #
  # Invariants:
  #   Pre:  Operator chose 're_loop' at scope_revise_cap_gate.
  #   Post: Counter file is reset to 0; loop resumes with fresh budget.
  - name: scope_revise_reset
    type: script
    description: Reset scope-revise iteration counter for continued revising
    command: pwsh
    args:
      - "-NoProfile"
      - "-Command"
      - |
        $counterFile = Join-Path ([System.IO.Path]::GetTempPath()) "conductor-mg-scope-revise-{{ workflow.input.work_item_id }}-{{ workflow.input.mg_path }}"
        Set-Content $counterFile 0
        @{ iteration = 0; reset = $true } | ConvertTo-Json
    routes:
      # AB#3217: clear the apex-root impl-merged-in-mg marker so the
      # restarted loop can actually re-dispatch the apex root for revision.
      - to: clear_apex_impl_marker

  # ── Clear apex impl marker (AB#3217) ─────────────────────────────────
  #
  # Deterministic single-node funnel for every workflow route that
  # re-dispatches the same MG for revision. Clears the
  # `polyphony:impl-merged-in-mg=<mg-path>` marker stamped by
  # `primary_completer`'s apex-root branch (see AB#3217 / AB#3169 for
  # why the marker exists).
  #
  # Without this funnel, when the apex root IS the sole implementable
  # item in the MG, the marker stays on the work item across revision
  # passes and `primary_router` reports `all_items_done` immediately —
  # the scope_reviewer's feedback is silently lost and the workflow
  # loops between user_acceptance and pr_platform_router with nothing
  # actually re-implemented.
  #
  # Idempotent: `polyphony branch clear-impl-merged` returns
  # `success=true, already_in_desired_state=true` when the tag is
  # already absent (e.g. the apex root never completed for this MG, or
  # this is a non-apex-root MG where primary_completer never stamped),
  # so this node is safe on every revision route regardless of whether
  # the marker was actually present.
  #
  # Invariants:
  #   Pre:  A revision route has fired (scope_revise_counter cap_reached
  #         == false, scope_revise_reset, or user_acceptance Request
  #         Changes).
  #   Post: The impl-merged-in-mg marker is absent from the apex root;
  #         primary_router is free to re-dispatch the apex root if it is
  #         non-terminal.
  - name: clear_apex_impl_marker
    type: script
    description: Clear the impl-merged-in-mg marker on the apex root before re-dispatching for revision (AB#3217)
    command: polyphony
    args:
      - "branch"
      - "clear-impl-merged"
      - "--work-item"
      - "{{ workflow.input.root_id }}"
      - "--mg-path"
      - "{{ workflow.input.mg_path }}"
    routes:
      - to: primary_router

  # ── User acceptance policy router (AB#3104) ───────────────────────────
  #
  # Reads `policy.unattended.acceptance_mode`. When `auto`, bypasses the
  # `user_acceptance` gate by routing directly to `pr_platform_router`
  # (the same target the operator's "accept" option selects). When
  # `manual` or unknown, falls through to the human gate.
  #
  # Invariants:
  #   Pre:  scope_reviewer.output.verdict == 'approved'.
  #   Post: load_policy.output.unattended.acceptance_mode is
  #         {manual, auto} (validated by the loader).
  - name: user_acceptance_policy_router
    type: script
    description: Bypass user_acceptance gate when policy.unattended.acceptance_mode=auto
    command: polyphony
    args:
      - "policy"
      - "load"
    routes:
      - to: pr_platform_router
        when: "{{ user_acceptance_policy_router.output.unattended.acceptance_mode == 'auto' }}"
      - to: fetch_for_user_acceptance

  # ── Fetch for user acceptance (AB#3157) ───────────────────────────────
  #
  # Mirror of `fetch_for_scope_review` placed before the user_acceptance
  # human gate. The gate's prompt renders `git log` / `git diff` example
  # commands the operator may copy into a worktree shell to inspect the
  # MG; that inspection is only meaningful if local refs (or `origin/...`
  # refs) reflect what `gh pr merge` pushed. Pre-fetching here keeps the
  # operator's commands honest and brings local heads up to date even
  # when the user_acceptance_policy_router runs in `manual` mode (the
  # `auto` path bypasses this step and goes straight to pr_platform_router,
  # which uses platform verbs that handle their own ref freshness).
  #
  # Invariants:
  #   Pre:  scope_reviewer.output.verdict == 'approved' AND
  #         policy.unattended.acceptance_mode == 'manual'.
  #   Post: `origin/feature_branch` and `origin/mg/...` reflect remote;
  #         local heads have been fast-forwarded to match when safe.
  - name: fetch_for_user_acceptance
    type: script
    description: Pre-fetch origin refs so the operator's inspection commands see fresh state (AB#3157)
    command: pwsh
    args:
      - "-NoProfile"
      - "-Command"
      - |
        $feature = '{{ workflow.input.feature_branch }}'
        $mg = 'mg/{{ workflow.input.root_id }}_{{ workflow.input.mg_path }}'
        git fetch --quiet origin $feature $mg
        if ($LASTEXITCODE -ne 0) { throw "git fetch failed for $feature, $mg" }
        # Defensive fast-forward of local heads so any consumer that
        # uses bare names (without the origin/ prefix) sees fresh state.
        foreach ($branch in @($feature, $mg)) {
            $remoteRef = "refs/remotes/origin/$branch"
            $localRef = "refs/heads/$branch"
            $localExists = (git rev-parse --verify --quiet $localRef 2>$null) -ne $null
            if ($localExists) {
                & git merge-base --is-ancestor $localRef $remoteRef
                if ($LASTEXITCODE -eq 0) {
                    git update-ref $localRef $remoteRef
                } else {
                    Write-Host "::warning:: local $branch has commits not on origin; not fast-forwarding"
                }
            }
        }
        @{ ok = $true } | ConvertTo-Json -Compress
    routes:
      - to: user_acceptance

  # ── User acceptance gate ──────────────────────────────────────────────
  #
  # Optional human gate for user acceptance of the completed MG before
  # MG PR submission.
  #
  # Invariants:
  #   Pre:  scope_reviewer.output.verdict == 'approved'.
  #   Post: User has accepted (proceed to MG PR), requested changes (loop), or aborted.
  - name: user_acceptance
    type: human_gate
    prompt: |
      ## ✅ MG `{{ workflow.input.mg_path }}` — Ready for MG PR

      All tasks in MG `{{ workflow.input.mg_path }}` for work item
      **{{ workflow.input.work_item_id }}** have been implemented, reviewed,
      and merged into the MG branch.

      ### Tasks completed: {{ workflow.input.work_item_ids | length }}

      {% for task_id in workflow.input.work_item_ids %}
      - `AB#{{ task_id }}`
      {% endfor %}

      ### Reviewer Summary

      {% if scope_reviewer is defined %}{{ scope_reviewer.output.feedback }}{% elif scope_auto_approve is defined %}{{ scope_auto_approve.output.feedback }}{% else %}(No reviewer feedback available){% endif %}

      ### Inspect the MG branch

      > Refs were freshly fetched from origin immediately upstream;
      > compare against `origin/...` refs to avoid stale-cache false
      > positives. (See AB#3157.)

      ```
      git log --oneline origin/{{ workflow.input.feature_branch }}..origin/mg/{{ workflow.input.root_id }}_{{ workflow.input.mg_path }}
      git diff origin/{{ workflow.input.feature_branch }}...origin/mg/{{ workflow.input.root_id }}_{{ workflow.input.mg_path }} --stat
      git diff origin/{{ workflow.input.feature_branch }}...origin/mg/{{ workflow.input.root_id }}_{{ workflow.input.mg_path }}
      ```

      ---

      Choose an action:
      - **Accept** — proceed to open and merge the MG PR
      - **Request Changes** — send back for additional work
      - **Abort** — cancel this MG
    options:
      - label: "✅ Accept"
        value: accepted
        route: pr_platform_router
      - label: "🔄 Request Changes"
        value: changes
        # AB#3217: route through clear_apex_impl_marker so the
        # impl-merged-in-mg marker doesn't suppress the next
        # primary_router poll for the apex root case.
        route: clear_apex_impl_marker
      - label: "🛑 Abort"
        value: abort
        route: terminal_abort_run

  # ── PR platform router ────────────────────────────────────────────────
  #
  # Routes to the platform-specific MG-PR lifecycle leg based on the
  # platform input (github | ado). Same shape as feature-pr.yaml's
  # pr_platform_router.
  #
  # The script ALSO computes `ado_inputs_ready` so the workflow can fail
  # early and clearly when platform=ado but the connection inputs
  # (organization, project, repository) were not threaded — without
  # invoking an ADO verb that would just return `error_code:
  # invalid_argument`. The router emits:
  #   { platform: 'github'|'ado', ado_inputs_ready: bool, missing: '<csv>' }
  # so route conditions can branch on the ready flag and the failure
  # gate can reference the missing field list per M3.
  #
  # Invariants:
  #   Pre:  User accepted the MG; platform is 'github' or 'ado'.
  #   Post: Routes to mg_pr_open (github), mg_pr_open_ado (ado +
  #         inputs ready), or mg_pr_inputs_missing_gate (ado + missing).
  - name: pr_platform_router
    type: script
    description: Route to platform-specific MG-PR lifecycle based on platform + ADO connection inputs
    command: pwsh
    args:
      - "-NoProfile"
      - "-Command"
      - >-
        $platform = '{{ workflow.input.platform }}';
        $org = '{{ workflow.input.organization }}';
        $proj = '{{ workflow.input.project }}';
        $repo = '{{ workflow.input.repository }}';
        $missing = @();
        if ([string]::IsNullOrWhiteSpace($org)) { $missing += 'organization' };
        if ([string]::IsNullOrWhiteSpace($proj)) { $missing += 'project' };
        if ([string]::IsNullOrWhiteSpace($repo)) { $missing += 'repository' };
        $ready = ($missing.Count -eq 0);
        @{ platform = $platform; ado_inputs_ready = $ready; missing = ($missing -join ',') } | ConvertTo-Json -Compress
    routes:
      - to: mg_pr_open
        when: "{{ pr_platform_router.output.platform == 'github' }}"
      - to: mg_pr_open_ado
        when: "{{ pr_platform_router.output.platform == 'ado' and pr_platform_router.output.ado_inputs_ready == true }}"
      - to: mg_pr_inputs_missing_gate
        when: "{{ pr_platform_router.output.platform == 'ado' and pr_platform_router.output.ado_inputs_ready == false }}"
      # Catch-all per M4: unknown platform value fails safely to $end
      # rather than raising `No matching route found` mid-MG.
      - to: $end

  # ── MG PR open ────────────────────────────────────────────────────────
  #
  # GitHub leg of the platform router. Opens (or reuses) the MG PR via
  # `polyphony pr open-mg-pr`. Head is the MG branch; base is the parent
  # (enclosing MG branch when nested, feature branch when top-level).
  # Idempotent — reuses an existing open PR for the same head/base pair.
  #
  # Invariants:
  #   Pre:  Platform == 'github'; user accepted the MG.
  #   Post: MG PR exists; output.pr_number and output.pr_url set.
  - name: mg_pr_open
    type: script
    description: Open (or reuse) the MG PR targeting the parent branch
    command: polyphony
    args:
      - "pr"
      - "open-mg-pr"
      - "--root-id"
      - "{{ workflow.input.root_id }}"
      - "--mg-path"
      - "{{ workflow.input.mg_path }}"
    routes:
      - to: mg_pr_merge

  # ── MG PR merge ───────────────────────────────────────────────────────
  #
  # Merges the MG PR via merge-commit (hard-coded by the verb per ADR
  # `docs/decisions/branch-model.md` — nested merge groups depend on git
  # ancestry; squash and rebase would break the chain). Head branch is
  # NOT deleted (sibling MGs may still depend on it).
  #
  # Idempotent — recognises an already merged PR.
  #
  # Invariants:
  #   Pre:  MG PR is open.
  #   Post: MG PR is merged into the parent branch.
  - name: mg_pr_merge
    type: script
    description: Merge the MG PR via merge-commit (per the ADR)
    command: polyphony
    args:
      - "pr"
      - "merge-mg-pr"
      - "--root-id"
      - "{{ workflow.input.root_id }}"
      - "--mg-path"
      - "{{ workflow.input.mg_path }}"
    routes:
      - to: scope_closer

  # ── ADO MG-PR open ────────────────────────────────────────────────────
  #
  # ADO leg of the platform router. Opens (or reuses) the MG PR in
  # Azure DevOps via `polyphony pr open-mg-ado`. Head is the MG branch;
  # base is the parent (enclosing MG branch when nested, feature branch
  # when top-level). Idempotent — reuses an existing OPEN PR for the
  # same head/base pair.
  #
  # Routing-style verb: always exits 0; success/failure determined by
  # `output.error_code`. On any error_code, route to mg_pr_failed_gate_ado
  # so the operator can inspect and retry (open is idempotent) or abort.
  #
  # Invariants:
  #   Pre:  Platform == 'ado'; ado_inputs_ready == true; user accepted the MG.
  #   Post: ADO MG PR exists; output.pr_number and output.pr_url set.
  - name: mg_pr_open_ado
    type: script
    description: Open (or reuse) the ADO MG PR targeting the parent branch
    command: polyphony
    args:
      - "pr"
      - "open-mg-ado"
      - "--organization"
      - "{{ workflow.input.organization }}"
      - "--project"
      - "{{ workflow.input.project }}"
      - "--repository"
      - "{{ workflow.input.repository }}"
      - "--root-id"
      - "{{ workflow.input.root_id }}"
      - "--mg-path"
      - "{{ workflow.input.mg_path }}"
    routes:
      - to: mg_pr_failed_gate_ado
        when: "{{ mg_pr_open_ado.output.error_code is defined and mg_pr_open_ado.output.error_code != '' }}"
      - to: mg_pr_merge_ado
        when: "{{ mg_pr_open_ado.output.error_code is not defined or mg_pr_open_ado.output.error_code == '' }}"
      # Catch-all per M4: missing/malformed error_code -> failed gate.
      - to: mg_pr_failed_gate_ado

  # ── ADO MG-PR merge ───────────────────────────────────────────────────
  #
  # Merges the ADO MG PR via merge-commit (hardcoded by the verb to
  # `noFastForward` per ADR `docs/decisions/branch-model.md` — nested
  # merge groups depend on git ancestry; squash and rebase would break
  # the chain). The head branch is never deleted; sibling MGs may still
  # be in flight (`completionOptions.deleteSourceBranch` is pinned to
  # false in `AdoCompletionOptions`).
  #
  # Idempotent — recognises an already-merged PR via `already_merged`.
  #
  # Routing-style verb: always exits 0; success determined by
  # `merged == true` (covers both fresh merges and already-merged
  # idempotent re-runs). Any non-empty error_code routes to the failed
  # gate.
  #
  # Invariants:
  #   Pre:  ADO MG PR is open.
  #   Post: ADO MG PR is merged into the parent branch.
  - name: mg_pr_merge_ado
    type: script
    description: Merge the ADO MG PR via merge-commit (per the ADR)
    command: polyphony
    args:
      - "pr"
      - "merge-mg-ado"
      - "--organization"
      - "{{ workflow.input.organization }}"
      - "--project"
      - "{{ workflow.input.project }}"
      - "--repository"
      - "{{ workflow.input.repository }}"
      - "--root-id"
      - "{{ workflow.input.root_id }}"
      - "--mg-path"
      - "{{ workflow.input.mg_path }}"
    routes:
      - to: mg_pr_failed_gate_ado
        when: "{{ mg_pr_merge_ado.output.error_code is defined and mg_pr_merge_ado.output.error_code != '' }}"
      - to: scope_closer
        when: "{{ mg_pr_merge_ado.output.merged == true }}"
      # Catch-all per M4: not merged + no error_code -> failed gate
      # so the operator can decide rather than silently advancing.
      - to: mg_pr_failed_gate_ado

  # ── ADO connection-inputs missing gate ────────────────────────────────
  #
  # Fires when platform=ado but one or more of organization, project,
  # repository was blank. Surfaces a clear remediation path (re-invoke
  # the workflow with the missing inputs) without burning an ADO API
  # call that would just return `invalid_argument`.
  #
  # Per M3, only this gate's prompt references
  # `pr_platform_router.output.missing` — the router IS defined when we
  # reach this gate (route precondition).
  #
  # Invariants:
  #   Pre:  platform == 'ado' AND ado_inputs_ready == false.
  #   Post: Operator has been informed; workflow exits without invoking
  #         any ADO verb.
  - name: mg_pr_inputs_missing_gate
    type: human_gate
    description: ADO connection inputs are missing — workflow cannot proceed
    prompt: |
      ## ADO connection inputs missing

      `platform=ado` was selected but the following required inputs are
      blank: **{{ pr_platform_router.output.missing }}**

      `polyphony pr open-mg-ado` and `pr merge-mg-ado` require all three
      of `--organization`, `--project`, and `--repository`. Re-invoke the
      workflow chain with those inputs supplied (typically threaded from
      the apex driver's inputs).

      MG branch:
      `mg/{{ workflow.input.root_id }}_{{ workflow.input.mg_path }}`
    options:
      - label: "🛑 Abort (will re-invoke with inputs)"
        value: abort
        route: terminal_abort_run

  # ── ADO MG-PR failure gate ────────────────────────────────────────────
  #
  # Fires when either `mg_pr_open_ado` or `mg_pr_merge_ado` returned a
  # non-empty error_code (or the merge verb returned merged=false).
  # Operator can:
  #
  # - **Retry** — route back to `mg_pr_open_ado`. Open is idempotent
  #   (reuses existing OPEN PR); merge is idempotent (recognises
  #   already-merged). Safe regardless of which verb failed.
  # - **Abort** — exit without running scope_closer. Items remain in
  #   their pre-merge states.
  #
  # Per M3 (StrictUndefined), every reference to a verb's output is
  # guarded with `is defined` because at most one of the two verbs has
  # actually run when this gate fires.
  #
  # Invariants:
  #   Pre:  At least one of mg_pr_open_ado / mg_pr_merge_ado has been
  #         invoked and returned an error or did not merge.
  #   Post: Operator has retried (route to mg_pr_open_ado) or aborted ($end).
  - name: mg_pr_failed_gate_ado
    type: human_gate
    description: ADO MG PR open/merge failed — operator decides retry or abort
    prompt: |
      ## ADO MG-PR lifecycle failed

      MG: `mg/{{ workflow.input.root_id }}_{{ workflow.input.mg_path }}`

      {% if mg_pr_merge_ado is defined and mg_pr_merge_ado.output.error_code is defined and mg_pr_merge_ado.output.error_code != '' -%}
      **Stage:** merge
      **Error code:** `{{ mg_pr_merge_ado.output.error_code }}`
      **Detail:** {{ mg_pr_merge_ado.output.error | default('(no detail)') }}
      {%- elif mg_pr_merge_ado is defined and mg_pr_merge_ado.output.merged == false -%}
      **Stage:** merge
      **Error code:** `merge_returned_false`
      **Detail:** Merge verb returned merged=false with no error_code; PR may still be open or in an unexpected state.
      {%- elif mg_pr_open_ado is defined and mg_pr_open_ado.output.error_code is defined and mg_pr_open_ado.output.error_code != '' -%}
      **Stage:** open
      **Error code:** `{{ mg_pr_open_ado.output.error_code }}`
      **Detail:** {{ mg_pr_open_ado.output.error | default('(no detail)') }}
      {%- else -%}
      **Stage:** unknown
      **Detail:** Routed to failure gate without an explicit error_code.
      {%- endif %}

      **Retry** is safe: `pr open-mg-ado` reuses an existing OPEN PR for
      the same head/base, and `pr merge-mg-ado` recognises an
      already-merged PR. The retry route re-enters at `mg_pr_open_ado`.

      **Abort** exits without invoking `scope_closer` — items remain in
      their pre-merge states.
    options:
      - label: "🔄 Retry (re-enter open → merge)"
        value: retry
        route: mg_pr_open_ado
      - label: "🛑 Abort"
        value: abort
        route: terminal_abort_run

  # ── Scope closer ──────────────────────────────────────────────────────
  #
  # After the MG PR merges, transitions completed items in this MG to
  # their template's done state in ADO. (Most are already Done from
  # primary_completer; this step covers any that weren't and provides a
  # consistent end-of-MG boundary.) Uses `polyphony branch close-scope`
  # which validates each item before transitioning.
  #
  # Transitional bridge: uses `--pg-number N`. A follow-up PR will add
  # `--mg-path PATH` matching.
  #
  # Invariants:
  #   Pre:  MG PR merged.
  #   Post: All MG items reflect their terminal state in ADO.
  - name: scope_closer
    type: script
    description: Transition completed MG items to Done in ADO after MG PR merge
    command: polyphony
    args:
      - "branch"
      - "close-scope"
      - "--work-item"
      - "{{ workflow.input.work_item_id }}"
      - "--pg-number"
      - "{{ workflow.input.pg_number }}"
    routes:
      - to: $end

  # ── Terminal abort (operator chose Abort on an error gate) ────────────
  #
  # Identical to plan-level.yaml's terminal_abort_run. Invokes
  # abort-run.ps1, which POSTs to conductor's /api/stop endpoint. The
  # engine raises InterruptError at every nested between-agent check,
  # unwinding the entire run cleanly (no process-kill, no zombies).
  - name: terminal_abort_run
    type: script
    description: Operator-initiated full-run abort — POSTs /api/stop to halt the run cleanly
    command: pwsh
    args:
      - "-NoProfile"
      - "-File"
      - "{{ workflow.dir }}/../scripts/abort-run.ps1"
      - "-Reason"
      - "operator-abort"
      - "-Stage"
      - "implement-merge-group"
    routes:
      - to: $end
