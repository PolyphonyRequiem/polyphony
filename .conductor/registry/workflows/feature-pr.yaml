# feature-pr — Feature PR creation, review, and remediation cycle.
#
# Creates a feature PR (all PGs merged → feature branch → target branch),
# delegates to the platform-specific PR sub-workflow (github-pr.yaml or
# ado-pr.yaml) for review/fix/merge, and handles remediation cycles when
# the sub-workflow cannot resolve issues (merged=false).
#
# Remediation cycle: merged=false → remediation_planner → remediation_seeder
# → implement-merge-group (remediation MG) → feature_pr_updater (re-request review)
# → pr_platform_router (re-review). Capped at 3 cycles;
# after that, a human gate fires for escalation.
#
# Both platform legs are full-lifecycle as of v1.2.0 (Phase 5 closeout):
# GitHub remediation uses `gh` to read PR review feedback and re-request
# review; ADO remediation uses the work-item ancestry + the platform-poll
# state from `pr poll-status-ado` to plan the addendum, and posts the
# re-review comment via `polyphony pr post-comment-ado` (PR #122). The
# remediation cycle is platform-aware via Jinja branching on
# `workflow.input.platform`. See `docs/decisions/ado-feature-pr-parity.md`.
#
# Invariants:
#   Pre:  All PGs are merged into the feature branch; feature branch is ready
#         for a PR to the target branch.
#   Post: Feature PR is merged (merged=true) or aborted (merged=false).

workflow:
  name: feature-pr
  description: >-
    Feature PR lifecycle. Routes to a platform-specific creator
    (feature_pr_creator_github | feature_pr_creator_ado) and lifecycle
    sub-workflow (github-pr.yaml | ado-pr.yaml) based on the platform
    input. Runs remediation cycles (capped at 3) when the sub-workflow
    fails to merge. After each remediation, re-requests review via
    feature_pr_updater (gh on GitHub, `pr post-comment-ado` on ADO).
    Escalates to human gate after cap is exceeded.
  version: "2.4.8"
  entry_point: integrate_target_drift
  metadata:
    min_polyphony_version: "2.4.8"

  limits:
    max_iterations: 200

  input:
    work_item_id:
      type: number
      required: true
      description: ADO work item ID of the root (top-level) item (type is runtime-injected; do not hardcode type names)
    feature_branch:
      type: string
      required: true
      description: Feature branch containing all merged PG work
    target_branch:
      type: string
      required: true
      description: Target branch the feature PR merges into (e.g., main)
    platform:
      type: string
      required: false
      default: ado
      description: "PR platform: 'ado' (default — matches the work item source) or 'github' (for repos hosted on GitHub)"
    organization:
      type: string
      required: false
      default: ""
      description: >-
        ADO organization name (e.g. `contoso`). Required when
        platform=ado; ignored when platform=github. When platform=ado
        and this is blank, pr_platform_router routes to
        feature_pr_inputs_missing_gate before invoking any ADO verb.
    project:
      type: string
      required: false
      default: ""
      description: >-
        ADO project name. Required when platform=ado; ignored when
        platform=github.
    repository:
      type: string
      required: false
      default: ""
      description: >-
        ADO repository identifier — GUID or name; both accepted by
        `pr create-feature-ado` / `pr merge-feature-ado`. Required when
        platform=ado; ignored when platform=github.
    plan_path:
      type: string
      required: false
      default: ""
      description: Path to the original plan document for remediation context

tools:
  - twig
  - gh
  - filesystem

output:
  # Per M3, under StrictUndefined we must guard `is defined` because only
  # ONE of pr_lifecycle_github / pr_lifecycle_ado / remediation_abort actually
  # runs in any given execution — the others remain undefined and the
  # `default` filter does NOT lazy-evaluate its argument when the variable
  # itself is undefined (only when the looked-up attribute is undefined).
  # Per M7, pipe booleans through `| string | lower` so the parent receives
  # a real bool rather than capital "True"/"False".
  merged: >-
    {% if pr_lifecycle_github is defined %}{{ (pr_lifecycle_github.output.merged | default(false)) | string | lower }}
    {%- elif pr_lifecycle_ado is defined %}{{ (pr_lifecycle_ado.output.merged | default(false)) | string | lower }}
    {%- elif remediation_abort is defined %}{{ (remediation_abort.output.merged | default(false)) | string | lower }}
    {%- else %}false{% endif %}
  pr_url: >-
    {%- if feature_pr_creator_ado is defined -%}{{ feature_pr_creator_ado.output.pr_url | default('') }}
    {%- elif feature_pr_creator_github is defined -%}{{ feature_pr_creator_github.output.pr_url | default('') }}
    {%- else -%}{% endif -%}
  pr_number: >-
    {%- if feature_pr_creator_ado is defined -%}{{ feature_pr_creator_ado.output.pr_number | default(0) }}
    {%- elif feature_pr_creator_github is defined -%}{{ feature_pr_creator_github.output.pr_number | default(0) }}
    {%- else -%}0{% endif -%}

agents:
  # ── Drift integration ───────────────────────────────────────────────────
  #
  # AB#3238: A long-lived feature branch accumulates drift as the target
  # branch advances. Without integrating that drift before opening the
  # PR, the diff includes / removes changes that landed on the target
  # while the feature was alive — fooling LLM reviewers into flagging
  # unrelated files (compounding with AB#3236's revise_counter loop).
  #
  # This script is the entry point of feature-pr.yaml so EVERY feature
  # PR (apex→main from apex-driver, child→feature/<apex> from
  # apex-item-dispatch, GitHub or ADO) is protected.
  #
  # Strategy: `git rebase origin/<target>` on the feature branch, then
  # force-push with `--force-with-lease=<feature>:<expected-sha>`. Rebase
  # (not merge) keeps the feature PR's commit history linear and clean —
  # no extra "drift integration" merge commit pollutes the PR's Commits
  # tab; upstream changes appear as ancestor commits rather than as a
  # sibling merge. Force-with-lease (refusing if origin advanced since
  # fetch) plus the local-vs-origin divergence gate (below) make this
  # safe given polyphony's branch model (SDLC run is sole writer).
  #
  # Routing-style script — always exits 0; failures surface via
  # `error_code` and route to the conflict / failed gates.
  #
  # Invariants:
  #   Pre:  feature_branch and target_branch inputs are set; cwd is the
  #         feature-branch worktree.
  #   Post: feature_branch on origin is no commits behind origin/<target>
  #         (drift_integrated=true), OR no drift existed
  #         (drift_integrated=false, success=true), OR a conflict / error
  #         was surfaced to a gate.
  - name: integrate_target_drift
    type: script
    description: Integrate origin/<target_branch> drift into <feature_branch> before opening the feature PR (AB#3238)
    command: pwsh
    args:
      - "-NoProfile"
      - "-File"
      - "{{ workflow.dir }}/../scripts/integrate-target-drift.ps1"
      - "-FeatureBranch"
      - "{{ workflow.input.feature_branch }}"
      - "-TargetBranch"
      - "{{ workflow.input.target_branch }}"
    routes:
      - to: integrate_target_drift_conflict_gate
        when: "{{ integrate_target_drift.output.error_code == 'merge_conflict' }}"
      - to: integrate_target_drift_failed_gate
        when: "{{ integrate_target_drift.output.error_code != '' }}"
      - to: pr_platform_router

  # ── Conflict gate ───────────────────────────────────────────────────────
  #
  # `git rebase origin/<target>` hit conflicts. The script aborted the
  # rebase cleanly so the worktree is back to feature-branch HEAD. The
  # operator must resolve by hand (cd into the feature worktree, rebase
  # against origin/<target>, resolve, continue, force-push-with-lease),
  # then click Retry. The script will re-check behind_by; if 0, it falls
  # through to the PR creator without re-attempting the rebase.
  - name: integrate_target_drift_conflict_gate
    type: human_gate
    description: Drift integration hit rebase conflicts — operator resolves by hand, then retries
    prompt: |
      ## ⚠️ Drift integration: rebase conflict

      Rebasing `{{ workflow.input.feature_branch }}` onto
      `origin/{{ workflow.input.target_branch }}` hit conflicts on:

      {% if integrate_target_drift.output.conflicted_files | length > 0 -%}
      {% for f in integrate_target_drift.output.conflicted_files -%}
      - `{{ f }}`
      {% endfor %}
      {%- else -%}
      _(no conflicted-file list captured)_
      {%- endif %}

      **Behind by:** `{{ integrate_target_drift.output.behind_by }}` commit(s)

      The rebase was aborted cleanly; the feature branch is back at its
      original HEAD. Resolve by hand:

      ```
      cd <feature worktree>
      git fetch origin {{ workflow.input.target_branch }} {{ workflow.input.feature_branch }}
      git rebase origin/{{ workflow.input.target_branch }}
      # for each conflict: edit, git add <file>, git rebase --continue
      # (or `git rebase --abort` to bail out entirely)
      $expected = git rev-parse refs/remotes/origin/{{ workflow.input.feature_branch }}
      git push --force-with-lease=refs/heads/{{ workflow.input.feature_branch }}:$expected origin HEAD:refs/heads/{{ workflow.input.feature_branch }}
      ```

      Then click **Retry** — the script will re-check and skip the
      rebase if the branch is now in sync.

      Choose an action:
      - **Retry** — re-run drift integration (operator has resolved & pushed)
      - **Abort** — halt without opening the feature PR
    options:
      - label: "🔁 Retry — operator resolved & pushed"
        value: retry
        route: integrate_target_drift
      - label: "🛑 Abort"
        value: abort
        route: $end

  # ── Generic failure gate ────────────────────────────────────────────────
  #
  # Drift integration failed for a reason other than rebase conflict:
  # worktree-blocked (uncommitted changes / in-progress merge / rebase /
  # cherry-pick / revert), fetch failure, branch-mismatch / checkout
  # failure, push failure (typically: origin advanced since fetch ⇒
  # `--force-with-lease` refused), local feature branch diverged from
  # origin, or an uncaught error.
  - name: integrate_target_drift_failed_gate
    type: human_gate
    description: Drift integration failed (non-conflict) — operator decides retry or abort
    prompt: |
      ## ⚠️ Drift integration failed

      Could not integrate `origin/{{ workflow.input.target_branch }}` into
      `{{ workflow.input.feature_branch }}`.

      **Error code:** `{{ integrate_target_drift.output.error_code }}`
      **Detail:** {{ integrate_target_drift.output.error_message }}

      Common cases:
      - `worktree_dirty` — uncommitted changes or in-progress
        merge/rebase/cherry-pick/revert in the feature worktree.
        Resolve (`git status`, then commit / stash / reset / abort
        whatever's pending) and retry.
      - `fetch_failed` — network / auth / branch-doesn't-exist.
      - `branch_mismatch` — worktree isn't on the expected feature branch.
      - `feature_branch_diverged` — local and origin both have unique
        commits on `{{ workflow.input.feature_branch }}`; inspect with
        `git log origin/{{ workflow.input.feature_branch }}..HEAD` and
        `git log HEAD..origin/{{ workflow.input.feature_branch }}`.
      - `push_failed` — drift was rebased locally but the force-push was
        refused by the lease (origin advanced since our fetch).
        Re-fetch + retry.

      Choose an action:
      - **Retry** — re-run drift integration
      - **Abort** — halt without opening the feature PR
    options:
      - label: "🔁 Retry"
        value: retry
        route: integrate_target_drift
      - label: "🛑 Abort"
        value: abort
        route: $end

  # ── PR platform router ──────────────────────────────────────────────────
  #
  # Routes to the platform-specific feature-PR creator based on the
  # platform input AND, for ADO, the presence of all three connection
  # inputs (organization, project, repository).
  #
  # Mirrors the pattern in implement-merge-group.yaml's pr_platform_router (PR #118).
  # The router fires BEFORE the creator so ADO can use its own creator
  # verb (`pr create-feature-ado`) rather than the GitHub-only
  # `pr create-feature-pr`.
  #
  # Emits `{ platform, ado_inputs_ready: bool, missing: '<csv>' }` so the
  # inputs-missing gate's prompt can reference the missing field list per M3.
  #
  # Invariants:
  #   Pre:  platform input is 'github' or 'ado'.
  #   Post: Routes to feature_pr_creator_github (github),
  #         feature_pr_creator_ado (ado + inputs ready), or
  #         feature_pr_inputs_missing_gate (ado + missing).
  - name: pr_platform_router
    type: script
    description: Route to platform-specific feature-PR creator based on platform + ADO connection inputs
    command: pwsh
    args:
      - "-NoProfile"
      - "-Command"
      - >-
        $platform = '{{ workflow.input.platform }}';
        $org = '{{ workflow.input.organization }}';
        $proj = '{{ workflow.input.project }}';
        $repo = '{{ workflow.input.repository }}';
        $missing = @();
        if ([string]::IsNullOrWhiteSpace($org)) { $missing += 'organization' };
        if ([string]::IsNullOrWhiteSpace($proj)) { $missing += 'project' };
        if ([string]::IsNullOrWhiteSpace($repo)) { $missing += 'repository' };
        $ready = ($missing.Count -eq 0);
        @{ platform = $platform; ado_inputs_ready = $ready; missing = ($missing -join ',') } | ConvertTo-Json -Compress
    routes:
      - to: feature_pr_creator_github
        when: "{{ pr_platform_router.output.platform == 'github' }}"
      - to: feature_pr_creator_ado
        when: "{{ pr_platform_router.output.platform == 'ado' and pr_platform_router.output.ado_inputs_ready == true }}"
      - to: feature_pr_inputs_missing_gate
        when: "{{ pr_platform_router.output.platform == 'ado' and pr_platform_router.output.ado_inputs_ready == false }}"
      # Catch-all per M4: unknown platform value fails safely to $end
      # rather than raising `No matching route found` mid-run.
      - to: $end

  # ── Feature PR creator (GitHub) ─────────────────────────────────────────
  #
  # GitHub leg. Creates the feature PR from the feature branch to the
  # target branch via `polyphony pr create-feature-pr`. If an open PR
  # already exists for the same head/base pair, reuses it (idempotent).
  #
  # Invariants:
  #   Pre:  Platform == 'github'; feature branch exists with all PG work merged.
  #   Post: GitHub feature PR exists; output.pr_number and output.pr_url set.
  - name: feature_pr_creator_github
    type: script
    description: Create (or reuse) GitHub feature PR via `pr create-feature-pr`
    command: polyphony
    args:
      - "pr"
      - "create-feature-pr"
      - "--work-item"
      - "{{ workflow.input.work_item_id }}"
      - "--feature-branch"
      - "{{ workflow.input.feature_branch }}"
      - "--target-branch"
      - "{{ workflow.input.target_branch }}"
    routes:
      - to: pr_lifecycle_github

  # ── Feature PR creator (ADO) ────────────────────────────────────────────
  #
  # ADO leg. Creates the feature PR via `polyphony pr create-feature-ado`.
  # Reuses an existing OPEN PR for the same head/base pair (idempotent).
  #
  # Routing-style verb: always exits 0; success/failure determined by
  # `output.error_code`. On any error_code, route to
  # feature_pr_creator_failed_gate_ado so the operator can inspect and
  # retry (create is idempotent) or abort.
  #
  # Invariants:
  #   Pre:  Platform == 'ado'; ado_inputs_ready == true; feature branch
  #         exists on the remote.
  #   Post: ADO feature PR exists; output.pr_number and output.pr_url set.
  - name: feature_pr_creator_ado
    type: script
    description: Create (or reuse) ADO feature PR via `pr create-feature-ado`
    command: polyphony
    args:
      - "pr"
      - "create-feature-ado"
      - "--organization"
      - "{{ workflow.input.organization }}"
      - "--project"
      - "{{ workflow.input.project }}"
      - "--repository"
      - "{{ workflow.input.repository }}"
      - "--root-id"
      - "{{ workflow.input.work_item_id }}"
      - "--target-branch"
      - "{{ workflow.input.target_branch }}"
    routes:
      - to: feature_pr_creator_failed_gate_ado
        when: "{{ feature_pr_creator_ado.output.error_code is defined and feature_pr_creator_ado.output.error_code != '' }}"
      - to: pr_lifecycle_ado
        when: "{{ feature_pr_creator_ado.output.error_code is not defined or feature_pr_creator_ado.output.error_code == '' }}"
      # Catch-all per M4: missing/malformed error_code -> failed gate.
      - to: feature_pr_creator_failed_gate_ado

  # ── ADO connection-inputs missing gate ─────────────────────────────────
  #
  # Fires when platform=ado but one or more of organization, project,
  # repository was blank. Surfaces a clear remediation path (re-invoke
  # the workflow with the missing inputs) without burning an ADO API
  # call that would just return invalid_argument.
  #
  # Per M3, only this gate's prompt references
  # `pr_platform_router.output.missing` — the router IS defined when we
  # reach this gate (route precondition).
  #
  # Invariants:
  #   Pre:  platform == 'ado' AND ado_inputs_ready == false.
  #   Post: Operator informed; workflow exits without invoking any ADO verb.
  - name: feature_pr_inputs_missing_gate
    type: human_gate
    description: ADO connection inputs are missing — workflow cannot proceed
    prompt: |
      ## ADO connection inputs missing

      `platform=ado` was selected but the following required inputs are
      blank: **{{ pr_platform_router.output.missing }}**

      `polyphony pr create-feature-ado` and `pr merge-feature-ado` require
      all three of `--organization`, `--project`, and `--repository`.
      Re-invoke the workflow chain with those inputs supplied (typically
      threaded from the apex driver's inputs).

      Feature branch:
      `{{ workflow.input.feature_branch }}`
    options:
      - label: "🛑 Abort (will re-invoke with inputs)"
        value: abort
        route: terminal_abort_run

  # ── ADO feature-PR creator failure gate ────────────────────────────────
  #
  # Fires when `feature_pr_creator_ado` returned a non-empty error_code.
  # Operator can:
  # - **Retry** — route back to `feature_pr_creator_ado`. Create is
  #   idempotent (reuses existing OPEN PR for same head/base).
  # - **Abort** — exit without running the lifecycle. No PR exists (or
  #   the existing one was not surfaced).
  #
  # Per M3 (StrictUndefined), references to the creator's output are
  # guarded with `is defined`.
  #
  # Invariants:
  #   Pre:  feature_pr_creator_ado has been invoked and returned an error.
  #   Post: Operator has retried (route to feature_pr_creator_ado) or aborted ($end).
  - name: feature_pr_creator_failed_gate_ado
    type: human_gate
    description: ADO feature-PR creation failed — operator decides retry or abort
    prompt: |
      ## ADO feature-PR creation failed

      Feature branch: `{{ workflow.input.feature_branch }}` →
      `{{ workflow.input.target_branch }}`

      {% if feature_pr_creator_ado is defined and feature_pr_creator_ado.output.error_code is defined and feature_pr_creator_ado.output.error_code != '' -%}
      **Error code:** `{{ feature_pr_creator_ado.output.error_code }}`
      **Detail:** {{ feature_pr_creator_ado.output.error | default('(no detail)') }}
      {%- else -%}
      **Detail:** Routed to gate without an explicit error code.
      {%- endif %}

      **Retry** is safe: `pr create-feature-ado` reuses an existing OPEN
      PR for the same head/base.

      **Abort** exits without invoking the lifecycle — no PR will be
      surfaced for review.
    options:
      - label: "🔄 Retry"
        value: retry
        route: feature_pr_creator_ado
      - label: "🛑 Abort"
        value: abort
        route: terminal_abort_run

  # ── GitHub PR lifecycle sub-workflow ─────────────────────────────────────
  #
  # Invokes github-pr.yaml for the full GitHub PR lifecycle (review, fix,
  # merge). Passes the feature PR details. On merged=true routes to $end;
  # on merged=false routes to remediation cycle.
  #
  # Invariants:
  #   Pre:  pr_platform_router.output.platform == 'github'; feature PR exists.
  #   Post: PR is reviewed, fixed (if needed), and merged — or remediation
  #         cycle begins.
  - name: pr_lifecycle_github
    type: workflow
    description: GitHub PR lifecycle — review, fix loop, merge
    workflow: ./github-pr.yaml
    input_mapping:
      pr_number: "{{ feature_pr_creator_github.output.pr_number }}"
      branch_name: "{{ workflow.input.feature_branch }}"
      target_branch: "{{ workflow.input.target_branch }}"
      review_policy: "auto"
      work_item_id: "{{ workflow.input.work_item_id }}"
    routes:
      - to: $end
        when: "{{ pr_lifecycle_github.output.merged == true }}"
      - to: pr_remediation_policy
        when: "{{ pr_lifecycle_github.output.merged == false }}"
      # Catch-all: undefined/missing 'merged' -> remediation cycle
      # (treats ambiguous outcomes as 'not merged') per M4.
      - to: pr_remediation_policy

  # ── ADO PR lifecycle sub-workflow ────────────────────────────────────────
  #
  # Invokes ado-pr.yaml for the ADO PR lifecycle (poll → merge with
  # human gates for non-approved states, plus the stuck-review escalation
  # added in PR #148). Threads ADO connection inputs plus pr_number from
  # feature_pr_creator_ado.
  #
  # On merged=false (operator chose "Trigger remediation" at one of the
  # ado-pr.yaml gates, or any other non-merge terminal), routes to
  # remediation_counter — same chain as the GitHub leg. The remediation
  # planner / updater branch on workflow.input.platform internally so the
  # cycle works on both platforms (Phase 5 closeout — see
  # `docs/decisions/ado-feature-pr-parity.md`).
  #
  # Invariants:
  #   Pre:  pr_platform_router.output.platform == 'ado'; ADO PR exists.
  #   Post: PR is merged (natively in ADO) — or remediation cycle begins.
  - name: pr_lifecycle_ado
    type: workflow
    description: ADO PR lifecycle — poll, human gates, merge
    workflow: ./ado-pr.yaml
    input_mapping:
      pr_number: "{{ feature_pr_creator_ado.output.pr_number }}"
      branch_name: "{{ workflow.input.feature_branch }}"
      target_branch: "{{ workflow.input.target_branch }}"
      review_policy: "manual"
      # work_item_id is declared required by ado-pr.yaml — drives the
      # guidance_loader's `polyphony plan load-agent-guidance --work-item`
      # call and is part of the composite counter keys (pending-poll,
      # revise). Omitting it crashed guidance_loader with a Jinja
      # 'work_item_id' undefined error against an empty workflow.input
      # in ado-pr.yaml. Mirror what pr_lifecycle_github does above.
      work_item_id: "{{ workflow.input.work_item_id }}"
      organization: "{{ workflow.input.organization }}"
      project: "{{ workflow.input.project }}"
      repository: "{{ workflow.input.repository }}"
      root_id: "{{ workflow.input.work_item_id }}"
    routes:
      - to: $end
        when: "{{ pr_lifecycle_ado.output.merged == true }}"
      - to: pr_remediation_policy
        when: "{{ pr_lifecycle_ado.output.merged == false }}"
      # Catch-all per M4: undefined/missing 'merged' -> remediation cycle
      # (treats ambiguous outcomes as 'not merged') so the operator gets
      # a remediation gate path rather than silent termination.
      - to: pr_remediation_policy

  # ── PR remediation policy resolver (AB#3181 partial wiring) ────────────
  #
  # Resolves the `pr` policy domain so remediation_counter can drive its
  # cap from policy.pr.max_remediation_cycles instead of a hardcoded
  # literal. Pre-AB#3181 this domain was dead at workflow runtime.
  #
  # Scoped to `default` because feature-pr.yaml runs once per work item
  # and isn't tied to a single child task type. The cap is feature-PR-wide.
  #
  # Currently consumed: max_remediation_cycles only. The mode (auto/warning/
  # manual) and max_fix_loops fields remain unwired; tracked as follow-up
  # under AB#3181.
  - name: pr_remediation_policy
    type: script
    description: Resolve PR policy for remediation cap (AB#3181)
    command: polyphony
    args:
      - "policy"
      - "resolve"
      - "--domain"
      - "pr"
      - "--scope"
      - "default"
    routes:
      - to: remediation_counter

  # ── Remediation cycle counter ───────────────────────────────────────────
  #
  # Tracks the number of remediation cycles (review → plan → implement →
  # re-review). Uses a counter file scoped to the work item ID. Increments
  # after each cycle. Enforces the cap from policy.pr.max_remediation_cycles
  # (AB#3181 wiring via pr_remediation_policy above; falls back to 3 if
  # the policy returned no value, preserving pre-AB#3181 behavior). Routes
  # to remediation_cap_gate if cap is reached AND review returned
  # changes_requested, or to remediation_guidance_loader if under the cap.
  #
  # Invariants:
  #   Pre:  PR sub-workflow returned merged=false.
  #   Post: output.iteration is the current count (1-based);
  #         output.under_limit indicates whether remediation may continue.
  - name: remediation_counter
    type: script
    description: Track remediation cycle count (cap from policy.pr.max_remediation_cycles)
    command: pwsh
    args:
      - "-NoProfile"
      - "-Command"
      - |
        $counterFile = Join-Path ([System.IO.Path]::GetTempPath()) "conductor-remediation-count-{{ workflow.input.work_item_id }}"
        if (Test-Path $counterFile) {
            $count = [int](Get-Content $counterFile -Raw) + 1
        } else {
            $count = 1
        }
        Set-Content $counterFile $count
        $policyMax = '{{ pr_remediation_policy.output.max_remediation_cycles }}'
        if ([string]::IsNullOrWhiteSpace($policyMax) -or $policyMax -eq 'None' -or $policyMax -eq '0') {
            $maxCycles = 3
        } else {
            $maxCycles = [int]$policyMax
        }
        @{ iteration = $count; max_cycles = $maxCycles; under_limit = ($count -lt $maxCycles) } | ConvertTo-Json
    routes:
      - to: remediation_guidance_loader
        when: "{{ remediation_counter.output.under_limit == true }}"
      - to: remediation_cap_gate_policy_router
        when: "{{ remediation_counter.output.under_limit == false }}"
      # Catch-all: defensive against missing/malformed under_limit.
      - to: remediation_cap_gate_policy_router

  # ── Remediation cap gate policy router (AB#3186) ────────────────────────
  #
  # Reads `policy.unattended.cap_mode` via the shared resolver. Three
  # modes:
  #   • `manual` (default) → fall through to remediation_cap_gate
  #   • `auto_proceed`     → remediation_guidance_loader (continue the
  #                          remediation cycle past the cap; same as the
  #                          operator picking "Continue Anyway". The
  #                          counter does NOT reset, so the cap is
  #                          re-evaluated next cycle and re-fires —
  #                          auto_proceed effectively turns
  #                          max_remediation_cycles into "advisory".)
  #   • `auto_fail`        → terminal_cap_auto_fail (NOT remediation_abort
  #                          which encodes operator intent in its reason
  #                          field — honest about who decided to halt)
  #
  # Helper degrades to `cap_mode = 'manual'` on policy / CLI failure.
  # See `.conductor/registry/scripts/resolve-unattended-cap-mode.ps1`.
  - name: remediation_cap_gate_policy_router
    type: script
    description: Resolve policy.unattended.cap_mode for remediation_cap_gate (AB#3186)
    command: pwsh
    args:
      - "-NoProfile"
      - "-File"
      - "{{ workflow.dir }}/../scripts/resolve-unattended-cap-mode.ps1"
    routes:
      - to: remediation_guidance_loader
        when: "{{ remediation_cap_gate_policy_router.output.cap_mode == 'auto_proceed' }}"
      - to: terminal_cap_auto_fail
        when: "{{ remediation_cap_gate_policy_router.output.cap_mode == 'auto_fail' }}"
      # Default + 'manual' + any unknown → surface the human gate.
      - to: remediation_cap_gate

  # ── Remediation cap gate ────────────────────────────────────────────────
  #
  # Human decision point when the remediation cycle has reached the maximum
  # cap (3 cycles). Fires when remediation_count >= 3 AND PR sub-workflow
  # returned merged=false. Offers two options:
  #   Continue — bypass the cap for this cycle only (counter does NOT reset)
  #   Abort    — leave the feature PR open for manual resolution
  #
  # Invariants:
  #   Pre:  remediation_counter.output.iteration >= 3;
  #         PR sub-workflow returned merged=false.
  #   Post: Human has chosen to continue (bypass) or abort.
  - name: remediation_cap_gate
    type: human_gate
    prompt: |
      ## ⚠️ Remediation Cycle Cap Reached — Work Item #{{ workflow.input.work_item_id }}

      The remediation cycle for the feature PR has reached the maximum of
      **3 cycles** without achieving approval.

      ### Feature PR Details

      | Field | Value |
      |-------|-------|
      | Work Item | `{{ workflow.input.work_item_id }}` |
      | Platform | `{{ workflow.input.platform }}` |
      | PR Number | `{% if feature_pr_creator_ado is defined %}{{ feature_pr_creator_ado.output.pr_number }}{% elif feature_pr_creator_github is defined %}{{ feature_pr_creator_github.output.pr_number }}{% else %}(unknown){% endif %}` |
      | Feature Branch | `{{ workflow.input.feature_branch }}` |
      | Target Branch | `{{ workflow.input.target_branch }}` |
      | Remediation Cycles | {{ remediation_counter.output.iteration }} |

      ---

      The platform PR sub-workflow was unable to merge the feature PR after
      **{{ remediation_counter.output.iteration }}** remediation cycles.
      Review the PR comments on GitHub/ADO for details on unresolved issues.

      {% if remediation_cap_gate_policy_router is defined and remediation_cap_gate_policy_router.output.source == 'error' %}
      > ⚠️ Policy resolution for `unattended.cap_mode` failed; surfacing this
      > gate as a manual fallback. Details:
      > `{{ remediation_cap_gate_policy_router.output.policy_error }}`
      {% endif %}

      Choose an action:
      - **Continue** — override the cap for this cycle only and attempt another
        remediation round (counter does not reset)
      - **Abort** — leave the feature PR open for manual resolution and end
        the workflow
    options:
      - label: "🔄 Continue Anyway"
        value: continue
        route: remediation_guidance_loader
      - label: "🛑 Abort"
        value: abort
        route: remediation_abort

  # ── Remediation abort ───────────────────────────────────────────────────
  #
  # Terminal node when the human chooses to abort after the remediation cap.
  # Emits merged=false so downstream consumers know the feature PR was NOT
  # merged and remains open for manual resolution.
  #
  # Invariants:
  #   Pre:  Human chose 'abort' at remediation_cap_gate.
  #   Post: output.merged is false; workflow ends.
  - name: remediation_abort
    type: script
    description: Emit merged=false when remediation is aborted
    command: pwsh
    args:
      - "-NoProfile"
      - "-Command"
      - |
        @{
          merged = $false
          pr_url = ''
          reason = 'Remediation cycle cap exceeded — aborted by human decision'
          remediation_count = {{ remediation_counter.output.iteration }}
        } | ConvertTo-Json
    routes:
      - to: $end

  # ── Remediation planner ─────────────────────────────────────────────────
  #
  # Creates an addendum plan based on the review feedback. Reads PR review
  # context from the platform and the original plan to produce a targeted
  # remediation plan that addresses only the requested changes.
  #
  # Platform-aware (Phase 5 closeout):
  #   - github: uses `gh pr view` and `gh api .../reviews` to fetch the
  #     full review body and inline comment text.
  #   - ado: uses `polyphony pr poll-status-ado` (via filesystem reading
  #     of its own preceding logs is NOT relied on — the agent calls the
  #     verb-shaped output directly via the `polyphony` tool through a
  #     bash invocation if needed). No verb returns thread/comment text
  #     yet; the agent generates the addendum from reviewer identity +
  #     vote + the original plan + operator-supplied context. A follow-up
  #     `pr get-comments-ado` verb is tracked in
  #     `docs/decisions/ado-feature-pr-parity.md`.
  #
  # Invariants:
  #   Pre:  PR sub-workflow returned merged=false;
  #         remediation_counter.output.under_limit == true OR human chose
  #         'continue' at remediation_cap_gate.
  #   Post: output.addendum_plan_path is set; output.work_items describes
  #         the work needed.
  - name: remediation_guidance_loader
    type: script
    description: Load agent guidance for the apex (drives remediation_planner's architect refinement)
    command: polyphony
    args:
      - "plan"
      - "load-agent-guidance"
      - "--work-item"
      - "{{ workflow.input.work_item_id }}"
    routes:
      - to: fetch_for_remediation

  # ── Fetch for remediation (AB#3157 / AB#3161) ─────────────────────────
  #
  # Pre-fetch the target + feature branches from origin so the
  # remediation_planner's `git diff` example reads fresh state. The
  # remediation worktree is checked out on `feature_branch`, so HEAD is
  # fresh, but `target_branch` (e.g. `main`) and even `feature_branch`'s
  # remote tip can drift between worktree creation and the planner's
  # invocation — particularly across long remediation cycles. The bug
  # class is the same as AB#3157 (stale local refs in the bare-repo +
  # per-run worktree model). Hardened by the bare-ref lint added in
  # AB#3161.
  #
  # Invariants:
  #   Pre:  feature_branch + target_branch exist on origin.
  #   Post: `origin/{target,feature}_branch` reflect remote; local heads
  #         are fast-forwarded when safe.
  - name: fetch_for_remediation
    type: script
    description: Pre-fetch origin refs so remediation_planner sees fresh state (AB#3157 / AB#3161)
    command: pwsh
    args:
      - "-NoProfile"
      - "-Command"
      - |
        $target = '{{ workflow.input.target_branch }}'
        $feature = '{{ workflow.input.feature_branch }}'
        git fetch --quiet origin $target $feature
        if ($LASTEXITCODE -ne 0) { throw "git fetch failed for $target, $feature" }
        foreach ($branch in @($target, $feature)) {
            $remoteRef = "refs/remotes/origin/$branch"
            $localRef = "refs/heads/$branch"
            $localExists = (git rev-parse --verify --quiet $localRef 2>$null) -ne $null
            if ($localExists) {
                & git merge-base --is-ancestor $localRef $remoteRef
                if ($LASTEXITCODE -eq 0) {
                    git update-ref $localRef $remoteRef
                } else {
                    Write-Host "::warning:: local $branch has commits not on origin; not fast-forwarding"
                }
            }
        }
        @{ ok = $true } | ConvertTo-Json -Compress
    routes:
      - to: remediation_planner

  - name: remediation_planner
    type: agent
    model: claude-opus-4.7
    description: Create addendum plan from review feedback for remediation
    tools:
      - twig
      - gh
      - filesystem
    prompt: |
      You are the remediation planner for the twig SDLC workflow.

      ## Your Mission

      Create an addendum plan to address the review feedback on the feature PR
      for work item {{ workflow.input.work_item_id }}.

      ## Context

      - **Work item:** {{ workflow.input.work_item_id }}
      - **Platform:** {{ workflow.input.platform }}
      - **PR number:** {% if workflow.input.platform == 'ado' and feature_pr_creator_ado is defined %}{{ feature_pr_creator_ado.output.pr_number }}{% elif feature_pr_creator_github is defined %}{{ feature_pr_creator_github.output.pr_number }}{% else %}(unknown){% endif %}
      - **PR URL:** {% if workflow.input.platform == 'ado' and feature_pr_creator_ado is defined %}{{ feature_pr_creator_ado.output.pr_url }}{% elif feature_pr_creator_github is defined %}{{ feature_pr_creator_github.output.pr_url }}{% else %}(unknown){% endif %}
      - **Remediation cycle:** {{ remediation_counter.output.iteration }}
      - **Original plan:** {{ workflow.input.plan_path }}

      ## Instructions

      ### Reviewer feedback (pre-digested by the PR sub-workflow's analyzer)

      The github-pr / ado-pr sub-workflow ran its sentiment-driven analyzer
      on the most recent poll before exiting unmerged. When the analyzer
      saw actionable negative feedback, it surfaces a markdown summary
      below — treat this as authoritative for what the reviewers want
      changed. When empty, fall back to the platform-direct sources in
      step 1.

      ```markdown
      {%- if workflow.input.platform == 'ado' and pr_lifecycle_ado is defined and pr_lifecycle_ado.output.feedback_summary is defined and pr_lifecycle_ado.output.feedback_summary %}
      {{ pr_lifecycle_ado.output.feedback_summary }}
      {%- elif workflow.input.platform != 'ado' and pr_lifecycle_github is defined and pr_lifecycle_github.output.feedback_summary is defined and pr_lifecycle_github.output.feedback_summary %}
      {{ pr_lifecycle_github.output.feedback_summary }}
      {%- else %}
      (no analyzer summary available — the PR likely exited unmerged
      without negative feedback, e.g. operator closed/abandoned the PR
      with no review threads; gather context yourself in step 1)
      {%- endif %}
      ```

      {% if workflow.input.platform == 'ado' -%}
      1. **Read the PR review context** — Polyphony does not yet ship a
         verb that returns ADO PR thread/comment text. You have these
         honest sources of truth:
         - The reviewer **identity + vote** can be queried with
           `polyphony pr poll-status-ado --organization '{{ workflow.input.organization }}' --project '{{ workflow.input.project }}' --repository-id '{{ workflow.input.repository }}' --pr-number {{ feature_pr_creator_ado.output.pr_number }}`
           (use the `bash` tool to invoke). The output includes
           `reviewers[]` with `identity` and `vote` (-10/-5/0/+5/+10).
         - The original plan at `{{ workflow.input.plan_path }}` and any
           prior addenda under `docs/projects/{{ workflow.input.work_item_id }}-addendum-*.plan.md`.
         - The diff on the feature branch (`git diff
           origin/{{ workflow.input.target_branch }}..origin/{{ workflow.input.feature_branch }}`)
           — refs were freshly fetched immediately upstream; compare
           against `origin/...` to avoid stale-cache false positives
           (see AB#3157).
         - The PR URL above — operators may also have left context in
           the work-item discussion (use `twig show {{ workflow.input.work_item_id }}`).
         Be HONEST about the limit: if you cannot infer specific issues
         from the available context, list "operator triage required" as
         a remediation task and surface that in the addendum.
      {% else -%}
      1. **Read the PR review feedback** — Use `gh pr view {{ feature_pr_creator_github.output.pr_number }}`
         and `gh api repos/{owner}/{repo}/pulls/{{ feature_pr_creator_github.output.pr_number }}/reviews`
         to fetch all review comments and requested changes.
      {%- endif %}
      2. **Read the original plan** (if available) to understand context
      3. **Analyze each review issue** to determine scope of work needed
      4. **Create an addendum plan document** that:
         - References the original plan
         - Lists specific tasks to address each review issue
         - Estimates effort and files affected
         - Notes the remediation cycle number
         - On ADO, explicitly notes which inputs the addendum was built
           from (reviewer votes only? operator-supplied issues? diff
           inspection?) so downstream agents know the planning fidelity.
      5. **Save the addendum** as `docs/projects/{{ workflow.input.work_item_id }}-addendum-{{ remediation_counter.output.iteration }}.plan.md`

      ## Output

      Return a JSON object:
      ```json
      {
        "addendum_plan_path": "docs/projects/<work_item_id>-addendum-<N>.plan.md",
        "work_items": [
          {
            "title": "Brief task title",
            "description": "What needs to be done",
            "files": ["affected/files"]
          }
        ],
        "estimated_tasks": 0
      }
      ```

      {% if remediation_guidance_loader is defined and remediation_guidance_loader.output.agents.remediation_planner is defined and remediation_guidance_loader.output.agents.remediation_planner %}
      ## Repo-Specific Guidance — remediation_planner (override)

      {{ remediation_guidance_loader.output.agents.remediation_planner }}
      {% elif remediation_guidance_loader is defined and remediation_guidance_loader.output.architect is defined and remediation_guidance_loader.output.architect.role %}
      ## Repo-Specific Guidance

      {{ remediation_guidance_loader.output.architect.role }}
      {% endif %}

      {% if remediation_guidance_loader is defined and remediation_guidance_loader.output.architect is defined and remediation_guidance_loader.output.architect.type_refinement %}
      ## Repo-Specific Guidance — {{ remediation_guidance_loader.output.type }} refinement

      {{ remediation_guidance_loader.output.architect.type_refinement }}
      {% endif %}
    output:
      addendum_plan_path:
        type: string
        description: Path to the addendum plan markdown document
      work_items:
        type: array
        description: List of remediation tasks to seed as ADO work items
        items:
          type: object
          properties:
            title:
              type: string
            description:
              type: string
            files:
              type: array
              items:
                type: string
      estimated_tasks:
        type: number
        description: Total count of remediation tasks
    routes:
      - to: remediation_seeder

  # ── Remediation seeder ──────────────────────────────────────────────────
  #
  # Creates new ADO work items for the remediation tasks identified by
  # the remediation planner. Seeds them as children of the root work item
  # so they appear in the hierarchy.
  #
  # Invariants:
  #   Pre:  remediation_planner.output.work_items is a non-empty array.
  #   Post: New work items are created in ADO; output.work_item_ids is set.
  - name: remediation_seeder
    type: agent
    model: claude-sonnet-4.6
    description: Create ADO work items for remediation tasks
    tools:
      - twig
    prompt: |
      You are the remediation seeder for the twig SDLC workflow.

      ## Your Mission

      Create ADO work items for the remediation tasks.

      ## Context

      - **Parent work item:** {{ workflow.input.work_item_id }}
      - **Remediation cycle:** {{ remediation_counter.output.iteration }}
      - **Child work items to seed:**

      {{ remediation_planner.output.work_items | json(indent=2) }}

      ## Instructions

      1. For each work item in the list above, use `twig seed` to create
         a child work item under work item {{ workflow.input.work_item_id }}
      2. Set the title, description, and tag with `remediation-cycle-{{ remediation_counter.output.iteration }}`
      3. Record the created work item IDs

      ## Output

      Return a JSON object:
      ```json
      {
        "work_item_ids": [0],
        "pg_number": 0,
        "branch_name": "remediation/{{ workflow.input.work_item_id }}-cycle-{{ remediation_counter.output.iteration }}"
      }
      ```
    output:
      work_item_ids:
        type: array
        description: ADO work item IDs created for the remediation tasks
        items:
          type: number
      pg_number:
        type: number
        description: PG number for the remediation branch
      branch_name:
        type: string
        description: Git branch name for the remediation work
    routes:
      - to: remediation_implementer

  # ── Remediation implementer ─────────────────────────────────────────────
  #
  # Invokes implement-merge-group.yaml as a sub-workflow to execute the remediation
  # MG. The remediation MG branch targets the feature branch (not main)
  # so fixes land on the feature branch for the next review cycle. After
  # remediation merges, routes to feature_pr_updater which re-requests
  # review on the feature PR before looping back to pr_platform_router.
  #
  # Uses implement-merge-group.yaml so the remediation
  # path benefits from its pr_platform_router — both GitHub and ADO MG
  # PRs are supported there (PRs #110 / #118).
  #
  # Invariants:
  #   Pre:  remediation_seeder.output.work_item_ids is a non-empty array;
  #         work_item_ids carry the legacy `PG-{number}` tag for
  #         `branch next-impl` / `branch close-scope` to find them.
  #   Post: Remediation MG is implemented and merged into the feature branch.
  - name: remediation_implementer
    type: workflow
    description: Execute remediation MG via implement-merge-group sub-workflow
    workflow: ./implement-merge-group.yaml
    input_mapping:
      work_item_id: "{{ workflow.input.work_item_id }}"
      # Remediation runs at the apex layer — the apex IS the root for the
      # remediation MG. Mirrors the root_id synthesis the apex driver uses
      # when dispatching MGs to implement-merge-group.yaml.
      root_id: "{{ workflow.input.work_item_id }}"
      pg_number: "{{ remediation_seeder.output.pg_number }}"
      # Synthesize Rev 4-valid mg_path from the legacy pg_number using the
      # same `pg-{number}` convention the apex driver applies when
      # dispatching MGs. Items in the remediation PG still carry the
      # legacy `PG-{number}` tag for `branch next-impl` /
      # `branch close-scope` to find them.
      mg_path: "pg-{{ remediation_seeder.output.pg_number }}"
      work_item_ids: "{{ remediation_seeder.output.work_item_ids }}"
      feature_branch: "{{ workflow.input.feature_branch }}"
      platform: "{{ workflow.input.platform }}"
    routes:
      - to: feature_pr_updater

  # ── Feature PR updater ─────────────────────────────────────────────────
  #
  # Re-requests review on the feature PR after the remediation PG has been
  # implemented and merged into the feature branch. Platform-aware
  # (Phase 5 closeout):
  #   - github: uses `gh pr comment`, `gh api .../requested_reviewers`,
  #     and `gh pr ready` directly via the `gh` tool.
  #   - ado: emits the rendered comment_body via output.comment_body and
  #     routes to feature_pr_updater_poster_ado, which posts the comment
  #     via `polyphony pr post-comment-ado`. Reviewer re-request is
  #     out-of-band on ADO — reviewers are configured per branch policy
  #     in the ADO project (no per-PR re-request API call needed in the
  #     same shape as GitHub). Mirrors plan-level.yaml's
  #     plan_reviewer + plan_reviewer_poster_ado pattern from PR #123.
  #
  # Either way, control returns to pr_platform_router for the next
  # review cycle.
  #
  # Invariants:
  #   Pre:  remediation_implementer has completed; remediation changes are
  #         merged into the feature branch.
  #   Post: A re-review comment has been posted on the PR (via gh on
  #         GitHub, queued for the poster script on ADO); routes to
  #         pr_platform_router for the next review cycle.
  - name: feature_pr_updater
    type: agent
    model: claude-sonnet-4.6
    description: Re-request review on the feature PR after remediation
    tools:
      - gh
      - filesystem
    output:
      posted:
        type: boolean
        description: Whether a comment was posted by THIS agent (true on github happy path; false on ado, where feature_pr_updater_poster_ado posts it)
      pr_number:
        type: number
        description: PR number that was updated
      remediation_cycle:
        type: number
        description: Remediation cycle number this update corresponds to
      review_requested:
        type: boolean
        description: True on github when the API call to re-request review succeeded; always false on ado (out-of-band per ADO policy)
      comment_body:
        type: string
        description: |
          The fully-rendered markdown comment ready to be posted. On ado
          this is consumed by feature_pr_updater_poster_ado. On github it
          is informational (the LLM has already posted it via gh) but is
          still emitted for log parity.
    prompt: |
      You are the feature PR updater for the twig SDLC workflow.

      ## Your Mission

      Re-request review on the feature PR after remediation cycle
      {{ remediation_counter.output.iteration }} has completed.

      ## Context

      - **Work item:** {{ workflow.input.work_item_id }}
      - **Platform:** {{ workflow.input.platform }}
      - **PR number:** {% if workflow.input.platform == 'ado' and feature_pr_creator_ado is defined %}{{ feature_pr_creator_ado.output.pr_number }}{% elif feature_pr_creator_github is defined %}{{ feature_pr_creator_github.output.pr_number }}{% else %}(unknown){% endif %}
      - **Feature branch:** {{ workflow.input.feature_branch }}
      - **Target branch:** {{ workflow.input.target_branch }}
      - **Remediation cycle:** {{ remediation_counter.output.iteration }}
      - **Addendum plan:** {{ remediation_planner.output.addendum_plan_path }}

      ## Comment shape

      The comment body must use this structure (markdown):

      ```
      ## Remediation Cycle {{ remediation_counter.output.iteration }} Complete

      Remediation changes have been implemented and merged into the
      feature branch. Please re-review.

      **Addendum plan:** {{ remediation_planner.output.addendum_plan_path }}

      _Posted by the polyphony feature_pr_updater agent._
      ```

      {% if workflow.input.platform == 'ado' %}
      ## Instructions (Azure DevOps)

      You do NOT have a tool to post the comment yourself. Render the
      comment body using the shape above and emit it via
      `output.comment_body` — a downstream script
      (`feature_pr_updater_poster_ado`) will post it via
      `polyphony pr post-comment-ado`. Do NOT attempt to call `gh`; this
      is an ADO PR and `gh` will fail.

      Set `output.posted = false` and `output.review_requested = false`
      (the poster script will record the real post status when it runs;
      reviewer re-request is out-of-band on ADO — the project's branch
      policy already pins required reviewers).
      {% else %}
      ## Instructions (GitHub)

      1. **Add a PR comment** with the rendered body:
         ```
         gh pr comment {{ feature_pr_creator_github.output.pr_number }} \
           --body "<rendered comment body>"
         ```

      2. **Re-request review** using the GitHub API. Fetch the most recent
         reviewer and re-request their review:
         ```
         gh api repos/{owner}/{repo}/pulls/{{ feature_pr_creator_github.output.pr_number }}/requested_reviewers \
           --method POST \
           -f "reviewers[]={reviewer_login}"
         ```
         If the reviewer cannot be determined, use `gh pr edit` to request
         review from the repository's default reviewers.

      3. **Mark the PR as ready for review** (in case it was in draft):
         ```
         gh pr ready {{ feature_pr_creator_github.output.pr_number }}
         ```

      Set `output.posted = true` and `output.review_requested = true`
      after the gh calls succeed.
      {% endif %}

      ## Output

      Return a JSON object:
      ```json
      {
        "posted": {% if workflow.input.platform == 'ado' %}false{% else %}true{% endif %},
        "pr_number": {% if workflow.input.platform == 'ado' %}{{ feature_pr_creator_ado.output.pr_number }}{% else %}{{ feature_pr_creator_github.output.pr_number }}{% endif %},
        "review_requested": {% if workflow.input.platform == 'ado' %}false{% else %}true{% endif %},
        "remediation_cycle": {{ remediation_counter.output.iteration }},
        "comment_body": "<full rendered markdown comment per the shape above>"
      }
      ```
    routes:
      # On ADO platform, route to the poster script which actually posts
      # the comment via `polyphony pr post-comment-ado`. On github the
      # LLM already posted via the `gh` tool, so route straight back to
      # the platform router for the next review cycle.
      - to: feature_pr_updater_poster_ado
        when: "{{ workflow.input.platform == 'ado' }}"
      - to: pr_platform_router

  # ── Feature PR updater poster (ADO) ────────────────────────────────────
  #
  # Posts the comment body produced by feature_pr_updater to the ADO PR
  # via `polyphony pr post-comment-ado` (since the LLM has no `polyphony`
  # tool registered for direct invocation). Routes back to
  # pr_platform_router so the next review cycle re-enters via
  # pr_lifecycle_ado.
  #
  # NOTE: even if the post fails (already-commented races, transient API
  # failures), we still proceed back to the router. The next poll surfaces
  # the real PR state — a missed re-review comment is not a workflow-fatal
  # condition since the pending-review gate / stuck-review gate already
  # cover the operator-attention path.
  #
  # Invariants:
  #   Pre:  workflow.input.platform == 'ado'; feature_pr_updater produced
  #         output.comment_body.
  #   Post: A best-effort post has been attempted; routes to
  #         pr_platform_router for the next review cycle.
  - name: feature_pr_updater_poster_ado
    type: script
    description: Post the feature_pr_updater's rendered comment to the ADO PR.
    command: polyphony
    args:
      - "pr"
      - "post-comment-ado"
      - "--organization"
      - "{{ workflow.input.organization }}"
      - "--project"
      - "{{ workflow.input.project }}"
      - "--repository"
      - "{{ workflow.input.repository }}"
      - "--pr-number"
      - "{{ feature_pr_creator_ado.output.pr_number }}"
      - "--body"
      - "{{ feature_pr_updater.output.comment_body }}"
    routes:
      - to: pr_platform_router

  # ── Terminal abort (operator chose Abort on an error gate) ────────────
  #
  # Identical to plan-level.yaml's terminal_abort_run. Invokes
  # abort-run.ps1, which POSTs to conductor's /api/stop endpoint. The
  # engine raises InterruptError at every nested between-agent check,
  # unwinding the entire run cleanly (no process-kill, no zombies).
  - name: terminal_abort_run
    type: script
    description: Operator-initiated full-run abort — POSTs /api/stop to halt the run cleanly
    command: pwsh
    args:
      - "-NoProfile"
      - "-File"
      - "{{ workflow.dir }}/../scripts/abort-run.ps1"
      - "-Reason"
      - "operator-abort"
      - "-Stage"
      - "feature-pr"
    routes:
      - to: $end

  # ── Terminal: policy-driven cap-mode auto-fail (AB#3186) ─────────────────
  #
  # Reached when `policy.unattended.cap_mode == 'auto_fail'` triggers at
  # remediation_cap_gate. Distinct from terminal_abort_run so post-mortem
  # diagnostics can tell policy-driven failures apart from human-initiated
  # aborts — the abort-run.ps1 envelope's `reason` field is the
  # discriminator (`cap-auto-fail` vs `operator-abort`).
  - name: terminal_cap_auto_fail
    type: script
    description: Policy-driven full-run abort — unattended.cap_mode='auto_fail' at a cap-hit gate
    command: pwsh
    args:
      - "-NoProfile"
      - "-File"
      - "{{ workflow.dir }}/../scripts/abort-run.ps1"
      - "-Reason"
      - "cap-auto-fail"
      - "-WorkItemId"
      - "{{ workflow.input.work_item_id }}"
      - "-Stage"
      - "feature-pr"
      - "-Detail"
      - "policy.unattended.cap_mode='auto_fail' triggered at remediation_cap_gate."
    routes:
      - to: $end
