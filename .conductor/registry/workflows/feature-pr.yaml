# feature-pr — Feature PR creation, review, and remediation cycle.
#
# Creates a feature PR (all PGs merged → feature branch → target branch),
# delegates to the platform-specific PR sub-workflow (github-pr.yaml or
# ado-pr.yaml) for review/fix/merge, and handles remediation cycles when
# the sub-workflow cannot resolve issues (merged=false).
#
# Remediation cycle: merged=false → remediation_planner → remediation_seeder
# → implement-mg (remediation MG) → feature_pr_updater (re-request review)
# → pr_platform_router (re-review). Capped at 3 cycles;
# after that, a human gate fires for escalation.
#
# Invariants:
#   Pre:  All PGs are merged into the feature branch; feature branch is ready
#         for a PR to the target branch.
#   Post: Feature PR is merged (merged=true) or aborted (merged=false).

workflow:
  name: feature-pr
  description: >-
    Feature PR lifecycle. Routes to a platform-specific creator
    (feature_pr_creator_github | feature_pr_creator_ado) and lifecycle
    sub-workflow (github-pr.yaml | ado-pr.yaml) based on the platform
    input. Runs remediation cycles (capped at 3) when the sub-workflow
    fails to merge. After each remediation, re-requests review via
    feature_pr_updater. Escalates to human gate after cap is exceeded.
  version: "1.1.0"
  entry_point: pr_platform_router
  metadata:
    min_polyphony_version: "1.0.1"

  limits:
    max_iterations: 200

  input:
    work_item_id:
      type: number
      required: true
      description: ADO work item ID of the root (top-level) item (type is runtime-injected; do not hardcode type names)
    feature_branch:
      type: string
      required: true
      description: Feature branch containing all merged PG work
    target_branch:
      type: string
      required: true
      description: Target branch the feature PR merges into (e.g., main)
    platform:
      type: string
      required: false
      default: ado
      description: "PR platform: 'ado' (default — matches the work item source) or 'github' (for repos hosted on GitHub)"
    organization:
      type: string
      required: false
      default: ""
      description: >-
        ADO organization name (e.g. `contoso`). Required when
        platform=ado; ignored when platform=github. When platform=ado
        and this is blank, pr_platform_router routes to
        feature_pr_inputs_missing_gate before invoking any ADO verb.
    project:
      type: string
      required: false
      default: ""
      description: >-
        ADO project name. Required when platform=ado; ignored when
        platform=github.
    repository:
      type: string
      required: false
      default: ""
      description: >-
        ADO repository identifier — GUID or name; both accepted by
        `pr create-feature-ado` / `pr merge-feature-ado`. Required when
        platform=ado; ignored when platform=github.
    plan_path:
      type: string
      required: false
      default: ""
      description: Path to the original plan document for remediation context

tools:
  - twig
  - gh
  - filesystem

output:
  # Per M3, under StrictUndefined we must guard `is defined` because only
  # ONE of pr_lifecycle_github / pr_lifecycle_ado / remediation_abort actually
  # runs in any given execution — the others remain undefined and the
  # `default` filter does NOT lazy-evaluate its argument when the variable
  # itself is undefined (only when the looked-up attribute is undefined).
  # Per M7, pipe booleans through `| string | lower` so the parent receives
  # a real bool rather than capital "True"/"False".
  merged: >-
    {% if pr_lifecycle_github is defined %}{{ (pr_lifecycle_github.output.merged | default(false)) | string | lower }}
    {%- elif pr_lifecycle_ado is defined %}{{ (pr_lifecycle_ado.output.merged | default(false)) | string | lower }}
    {%- elif remediation_abort is defined %}{{ (remediation_abort.output.merged | default(false)) | string | lower }}
    {%- else %}false{% endif %}
  pr_url: >-
    {%- if feature_pr_creator_ado is defined -%}{{ feature_pr_creator_ado.output.pr_url | default('') }}
    {%- elif feature_pr_creator_github is defined -%}{{ feature_pr_creator_github.output.pr_url | default('') }}
    {%- else -%}{% endif -%}
  pr_number: >-
    {%- if feature_pr_creator_ado is defined -%}{{ feature_pr_creator_ado.output.pr_number | default(0) }}
    {%- elif feature_pr_creator_github is defined -%}{{ feature_pr_creator_github.output.pr_number | default(0) }}
    {%- else -%}0{% endif -%}

agents:
  # ── PR platform router ──────────────────────────────────────────────────
  #
  # Routes to the platform-specific feature-PR creator based on the
  # platform input AND, for ADO, the presence of all three connection
  # inputs (organization, project, repository).
  #
  # Mirrors the pattern in implement-mg.yaml's pr_platform_router (PR #118).
  # The router fires BEFORE the creator so ADO can use its own creator
  # verb (`pr create-feature-ado`) rather than the GitHub-only
  # `pr create-feature-pr`.
  #
  # Emits `{ platform, ado_inputs_ready: bool, missing: '<csv>' }` so the
  # inputs-missing gate's prompt can reference the missing field list per M3.
  #
  # Invariants:
  #   Pre:  platform input is 'github' or 'ado'.
  #   Post: Routes to feature_pr_creator_github (github),
  #         feature_pr_creator_ado (ado + inputs ready), or
  #         feature_pr_inputs_missing_gate (ado + missing).
  - name: pr_platform_router
    type: script
    description: Route to platform-specific feature-PR creator based on platform + ADO connection inputs
    command: pwsh
    args:
      - "-NoProfile"
      - "-Command"
      - >-
        $platform = '{{ workflow.input.platform }}';
        $org = '{{ workflow.input.organization }}';
        $proj = '{{ workflow.input.project }}';
        $repo = '{{ workflow.input.repository }}';
        $missing = @();
        if ([string]::IsNullOrWhiteSpace($org)) { $missing += 'organization' };
        if ([string]::IsNullOrWhiteSpace($proj)) { $missing += 'project' };
        if ([string]::IsNullOrWhiteSpace($repo)) { $missing += 'repository' };
        $ready = ($missing.Count -eq 0);
        @{ platform = $platform; ado_inputs_ready = $ready; missing = ($missing -join ',') } | ConvertTo-Json -Compress
    routes:
      - to: feature_pr_creator_github
        when: "{{ pr_platform_router.output.platform == 'github' }}"
      - to: feature_pr_creator_ado
        when: "{{ pr_platform_router.output.platform == 'ado' and pr_platform_router.output.ado_inputs_ready == true }}"
      - to: feature_pr_inputs_missing_gate
        when: "{{ pr_platform_router.output.platform == 'ado' and pr_platform_router.output.ado_inputs_ready == false }}"
      # Catch-all per M4: unknown platform value fails safely to $end
      # rather than raising `No matching route found` mid-run.
      - to: $end

  # ── Feature PR creator (GitHub) ─────────────────────────────────────────
  #
  # GitHub leg. Creates the feature PR from the feature branch to the
  # target branch via `polyphony pr create-feature-pr`. If an open PR
  # already exists for the same head/base pair, reuses it (idempotent).
  #
  # Invariants:
  #   Pre:  Platform == 'github'; feature branch exists with all PG work merged.
  #   Post: GitHub feature PR exists; output.pr_number and output.pr_url set.
  - name: feature_pr_creator_github
    type: script
    description: Create (or reuse) GitHub feature PR via `pr create-feature-pr`
    command: polyphony
    args:
      - "pr"
      - "create-feature-pr"
      - "--work-item"
      - "{{ workflow.input.work_item_id }}"
      - "--feature-branch"
      - "{{ workflow.input.feature_branch }}"
      - "--target-branch"
      - "{{ workflow.input.target_branch }}"
    routes:
      - to: pr_lifecycle_github

  # ── Feature PR creator (ADO) ────────────────────────────────────────────
  #
  # ADO leg. Creates the feature PR via `polyphony pr create-feature-ado`.
  # Reuses an existing OPEN PR for the same head/base pair (idempotent).
  #
  # Routing-style verb: always exits 0; success/failure determined by
  # `output.error_code`. On any error_code, route to
  # feature_pr_creator_failed_gate_ado so the operator can inspect and
  # retry (create is idempotent) or abort.
  #
  # Invariants:
  #   Pre:  Platform == 'ado'; ado_inputs_ready == true; feature branch
  #         exists on the remote.
  #   Post: ADO feature PR exists; output.pr_number and output.pr_url set.
  - name: feature_pr_creator_ado
    type: script
    description: Create (or reuse) ADO feature PR via `pr create-feature-ado`
    command: polyphony
    args:
      - "pr"
      - "create-feature-ado"
      - "--organization"
      - "{{ workflow.input.organization }}"
      - "--project"
      - "{{ workflow.input.project }}"
      - "--repository"
      - "{{ workflow.input.repository }}"
      - "--root-id"
      - "{{ workflow.input.work_item_id }}"
      - "--target-branch"
      - "{{ workflow.input.target_branch }}"
    routes:
      - to: feature_pr_creator_failed_gate_ado
        when: "{{ feature_pr_creator_ado.output.error_code is defined and feature_pr_creator_ado.output.error_code != '' }}"
      - to: pr_lifecycle_ado
        when: "{{ feature_pr_creator_ado.output.error_code is not defined or feature_pr_creator_ado.output.error_code == '' }}"
      # Catch-all per M4: missing/malformed error_code -> failed gate.
      - to: feature_pr_creator_failed_gate_ado

  # ── ADO connection-inputs missing gate ─────────────────────────────────
  #
  # Fires when platform=ado but one or more of organization, project,
  # repository was blank. Surfaces a clear remediation path (re-invoke
  # the workflow with the missing inputs) without burning an ADO API
  # call that would just return invalid_argument.
  #
  # Per M3, only this gate's prompt references
  # `pr_platform_router.output.missing` — the router IS defined when we
  # reach this gate (route precondition).
  #
  # Invariants:
  #   Pre:  platform == 'ado' AND ado_inputs_ready == false.
  #   Post: Operator informed; workflow exits without invoking any ADO verb.
  - name: feature_pr_inputs_missing_gate
    type: human_gate
    description: ADO connection inputs are missing — workflow cannot proceed
    prompt: |
      ## ADO connection inputs missing

      `platform=ado` was selected but the following required inputs are
      blank: **{{ pr_platform_router.output.missing }}**

      `polyphony pr create-feature-ado` and `pr merge-feature-ado` require
      all three of `--organization`, `--project`, and `--repository`.
      Re-invoke the workflow chain with those inputs supplied (typically
      threaded from the apex driver's inputs).

      Feature branch:
      `{{ workflow.input.feature_branch }}`
    options:
      - label: "🛑 Abort (will re-invoke with inputs)"
        value: abort
        route: $end

  # ── ADO feature-PR creator failure gate ────────────────────────────────
  #
  # Fires when `feature_pr_creator_ado` returned a non-empty error_code.
  # Operator can:
  # - **Retry** — route back to `feature_pr_creator_ado`. Create is
  #   idempotent (reuses existing OPEN PR for same head/base).
  # - **Abort** — exit without running the lifecycle. No PR exists (or
  #   the existing one was not surfaced).
  #
  # Per M3 (StrictUndefined), references to the creator's output are
  # guarded with `is defined`.
  #
  # Invariants:
  #   Pre:  feature_pr_creator_ado has been invoked and returned an error.
  #   Post: Operator has retried (route to feature_pr_creator_ado) or aborted ($end).
  - name: feature_pr_creator_failed_gate_ado
    type: human_gate
    description: ADO feature-PR creation failed — operator decides retry or abort
    prompt: |
      ## ADO feature-PR creation failed

      Feature branch: `{{ workflow.input.feature_branch }}` →
      `{{ workflow.input.target_branch }}`

      {% if feature_pr_creator_ado is defined and feature_pr_creator_ado.output.error_code is defined and feature_pr_creator_ado.output.error_code != '' -%}
      **Error code:** `{{ feature_pr_creator_ado.output.error_code }}`
      **Detail:** {{ feature_pr_creator_ado.output.error | default('(no detail)') }}
      {%- else -%}
      **Detail:** Routed to gate without an explicit error code.
      {%- endif %}

      **Retry** is safe: `pr create-feature-ado` reuses an existing OPEN
      PR for the same head/base.

      **Abort** exits without invoking the lifecycle — no PR will be
      surfaced for review.
    options:
      - label: "🔄 Retry"
        value: retry
        route: feature_pr_creator_ado
      - label: "🛑 Abort"
        value: abort
        route: $end

  # ── GitHub PR lifecycle sub-workflow ─────────────────────────────────────
  #
  # Invokes github-pr.yaml for the full GitHub PR lifecycle (review, fix,
  # merge). Passes the feature PR details. On merged=true routes to $end;
  # on merged=false routes to remediation cycle.
  #
  # Invariants:
  #   Pre:  pr_platform_router.output.platform == 'github'; feature PR exists.
  #   Post: PR is reviewed, fixed (if needed), and merged — or remediation
  #         cycle begins.
  - name: pr_lifecycle_github
    type: workflow
    description: GitHub PR lifecycle — review, fix loop, merge
    workflow: ./github-pr.yaml
    input_mapping:
      pr_number: "{{ feature_pr_creator_github.output.pr_number }}"
      branch_name: "{{ workflow.input.feature_branch }}"
      target_branch: "{{ workflow.input.target_branch }}"
      review_policy: "auto"
    routes:
      - to: $end
        when: "{{ pr_lifecycle_github.output.merged == true }}"
      - to: remediation_counter
        when: "{{ pr_lifecycle_github.output.merged == false }}"
      # Catch-all: undefined/missing 'merged' -> remediation cycle
      # (treats ambiguous outcomes as 'not merged') per M4.
      - to: remediation_counter

  # ── ADO PR lifecycle sub-workflow ────────────────────────────────────────
  #
  # Invokes ado-pr.yaml for the ADO PR lifecycle (poll → merge with
  # human gates for non-approved states). Threads ADO connection inputs
  # plus pr_number from feature_pr_creator_ado.
  #
  # ADO remediation is NOT yet wired — the planner/seeder/updater chain
  # uses GitHub-only `gh` calls. On merged=false, route to a clear
  # "remediation not supported on ADO" emitter that exits with
  # merged=false rather than entering the GitHub remediation cycle.
  #
  # Invariants:
  #   Pre:  pr_platform_router.output.platform == 'ado'; ADO PR exists.
  #   Post: PR is reviewed (natively in ADO) and merged — or operator
  #         exited with merged=false.
  - name: pr_lifecycle_ado
    type: workflow
    description: ADO PR lifecycle — poll, human gates, merge
    workflow: ./ado-pr.yaml
    input_mapping:
      pr_number: "{{ feature_pr_creator_ado.output.pr_number }}"
      branch_name: "{{ workflow.input.feature_branch }}"
      target_branch: "{{ workflow.input.target_branch }}"
      review_policy: "manual"
      organization: "{{ workflow.input.organization }}"
      project: "{{ workflow.input.project }}"
      repository: "{{ workflow.input.repository }}"
      root_id: "{{ workflow.input.work_item_id }}"
    routes:
      - to: $end
        when: "{{ pr_lifecycle_ado.output.merged == true }}"
      # ADO remediation cycle is not yet wired — short-circuit to a
      # clean "not supported" emitter rather than entering the
      # GitHub-only remediation chain (planner/seeder/updater all use
      # `gh` directly).
      - to: ado_remediation_not_supported_emitter
        when: "{{ pr_lifecycle_ado.output.merged == false }}"
      # Catch-all: undefined/missing 'merged' -> ado-not-supported.
      - to: ado_remediation_not_supported_emitter

  # ── ADO remediation-not-supported emitter ──────────────────────────────
  #
  # Terminal node when an ADO feature PR fails to merge. The remediation
  # chain (planner/seeder/updater) is GitHub-only and cannot run on ADO
  # without `pr post-comment-ado` / `pr request-review-ado` verbs that
  # don't exist yet. Operator must remediate manually in ADO and re-invoke
  # the workflow.
  #
  # Emits merged=false so the parent (apex driver) sees a clean
  # "not merged" outcome and routes to its own feature_pr_failed_gate
  # for operator escalation.
  #
  # Invariants:
  #   Pre:  pr_lifecycle_ado returned merged=false.
  #   Post: Workflow output.merged is false; exits.
  - name: ado_remediation_not_supported_emitter
    type: script
    description: Emit merged=false — ADO remediation cycle not yet wired
    command: pwsh
    args:
      - "-NoProfile"
      - "-Command"
      - >-
        @{
          merged = $false;
          pr_url = '';
          reason = 'ado_remediation_not_supported';
          detail = 'ADO PR did not merge. The remediation chain (planner/seeder/updater) is GitHub-only and cannot run on ADO without `pr post-comment-ado` and `pr request-review-ado` verbs which do not exist yet. Remediate manually in ADO and re-invoke the workflow.'
        } | ConvertTo-Json -Compress
    routes:
      - to: $end

  # ── Remediation cycle counter ───────────────────────────────────────────
  #
  # Tracks the number of remediation cycles (review → plan → implement →
  # re-review). Uses a counter file scoped to the work item ID. Increments
  # after each cycle. Enforces the max 3 remediation cycle cap. Routes to
  # remediation_cap_gate if cap is reached AND review returned
  # changes_requested, or to remediation_planner if under the cap.
  #
  # Invariants:
  #   Pre:  PR sub-workflow returned merged=false.
  #   Post: output.iteration is the current count (1-based);
  #         output.under_limit indicates whether remediation may continue.
  - name: remediation_counter
    type: script
    description: Track remediation cycle count (max 3 cycles)
    command: pwsh
    args:
      - "-NoProfile"
      - "-Command"
      - |
        $counterFile = Join-Path ([System.IO.Path]::GetTempPath()) "conductor-remediation-count-{{ workflow.input.work_item_id }}"
        if (Test-Path $counterFile) {
            $count = [int](Get-Content $counterFile -Raw) + 1
        } else {
            $count = 1
        }
        Set-Content $counterFile $count
        @{ iteration = $count; under_limit = ($count -lt 3) } | ConvertTo-Json
    routes:
      - to: remediation_planner
        when: "{{ remediation_counter.output.under_limit == true }}"
      - to: remediation_cap_gate
        when: "{{ remediation_counter.output.under_limit == false }}"
      # Catch-all: defensive against missing/malformed under_limit.
      - to: remediation_cap_gate

  # ── Remediation cap gate ────────────────────────────────────────────────
  #
  # Human decision point when the remediation cycle has reached the maximum
  # cap (3 cycles). Fires when remediation_count >= 3 AND PR sub-workflow
  # returned merged=false. Offers two options:
  #   Continue — bypass the cap for this cycle only (counter does NOT reset)
  #   Abort    — leave the feature PR open for manual resolution
  #
  # Invariants:
  #   Pre:  remediation_counter.output.iteration >= 3;
  #         PR sub-workflow returned merged=false.
  #   Post: Human has chosen to continue (bypass) or abort.
  - name: remediation_cap_gate
    type: human_gate
    prompt: |
      ## ⚠️ Remediation Cycle Cap Reached — Work Item #{{ workflow.input.work_item_id }}

      The remediation cycle for the feature PR has reached the maximum of
      **3 cycles** without achieving approval.

      ### Feature PR Details

      | Field | Value |
      |-------|-------|
      | Work Item | `{{ workflow.input.work_item_id }}` |
      | PR Number | `{{ feature_pr_creator_github.output.pr_number }}` |
      | Feature Branch | `{{ workflow.input.feature_branch }}` |
      | Target Branch | `{{ workflow.input.target_branch }}` |
      | Remediation Cycles | {{ remediation_counter.output.iteration }} |

      ---

      The platform PR sub-workflow was unable to merge the feature PR after
      **{{ remediation_counter.output.iteration }}** remediation cycles.
      Review the PR comments on GitHub/ADO for details on unresolved issues.

      Choose an action:
      - **Continue** — override the cap for this cycle only and attempt another
        remediation round (counter does not reset)
      - **Abort** — leave the feature PR open for manual resolution and end
        the workflow
    options:
      - label: "🔄 Continue Anyway"
        value: continue
        route: remediation_planner
      - label: "🛑 Abort"
        value: abort
        route: remediation_abort

  # ── Remediation abort ───────────────────────────────────────────────────
  #
  # Terminal node when the human chooses to abort after the remediation cap.
  # Emits merged=false so downstream consumers know the feature PR was NOT
  # merged and remains open for manual resolution.
  #
  # Invariants:
  #   Pre:  Human chose 'abort' at remediation_cap_gate.
  #   Post: output.merged is false; workflow ends.
  - name: remediation_abort
    type: script
    description: Emit merged=false when remediation is aborted
    command: pwsh
    args:
      - "-NoProfile"
      - "-Command"
      - |
        @{
          merged = $false
          pr_url = ''
          reason = 'Remediation cycle cap exceeded — aborted by human decision'
          remediation_count = {{ remediation_counter.output.iteration }}
        } | ConvertTo-Json
    routes:
      - to: $end

  # ── Remediation planner ─────────────────────────────────────────────────
  #
  # Creates an addendum plan based on the review feedback. Reads PR review
  # comments from the platform (via gh api) and the original plan to produce
  # a targeted remediation plan that addresses only the requested changes.
  #
  # Invariants:
  #   Pre:  PR sub-workflow returned merged=false;
  #         remediation_counter.output.under_limit == true OR human chose
  #         'continue' at remediation_cap_gate.
  #   Post: output.addendum_plan_path is set; output.work_items describes
  #         the work needed.
  - name: remediation_planner
    type: agent
    model: claude-opus-4.7
    description: Create addendum plan from review feedback for remediation
    tools:
      - twig
      - gh
      - filesystem
    prompt: |
      You are the remediation planner for the twig SDLC workflow.

      ## Your Mission

      Create an addendum plan to address the review feedback on the feature PR
      for work item {{ workflow.input.work_item_id }}.

      ## Context

      - **Work item:** {{ workflow.input.work_item_id }}
      - **PR number:** {{ feature_pr_creator_github.output.pr_number }}
      - **Remediation cycle:** {{ remediation_counter.output.iteration }}
      - **Original plan:** {{ workflow.input.plan_path }}

      ## Instructions

      1. **Read the PR review feedback** — Use `gh pr view {{ feature_pr_creator_github.output.pr_number }}`
         and `gh api repos/{owner}/{repo}/pulls/{{ feature_pr_creator_github.output.pr_number }}/reviews`
         to fetch all review comments and requested changes.
      2. **Read the original plan** (if available) to understand context
      3. **Analyze each review issue** to determine scope of work needed
      4. **Create an addendum plan document** that:
         - References the original plan
         - Lists specific tasks to address each review issue
         - Estimates effort and files affected
         - Notes the remediation cycle number
      5. **Save the addendum** as `docs/projects/{{ workflow.input.work_item_id }}-addendum-{{ remediation_counter.output.iteration }}.plan.md`

      ## Output

      Return a JSON object:
      ```json
      {
        "addendum_plan_path": "docs/projects/<work_item_id>-addendum-<N>.plan.md",
        "work_items": [
          {
            "title": "Brief task title",
            "description": "What needs to be done",
            "files": ["affected/files"]
          }
        ],
        "estimated_tasks": 0
      }
      ```
    output:
      addendum_plan_path:
        type: string
        description: Path to the addendum plan markdown document
      work_items:
        type: array
        description: List of remediation tasks to seed as ADO work items
        items:
          type: object
          properties:
            title:
              type: string
            description:
              type: string
            files:
              type: array
              items:
                type: string
      estimated_tasks:
        type: number
        description: Total count of remediation tasks
    routes:
      - to: remediation_seeder

  # ── Remediation seeder ──────────────────────────────────────────────────
  #
  # Creates new ADO work items for the remediation tasks identified by
  # the remediation planner. Seeds them as children of the root work item
  # so they appear in the hierarchy.
  #
  # Invariants:
  #   Pre:  remediation_planner.output.work_items is a non-empty array.
  #   Post: New work items are created in ADO; output.work_item_ids is set.
  - name: remediation_seeder
    type: agent
    model: claude-sonnet-4.6
    description: Create ADO work items for remediation tasks
    tools:
      - twig
    prompt: |
      You are the remediation seeder for the twig SDLC workflow.

      ## Your Mission

      Create ADO work items for the remediation tasks.

      ## Context

      - **Parent work item:** {{ workflow.input.work_item_id }}
      - **Remediation cycle:** {{ remediation_counter.output.iteration }}
      - **Child work items to seed:**

      {{ remediation_planner.output.work_items | json(indent=2) }}

      ## Instructions

      1. For each work item in the list above, use `twig seed` to create
         a child work item under work item {{ workflow.input.work_item_id }}
      2. Set the title, description, and tag with `remediation-cycle-{{ remediation_counter.output.iteration }}`
      3. Record the created work item IDs

      ## Output

      Return a JSON object:
      ```json
      {
        "work_item_ids": [0],
        "pg_number": 0,
        "branch_name": "remediation/{{ workflow.input.work_item_id }}-cycle-{{ remediation_counter.output.iteration }}"
      }
      ```
    output:
      work_item_ids:
        type: array
        description: ADO work item IDs created for the remediation tasks
        items:
          type: number
      pg_number:
        type: number
        description: PG number for the remediation branch
      branch_name:
        type: string
        description: Git branch name for the remediation work
    routes:
      - to: remediation_implementer

  # ── Remediation implementer ─────────────────────────────────────────────
  #
  # Invokes implement-mg.yaml as a sub-workflow to execute the remediation
  # MG. The remediation MG branch targets the feature branch (not main)
  # so fixes land on the feature branch for the next review cycle. After
  # remediation merges, routes to feature_pr_updater which re-requests
  # review on the feature PR before looping back to pr_platform_router.
  #
  # Uses implement-mg.yaml (not implement-pg.yaml) so the remediation
  # path benefits from PR H's pr_platform_router — both GitHub (full
  # lifecycle) and ADO (human-gate stub) are supported here.
  #
  # Invariants:
  #   Pre:  remediation_seeder.output.work_item_ids is a non-empty array;
  #         work_item_ids carry the legacy `PG-{number}` tag for
  #         `branch next-impl` / `branch close-scope` to find them.
  #   Post: Remediation MG is implemented and merged into the feature branch.
  - name: remediation_implementer
    type: workflow
    description: Execute remediation MG via implement-mg sub-workflow
    workflow: ./implement-mg.yaml
    input_mapping:
      work_item_id: "{{ workflow.input.work_item_id }}"
      # Remediation runs at the apex layer — the apex IS the root for the
      # remediation MG. Mirrors the root_id synthesis the apex driver uses
      # when dispatching MGs to implement-mg.yaml.
      root_id: "{{ workflow.input.work_item_id }}"
      pg_number: "{{ remediation_seeder.output.pg_number }}"
      # Synthesize Rev 4-valid mg_path from the legacy pg_number using the
      # same `pg-{number}` convention the apex driver applies when
      # dispatching MGs. Items in the remediation PG still carry the
      # legacy `PG-{number}` tag for `branch next-impl` /
      # `branch close-scope` to find them.
      mg_path: "pg-{{ remediation_seeder.output.pg_number }}"
      work_item_ids: "{{ remediation_seeder.output.work_item_ids }}"
      feature_branch: "{{ workflow.input.feature_branch }}"
      platform: "{{ workflow.input.platform }}"
    routes:
      - to: feature_pr_updater

  # ── Feature PR updater ─────────────────────────────────────────────────
  #
  # Re-requests review on the feature PR after the remediation PG has been
  # implemented and merged into the feature branch. Uses `gh api` to
  # dismiss stale reviews and request a fresh review cycle, then routes
  # back to pr_platform_router to re-enter the review flow.
  #
  # Invariants:
  #   Pre:  remediation_implementer has completed; remediation changes are
  #         merged into the feature branch.
  #   Post: Review is re-requested on the feature PR; routes to
  #         pr_platform_router for the next review cycle.
  - name: feature_pr_updater
    type: agent
    model: claude-sonnet-4.6
    description: Re-request review on the feature PR after remediation
    tools:
      - gh
    prompt: |
      You are the feature PR updater for the twig SDLC workflow.

      ## Your Mission

      Re-request review on the feature PR after remediation cycle
      {{ remediation_counter.output.iteration }} has completed.

      ## Context

      - **Work item:** {{ workflow.input.work_item_id }}
      - **PR number:** {{ feature_pr_creator_github.output.pr_number }}
      - **Feature branch:** {{ workflow.input.feature_branch }}
      - **Target branch:** {{ workflow.input.target_branch }}
      - **Remediation cycle:** {{ remediation_counter.output.iteration }}
      - **Addendum plan:** {{ remediation_planner.output.addendum_plan_path }}

      ## Instructions

      1. **Add a PR comment** summarizing the remediation work:
         ```
         gh pr comment {{ feature_pr_creator_github.output.pr_number }} \
           --body "## Remediation Cycle {{ remediation_counter.output.iteration }} Complete\n\nRemediation changes have been implemented and merged into the feature branch. Please re-review.\n\nAddendum plan: {{ remediation_planner.output.addendum_plan_path }}"
         ```

      2. **Re-request review** using the GitHub API. Fetch the most recent
         reviewer and re-request their review:
         ```
         gh api repos/{owner}/{repo}/pulls/{{ feature_pr_creator_github.output.pr_number }}/requested_reviewers \
           --method POST \
           -f "reviewers[]={reviewer_login}"
         ```
         If the reviewer cannot be determined, use `gh pr edit` to request
         review from the repository's default reviewers.

      3. **Mark the PR as ready for review** (in case it was in draft):
         ```
         gh pr ready {{ feature_pr_creator_github.output.pr_number }}
         ```

      ## Output

      Return a JSON object:
      ```json
      {
        "pr_number": {{ feature_pr_creator_github.output.pr_number }},
        "review_requested": true,
        "comment_posted": true,
        "remediation_cycle": {{ remediation_counter.output.iteration }}
      }
      ```
    routes:
      - to: pr_platform_router
