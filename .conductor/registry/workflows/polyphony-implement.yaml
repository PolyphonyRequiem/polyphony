# polyphony-implement — Implementation orchestration sub-workflow.
#
# Invoked by the root workflow (polyphony-full.yaml) when
# phase=ready_for_implementation or phase=in_progress. Acquires the
# same-root run lock, runs a lightweight preflight, loads the work tree
# for MG structure, and dispatches each pending MG sequentially via
# for_each to implement-mg.yaml.
#
# Invariants:
#   Pre:  work_item_id exists in ADO; phase is ready_for_implementation or in_progress.
#   Post: All MGs implemented and merged; ready for feature PR or close-out.
#         Run lock released on every exit path.
#
# PR F (Phase 4b) wiring decisions (post rubber-duck triage):
#
#   * Run lock acquired at this layer (apex). Per-MG lock acquisition
#     would self-conflict with parallel MG execution.
#
#   * Manifest init / record-approval intentionally NOT performed in
#     PR F — `polyphony manifest init` is not idempotent today and
#     requires a `--platform-project` value not available here. A
#     follow-up PR will add manifest plumbing once the verbs gain
#     read-or-init semantics. Lock alone is sufficient for run-isolation.
#
#   * MG dispatch is sequential (max_concurrent: 1) for PR F. Phase 7's
#     git-worktree work will restore parallelism safely; until then,
#     three concurrent sub-workflows in one checkout would race branch
#     checkouts and corrupt commits.
#
#   * `failure_mode: continue_on_error` on the MG group so failed MGs
#     route to a summary gate (where the lock can be released) rather
#     than short-circuit and leak the lock.
#
#   * The legacy PG-N tag bridge is preserved: `pg_dispatcher` synthesizes
#     `mg_path = pg-{number}` from each PG and threads it into
#     implement-mg.yaml. Items in the PG must still carry `PG-N` legacy
#     tags for `branch next-impl` / `branch close-scope` to find them.

workflow:
  name: polyphony-implement
  description: >-
    Implementation orchestration entry point. Acquires the same-root run
    lock, validates prerequisites with a lightweight preflight, loads the
    work tree to discover MG structure and completion status, then
    dispatches pending MGs sequentially via for_each to implement-mg.yaml.
    Releases the lock on every exit path.
  version: "1.1.0"
  entry_point: preflight_lite
  metadata:
    min_polyphony_version: "1.0.1"

  limits:
    # Implementation workflow runs a sequential for_each (max_concurrent: 1
    # for PR F, until Phase 7 worktree isolation lands) over MGs, each
    # spawning implement-mg.yaml as a sub-workflow. Each for_each iteration
    # counts toward max_iterations. Default 10 is far too low.
    max_iterations: 200

  input:
    work_item_id:
      type: number
      required: true
      description: ADO work item ID (any implementable type at any level)
    intent:
      type: string
      required: false
      default: resume
      description: "new | redo | resume"
    feature_branch:
      type: string
      required: true
      description: Feature branch that PG branches target for merge
    platform:
      type: string
      required: false
      default: github
      description: "PR platform: github | ado"

tools:
  - twig
  - gh
  - filesystem

output:
  # Workflow-scope output is a Jinja template map rendered at end-of-run.
  # Group results expose `errors`/`outputs`/`count` (no `failed_count` —
  # see M8). Boolean expressions render as capital "True"/"False" strings
  # which `_maybe_parse_json` does not coerce — wrap with `| string | lower`
  # so the parent receives a proper bool. See conductor-mechanics M7/M8.
  all_mgs_merged: "{% if mg_execution_group is defined %}{{ ((mg_execution_group.errors | length) == 0) | string | lower }}{% else %}false{% endif %}"
  # Use `| json` filter (the only registered serializer; `tojson` does not
  # exist) so the list arrives as valid JSON the parent can parse.
  completed_mgs: "{% if load_work_tree is defined %}{{ load_work_tree.output.completed_pgs | json }}{% else %}[]{% endif %}"

agents:
  # ── Lightweight preflight ──────────────────────────────────────────────
  #
  # Quick 3-check validation (twig CLI, polyphony CLI, git repo) before
  # implementation begins. Cheaper than full preflight since the root
  # workflow already ran the comprehensive preflight-check.ps1.
  #
  # Invariants:
  #   Pre:  work_item_id is a valid integer.
  #   Post: output.ready is true/false; output contains check details.
  - name: preflight_lite
    type: script
    description: Quick 3-check validation before implementation begins
    command: polyphony
    args:
      - "state"
      - "preflight-lite"
      - "--workflow-yaml"
      - "{{ workflow.file }}"
    routes:
      - to: lock_acquire
        when: "{{ preflight_lite.output.ready == true }}"
      - to: preflight_lite_gate
        when: "{{ preflight_lite.output.ready == false }}"
      # Catch-all: if `ready` is missing or non-boolean, surface to user
      # rather than ValueError. See conductor-mechanics M4.
      - to: preflight_lite_gate

  # ── Preflight lite gate (human decision point) ─────────────────────────
  #
  # Fires only when preflight_lite.output.ready == false. Presents the
  # user with a Jinja2 Markdown summary of failed checks and remediation
  # steps, then offers retry or abort (P6, P13).
  #
  # Invariants:
  #   Pre:  preflight_lite has run and output.ready == false.
  #   Post: User has chosen retry (loop) or abort (end).
  - name: preflight_lite_gate
    type: human_gate
    prompt: |
      ## ⚠️ Preflight Lite Check Failed

      {{ preflight_lite.output.summary }}

      ### Checks

      | # | Check | Status | Detail |
      |---|-------|--------|--------|
      {% for check in preflight_lite.output.checks %}
      | {{ loop.index }} | `{{ check.name }}` | {{ "✅" if check.passed else "❌" }} | {{ check.detail }} |
      {% endfor %}

      ---

      One or more required checks failed. Please fix the issues above and retry.

      Choose an action:
      - **Retry** — fix the issues above and re-run preflight checks
      - **Abort** — cancel the implementation workflow
    options:
      - label: "🔄 Retry"
        value: retry
        route: preflight_lite
      - label: "🛑 Abort"
        value: abort
        route: $end

  # ── Lock acquire ───────────────────────────────────────────────────────
  #
  # Acquires the same-root run lock at .polyphony/locks/run-{root_id}.lock.
  # Only one polyphony-implement run per root can hold this at a time. On
  # crash/kill the lock token in lock_acquire.output is lost; the operator
  # must use the lock-busy gate to force-release before resuming.
  #
  # Invariants:
  #   Pre:  preflight_lite passed.
  #   Post: output.acquired is true → output.lock_token contains the UUID
  #         used by lock_release. acquired is false → output.existing_lock
  #         describes the holder so the gate can present meaningful context.
  - name: lock_acquire
    type: script
    description: Acquire the same-root run lock
    command: polyphony
    args:
      - "lock"
      - "acquire"
      - "--root-id"
      - "{{ workflow.input.work_item_id }}"
    routes:
      - to: load_work_tree
        when: "{{ lock_acquire.output.acquired == true }}"
      - to: lock_busy_gate
        when: "{{ lock_acquire.output.acquired == false }}"
      # Catch-all: if `acquired` is missing or non-boolean, surface to user
      # rather than ValueError. See conductor-mechanics M4.
      - to: lock_busy_gate

  # ── Lock-busy gate (human decision point) ──────────────────────────────
  #
  # Fires only when lock_acquire.output.acquired == false. Surfaces the
  # existing-lock metadata so the operator can choose between waiting,
  # force-releasing the stale lock, or aborting (P6).
  #
  # Force-release routes to a dedicated `lock_force_release` script step
  # rather than performing the side-effect inside the gate (gates can only
  # route, not execute).
  #
  # Invariants:
  #   Pre:  lock_acquire ran with acquired == false.
  #   Post: User chose retry (loop), force-release (cleanup + retry), or
  #         abort ($end without holding any lock).
  - name: lock_busy_gate
    type: human_gate
    prompt: |
      ## ⚠️ Same-Root Run Lock Held

      Another polyphony-implement run holds the lock for root work item
      **{{ workflow.input.work_item_id }}**.

      {% if lock_acquire.output.existing_lock is defined %}
      **Existing lock:**
      - Acquired by: `{{ lock_acquire.output.existing_lock.acquired_by | default('unknown') }}`
      - Host:        `{{ lock_acquire.output.existing_lock.host | default('unknown') }}`
      - PID:         `{{ lock_acquire.output.existing_lock.pid | default('unknown') }}`
      - Acquired at: `{{ lock_acquire.output.existing_lock.acquired_at | default('unknown') }}`
      - TTL until:   `{{ lock_acquire.output.existing_lock.ttl_until | default('unknown') }}`
      {% endif %}

      {% if lock_acquire.output.reason is defined %}**Reason:** `{{ lock_acquire.output.reason }}`{% endif %}
      {% if lock_acquire.output.hint is defined %}

      _{{ lock_acquire.output.hint }}_
      {% endif %}

      ---

      Choose an action:
      - **Retry** — re-attempt acquire (use if you believe the other run finished)
      - **Force release & retry** — destructively release the existing lock then retry (use only if the holder is dead)
      - **Abort** — exit without holding any lock
    options:
      - label: "🔄 Retry"
        value: retry
        route: lock_acquire
      - label: "💥 Force release & retry"
        value: force_release
        route: lock_force_release
      - label: "🛑 Abort"
        value: abort
        route: $end

  # ── Lock force-release ─────────────────────────────────────────────────
  #
  # Operator-confirmed force-release of the same-root run lock. No token
  # required (token-less by design — this is the recovery path for stale
  # locks whose acquirer is dead). After force-release, loops back to
  # lock_acquire so the current run can take ownership.
  #
  # Invariants:
  #   Pre:  Operator chose `force_release` from lock_busy_gate.
  #   Post: Lock file removed; control returns to lock_acquire.
  - name: lock_force_release
    type: script
    description: Force-release the existing run lock (operator-confirmed)
    command: polyphony
    args:
      - "lock"
      - "force-release"
      - "--root-id"
      - "{{ workflow.input.work_item_id }}"
    routes:
      - to: lock_acquire

  # ── Load work tree ─────────────────────────────────────────────────────
  #
  # Loads the full work item hierarchy and produces PG-grouped JSON with
  # completion status via load-work-tree.ps1. Outputs pr_groups (with
  # task_ids, branch names, completion flags), completed_pgs, pending_pgs,
  # and next_pg for downstream routing.
  #
  # Invariants:
  #   Pre:  preflight_lite.output.ready == true.
  #   Post: output contains work_tree, pr_groups, completed_pgs, pending_pgs.
  - name: load_work_tree
    type: script
    description: Load work item hierarchy and PG structure with completion status
    command: polyphony
    args:
      - "branch"
      - "load-tree"
      - "--work-item"
      - "{{ workflow.input.work_item_id }}"
    routes:
      - to: pg_dispatcher
        when: "{{ load_work_tree.output.pending_pgs | length > 0 }}"
      - to: lock_release
        when: "{{ load_work_tree.output.pending_pgs | length == 0 }}"
      # Catch-all: if `pending_pgs` is missing or non-array, route to
      # lock_release so we never leave the lock held.
      # See conductor-mechanics M4.
      - to: lock_release

  # ── PG dispatcher ──────────────────────────────────────────────────────
  #
  # Transforms load_work_tree output into the structured array needed by
  # for_each. Extracts pending PGs with their pg_number, work_item_ids,
  # branch_name, feature_branch, AND a Rev 4-compliant `mg_path` synthesized
  # from the PG number (transitional bridge — see PR F notes at top).
  #
  # The synthesized `mg_path` MUST satisfy `^[a-z][a-z0-9-]{0,30}$` per
  # MergeGroupId.GrammarPattern. Bare digits (`"1"`) would fail validation
  # in `polyphony branch ensure-mg`, so we use the prefixed form `pg-1`.
  #
  # Invariants:
  #   Pre:  load_work_tree has run; pending_pgs is non-empty.
  #   Post: output.pgs is an array of MG descriptors for for_each dispatch.
  - name: pg_dispatcher
    type: script
    description: Prepare pending PGs for sequential dispatch to implement-mg
    command: pwsh
    args:
      - "-NoProfile"
      - "-Command"
      - >-
        $tree = '{{ load_work_tree.output | json }}' | ConvertFrom-Json;
        $featureBranch = '{{ workflow.input.feature_branch }}';
        $pgs = @();
        foreach ($pg in $tree.pr_groups) {
          if (-not $pg.completed) {
            $num = [int]($pg.name -replace '^PG-(\d+).*', '$1');
            $childIds = @($pg.child_ids);
            $containerIds = @($pg.work_item_ids);
            $allIds = @($childIds + $containerIds | Sort-Object -Unique);
            $pgs += [ordered]@{
              number = $num;
              name = $pg.name;
              mg_path = "pg-$num";
              work_item_ids = $allIds;
              branch_name = $pg.branch_name_suggestion;
              feature_branch = $featureBranch;
            }
          }
        }
        [ordered]@{ pgs = $pgs; pg_count = $pgs.Count } | ConvertTo-Json -Depth 5
    routes:
      - to: mg_execution_group

  # ── PG execution group (for_each) ──────────────────────────────────────
  #
  # Defined as a top-level `for_each:` block at the bottom of this file.
  # Conductor's schema requires for_each groups to be siblings of `agents:`,
  # NOT nested inside agents-list items — see the for_each: block below.

  # ── MG summary gate (human decision point) ─────────────────────────────
  #
  # Fires only when one or more MG sub-workflows failed. Surfaces failures
  # to the user so they can decide whether to retry failed MGs or abort.
  # Critically, both options route through lock_release_pre_abort so the
  # run lock is never leaked on the abort path.
  #
  # Invariants:
  #   Pre:  mg_execution_group has completed with at least one failure.
  #   Post: User has acknowledged the partial failure; workflow ends or retries.
  - name: pg_summary_gate
    type: human_gate
    prompt: |
      ## ⚠️ MG Execution Partial Failure

      Implementation for work item **{{ workflow.input.work_item_id }}** completed with errors.

      - **Succeeded:** {{ mg_execution_group.outputs | length }}
      - **Failed:** {{ mg_execution_group.errors | length }}

      Some merge groups were not implemented successfully. Review the failures
      and re-run the implementation workflow to retry failed MGs (state
      discovery will skip already-completed MGs).

      ---

      Choose an action:
      - **Retry** — re-dispatch (completed MGs will be skipped; lock is retained)
      - **Abort** — release the lock and end the implementation workflow
    options:
      - label: "🔄 Retry"
        value: retry
        route: load_work_tree
      - label: "🛑 Abort"
        value: abort
        route: lock_release_pre_abort

  # ── Lock release (success path) ────────────────────────────────────────
  #
  # Releases the same-root run lock after successful MG dispatch (or when
  # the work tree has nothing pending). Wrapped in pwsh so token-mismatch
  # / not-held outcomes from `polyphony lock release` (which exits non-zero
  # for token mismatch) are normalized into workflow-success — at this
  # point the work is done and a stale lock is recoverable via the gate
  # on the next run, so we should not fail the workflow on a release hiccup.
  #
  # Invariants:
  #   Pre:  Work is done OR there was nothing to do.
  #   Post: Lock removed if our token matched; otherwise lock left intact
  #         (will time out on its own TTL or be force-released next run).
  - name: lock_release
    type: script
    description: Best-effort release of the same-root run lock (success path)
    command: pwsh
    args:
      - "-NoProfile"
      - "-Command"
      - >-
        $rootId = {{ workflow.input.work_item_id }};
        $token = '{{ lock_acquire.output.lock_token | default('') }}';
        if ([string]::IsNullOrWhiteSpace($token)) {
          [ordered]@{ released = $false; reason = 'no-token-in-context' } | ConvertTo-Json;
          exit 0;
        }
        $raw = polyphony lock release --root-id $rootId --lock-token $token 2>&1;
        $exit = $LASTEXITCODE;
        try {
          $parsed = $raw | Out-String | ConvertFrom-Json;
          $released = [bool]($parsed.released);
          $reason = $parsed.reason;
        } catch {
          $released = ($exit -eq 0);
          $reason = 'unparseable-output';
        }
        [ordered]@{ released = $released; reason = $reason; exit_code = $exit } | ConvertTo-Json;
        exit 0
    routes:
      - to: $end

  # ── Lock release (abort path) ──────────────────────────────────────────
  #
  # Same logic as lock_release but used on the abort branch from the
  # summary gate, so a partial-failure abort still releases the lock.
  # Kept as a separate node because conductor identifies agents by name
  # in the route graph and we want the success path and abort path to
  # be distinguishable in event logs.
  #
  # Invariants:
  #   Pre:  pg_summary_gate routed user choice "abort" here.
  #   Post: Lock removed if our token matched; control reaches $end.
  - name: lock_release_pre_abort
    type: script
    description: Best-effort release of the same-root run lock (abort path)
    command: pwsh
    args:
      - "-NoProfile"
      - "-Command"
      - >-
        $rootId = {{ workflow.input.work_item_id }};
        $token = '{{ lock_acquire.output.lock_token | default('') }}';
        if ([string]::IsNullOrWhiteSpace($token)) {
          [ordered]@{ released = $false; reason = 'no-token-in-context' } | ConvertTo-Json;
          exit 0;
        }
        $raw = polyphony lock release --root-id $rootId --lock-token $token 2>&1;
        $exit = $LASTEXITCODE;
        try {
          $parsed = $raw | Out-String | ConvertFrom-Json;
          $released = [bool]($parsed.released);
          $reason = $parsed.reason;
        } catch {
          $released = ($exit -eq 0);
          $reason = 'unparseable-output';
        }
        [ordered]@{ released = $released; reason = $reason; exit_code = $exit } | ConvertTo-Json;
        exit 0
    routes:
      - to: $end


# ─────────────────────────────────────────────────────────────────────────────
# For-each groups
# ─────────────────────────────────────────────────────────────────────────────
#
# Conductor's schema requires `for_each:` to be a top-level key (sibling of
# `agents:`), NOT nested inside an agents-list item. Pydantic's AgentDef has
# no `extra = "forbid"`, so misnesting silently drops the for_each field and
# the wrapper is treated as a no-op `type: agent` that defaults to gpt-4o.
# See dogfood_findings #8 (polyphony fix) and microsoft/conductor#140
# (schema hardening).

for_each:
  # ── MG execution group ───────────────────────────────────────────────────
  #
  # Sequential MG execution: spawns one implement-mg.yaml sub-workflow per
  # pending PG (now MG) from the pg_dispatcher output.
  #
  # max_concurrent: 1 for PR F. Parallel MG dispatch (max_concurrent: 3 in
  # the legacy implement-pg flow) is unsafe today because all sub-workflows
  # share the same git working tree and would race branch checkouts. Phase 7
  # will introduce per-MG git worktrees and restore parallelism.
  #
  # failure_mode: continue_on_error so failed MGs flow to the summary gate
  # via the group-level routes (where lock can be released). With fail_fast
  # the group short-circuits and the lock would leak.
  #
  # Invariants:
  #   Pre:  pg_dispatcher.output.pgs is a non-empty array of MG descriptors.
  #   Post: Each MG has been implemented, PR'd, and merged (or recorded
  #         as failed in mg_execution_group.errors).
  - name: mg_execution_group
    type: for_each
    description: Sequential per-MG implementation via implement-mg.yaml
    # `source:` is a bare dotted path, NOT a Jinja expression. Wrapping
    # in {{ }} causes config-load rejection. See conductor-mechanics M8.
    source: pg_dispatcher.output.pgs
    as: pg
    max_concurrent: 1
    failure_mode: continue_on_error
    agent:
      name: implement_mg
      type: workflow
      workflow: ./implement-mg.yaml
      input_mapping:
        work_item_id: "{{ workflow.input.work_item_id }}"
        # apex IS root in this orchestration layer
        root_id: "{{ workflow.input.work_item_id }}"
        pg_number: "{{ pg.number }}"
        mg_path: "{{ pg.mg_path }}"
        work_item_ids: "{{ pg.work_item_ids }}"
        feature_branch: "{{ pg.feature_branch }}"
    routes:
      # Group results expose `errors` / `outputs` / `count`. There is no
      # `failed_count` / `succeeded_count` aggregate — derive from
      # `errors | length`. See conductor-mechanics M8.
      - to: pg_summary_gate
        when: "{{ (mg_execution_group.errors | length) > 0 }}"
      - to: lock_release
        when: "{{ (mg_execution_group.errors | length) == 0 }}"
      # Catch-all guards against unexpected group state. Route to the
      # summary gate so the user can decide; the gate's abort path will
      # release the lock.
      - to: pg_summary_gate