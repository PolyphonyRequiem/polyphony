# apex-driver — Phase 7 keystone SDLC orchestrator.
#
# Replaces the deleted `polyphony-full.yaml`. Walks the apex
# (run-root) work item's tree as discovered by `polyphony worklist
# build`, edge-checks the result, and dispatches each item into the
# right lifecycle sub-workflow per wave. Per-item worktrees keep
# parallel dispatches isolated; topological wave integration merges
# completed branches back into the apex feature branch in
# edge-correct order.
#
# Four-input contract:
#
#   apex_id  — REQUIRED. The apex (run-root feature) work-item id.
#              Treated as the tree root for `polyphony worklist build`.
#   intent   — REQUIRED. One of `new` / `resume` / `replan`. Drives
#              preflight behavior; the dispatch loop itself is purely
#              observable-state-driven (P3) and identical across all
#              three intents.
#
# Design picks (signed off — see docs/decisions/apex-driver.md):
#
#   Q1 — Dispatch granularity is parallel-by-default within wave with
#        per-item worktree isolation. `isolation_scope: per_mg`
#        (planner-declared on the parent MG container) serializes the
#        wave's items inside a shared MG worktree; `per_item` (default)
#        spawns a fresh worktree per item and runs them in parallel
#        bounded by `concurrency.max_concurrent_pgs`. MVP ships
#        per_item; per_mg serialization is a stub (defers to per_item
#        until a follow-up wires the MG container check).
#
#   Q2 — Multi-facet items execute in planner-declared `facet_sequence`
#        order. The default is `[actionable, implementable]`: action
#        evidence is satisfied first, then implementation. The
#        lifecycle-router script picks whichever facet is currently
#        dispatchable; the implicit `action_satisfied → implementation_merged`
#        edge in the requirement set enforces sequencing without the
#        workflow needing to re-read `process-config.yaml`.
#
#   Q3 — Renegotiation bubble-up is gated by `renegotiation.auto_decide`
#        in `.conductor/policy.yaml`:
#          - `prompt`       — surface the renegotiation human gate
#                             (default — `renegotiation_gate` below).
#          - `auto_restart` — re-enter the parent's plan-level workflow
#                             so the parent can re-author. MVP STUB:
#                             treated identically to `prompt` until the
#                             auto-restart loop ships in a follow-up.
#          - `ignore`       — treat the child plan as accepted; continue.
#                             MVP STUB: not yet wired (would require a
#                             policy reader step to short-circuit the
#                             gate to `override`).
#        plan-level.yaml DOES emit the four bubble-up outputs as of
#        PR #144 (`renegotiation_pending`, `renegotiation_request`,
#        `validate_scope_verdict`, `scope_violation_files`). The
#        bubble-up is now wired end-to-end:
#           plan-level → apex-item-dispatch.output.renegotiation_pending
#           apex-item-dispatch → apex-wave-dispatch.aggregate_renegotiation
#           apex-wave-dispatch → apex-driver.renegotiation_summary
#           apex-driver.renegotiation_summary → renegotiation_gate.
#
#   Q4 — Resume is pure observable-state re-entry. `intent: resume`
#        re-runs `worklist build` + `edges check` and lets the
#        dispatch loop pick up wherever the prior run left off. The
#        apex-driver writes NO checkpoint state of its own; the source
#        of truth is the work-item tree (P1).
#
#   Q5 — Outer iterate-until-stable loop (PR #9, Option α). Wraps the
#        existing wave dispatch loop so multi-facet items
#        (plannable+implementable, etc.) traverse their facets in a
#        SINGLE apex-driver invocation rather than one invocation per
#        facet. Each outer iteration:
#          1. (Re)builds the worklist via `polyphony worklist build` —
#             observers see post-merge state from prior iterations
#             (P1: source-of-truth is the work-item tree).
#          2. Dispatches every wave (existing flow).
#          3. Aggregates per-iteration progress via the wave-level
#             `items_satisfied_count` and `items_dispatched_count`
#             (added to apex-wave-dispatch.yaml in the same PR).
#          4. Consults `polyphony state next-ready --work-item {apex_id}`
#             — `item_satisfied: Satisfied` here is closed-loop honest
#             as of PR #5.
#          5. Decides `complete | cap | blocked | continue`.
#        Cap defaults to 10 (override via
#        POLYPHONY_APEX_MAX_DISPATCH_ITERATIONS); see `outer_loop_evaluator`
#        below. Option β (per-facet wave fan-out in worklist build) was
#        deliberately deferred — see closed-loop-state-plan §4 PR #9
#        footnote for revisit conditions.
#
# Routing-style envelope contract (per polyphony-workflow-author skill):
#   * Every script step ALWAYS exits 0; failures surface via JSON
#     envelope fields (`success`, `error_code`, etc.).
#   * Workflows route on envelope fields, NOT exit codes.
#
# Conductor mechanics gotchas honored throughout:
#   M3  StrictUndefined — every cross-leg verb output is guarded with
#       `is defined`; nested attributes use `default(...)` only on
#       the attribute, not the variable.
#   M4  Routes have no implicit fallback — every reachable agent
#       state has an explicit catch-all `to:` last.
#   M7  Workflow `output:` map booleans piped through `| string | lower`.
#   M8  for_each `source:` is a BARE dotted path (not Jinja-quoted);
#       errors-array surfaced as `<group>.errors`; results in `<group>.outputs`.
#   M9  `max_iterations` raised well above default 10 — the dispatch
#       loop is a wave for_each over a worklist that may contain
#       hundreds of items.
#
# Forward references (DEFERRED — DO NOT add in this PR):
#   * E2E execution tests (separate PR p7-tree-walker-e2e).
#   * Per-MG worktree serialization (currently per_item only).
#   * Auto-restart on renegotiation (currently prompt-equivalent).
#   * Caller cutover (no production caller wired to apex-driver yet).

workflow:
  name: apex-driver
  description: >-
    Tree-walking apex-level SDLC orchestrator. Dispatches each work
    item under `apex_id` into the right lifecycle sub-workflow
    (plan-level / actionable / implement-pg / feature-pr / fast-path)
    in topological wave order, with per-item worktree isolation and
    edge-correct wave integration. Wraps the wave dispatch in an
    outer iterate-until-stable loop (PR #9) so multi-facet items
    (plannable+implementable, etc.) traverse plan → impl → close in a
    single invocation rather than requiring per-facet re-invocation.
    Replaces the deleted polyphony-full.yaml.
  version: "2.2.0"
  entry_point: preflight_sync
  metadata:
    min_polyphony_version: "2.2.0"

  limits:
    # The dispatch loop is a for_each over waves; each wave is itself a
    # for_each over items; each item invocation is a sub-workflow. The
    # default 10 is wildly insufficient. 500 covers an apex tree with up
    # to ~30 waves of ~16 items each comfortably; raise further if
    # workspaces routinely exceed.
    max_iterations: 500

  input:
    apex_id:
      type: number
      required: true
      description: >-
        ADO work item id of the apex (run-root feature). Treated as the
        tree root for `polyphony worklist build`. Type is
        runtime-injected (P5 — type-agnostic).
    intent:
      type: string
      required: false
      default: new
      description: >-
        One of `new` / `resume` / `replan`. Drives preflight behavior:
        - new     — fresh start; ensure feature branch from origin/main.
        - resume  — re-enter an in-flight apex; re-run worklist + edges
                    and let the dispatch loop pick up.
        - replan  — same as `new` for now; reserved for a future hook
                    that re-invokes plan-level on the apex.
    platform:
      type: string
      required: false
      default: ado
      description: >-
        Work-item source platform. Threaded through to lifecycle
        sub-workflows verbatim; apex-driver itself is platform-agnostic.
    organization:
      type: string
      required: true
      description: >-
        ADO organization name. Required by every preflight step that
        touches ADO (manifest-bootstrap, feature-pr, plan-level).
        Threaded through the wave/item dispatch fan-out so per-item
        lifecycles see it without each caller having to special-case.
        Declared `required: true` (not `default: ""`) so conductor
        rejects the run at the door rather than letting downstream
        scripts fail with cryptic "empty value" errors. When a github
        leg ships, callers on that leg can pass `--input organization=n/a`
        until we split this into per-platform required-ness.
    project:
      type: string
      required: true
      description: ADO project name (see `organization`).
    repository:
      type: string
      required: true
      description: ADO repository identifier (GUID or name) (see `organization`).

tools:
  - twig

# Workflow-level output map. Per M3 every reference to a verb's output
# is guarded with `is defined`; per M7 booleans are piped through
# `| string | lower` so the parent receives a real bool not capital
# "True" / "False".
output:
  apex_id: "{{ workflow.input.apex_id }}"
  satisfied: >-
    {%- if terminal_apex_satisfied is defined -%}true
    {%- else -%}false{%- endif -%}
  abandoned: >-
    {%- if terminal_apex_abandoned is defined -%}true
    {%- else -%}false{%- endif -%}
  preflight_failed: >-
    {%- if terminal_preflight_failed is defined -%}true
    {%- else -%}false{%- endif -%}
  # ── Outer-loop terminals (PR #9) ───────────────────────────────────────
  # `iteration_cap_hit` fires when the apex.max_dispatch_iterations
  # ceiling was reached without `item_satisfied` rolling all the way
  # up. `blocked` fires when an iteration produced zero new dispatches
  # AND the apex isn't satisfied — the workflow can't progress under
  # its own steam (typically: an external dependency, a missing agent
  # corridor, or a true human-input gap).
  iteration_cap_hit: >-
    {%- if terminal_apex_iteration_cap is defined -%}true
    {%- else -%}false{%- endif -%}
  blocked: >-
    {%- if terminal_apex_blocked is defined -%}true
    {%- else -%}false{%- endif -%}
  iterations_used: >-
    {%- if outer_loop_evaluator is defined -%}{{ outer_loop_evaluator.output.iteration | default(0) }}
    {%- else -%}0{%- endif -%}
  renegotiation_pending: >-
    {%- if renegotiation_summary is defined -%}{{ (renegotiation_summary.output.any_pending | default(false)) | string | lower }}
    {%- else -%}false{%- endif -%}

agents:
  # ─────────────────────────────────────────────────────────────────────────
  # SECTION 1 — Preflight
  #
  # Sync work-item state, validate the apex resolves, and ensure the
  # apex feature branch exists. All preflight steps are idempotent so
  # `intent: resume` re-runs them safely.
  # ─────────────────────────────────────────────────────────────────────────

  # ── Preflight: sync ADO state ─────────────────────────────────────────────
  #
  # Pull the latest work-item state from ADO so worklist build sees
  # current dispositions. Always run, even on resume — the operator may
  # have edited items between invocations.
  #
  # Invariants:
  #   Pre:  twig is configured for the active workspace.
  #   Post: local twig cache is fresh.
  - name: preflight_sync
    type: script
    description: Sync work-item cache from ADO via twig
    command: twig
    args:
      - "sync"
    routes:
      - to: preflight_apex_state
      # Catch-all per M4 — twig sync failures shouldn't halt the run;
      # apex-driver continues with stale cache and the operator can
      # re-invoke if dispatch picks up wrong state.
      - to: preflight_apex_state

  # ── Preflight: validate apex via state next-ready ─────────────────────────
  #
  # Confirms the apex id resolves to a real, dispatchable tree. Uses
  # `polyphony state next-ready` rather than a custom validator — it
  # already knows how to resolve work-item types and emits a structured
  # status. If the apex is satisfied or empty already, fast-path to the
  # close section.
  #
  # Invariants:
  #   Pre:  workflow.input.apex_id is a positive integer.
  #   Post: preflight_apex_state.output.status is one of
  #         {dispatchable, monitoring, satisfied, empty, blocked, error}.
  - name: preflight_apex_state
    type: script
    description: Validate apex resolves and inspect its starting status
    command: polyphony
    args:
      - "state"
      - "next-ready"
      - "--work-item"
      - "{{ workflow.input.apex_id }}"
    routes:
      - to: preflight_ensure_branch
        when: "{{ preflight_apex_state.output.status == 'dispatchable' }}"
      - to: preflight_ensure_branch
        when: "{{ preflight_apex_state.output.status == 'monitoring' }}"
      - to: preflight_ensure_branch
        when: "{{ preflight_apex_state.output.status == 'blocked' }}"
      - to: terminal_apex_satisfied
        when: "{{ preflight_apex_state.output.status == 'satisfied' }}"
      - to: terminal_apex_satisfied
        when: "{{ preflight_apex_state.output.status == 'empty' }}"
      - to: preflight_failure_gate
        when: "{{ preflight_apex_state.output.status == 'error' }}"
      # M4 catch-all — unknown statuses surface via the failure gate.
      - to: preflight_failure_gate

  # ── Preflight: ensure feature branch ─────────────────────────────────────
  #
  # Idempotent — `polyphony branch ensure-feature` reuses an existing
  # local/remote branch when present. Spawns from origin/main on first
  # run; on resume, the branch is already there and the verb is a no-op.
  #
  # Invariants:
  #   Pre:  preflight_apex_state confirmed a dispatchable tree.
  #   Post: feature/{apex_id} exists locally.
  - name: preflight_ensure_branch
    type: script
    description: Ensure feature/{apex_id} exists (idempotent)
    command: polyphony
    args:
      - "branch"
      - "ensure-feature"
      - "--branch"
      - "feature/{{ workflow.input.apex_id }}"
    routes:
      - to: init_manifest
        when: "{{ preflight_ensure_branch.output.error is not defined or preflight_ensure_branch.output.error == '' }}"
      - to: preflight_failure_gate
      # M4 catch-all
      - to: preflight_failure_gate

  # ── Preflight: initialize run manifest ───────────────────────────────────
  #
  # Creates `.polyphony/run.yaml` if missing; validates an existing
  # manifest matches the requested apex (root_id). The manifest is the
  # canonical resume key — `polyphony worklist build` reads it.
  #
  # Topology-hash validation against the live ADO tree is intentionally
  # deferred (see manifest-bootstrap.ps1 docstring + branch-model ADR).
  # For this MVP, matching root_id is sufficient to consider an existing
  # manifest reusable.
  #
  # Invariants:
  #   Pre:  feature branch ensured.
  #   Post: .polyphony/run.yaml exists AND its root_id matches apex_id.
  - name: init_manifest
    type: script
    description: Initialize or validate the per-run manifest (.polyphony/run.yaml)
    command: pwsh
    args:
      - "-NoProfile"
      - "-File"
      - "{{ workflow.dir }}/../scripts/manifest-bootstrap.ps1"
      - "-ApexId"
      - "{{ workflow.input.apex_id }}"
      - "-Organization"
      - "{{ workflow.input.organization }}"
      - "-Project"
      - "{{ workflow.input.project }}"
    routes:
      - to: commit_and_push_manifest
        when: "{{ init_manifest.output.success | string | lower == 'true' }}"
      - to: preflight_failure_gate
      # M4 catch-all
      - to: preflight_failure_gate

  # ── Preflight: commit + push the manifest to feature/{apex_id} ───────────
  #
  # Closes the structural manifest-lifecycle gap surfaced by bug #12 (#179).
  # `init_manifest` writes `.polyphony/run.yaml` to the worktree filesystem
  # but never commits it. Downstream verbs that enforce the branch-model
  # invariant ("manifest lives on origin/feature/{root}") — most notably
  # `polyphony pr open-plan-pr` — read from the remote and would fail the
  # entire run on a fresh apex without this step.
  #
  # The verb is idempotent: a no-op when the manifest already matches HEAD
  # on feature/{apex_id}. Refuses to run on the wrong branch (encodes the
  # ADR's "manifest must be committed on feature branch" rule at the verb
  # boundary, not in YAML).
  #
  # Invariants:
  #   Pre:  init_manifest succeeded; worktree on feature/{apex_id}.
  #   Post: origin/feature/{apex_id}:.polyphony/run.yaml exists and matches
  #         the local file.
  - name: commit_and_push_manifest
    type: script
    description: Commit and push .polyphony/run.yaml to feature/{apex_id}
    command: polyphony
    args:
      - "manifest"
      - "commit-and-push"
      - "--root-id"
      - "{{ workflow.input.apex_id }}"
    routes:
      - to: declare_root
        when: "{{ commit_and_push_manifest.output.error_code is not defined or commit_and_push_manifest.output.error_code == '' }}"
      - to: preflight_failure_gate
      # M4 catch-all
      - to: preflight_failure_gate

  # ── Preflight: stamp the polyphony:root marker tag ───────────────────────
  #
  # Per docs/polyphony-tags.md §"Workflow integration":
  # > Entry: tree-walker receives root_id as input. Calls
  # > `polyphony root declare {root_id}` (idempotent) to stamp the root tag.
  #
  # Without this stamp, `polyphony root resolve` (used inside lifecycle
  # sub-workflows for ancestor walks) returns `fallback_required: true` and
  # the descent gate fires for every descendant. Idempotent — safe to run
  # on resumes; emits `changed: false` when the tag already exists.
  #
  # Invariants:
  #   Pre:  apex_id is a valid ADO work item.
  #   Post: apex_id carries the `polyphony:root` system tag.
  - name: declare_root
    type: script
    description: Stamp polyphony:root on the apex item (idempotent)
    command: polyphony
    args:
      - "root"
      - "declare"
      - "--work-item"
      - "{{ workflow.input.apex_id }}"
    routes:
      - to: preflight_failure_gate
        when: "{{ declare_root.output.error is defined and declare_root.output.error != '' }}"
      - to: outer_loop_init
      # M4 catch-all
      - to: preflight_failure_gate

  # ── Outer loop init (PR #9 — apex-driver iterate-until-stable) ────────────
  #
  # Resets the per-apex iteration counter file so a fresh invocation
  # starts from iteration 0. Counter is keyed on apex_id and lives
  # under [System.IO.Path]::GetTempPath() so it survives across the
  # workflow's own steps (each script step is a fresh PowerShell process)
  # but is naturally scoped to the apex.
  #
  # The outer loop body lives between `build_worklist` and
  # `outer_loop_evaluator` (post-wave-loop). Each pass through the
  # body increments the counter; the evaluator decides whether to loop
  # back, terminate happy, or terminate as cap/blocked. See
  # `apex.max_dispatch_iterations` (default 10) below.
  #
  # Invariants:
  #   Pre:  declare_root succeeded.
  #   Post: counter file exists with value "0".
  - name: outer_loop_init
    type: script
    description: Reset the per-apex outer-loop iteration counter (PR #9)
    command: pwsh
    args:
      - "-NoProfile"
      - "-Command"
      - >-
        $counterFile = Join-Path ([System.IO.Path]::GetTempPath()) "apex-driver-iter-{{ workflow.input.apex_id }}";
        Set-Content -Path $counterFile -Value "0" -NoNewline;
        [ordered]@{
          apex_id = {{ workflow.input.apex_id }};
          iteration = 0;
          counter_file = $counterFile;
          reset = $true;
        } | ConvertTo-Json -Compress
    routes:
      - to: build_worklist

  # ─────────────────────────────────────────────────────────────────────────
  # SECTION 2 — Dispatch loop
  #
  # The heart of the apex-driver. Each pass:
  #   1. Build the worklist (waves of work items in topological order).
  #   2. Edge-check for cross-item conflicts.
  #   3. Iterate waves, dispatching each item into its lifecycle
  #      sub-workflow inside a per-item worktree.
  #   4. Integrate completed branches back into the feature branch.
  #
  # Re-entry note (P3): the loop is purely observable-state-driven.
  # On `intent: resume` the worklist build returns the current wave
  # structure; already-satisfied items classify as `fast-path` and
  # short-circuit; in-flight items classify as `monitoring`.
  # ─────────────────────────────────────────────────────────────────────────

  # ── Build worklist ────────────────────────────────────────────────────────
  #
  # Walks the apex tree and groups work items into topological waves.
  # Always exit 0 (routing-style); has_conflicts surfaces via the
  # envelope.
  #
  # Invariants:
  #   Pre:  apex_id resolves to a tree containing at least one item.
  #   Post: build_worklist.output.waves is an array of
  #         { wave_index, items[] } in topological order.
  - name: build_worklist
    type: script
    description: Build the apex worklist (topological waves)
    command: polyphony
    args:
      - "worklist"
      - "build"
      - "--root-id"
      - "{{ workflow.input.apex_id }}"
      - "--json"
    routes:
      - to: check_conflicts
        when: "{{ build_worklist.output.error is not defined or build_worklist.output.error == '' }}"
      - to: worklist_failure_gate
      # M4 catch-all
      - to: worklist_failure_gate

  # ── Check edge conflicts ──────────────────────────────────────────────────
  #
  # Cross-item conflict detection is run separately from worklist build
  # so the conflict list can be surfaced through its own dedicated gate
  # without losing the wave structure on a re-run.
  #
  # Invariants:
  #   Pre:  build_worklist succeeded.
  #   Post: check_conflicts.output.has_conflicts is bool; conflicts[]
  #         is non-empty when has_conflicts is true.
  - name: check_conflicts
    type: script
    description: Edge-check the apex tree for cross-item conflicts
    command: polyphony
    args:
      - "edges"
      - "check"
      - "{{ workflow.input.apex_id }}"
      - "--render"
      - "json"
    routes:
      # `polyphony edges check` is routing-style — error envelope wins
      # over the conflict bool. Send envelope errors through the
      # worklist gate so the operator sees the same failure surface as
      # build_worklist errors.
      - to: worklist_failure_gate
        when: "{{ check_conflicts.output.error is defined and check_conflicts.output.error != '' }}"
      - to: conflict_resolution_gate
        when: "{{ check_conflicts.output.has_conflicts | string | lower == 'true' }}"
      - to: wave_dispatch_loop
        when: "{{ check_conflicts.output.has_conflicts | string | lower == 'false' }}"
      # M4 catch-all — undefined has_conflicts means the JSON envelope
      # wasn't shaped as expected; treat as a worklist-layer failure.
      - to: worklist_failure_gate

  # ── Conflict resolution gate ─────────────────────────────────────────────
  #
  # Surfaces edge conflicts (e.g. circular dependencies, unsatisfiable
  # rollups) to a human. Operator picks `retry` (re-run the loop after
  # editing items in ADO) or `abort` (halt the workflow).
  #
  # P6 — this is a genuine human decision; no policy override yet.
  - name: conflict_resolution_gate
    type: human_gate
    description: Edge conflicts detected — operator decides retry or abort
    prompt: |
      ## ⚠️ Edge conflicts detected in the apex tree

      `polyphony edges check` reported cross-item conflicts in the
      worklist for apex **#{{ workflow.input.apex_id }}**. The dispatch
      loop cannot proceed until they are resolved.

      ### Conflicts

      ```
      {{ check_conflicts.output.conflicts | tojson(indent=2) }}
      ```

      ### Options

      - **Retry** — fix the offending items in ADO (re-parent, mark
        satisfied, etc.) then retry the dispatch loop. This re-runs
        worklist build + edge check from scratch.
      - **Abort** — halt the workflow with `apex_satisfied=false`. Use
        this when the conflict reveals a structural problem worth
        re-planning at a higher level.
    options:
      - label: "🔁 Retry — I fixed the conflicts in ADO"
        value: retry
        route: build_worklist
      - label: "🛑 Abort"
        value: abort
        route: terminal_apex_abandoned

  # ── Wave dispatch loop ────────────────────────────────────────────────────
  #
  # See top-level `for_each: wave_dispatch_loop` at end of file. Conductor
  # schema requires for_each blocks to live in their own top-level section,
  # not nested under `agents:` (M8). Routes cross sections — agents here
  # route to `wave_dispatch_loop`, and `wave_dispatch_loop` routes back to
  # `wave_loop_summary` below.

  # ── Wave loop summary ────────────────────────────────────────────────────
  #
  # Inspects the for_each `errors` array (per M8 there's no
  # `failed_count`; we derive it via length). When all waves succeeded,
  # transitions to the apex_completion_gate. When any wave failed,
  # surface via wave_failed_gate.
  - name: wave_loop_summary
    type: script
    description: Summarize the wave dispatch loop outcome
    command: pwsh
    args:
      - "-NoProfile"
      - "-Command"
      - >-
        $failed = {{ wave_dispatch_loop.errors | length }};
        $total  = {{ wave_dispatch_loop.count }};
        [ordered]@{
          total_waves   = $total;
          failed_waves  = $failed;
          all_succeeded = ($failed -eq 0);
        } | ConvertTo-Json -Compress
    routes:
      - to: renegotiation_summary
        when: "{{ wave_loop_summary.output.all_succeeded | string | lower == 'true' }}"
      - to: wave_failed_gate
      # M4 catch-all
      - to: wave_failed_gate

  # ── Renegotiation summary ────────────────────────────────────────────────
  #
  # Aggregates `renegotiation_pending` across the wave dispatch loop's
  # outputs. Each wave's apex-wave-dispatch.output.renegotiation_pending
  # is a "true" | "false" string (per M7). When ANY wave bubbled up
  # `true`, route to `renegotiation_gate`; otherwise straight on to
  # `apex_completion_gate`.
  #
  # Per M8 there is no `output:` on the for_each group; per-wave outputs
  # live under `wave_dispatch_loop.outputs.<key>`. We `tojson` the
  # outputs dict and parse it inside pwsh — same pattern as
  # apex-wave-dispatch's `aggregate_renegotiation` step.
  - name: renegotiation_summary
    type: script
    description: Aggregate renegotiation_pending across the wave dispatch loop
    command: pwsh
    args:
      - "-NoProfile"
      - "-Command"
      - |
        $raw = @'
        {{ wave_dispatch_loop.outputs | tojson }}
        '@;
        $items = @();
        $any = $false;
        try {
          $parsed = $raw | ConvertFrom-Json;
          $values = if ($parsed -is [System.Collections.IEnumerable] -and -not ($parsed -is [string])) { $parsed }
                    else { $parsed.PSObject.Properties.Value };
          foreach ($v in $values) {
            if ($null -eq $v) { continue }
            $pending = $false;
            if ($v.PSObject.Properties.Name -contains 'renegotiation_pending') {
              $val = "$($v.renegotiation_pending)".ToLowerInvariant();
              $pending = ($val -eq 'true');
            }
            if ($pending) {
              $any = $true;
              $items += [ordered]@{
                wave_index = $v.wave_index;
                renegotiation_items = $v.renegotiation_items;
              };
            }
          }
        } catch {
          $any = $false;
          $items = @();
        }
        [ordered]@{
          any_pending = $any;
          waves = ($items | ConvertTo-Json -Compress -Depth 6);
          wave_count = $items.Count;
        } | ConvertTo-Json -Compress -Depth 6
    routes:
      - to: renegotiation_gate
        when: "{{ renegotiation_summary.output.any_pending | string | lower == 'true' }}"
      - to: outer_loop_evaluator
      # M4 catch-all
      - to: outer_loop_evaluator

  # ── Outer loop evaluator (PR #9 — iterate-until-stable) ──────────────────
  #
  # Decides what to do after one full pass through the wave dispatch
  # loop. Implements Option α (per closed-loop-state-plan §3.4 + §4
  # PR #9): re-classify the apex tree on the next iteration rather
  # than fan out per-facet up front.
  #
  # Inputs read:
  #   * Counter file (incremented by this step).
  #   * `wave_dispatch_loop.outputs` — sums of per-wave items_satisfied_count
  #     and items_dispatched_count tell us whether THIS iteration made
  #     progress (something either reached terminal-satisfied or got
  #     handed off to a corridor).
  #   * `polyphony state next-ready --work-item {apex_id}` — closed-loop
  #     honest as of PR #5; reports `item_satisfied: Satisfied` only when
  #     all facet-driven kinds are Satisfied AND children rolled up.
  #
  # Decision priority (per PR #9 brief):
  #   1. apex `item_satisfied: Satisfied` → `complete` → apex_completion_gate.
  #   2. iteration counter ≥ max_dispatch_iterations → `cap` →
  #      terminal_apex_iteration_cap.
  #   3. zero new dispatches AND zero new satisfactions → `blocked` →
  #      terminal_apex_blocked.
  #   4. otherwise → `continue` → loop back to build_worklist.
  #
  # `apex.max_dispatch_iterations` defaults to 10. Override via the
  # POLYPHONY_APEX_MAX_DISPATCH_ITERATIONS env var if a particularly
  # deep tree needs more passes (the cap is a safety net, not a
  # performance ceiling).
  #
  # Known limitation (PR #6 carry-forward): apex_satisfied is observed
  # via `next-ready` directly. If the validator-driven `item_satisfied`
  # event is not configured in `.conductor/process-config.yaml > transitions`,
  # the apex's ADO state will stay un-transitioned even though the outer
  # loop terminates `complete`. Documented in PR #220's body and again
  # in PR #9's PR body for the dogfood follow-up.
  #
  # Invariants:
  #   Pre:  wave_loop_summary succeeded; renegotiation_summary fired.
  #   Post: outer_loop_evaluator.output.decision is one of
  #         {complete, cap, blocked, continue}; iteration counter
  #         incremented exactly once.
  - name: outer_loop_evaluator
    type: script
    description: Aggregate per-iteration progress + decide loop-back / terminate (PR #9)
    command: pwsh
    args:
      - "-NoProfile"
      - "-Command"
      - |
        $counterFile = Join-Path ([System.IO.Path]::GetTempPath()) "apex-driver-iter-{{ workflow.input.apex_id }}";
        $iteration = if (Test-Path $counterFile) { [int]((Get-Content $counterFile -Raw).Trim()) + 1 } else { 1 };
        Set-Content -Path $counterFile -Value "$iteration" -NoNewline;

        $maxIterations = if ($env:POLYPHONY_APEX_MAX_DISPATCH_ITERATIONS) { [int]$env:POLYPHONY_APEX_MAX_DISPATCH_ITERATIONS } else { 10 };

        $satisfiedDelta = 0; $dispatchedDelta = 0; $totalItems = 0;
        $raw = @'
        {{ wave_dispatch_loop.outputs | tojson }}
        '@;
        try {
          $parsed = $raw | ConvertFrom-Json;
          $values = if ($parsed -is [System.Collections.IEnumerable] -and -not ($parsed -is [string])) { $parsed }
                    else { $parsed.PSObject.Properties.Value };
          foreach ($v in $values) {
            if ($null -eq $v) { continue }
            if ($v.PSObject.Properties.Name -contains 'items_satisfied_count') { $satisfiedDelta += [int]$v.items_satisfied_count }
            if ($v.PSObject.Properties.Name -contains 'items_dispatched_count') { $dispatchedDelta += [int]$v.items_dispatched_count }
            if ($v.PSObject.Properties.Name -contains 'item_count') { $totalItems += [int]$v.item_count }
          }
        } catch { }

        $madeProgress = ($satisfiedDelta -gt 0) -or ($dispatchedDelta -gt 0);

        # Apex satisfaction: trust state next-ready's closed-loop honest
        # `item_satisfied: Satisfied` (PR #5). Fail SAFE — if the verb
        # errors out for any reason, treat as not-satisfied and let the
        # progress / cap signals decide. Do NOT parse the reason text;
        # truncation observability is by demotion (PR #5 hand-off note).
        $apexSatisfied = $false;
        try {
          $nextRaw = polyphony state next-ready --work-item {{ workflow.input.apex_id }} 2>$null;
          if ($nextRaw) {
            $next = $nextRaw | ConvertFrom-Json;
            if ($null -ne $next -and $next.PSObject.Properties.Name -contains 'item_satisfied') {
              if ("$($next.item_satisfied)" -eq 'Satisfied') { $apexSatisfied = $true }
            }
          }
        } catch { }

        $capReached = $iteration -ge $maxIterations;

        $decision = if ($apexSatisfied) { 'complete' }
                    elseif ($capReached) { 'cap' }
                    elseif (-not $madeProgress) { 'blocked' }
                    else { 'continue' };

        [ordered]@{
          apex_id = {{ workflow.input.apex_id }};
          iteration = $iteration;
          max_iterations = $maxIterations;
          items_satisfied_this_iteration = $satisfiedDelta;
          items_dispatched_this_iteration = $dispatchedDelta;
          total_items_observed = $totalItems;
          made_progress = $madeProgress;
          apex_satisfied = $apexSatisfied;
          cap_reached = $capReached;
          decision = $decision;
        } | ConvertTo-Json -Compress
    routes:
      - to: apex_completion_gate
        when: "{{ outer_loop_evaluator.output.decision == 'complete' }}"
      - to: terminal_apex_iteration_cap
        when: "{{ outer_loop_evaluator.output.decision == 'cap' }}"
      - to: terminal_apex_blocked
        when: "{{ outer_loop_evaluator.output.decision == 'blocked' }}"
      - to: build_worklist
        when: "{{ outer_loop_evaluator.output.decision == 'continue' }}"
      # M4 catch-all — defensive: undefined or malformed envelope
      # falls into terminal_apex_blocked rather than silently looping.
      - to: terminal_apex_blocked

  # ── Renegotiation gate ───────────────────────────────────────────────────
  #
  # Q3 design pick — surfaces a renegotiation request that bubbled up
  # from a child plan-level invocation (PR #144). Operator picks:
  #   - renegotiate: route back to build_worklist so the next loop
  #     pass picks up the (presumably mutated) tree.
  #   - override: ignore the renegotiation request and proceed to
  #     apex completion as if the child plan was accepted.
  #   - abort: halt the workflow with apex_satisfied=false.
  #
  # `policy.renegotiation.auto_decide` defaults to `prompt` (this gate
  # fires); `auto_restart` is a stub treated identically to `prompt`
  # until the auto-restart loop ships in a follow-up; `ignore` would
  # short-circuit to `override` but is not yet wired (would require a
  # policy reader step).
  - name: renegotiation_gate
    type: human_gate
    description: Child plan-level invocation requested renegotiation — operator decides
    prompt: |
      ## 📝 Renegotiation requested

      One or more child planner invocations under apex
      **#{{ workflow.input.apex_id }}** completed but flagged that the
      assigned scope is unworkable as-is. Per
      `.conductor/policy.yaml > renegotiation.auto_decide` (default
      `prompt`) the operator decides next.

      ### Waves with renegotiation requests

      ```
      {{ renegotiation_summary.output.waves }}
      ```

      ### Wave summary

      - Total waves: **{{ wave_loop_summary.output.total_waves }}**
      - Failed waves: **{{ wave_loop_summary.output.failed_waves }}**

      ### Options

      - **Renegotiate** — re-enter the dispatch loop. Items are
        re-evaluated against the (presumably edited) tree. The
        operator should mutate the tree in ADO before choosing this.
      - **Override** — accept the child plans as-is and proceed to
        apex completion. Use when the renegotiation request is
        advisory rather than blocking.
      - **Abort** — halt with `apex_satisfied=false`.
    options:
      - label: "🔁 Renegotiate — re-enter the dispatch loop"
        value: renegotiate
        route: build_worklist
      - label: "✅ Override — accept the child plans, proceed to completion"
        value: override
        route: apex_completion_gate
      - label: "🛑 Abort"
        value: abort
        route: terminal_apex_abandoned

  # ── Wave failed gate ─────────────────────────────────────────────────────
  #
  # Surfaces failed waves to a human. Operator picks `retry` (re-enter
  # the dispatch loop — items the prior run satisfied will fast-path on
  # the next iteration), `abort` (halt with apex_satisfied=false), or
  # `escalate_renegotiation` (re-author the apex's plan; deferred).
  - name: wave_failed_gate
    type: human_gate
    description: One or more waves failed — operator decides next step
    prompt: |
      ## ❌ Wave dispatch failures

      The apex-driver dispatch loop completed with one or more wave
      failures for apex **#{{ workflow.input.apex_id }}**.

      ### Wave summary

      - Total waves: **{{ wave_loop_summary.output.total_waves }}**
      - Failed waves: **{{ wave_loop_summary.output.failed_waves }}**

      ### Failed wave details

      ```
      {{ wave_dispatch_loop.errors | tojson(indent=2) }}
      ```

      ### Options

      - **Retry** — re-enter the dispatch loop. Items the prior run
        already satisfied will fast-path; failed items will be
        re-dispatched against their current state.
      - **Abort** — halt the workflow with `apex_satisfied=false`.
      - **Renegotiate (deferred)** — re-author the apex's plan to
        accommodate the failures. MVP routes this to abort; a
        follow-up wires the renegotiation loop.
    options:
      - label: "🔁 Retry the dispatch loop"
        value: retry
        route: build_worklist
      - label: "🛑 Abort"
        value: abort
        route: terminal_apex_abandoned
      - label: "📝 Renegotiate (deferred — routes to abort in MVP)"
        value: renegotiate
        route: terminal_apex_abandoned

  # ── Worklist failure gate ────────────────────────────────────────────────
  #
  # Surfaces a failed `worklist build` (e.g. unresolved tag chain,
  # ADO outage). Operator picks retry or abort.
  - name: worklist_failure_gate
    type: human_gate
    description: Worklist build failed — operator decides next step
    prompt: |
      ## ❌ `polyphony worklist build` failed

      The apex-driver could not build a worklist for apex
      **#{{ workflow.input.apex_id }}**. This usually indicates a
      transient ADO outage, a misconfigured tag chain, or a
      structural problem in the work-item tree.

      ### Error

      ```
      {%- if build_worklist.output.error is defined -%}
      {{ build_worklist.output.error }}
      {%- else -%}
      (no error message captured — check polyphony logs)
      {%- endif -%}
      ```

      ### Options

      - **Retry** — re-run worklist build (e.g. after fixing the tag
        chain in ADO).
      - **Abort** — halt the workflow with `apex_satisfied=false`.
    options:
      - label: "🔁 Retry"
        value: retry
        route: build_worklist
      - label: "🛑 Abort"
        value: abort
        route: terminal_apex_abandoned

  # ── Preflight failure gate ───────────────────────────────────────────────
  #
  # Fires when `polyphony state next-ready` returns status=error during
  # preflight. The apex id may be invalid, the type may be unknown, or
  # ADO may be unreachable. Operator decides whether to retry or fail.
  - name: preflight_failure_gate
    type: human_gate
    description: Apex preflight validation failed — operator decides next step
    prompt: |
      ## ❌ Apex preflight failed

      A preflight step for apex **#{{ workflow.input.apex_id }}** did
      not produce a clean envelope. One of the following is the cause:

      ### `polyphony state next-ready` error
      ```
      {%- if preflight_apex_state.output.error is defined -%}
      {{ preflight_apex_state.output.error }}
      {%- else -%}
      (no error — this step succeeded or did not run)
      {%- endif -%}
      ```

      ### `polyphony branch ensure-feature` error
      ```
      {%- if preflight_ensure_branch.output.error is defined and preflight_ensure_branch.output.error != '' -%}
      {{ preflight_ensure_branch.output.error }}
      {%- else -%}
      (no error — this step succeeded or did not run)
      {%- endif -%}
      ```

      ### `init_manifest` error
      ```
      {%- if init_manifest.output.error is defined and init_manifest.output.error != '' -%}
      [{{ init_manifest.output.error_code | default('?') }}] {{ init_manifest.output.error }}
      {%- else -%}
      (no error — this step succeeded or did not run)
      {%- endif -%}
      ```

      ### `commit_and_push_manifest` error
      ```
      {%- if commit_and_push_manifest.output.error is defined and commit_and_push_manifest.output.error != '' -%}
      [{{ commit_and_push_manifest.output.error_code | default('?') }}] {{ commit_and_push_manifest.output.error }}
      {%- else -%}
      (no error — this step succeeded or did not run)
      {%- endif -%}
      ```

      ### `declare_root` error
      ```
      {%- if declare_root.output.error is defined and declare_root.output.error != '' -%}
      {{ declare_root.output.error }}
      {%- else -%}
      (no error — this step succeeded or did not run)
      {%- endif -%}
      ```

      ### Options

      - **Retry preflight** — re-run state next-ready (e.g. after
        fixing the apex's type config in ADO, repairing the working
        tree, or removing a stale `.polyphony/run.yaml`).
      - **Abort** — terminate the workflow with `preflight_failed=true`.
    options:
      - label: "🔁 Retry preflight"
        value: retry
        route: preflight_apex_state
      - label: "🛑 Abort"
        value: abort
        route: terminal_preflight_failed

  # ─────────────────────────────────────────────────────────────────────────
  # SECTION 3 — Apex completion gate
  # ─────────────────────────────────────────────────────────────────────────

  # ── Apex completion gate ─────────────────────────────────────────────────
  #
  # Surfaces the assembled apex to a human for final sign-off before
  # marking it satisfied. P6 — this is the apex-level human gate that
  # mirrors the per-item satisfaction gates in the lifecycle workflows.
  #
  # Invariants:
  #   Pre:  every wave dispatched and integrated successfully.
  #   Post: operator confirmed satisfaction or chose to abandon.
  - name: apex_completion_gate
    type: human_gate
    description: Final apex sign-off before marking satisfied
    prompt: |
      ## ✅ Apex dispatch complete

      The outer dispatch loop for apex **#{{ workflow.input.apex_id }}**
      reached `decision=complete` — `polyphony state next-ready` reports
      the apex is `item_satisfied: Satisfied` (every facet-driven kind
      Satisfied AND children's `item_satisfied` rolled up). Confirm
      satisfaction to mark the apex done and close the workflow.

      ### Iteration summary

      - Outer-loop iterations used: **{{ outer_loop_evaluator.output.iteration | default('?') }}** of {{ outer_loop_evaluator.output.max_iterations | default('?') }}
      - Last iteration items satisfied: **{{ outer_loop_evaluator.output.items_satisfied_this_iteration | default('?') }}**
      - Last iteration items dispatched: **{{ outer_loop_evaluator.output.items_dispatched_this_iteration | default('?') }}**

      ### Wave summary (most recent iteration)

      - Total waves: **{{ wave_loop_summary.output.total_waves }}**
      - Failed waves: **{{ wave_loop_summary.output.failed_waves }}**

      ### Options

      - **Confirm** — mark the apex item_satisfied via
        `polyphony validate` + `twig state` and close.
      - **Abandon** — record `apex_satisfied=false` and close. Use
        this when the integrated work is not what was intended even
        though every step technically succeeded.
    options:
      - label: "✅ Confirm — mark apex satisfied"
        value: confirm
        route: close_mark_satisfied
      - label: "🛑 Abandon"
        value: abandon
        route: terminal_apex_abandoned

  # ─────────────────────────────────────────────────────────────────────────
  # SECTION 4 — Close
  # ─────────────────────────────────────────────────────────────────────────

  # ── Close: mark apex satisfied ───────────────────────────────────────────
  #
  # Sync ADO once more (so the validate event sees a fresh cache),
  # validate the satisfaction event against the apex's type config,
  # then transition state via twig.
  - name: close_mark_satisfied
    type: script
    description: Sync, validate, and transition apex to its satisfied state
    command: pwsh
    args:
      - "-NoProfile"
      - "-Command"
      - >-
        twig sync;
        $validate = polyphony validate --work-item {{ workflow.input.apex_id }} --event item_satisfied | ConvertFrom-Json;
        if ($validate.target_state) {
          twig state $validate.target_state --id {{ workflow.input.apex_id }};
        }
        [ordered]@{
          apex_id      = {{ workflow.input.apex_id }};
          target_state = $validate.target_state;
          success      = ($null -ne $validate.target_state);
        } | ConvertTo-Json -Compress
    routes:
      - to: terminal_apex_satisfied

  # ── Terminal: apex satisfied ─────────────────────────────────────────────
  - name: terminal_apex_satisfied
    type: script
    description: Terminal — apex is satisfied
    command: pwsh
    args:
      - "-NoProfile"
      - "-Command"
      - >-
        @{ apex_id = {{ workflow.input.apex_id }}; satisfied = $true } | ConvertTo-Json -Compress
    routes:
      - to: $end

  # ── Terminal: apex abandoned ─────────────────────────────────────────────
  - name: terminal_apex_abandoned
    type: script
    description: Terminal — apex was abandoned by the operator
    command: pwsh
    args:
      - "-NoProfile"
      - "-Command"
      - >-
        @{ apex_id = {{ workflow.input.apex_id }}; satisfied = $false; abandoned = $true } | ConvertTo-Json -Compress
    routes:
      - to: $end

  # ── Terminal: preflight failed ───────────────────────────────────────────
  - name: terminal_preflight_failed
    type: script
    description: Terminal — preflight validation failed and operator aborted
    command: pwsh
    args:
      - "-NoProfile"
      - "-Command"
      - >-
        @{ apex_id = {{ workflow.input.apex_id }}; satisfied = $false; preflight_failed = $true } | ConvertTo-Json -Compress
    routes:
      - to: $end

  # ── Terminal: apex iteration cap (PR #9) ─────────────────────────────────
  #
  # Fires when the outer dispatch loop exceeded apex.max_dispatch_iterations
  # (default 10) without `item_satisfied` rolling all the way up the apex
  # tree. Indicates either (a) a genuine multi-pass apex deeper than the
  # cap, in which case the operator should raise POLYPHONY_APEX_MAX_DISPATCH_ITERATIONS
  # and re-invoke (state is on disk + ADO; resume is honest), or (b)
  # reclassification flapping — symptom (iii) from the closed-loop-state-plan
  # Option α footnote, calling for re-evaluating Option β (per-facet wave
  # fan-out in worklist build).
  - name: terminal_apex_iteration_cap
    type: script
    description: Terminal — outer dispatch loop hit max_dispatch_iterations
    command: pwsh
    args:
      - "-NoProfile"
      - "-Command"
      - >-
        @{
          apex_id = {{ workflow.input.apex_id }};
          satisfied = $false;
          iteration_cap_hit = $true;
          iterations_used = '{{ outer_loop_evaluator.output.iteration | default(0) }}';
          max_iterations  = '{{ outer_loop_evaluator.output.max_iterations | default(0) }}';
        } | ConvertTo-Json -Compress
    routes:
      - to: $end

  # ── Terminal: apex blocked (PR #9) ───────────────────────────────────────
  #
  # Fires when the iteration produced zero new dispatches AND zero new
  # satisfactions, AND the apex is not yet `item_satisfied: Satisfied`.
  # The workflow has nothing left it can do under its own steam — every
  # remaining item classifies as monitoring/blocked/error or has no
  # eligible corridor. Operator should inspect `polyphony state next-ready
  # --work-item {apex_id}` and the per-item dispositions before
  # re-invoking apex-driver.
  - name: terminal_apex_blocked
    type: script
    description: Terminal — outer loop is stable but apex is not satisfied
    command: pwsh
    args:
      - "-NoProfile"
      - "-Command"
      - >-
        @{
          apex_id = {{ workflow.input.apex_id }};
          satisfied = $false;
          blocked = $true;
          iterations_used = '{{ outer_loop_evaluator.output.iteration | default(0) }}';
          decision = '{{ outer_loop_evaluator.output.decision | default('blocked') }}';
        } | ConvertTo-Json -Compress
    routes:
      - to: $end

# ── Wave dispatch loop (for_each) ─────────────────────────────────────────
#
# for_each over waves. Each iteration:
#   1. Fans the wave's items out across per-item worktrees and
#      dispatches each into its lifecycle sub-workflow.
#   2. Integrates the completed branches back into the apex feature
#      branch in topological order.
#
# max_concurrent: 1 — waves are sequential by definition (a later
# wave's items depend on an earlier wave's items being complete).
# Within a wave, the inner for_each runs items in parallel.
#
# failure_mode: continue_on_error so a single wave's failures flow
# through to the wave_failed_gate rather than aborting the loop.
#
# Conductor schema: for_each lives at workflow root, not nested under
# `agents:` (M8). `source:` is a BARE dotted path (not a Jinja
# expression). Routes cross sections — `wave_dispatch_loop` is reached
# from agents above and routes back to `wave_loop_summary` in the
# agents section.
#
# Invariants:
#   Pre:  build_worklist.output.waves is non-empty.
#   Post: every wave has been dispatched and integrated, OR the
#         operator chose abort at wave_failed_gate.
for_each:
  - name: wave_dispatch_loop
    type: for_each
    description: Sequential per-wave dispatch + integration
    source: build_worklist.output.waves
    as: wave
    max_concurrent: 1
    failure_mode: continue_on_error
    agent:
      name: dispatch_one_wave
      type: workflow
      workflow: ./apex-wave-dispatch.yaml
      input_mapping:
        apex_id: "{{ workflow.input.apex_id }}"
        wave_index: "{{ wave.wave_index }}"
        wave_items: "{{ wave.items | tojson }}"
        platform: "{{ workflow.input.platform }}"
        organization: "{{ workflow.input.organization }}"
        project: "{{ workflow.input.project }}"
        repository: "{{ workflow.input.repository }}"
    routes:
      - to: wave_loop_summary
