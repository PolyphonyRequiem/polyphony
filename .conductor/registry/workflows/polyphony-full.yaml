# polyphony-full — Type-agnostic apex workflow for the polyphony SDLC pipeline.
#
# Entry point for any work item type at any hierarchy level. Runs preflight
# validation, detects lifecycle phase via Polyphony, and routes to the
# appropriate sub-workflow (planning, implementation, close-out, or end).
#
# Invariants:
#   Pre:  work_item_id exists in ADO and is accessible via twig CLI.
#   Post: Work item is routed to the correct phase sub-workflow or $end.

workflow:
  name: polyphony-full
  description: >-
    Type-agnostic SDLC apex workflow. Validates prerequisites, detects lifecycle
    phase, and routes to planning, implementation, close-out, or end.
  version: "1.0.1"
  entry_point: policy_loader
  metadata:
    min_polyphony_version: "1.0.1"

  limits:
    # Apex workflow that orchestrates planning/implementation/close-out
    # sub-workflows; default 10 is far too low.
    max_iterations: 200

  input:
    work_item_id:
      type: number
      required: true
      description: ADO work item ID (any type at any level)
    intent:
      type: string
      required: false
      default: resume
      description: "new | redo | resume"
    user_plan_path:
      type: string
      required: false
      default: ""
      description: Path to user-authored plan document
    policy:
      type: string
      required: false
      default: .conductor/policy.yaml
      description: Path to .conductor/policy.yaml (override via -i policy=<path>)

agents:
  # ── Policy load (apex resolution) ──────────────────────────────────────
  #
  # Loads .conductor/policy.yaml (or the override supplied via
  # -i policy=<path>) at start-of-run. Surfaces the fully-resolved snapshot
  # for operator visibility AND fails fast when policy.yaml is malformed —
  # before any LLM work begins. When no policy file exists, emits a
  # defaults-only snapshot with used_defaults=true.
  #
  # Sub-workflows that need scope-aware mode/cap resolution call
  # `polyphony policy resolve` themselves rather than threading the apex
  # snapshot through every input_mapping (see Phase 7 follow-up notes in
  # docs/decisions/polyphony-verb-migration.md).
  #
  # Invariants:
  #   Pre:  workflow.input.policy is a path string (defaults to
  #         .conductor/policy.yaml).
  #   Post: output.schema_version is set; output.used_defaults indicates
  #         whether a policy file was found.
  - name: policy_loader
    type: script
    description: Load and validate .conductor/policy.yaml at start-of-run
    command: polyphony
    args:
      - "policy"
      - "load"
      - "--path"
      - "{{ workflow.input.policy }}"
    routes:
      - to: preflight_check

  # ── Preflight validation ───────────────────────────────────────────────
  #
  # Runs preflight-check.ps1 to validate external dependencies (gh auth,
  # ADO access, .NET SDK, git state, etc.) before expensive LLM work begins.
  #
  # Invariants:
  #   Pre:  work_item_id is a valid integer.
  #   Post: output.ready is true/false; output contains check details.
  - name: preflight_check
    type: script
    description: Validate external dependencies before expensive LLM work begins
    command: polyphony
    args:
      - "state"
      - "preflight"
      - "--work-item"
      - "{{ workflow.input.work_item_id }}"
      - "--workflow-yaml"
      - "{{ workflow.file }}"
    routes:
      - to: state_detector
        when: "{{ preflight_check.output.ready == true }}"
      - to: preflight_gate
        when: "{{ preflight_check.output.ready == false }}"
      # Catch-all: if `ready` is missing or non-boolean, surface to user
      # rather than ValueError. See conductor-mechanics M4.
      - to: preflight_gate

  # ── Preflight gate (human decision point) ──────────────────────────────
  #
  # Fires only when preflight_check.output.ready == false. Presents the user
  # with a Jinja2 Markdown summary of failed checks and remediation steps,
  # then offers three choices: retry, proceed anyway, or abort (P6, P13).
  #
  # Invariants:
  #   Pre:  preflight_check has run and output.ready == false.
  #   Post: User has chosen retry (loop), proceed (continue), or abort (end).
  - name: preflight_gate
    type: human_gate
    prompt: |
      ## ⚠️ Preflight Check Failed

      {{ preflight_check.output.summary }}

      ### Required Checks

      | # | Check | Status | Detail |
      |---|-------|--------|--------|
      {% for check in preflight_check.output.required_checks %}
      | {{ loop.index }} | `{{ check.name }}` | {{ "✅" if check.passed else "❌" }} | {{ check.detail }} |
      {% endfor %}

      {% if preflight_check.output.advisory_checks %}
      ### Advisory Checks

      | # | Check | Status | Detail | Remediation |
      |---|-------|--------|--------|-------------|
      {% for check in preflight_check.output.advisory_checks %}
      | {{ loop.index }} | `{{ check.name }}` | {{ "✅" if check.passed else "⚠️" }} | {{ check.detail }} | {{ check.remediation if not check.passed else "—" }} |
      {% endfor %}
      {% endif %}

      ---

      **{{ preflight_check.output.failed_count }}** required check(s) failed, **{{ preflight_check.output.warning_count }}** advisory warning(s).

      Choose an action:
      - **Retry** — fix the issues above and re-run preflight checks
      - **Proceed Anyway** — continue despite failures (use with caution)
      - **Abort** — cancel the workflow
    options:
      - label: "🔄 Retry"
        value: retry
        route: preflight_check
      - label: "⏩ Proceed Anyway"
        value: proceed
        route: state_detector
      - label: "🛑 Abort"
        value: abort
        route: $end

  # ── State detection ────────────────────────────────────────────────────
  #
  # Runs detect-state.ps1 to determine the current lifecycle phase via
  # Polyphony route. Routes to sub-workflows based on phase:
  #   needs_planning / needs_seeding     → planning
  #   ready_for_implementation / in_progress → implementation
  #   ready_for_completion               → close_out
  #   done / removed                     → $end
  #
  # Invariants:
  #   Pre:  Preflight passed or user chose to proceed anyway.
  #   Post: output.phase contains the detected lifecycle phase.
  - name: state_detector
    type: script
    description: Detect current lifecycle phase via Polyphony route
    command: polyphony
    args:
      - "state"
      - "detect"
      - "--work-item"
      - "{{ workflow.input.work_item_id }}"
      - "--intent"
      - "{{ workflow.input.intent }}"
    routes:
      - to: ensure_feature_branch
        when: "{{ state_detector.output.phase == 'needs_planning' }}"
      - to: ensure_feature_branch
        when: "{{ state_detector.output.phase == 'needs_seeding' }}"
      - to: ensure_feature_branch
        when: "{{ state_detector.output.phase == 'ready_for_implementation' }}"
      - to: ensure_feature_branch
        when: "{{ state_detector.output.phase == 'in_progress' }}"
      - to: feature_pr
        when: "{{ state_detector.output.phase == 'ready_for_completion' }}"
      - to: $end
        when: "{{ state_detector.output.phase == 'done' }}"
      - to: $end
        when: "{{ state_detector.output.phase == 'removed' }}"
      # Catch-all: detect-state.ps1 may return 'error' or an unexpected
      # phase; route to $end rather than crash with ValueError. See
      # conductor-mechanics M4 — this is the canonical M4 example.
      - to: $end

  # ── Feature branch management ──────────────────────────────────────────
  #
  # The apex owns the feature branch lifecycle. This step idempotently
  # ensures the feature branch exists locally and on the remote before
  # routing to planning or implementation. Sub-workflows receive the
  # branch name as an input and trust it exists.
  #
  # Invariants:
  #   Pre:  state_detector has run; workspace_hint.feature_branch is set.
  #   Post: Feature branch exists locally (checked out) and on remote.
  - name: ensure_feature_branch
    type: script
    description: Create or check out the feature branch for this work item
    command: polyphony
    args:
      - "branch"
      - "ensure-feature"
      - "--branch"
      - "{{ state_detector.output.workspace_hint.feature_branch | default('feature/' ~ workflow.input.work_item_id) }}"
    routes:
      - to: planning
        when: "{{ state_detector.output.phase in ['needs_planning', 'needs_seeding'] }}"
      - to: implementation
        # Remaining phases that routed here are implementation phases.
        # Catch-all handles any edge case.
      - to: implementation

  # ── Planning sub-workflow ─────────────────────────────────────────────
  #
  # Invoked when state_detector.output.phase is needs_planning or
  # needs_seeding. Handles architect planning, plan PR review, and child
  # seeding for any plannable work item type.
  #
  # Invariants:
  #   Pre:  state_detector.output.phase in {needs_planning, needs_seeding}.
  #         Feature branch exists (created by ensure_feature_branch).
  #   Post: Work item has an approved plan and seeded children.
  - name: planning
    type: workflow
    description: Planning and seeding sub-workflow for plannable items
    workflow: ./polyphony-planning.yaml
    input_mapping:
      work_item_id: "{{ workflow.input.work_item_id }}"
      intent: "{{ workflow.input.intent }}"
      user_plan_path: "{{ workflow.input.user_plan_path }}"
      feature_branch: "{{ ensure_feature_branch.output.branch }}"
    routes:
      - to: state_detector
        # Re-discover phase after planning + seeding. State_detector will see
        # the new children (Tasks under Issue) and route to implementation.
        # P3: Re-Entry by State Discovery.

  # ── Implementation sub-workflow ───────────────────────────────────────
  #
  # Invoked when state_detector.output.phase is ready_for_implementation
  # or in_progress. Manages PG lifecycle, coding agents, PR creation and
  # review for any implementable work item type.
  #
  # Invariants:
  #   Pre:  state_detector.output.phase in {ready_for_implementation, in_progress}.
  #         Feature branch exists (created by ensure_feature_branch).
  #   Post: All PGs implemented, PRs merged, feature branch complete.
  - name: implementation
    type: workflow
    description: Implementation sub-workflow for implementable items
    workflow: ./polyphony-implement.yaml
    input_mapping:
      work_item_id: "{{ workflow.input.work_item_id }}"
      intent: "{{ workflow.input.intent }}"
      feature_branch: "{{ ensure_feature_branch.output.branch }}"
    routes:
      - to: state_detector
        # Re-discover phase after implementation. State_detector will see all
        # PGs done and route to feature_pr. P3: Re-Entry by State Discovery.

  # ── Feature PR sub-workflow ───────────────────────────────────────────
  #
  # Invoked when state_detector.output.phase is ready_for_completion.
  # Creates a feature PR (feature branch → main), reviews it, runs
  # remediation cycles if needed, and merges. The apex owns the feature
  # branch lifecycle — this step consumes it.
  #
  # Invariants:
  #   Pre:  All PGs are merged into the feature branch.
  #   Post: Feature PR is merged (merged=true) or aborted.
  - name: feature_pr
    type: workflow
    description: Feature PR creation, review, and merge
    workflow: ./feature-pr.yaml
    input_mapping:
      work_item_id: "{{ workflow.input.work_item_id }}"
      feature_branch: >-
        {%- if state_detector.output.workspace_hint is defined and state_detector.output.workspace_hint.feature_branch is defined and state_detector.output.workspace_hint.feature_branch -%}
        {{ state_detector.output.workspace_hint.feature_branch }}
        {%- elif ensure_feature_branch is defined -%}
        {{ ensure_feature_branch.output.branch | default('') }}
        {%- else -%}
        {%- endif %}
      target_branch: "main"
      platform: "github"
    routes:
      - to: close_out
        when: "{{ feature_pr.output.merged == true }}"
      - to: feature_pr_failed_gate
        when: "{{ feature_pr.output.merged == false }}"
      # Catch-all per M4: ambiguous merged state → surface to user.
      - to: feature_pr_failed_gate

  # ── Feature PR failure gate ─────────────────────────────────────────
  #
  # Fires when the feature PR sub-workflow returns merged=false (abort,
  # remediation cap exceeded, or unresolvable conflicts).
  #
  # Invariants:
  #   Pre:  feature_pr.output.merged == false.
  #   Post: User has chosen to retry, skip, or abort.
  - name: feature_pr_failed_gate
    type: human_gate
    prompt: |
      ## ⚠️ Feature PR Not Merged

      The feature PR for work item **{{ workflow.input.work_item_id }}** was
      not successfully merged.

      {% if feature_pr.output.pr_url is defined and feature_pr.output.pr_url %}
      **PR:** {{ feature_pr.output.pr_url }}
      {% endif %}

      Choose an action:
      - **Retry** — re-attempt the feature PR lifecycle
      - **Skip** — proceed to close-out without merging (manual merge required)
      - **Abort** — end the workflow
    options:
      - label: "🔄 Retry"
        value: retry
        route: feature_pr
      - label: "⏭️ Skip"
        value: skip
        route: close_out
      - label: "🛑 Abort"
        value: abort
        route: $end

  # ── Close-out sub-workflow ────────────────────────────────────────────
  #
  # Performs post-mortem analysis after the feature PR is merged.
  # Observations are returned as workflow output (not filed as children).
  #
  # Invariants:
  #   Pre:  Feature PR merged or user chose to skip.
  #   Post: Observations recorded; routes to epic_closer.
  - name: close_out
    type: workflow
    description: Post-implementation close-out and observation filing
    workflow: ./close-out.yaml
    input_mapping:
      work_item_id: "{{ workflow.input.work_item_id }}"
      feature_branch: "{{ state_detector.output.workspace_hint.feature_branch | default('') }}"
    routes:
      - to: epic_closer

  # ── Epic closer ──────────────────────────────────────────────────────
  #
  # Transitions the root work item to Done via the all_children_complete
  # event. Validates the precondition (all children in terminal state)
  # before transitioning. Non-fatal on failure — if the transition is
  # invalid, the item stays in its current state.
  #
  # Invariants:
  #   Pre:  Close-out has completed; all child work items should be Done.
  #   Post: Root work item transitioned to Done (or left as-is on failure).
  - name: epic_closer
    type: script
    description: Transition root work item to Done via all_children_complete
    command: pwsh
    args:
      - "-NoProfile"
      - "-Command"
      - >-
        $id = {{ workflow.input.work_item_id }};
        $validation = polyphony validate --work-item $id --event all_children_complete 2>&1 | ConvertFrom-Json;
        if ($validation.is_valid) {
          twig set $id 2>$null;
          twig state $validation.target_state 2>$null;
          @{ transitioned = $true; target_state = $validation.target_state; work_item_id = $id } | ConvertTo-Json
        } else {
          @{ transitioned = $false; reason = $validation.message; work_item_id = $id } | ConvertTo-Json
        }
    routes:
      - to: $end
