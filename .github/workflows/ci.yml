name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout polyphony
        uses: actions/checkout@v4
        with:
          path: polyphony
          fetch-depth: 0
          filter: tree:0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: polyphony/global.json

      - name: Restore
        working-directory: polyphony
        run: dotnet restore

      - name: Build
        working-directory: polyphony
        run: dotnet build --no-restore

      - name: Test (xUnit)
        working-directory: polyphony
        # Fast loop excludes Slow (forks pwsh / polyphony.exe) and Integration
        # (e2e harness scenarios). See #286 / #287. Run the full suite locally
        # with `dotnet test --no-build` (or via the workflow_dispatch job).
        run: dotnet test --no-build --filter "Category!=Slow&Category!=Integration"

      - name: Install Pester
        # Sequenced before all lint steps so a lint failure in an earlier
        # step (which runs `if: always()`) cannot cascade by skipping the
        # install. Previously this lived after the lint block and a single
        # type-agnostic violation cratered the whole job.
        shell: pwsh
        run: Install-Module -Name Pester -Force -SkipPublisherCheck -Scope CurrentUser

      - name: Install powershell-yaml
        # Required by the actionable.yaml e2e suite (Phase 6 PR #8) and by
        # tests/lint-pwsh-jinja-bareword.ps1. Sequenced before the lint
        # block so the bareword lint's `if: always()` always sees the
        # module — see Install Pester comment above.
        shell: pwsh
        run: Install-Module -Name powershell-yaml -Force -SkipPublisherCheck -Scope CurrentUser

      - name: Lint (type-agnosticism)
        # Runs the lint script against the actual repo (scripts/ + workflow YAMLs).
        # Pester tests below validate the lint's behavior on synthetic inputs;
        # this step is the gate that catches real regressions in shipped code.
        if: always()
        shell: pwsh
        working-directory: polyphony
        run: pwsh -NoProfile -File tests/lint-type-agnostic.ps1 -Surface all

      - name: Lint (lifecycle-router RequirementKind coverage)
        # Asserts every RequirementKind value in src/Polyphony/Sdlc/RequirementKind.cs
        # is reachable through one of lifecycle-router.ps1's classification arrays
        # (planKinds / actionKinds / implKinds / terminalKinds), or is explicitly
        # excluded with a `# router-skip: <value> — <reason>` comment. Catches
        # the silent-drop class of bug where a new requirement kind is added but
        # the classifier never learns about it (PR #6, closed-loop step 6).
        if: always()
        shell: pwsh
        working-directory: polyphony
        run: pwsh -NoProfile -File tests/lint-lifecycle-router-coverage.ps1

      - name: Lint (prose-children declarations in plan files)
        # Catches the false-satisfied bug class first surfaced by AB#3064:
        # an architect emits a plan whose body lists child work items under
        # a `## Child(ren) …` heading but whose YAML front-matter declares
        # neither `apex_facets:` (explicit-indivisibility marker) nor a
        # structured `children:` block. Defense in depth alongside PR #225
        # (`polyphony plan seed-children`'s runtime refusal); this lint
        # catches the same shape at PR-author time on the plan PR diff.
        if: always()
        shell: pwsh
        working-directory: polyphony
        run: pwsh -NoProfile -File tests/lint-prose-children.ps1 -Format github

      - name: Lint (no tracked .polyphony/ state — Rev 4.2 invariant)
        # Post-Rev 4.2 (PRs #251/#252/#254/#255) the polyphony per-root
        # state (run.yaml, run.lock) lives EXCLUSIVELY at
        # <git-common-dir>/polyphony/<root_id>/. The worktree-tracked
        # `.polyphony/` directory is forbidden. `.gitignore` covers
        # un-tracked state but does NOT prevent already-tracked paths
        # from being committed nor `git add -f` overrides — this lint
        # is the explicit invariant gate.
        if: always()
        shell: pwsh
        working-directory: polyphony
        run: pwsh -NoProfile -File tests/lint-no-tracked-polyphony-state.ps1

      - name: Lint (sync-after-mutation in command verbs)
        # Asserts every C# method body under src/Polyphony/Commands/
        # that calls SetStateAsync / PatchFieldsAsync also flushes via
        # SyncAsync(ct) before returning. twig's mutation methods only
        # stage the change in twig's local cache + pending queue — they
        # do NOT push to ADO. A separate process (e.g. polyphony
        # validate) reading via IWorkItemRepository.GetByIdAsync sees
        # the OLD state, and the workflow stalls or routes wrong.
        # AB#3126/27/28/29 family — PRs #339/340/341/356 patched the
        # four known sites individually; this lint is the standing
        # gate that catches the next instance at PR-author time.
        # Convention is documented at
        # `.github/skills/polyphony-cli-developer/SKILL.md` § "State-
        # mutation durability".
        if: always()
        shell: pwsh
        working-directory: polyphony
        run: pwsh -NoProfile -File tests/lint-sync-after-mutation.ps1 -Format github

      - name: Lint (bare cross-branch git refs)
        # Catches the AB#3157 stale-local-ref bug class: in the bare-repo
        # + per-run worktree model (AB#3085), all worktrees share
        # `.git/refs`. `gh pr merge` updates `refs/remotes/origin/...`
        # only; local `refs/heads/...` stays at the SHA the worktree was
        # created with — forever. Any agent prompt or workflow script
        # that issues `git log {{ feature }}..mg/{{ root_id }}_{{ mg }}`
        # then resolves both names against the stale local store and
        # observes stale state. PR #358 patched the two AB#3127 dogfood
        # reproducer sites; this lint catches the whole class
        # mechanically across `.conductor/registry/{workflows,prompts}/`
        # so new sites can't regress in. AB#3161.
        if: always()
        shell: pwsh
        working-directory: polyphony
        run: pwsh -NoProfile -File tests/lint-bare-cross-branch-refs.ps1 -Format github

      - name: Lint (primary_completer trust chain — AB#3214)
        # Encodes the AB#3214 contract: primary_completer in
        # implement-merge-group.yaml must be reachable ONLY via the
        # squash-coverage trust chain (assert_impl_pr_coverage →
        # delete_impl_branch → primary_completer, with
        # squash_coverage_mismatch_gate's force_accept option as the
        # only operator-override path). Together with PR #401 (AB#3210)
        # and PR #402 (AB#3211), this makes the AB#3175 premature-Done
        # green-wash structurally impossible. If anyone adds a new
        # predecessor to primary_completer or delete_impl_branch that
        # bypasses the coverage assertion, this lint fails.
        if: always()
        shell: pwsh
        working-directory: polyphony
        run: pwsh -NoProfile -File tests/lint-primary-completer-trust-chain.ps1 -Format github

      - name: Lint (workflow version drift — bundle internal consistency)
        # Asserts every workflow YAML's workflow.version matches the value in
        # .conductor/registry/index.yaml, AND that each workflow's
        # min_polyphony_version is <= its workflow.version. This catches the
        # PR #351 / PR #410 drift class: a single YAML's version forward-bumped
        # without the rest of the bundle following along, leaving the registry
        # in an unshippable state until the next release tag attempt.
        #
        # CI mode (no -RequiredVersion): asserts internal consistency only.
        # Release mode (release.yml passes -RequiredVersion <bare-tag>): also
        # asserts the bundle's shared version equals the tag being cut. Per
        # docs/decisions/versioning-strategy.md, one tag drives both binary
        # and bundle.
        if: always()
        shell: pwsh
        working-directory: polyphony
        run: pwsh -NoProfile -File tests/lint-version-drift.ps1

      - name: Setup Python (for harness scenarios)
        # The polyphony workflow harness (tests/harness/) drives the real
        # conductor engine in-process from Python with a FakeProvider for
        # the LLM boundary and a .NET shim binary on PATH for `script:`
        # nodes. Conductor requires Python 3.12+.
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install conductor (for harness scenarios)
        # Installs conductor from the public microsoft/conductor repo so
        # the harness scenarios under tests/harness/scenarios/ run on PR
        # builds. Without this, run-scenarios.Tests.ps1 detects missing
        # imports and skips the scenario tests with a diagnostic — that
        # fallback exists for developer convenience, but on CI we want
        # the scenarios to actually execute. The verification step below
        # turns a silent install failure into a hard build failure.
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install ruamel.yaml
          python -m pip install "git+https://github.com/microsoft/conductor.git@main"
          python -c "import conductor, ruamel.yaml; print('conductor + ruamel.yaml importable')"

      - name: Test (Pester)
        shell: pwsh
        working-directory: polyphony
        run: |
          # Excludes only Slow-tagged Pester tests. Integration-tagged tests
          # (the harness scenarios that boot real polyphony+conductor processes)
          # run on every PR build — they're the path-coverage net that catches
          # workflow-routing regressions before they ship (AB#3163).
          $config = New-PesterConfiguration
          $config.Run.Path = 'tests/'
          $config.Run.PassThru = $true
          $config.Output.Verbosity = 'Detailed'
          $config.Filter.ExcludeTag = @('Slow')
          $result = Invoke-Pester -Configuration $config
          if ($result.FailedCount -gt 0) { exit 1 }

      - name: Lint workflow YAMLs (StrictUndefined default-trap)
        shell: pwsh
        working-directory: polyphony
        run: |
          $result = Invoke-Pester -Path .conductor/registry/tests/lint-strict-undefined.Tests.ps1 -Output Detailed -PassThru
          if ($result.FailedCount -gt 0) { exit 1 }

      - name: Lint workflow YAMLs (PowerShell + Jinja bareword booleans)
        # Catches the AB#3156 Bug 1 class: a `command: pwsh` script body
        # that assigns a Jinja render unquoted (`$x = {{ … }}`). When
        # Jinja emits `true` / `false` (Python bool → lowercase string),
        # PowerShell parses the bareword as a cmdlet name, errors silently,
        # and leaves `$x = $null` — which downstream Jinja then treats as
        # `null != false`, routing to the wrong branch (killed an AB#3127
        # dogfood relaunch). PR #354 fixed plan-level.yaml; this lint stops
        # the pattern from coming back across every workflow YAML. Required
        # form: `$x = '{{ … }}' -eq 'true'` (or, for a numeric render,
        # `[int]'{{ … }}'`). Sequenced after `Install powershell-yaml` so
        # the YAML parser is available.
        if: always()
        shell: pwsh
        working-directory: polyphony
        run: pwsh -NoProfile -File tests/lint-pwsh-jinja-bareword.ps1 -Format github

      - name: Lint workflow YAMLs (Jinja2 resolver)
        # Resolves every `{{ <step>.output.<path> }}` reference in workflow
        # YAMLs against the verb-output schema registry (#173 / PR #184).
        # Catches five classes of bug: missing fields (JINJA001), unguarded
        # omit-when-null refs (JINJA002), unknown step ids (JINJA003),
        # non-polyphony refs that bypass schema (JINJA004; surfaced under
        # -Pedantic only), and invalid path traversal (JINJA005).
        #
        # Lints against the LIVE registry generated at build time
        # (`artifacts/verb-output-schemas.json` — written by the
        # Polyphony.SchemaExporter MSBuild step). The Pester unit suite
        # below uses the checked-in fixture under `tests/lint/fixtures/`
        # for hermetic synthetic-input tests (see ADR § "Locked registry
        # fixture vs. live registry"); only the real-workflow gate flips
        # to the live artifact.
        shell: pwsh
        working-directory: polyphony
        run: pwsh -NoProfile -File tests/lint-jinja-resolver.ps1 -Format github

      - name: Test (Pester) — Jinja2 resolver lint
        shell: pwsh
        working-directory: polyphony
        run: |
          $result = Invoke-Pester -Path tests/lint-jinja-resolver.Tests.ps1 -Output Detailed -PassThru
          if ($result.FailedCount -gt 0) { exit 1 }

      - name: Lint (CAF bool flag value form)
        # Detects workflow `args:` that pair a bool flag with "true"/"false",
        # which ConsoleAppFramework rejects at dispatcher parse-time with
        # `Argument 'false' is not recognized.` Fix: flip the verb parameter
        # to `string` and parse via `Polyphony.StringBoolArg.Parse`. See
        # PR introducing v2.4.2 and src/Polyphony/StringBoolArg.cs.
        if: always()
        shell: pwsh
        working-directory: polyphony
        run: pwsh -NoProfile -File tests/lint-caf-bool-value-form.ps1 -Format github

      - name: Test (Pester) — CAF bool flag value form lint
        if: always()
        shell: pwsh
        working-directory: polyphony
        run: |
          $result = Invoke-Pester -Path tests/lint-caf-bool-value-form.Tests.ps1 -Output Detailed -PassThru
          if ($result.FailedCount -gt 0) { exit 1 }

      - name: E2E (actionable.yaml)
        # Phase 6 PR #8 — graph-walk + agent-prompt-threading +
        # router-script behavior tests for actionable.yaml. Goes
        # beyond the structural lint by asserting end-to-end paths
        # through both executor legs.
        shell: pwsh
        working-directory: polyphony
        run: |
          $result = Invoke-Pester -Path .conductor/registry/tests/e2e-actionable.Tests.ps1 -Output Detailed -PassThru
          if ($result.FailedCount -gt 0) { exit 1 }

      - name: E2E (apex-driver)
        # Phase 7 capstone — graph-walk + branch-on-router +
        # router-script-to-YAML contract tests for the apex-driver
        # tree-walker (apex-driver.yaml + apex-wave-dispatch.yaml +
        # apex-item-dispatch.yaml). Catches drift between
        # lifecycle-router.ps1's emitted route values and the YAML's
        # `when:` clauses, and pins the bubble-up table across all
        # three workflows. Reuses the powershell-yaml install above.
        shell: pwsh
        working-directory: polyphony
        run: |
          $result = Invoke-Pester -Path .conductor/registry/tests/e2e-apex-driver.Tests.ps1 -Output Detailed -PassThru
          if ($result.FailedCount -gt 0) { exit 1 }
