# AB#3212 — Scripted human_gate response: drive the non-first option.
#
# Same revise_counter no-commit cap chain as
# revise_counter_no_commit_fast_fail, but the scenario *scripts* the
# revise_cap_gate response to "abort" — the FOURTH option in the gate's
# `options:` block. Under --skip-gates alone the harness would auto-pick
# the first option (Re-poll) and loop back to poll_status; the scripted
# handler instead routes to `terminal_abort_run` → $end.
#
# This is the proof scenario for the harness's scripted-gate infrastructure
# (`gates:` block + `gates_resolved` trace assertion + strict-by-default
# validation). It exercises a route that --skip-gates alone cannot reach.
#
# Counter walk (file at $env:TMP/conductor-github-pr-revise-442006-442.json):
#   iter 1: count=1, sha=X, shaPrev='',  no_commit=0,   cap=false → fixer
#   iter 2: count=2, sha=X, shaPrev=X,   no_commit=1,   cap=false → fixer
#   iter 3: count=3, sha=X, shaPrev=X,   no_commit=2,   cap=true (no_commit_stuck) → revise_cap_gate
#   gate (scripted=abort) → terminal_abort_run → $end
#
# `merged` evaluates to `false` because neither pr_merger nor
# closed_unmerged_emitter ran; the workflow `output:` block's `{%- else
# -%}false` branch wins. See github-pr.yaml:100-103.

workflow: .conductor/registry/workflows/github-pr.yaml

inputs:
  pr_number: 442
  branch_name: feature/issue-442
  target_branch: main
  work_item_id: "442006"

# Drive revise_cap_gate to the `abort` option (4th in the options list)
# instead of the auto-picked first option (`repoll`). String shorthand
# expands to {value: abort, additional_input: {}}.
gates:
  revise_cap_gate: abort

agent_scripts:
  pr_initial_reviewer:
    - content:
        posted: false
        pr_number: 442
        summary: "Harness fixture review — one blocking concern."
        strengths: []
        blocking_concerns:
          - "TestThing.cs:42 swallows the exception silently."
        non_blocking_suggestions: []
        comment_body: |
          <!-- polyphony:agent-comment agent=pr_initial_reviewer pr_number=442 -->
          ### Blocking concerns
          - TestThing.cs:42 swallows the exception silently.

  # 3 analyzer calls, all negative with the same digest.
  pr_feedback_analyzer:
    - content:
        has_negative_feedback: true
        feedback_summary: "Fix TestThing.cs:42 — log + rethrow."
        feedback_digest: "harness-digest-442006-stuck"
        reasoning: "Bot reviewer surfaced 1 blocking concern; fixer iteration 1."
    - content:
        has_negative_feedback: true
        feedback_summary: "Fix TestThing.cs:42 — log + rethrow."
        feedback_digest: "harness-digest-442006-stuck"
        reasoning: "Same feedback; fixer iteration 2 didn't commit."
    - content:
        has_negative_feedback: true
        feedback_summary: "Fix TestThing.cs:42 — log + rethrow."
        feedback_digest: "harness-digest-442006-stuck"
        reasoning: "Same feedback; fixer iteration 3 still no commit — cap should fire."

  # 2 fixer calls; the 3rd analyzer pass routes to the cap gate, not fixer.
  pr_fixer:
    - content:
        fixes_applied:
          - "Attempted to fix TestThing.cs:42 (iteration 1)."
        files_modified: []
        tests_passed: true
    - content:
        fixes_applied:
          - "Attempted to fix TestThing.cs:42 (iteration 2)."
        files_modified: []
        tests_passed: true

cli_scripts:
  - command: polyphony
    args: [plan, load-agent-guidance]
    stdout: |
      {
        "type": "deliverable",
        "architect": {"role": "", "type_refinement": ""},
        "reviewer":  {"role": "", "type_refinement": ""},
        "coder":     {"role": "", "type_refinement": ""},
        "agents": {}
      }
    exit_code: 0

  - command: gh
    args: [pr, comment]
    stdout: '{"posted":true,"pr_number":442}'
    exit_code: 0

  - command: gh
    args: [repo, view]
    stdout: '{"owner":{"login":"polyphony"},"name":"polyphony"}'
    exit_code: 0

  - command: polyphony
    args: [policy, resolve, --domain, approvals]
    stdout: |
      {
        "domain": "approvals",
        "scope": "type:deliverable",
        "mode": "warning",
        "max_revision_cycles": 5
      }
    exit_code: 0

  # Three identical-SHA poll responses to fire the no_commit_stuck cap.
  # No fourth poll: the scripted gate response routes to terminal_abort_run,
  # not back to poll_status.
  - command: polyphony
    args: [pr, poll-status]
    times: 1
    stdout: |
      {
        "route": "none",
        "route_reason": "bot reviewer surfaced blocking concerns; no merge signal",
        "state": "OPEN",
        "pr_url": "https://github.com/polyphony/polyphony/pull/442",
        "author_identity": "polyphony-bot",
        "head_sha": "stuckSHA",
        "comments": [],
        "threads": [],
        "reviewers": []
      }
    exit_code: 0

  - command: polyphony
    args: [pr, poll-status]
    times: 1
    stdout: |
      {
        "route": "none",
        "route_reason": "no commit since last revise",
        "state": "OPEN",
        "pr_url": "https://github.com/polyphony/polyphony/pull/442",
        "author_identity": "polyphony-bot",
        "head_sha": "stuckSHA",
        "comments": [],
        "threads": [],
        "reviewers": []
      }
    exit_code: 0

  - command: polyphony
    args: [pr, poll-status]
    times: 1
    stdout: |
      {
        "route": "none",
        "route_reason": "no commit since last revise (2nd time)",
        "state": "OPEN",
        "pr_url": "https://github.com/polyphony/polyphony/pull/442",
        "author_identity": "polyphony-bot",
        "head_sha": "stuckSHA",
        "comments": [],
        "threads": [],
        "reviewers": []
      }
    exit_code: 0

expected_trace:
  agents_executed:
    - guidance_loader
    - pr_initial_reviewer
    - pr_initial_reviewer_poster
    - poll_status
    - pr_feedback_analyzer
    - revise_counter
    - pr_fixer
    - pr_feedback_analyzer
    - revise_counter
    - pr_fixer
    - pr_feedback_analyzer
    - revise_counter
    - revise_cap_gate
    - terminal_abort_run
  scripts_executed:
    - guidance_loader
    - pr_initial_reviewer_poster
    - poll_status
    - revise_counter
    - revise_counter
    - revise_counter
    - terminal_abort_run
  gates_presented:
    - revise_cap_gate
  gates_resolved:
    revise_cap_gate: abort
  reached_terminal: true
  output_contains:
    merged: false
