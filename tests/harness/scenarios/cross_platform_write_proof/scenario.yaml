# cross_platform_write_proof — AB#3082
#
# End-to-end harness scenario proving the archivist → promotion writer
# pipeline works across a non-github↔github platform combination.
#
# Chosen combo: source-on-GitHub + research-on-ADO (azure_devops).
# Selected because the GitHub side is already exercised by polyphony's
# own dogfood runs, leaving the ADO write path as the novel surface.
#
# The scenario drives research-curation.yaml through:
#   1. enumerate_artifacts (script) — returns 2 scratch artifacts
#   2. archivist_agent (agent) — decides keep + discard
#   3. validate_decisions (script) — validates decisions, no errors
#   4. promote (script) — writes kept artifact, records platform combo
#
# Assertions:
#   - archivist_agent is executed (ordered subsequence)
#   - workflow reaches terminal ($end)
#   - output.platform_combo = "source:github+research:azure_devops"
#   - output.discarded_count = 1 (proves discard leg exercised)
#   - output.curate_artifact_count = 2 (proves curate processed all)
#
# Run artifact: the workflow output itself IS the run artifact — it
# names the platform combo exercised so reviewers can verify the proof.

workflow: .conductor/registry/workflows/research-curation.yaml

inputs:
  apex_id: 3075
  scratch_dir: research/scratch/3075
  destination_json: '{"platform":"azure_devops","repo_locator":"polyphonyrequiem/Polyphony/research","branch":"main","root_path":"articles"}'

cli_scripts:
  # ── 1. Enumerate: polyphony agent archivist ──────────────────────────
  #
  # Returns an ArchivistResult envelope with 2 artifacts and empty
  # decision placeholders (the LLM agent fills them in).
  - command: polyphony
    args: [agent, archivist]
    stdout: |
      {"apex":3075,"scratch_path":"research/scratch/3075","decisions":[{"artifact":"api-versioning.md","decision":"","rationale":"","relevance_signals":{"domain":"","codebase":"","technology_stacks":"","ecosystem":"","linkability":""}},{"artifact":"noise.md","decision":"","rationale":"","relevance_signals":{"domain":"","codebase":"","technology_stacks":"","ecosystem":"","linkability":""}}],"error":null,"error_code":null}
    exit_code: 0

  # ── 3. Validate: polyphony research curate ───────────────────────────
  #
  # Returns a valid ResearchCurateResult with 2 decisions, no errors.
  - command: polyphony
    args: [research, curate]
    stdout: |
      {"apex_id":3075,"scratch_dir":"research/scratch/3075","decisions":[{"artifact_path":"api-versioning.md","decision":"keep","rationale":"Relevant to API patterns.","relevance_signals":{"domain":"high","codebase":"high","technology_stacks":"medium","ecosystem":"high","linkability":"high"}},{"artifact_path":"noise.md","decision":"discard","rationale":"Not relevant.","relevance_signals":{"domain":"none","codebase":"none","technology_stacks":"none","ecosystem":"none","linkability":"none"}}],"artifact_count":2,"error":null,"error_code":null}
    exit_code: 0

  # ── 4. Promote: polyphony research promote ───────────────────────────
  #
  # Returns a ResearchPromoteResult recording the cross-platform combo
  # and listing the promoted artifact. This is the key assertion target.
  - command: polyphony
    args: [research, promote]
    stdout: |
      {"apex_id":3075,"promoted":["api-versioning.md"],"expand_requested":[],"discarded_count":1,"platform_combo":"source:github+research:azure_devops","error":null,"error_code":null}
    exit_code: 0

# ── 2. Archivist agent: LLM produces decisions ────────────────────────
#
# The agent returns a decisions_json string containing a JSON array of
# ArchivistDecision objects — 1 keep, 1 discard.
agent_scripts:
  archivist_agent:
    - content:
        decisions_json: '[{"artifact_path":"api-versioning.md","decision":"keep","rationale":"Relevant to API patterns.","relevance_signals":{"domain":"high","codebase":"high","technology_stacks":"medium","ecosystem":"high","linkability":"high"}},{"artifact_path":"noise.md","decision":"discard","rationale":"Not relevant.","relevance_signals":{"domain":"none","codebase":"none","technology_stacks":"none","ecosystem":"none","linkability":"none"}}]'

expected_trace:
  agents_executed:
    - archivist_agent
  reached_terminal: true
  output_contains:
    platform_combo: "source:github+research:azure_devops"
    discarded_count: 1
    curate_artifact_count: 2
