# Agile process template: Epic → User Story → Task
# States: New, Active, Resolved, Closed, Removed

process_template: Agile

types:
  Epic:
    self_referential: false
    allowed_child_types: [User Story]
    capabilities: [plannable]
    filing_eligible: false
    max_nesting_depth: 1
    decomposition_guidance: |
      Always decompose into User Stories. Epics are never implemented directly.
  User Story:
    self_referential: false
    allowed_child_types: [Task]
    parent: Epic
    capabilities: [plannable, implementable]
    filing_eligible: true
    max_nesting_depth: 1
    decomposition_guidance: |
      Decompose into Tasks when scope exceeds a single PG.
      Implement directly when the change is focused and fits one PG.
  Task:
    self_referential: false
    allowed_child_types: []
    parent: User Story
    capabilities: [implementable]
    filing_eligible: true

transitions:
  Epic:
    begin_planning: Active
    all_children_complete: Closed
    scope_removed: Removed
  User Story:
    begin_planning: Active
    begin_implementation: Active
    implementation_complete: Closed
    scope_removed: Removed
  Task:
    begin_implementation: Active
    implementation_complete: Closed
    scope_removed: Removed

branch_strategy:
  feature_branch: "feature/{root_id}-{slug}"
  planning_branch: "planning/{root_id}"
  pg_branch: "pg-{n}/{root_id}-{slug}"
  target: main

platform: github
