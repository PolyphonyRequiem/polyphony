# JINJA001 — references a field that does not exist on the verb's result type.
# `derive_chain` runs `plan derive-ancestor-chain` which returns a
# `PlanDeriveAncestorChainResult` with fields like root_id, parent_item_id, etc.
# `nonexistent_field` is not on that type → JINJA001 error.

workflow:
  name: jinja001-missing-field
  entry_point: derive_chain

agents:
  - name: derive_chain
    type: script
    command: polyphony
    args:
      - "plan"
      - "derive-ancestor-chain"
      - "{{ workflow.input.work_item_id }}"
      - "{{ workflow.input.work_item_id }}"
    routes:
      - to: consumer

  - name: consumer
    type: agent
    model: claude-haiku-4.5
    prompt: |
      Bad: {{ derive_chain.output.nonexistent_field }}.
    routes:
      - to: $end
