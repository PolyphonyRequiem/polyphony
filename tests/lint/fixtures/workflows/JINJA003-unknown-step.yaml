# JINJA003 — references a step id that doesn't exist in this workflow.

workflow:
  name: jinja003-unknown-step
  entry_point: real_step

agents:
  - name: real_step
    type: script
    command: polyphony
    args:
      - "plan"
      - "derive-ancestor-chain"
      - "{{ workflow.input.work_item_id }}"
      - "{{ workflow.input.work_item_id }}"
    routes:
      - to: consumer

  - name: consumer
    type: agent
    model: claude-haiku-4.5
    prompt: |
      Refers to a step that doesn't exist: {{ ghost_step.output.field }}.
    routes:
      - to: $end
