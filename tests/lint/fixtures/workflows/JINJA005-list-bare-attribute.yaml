# JINJA005 — bare attribute access on a list. `ancestor_chain` is a list of
# strings; accessing `.name` on the list (rather than `[0].name` or
# `| first | name`) is the silent runtime trap.

workflow:
  name: jinja005-list-bare-attribute
  entry_point: derive_chain

agents:
  - name: derive_chain
    type: script
    command: polyphony
    args:
      - "plan"
      - "derive-ancestor-chain"
      - "{{ workflow.input.work_item_id }}"
      - "{{ workflow.input.work_item_id }}"
    routes:
      - to: consumer

  - name: consumer
    type: agent
    model: claude-haiku-4.5
    prompt: |
      Bad list access: {{ derive_chain.output.ancestor_chain.name }}.
    routes:
      - to: $end
