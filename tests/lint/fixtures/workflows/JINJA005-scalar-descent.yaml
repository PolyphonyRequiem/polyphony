# JINJA005 — descend through a scalar leaf. `root_id` is a scalar int;
# accessing `.deeper` on it walks through the leaf → error.

workflow:
  name: jinja005-scalar-descent
  entry_point: derive_chain

agents:
  - name: derive_chain
    type: script
    command: polyphony
    args:
      - "plan"
      - "derive-ancestor-chain"
      - "{{ workflow.input.work_item_id }}"
    routes:
      - to: consumer

  - name: consumer
    type: agent
    model: claude-haiku-4.5
    prompt: |
      Bad descent: {{ derive_chain.output.root_id.deeper }}.
    routes:
      - to: $end
